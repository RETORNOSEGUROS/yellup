<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚽ Jogos — Yellup</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg-abyss: #06080f;
      --bg-deep: #0b0f1a;
      --bg-card: #111627;
      --bg-elevated: #171d33;
      --bg-glass: rgba(17, 22, 39, 0.8);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,181,71,0.25);
      --text: #eaedf6;
      --text-dim: #7a82a0;
      --text-muted: #454d6b;
      --gold: #ffb547;
      --gold-glow: rgba(255,181,71,0.25);
      --green: #34d399;
      --green-glow: rgba(52,211,153,0.15);
      --red: #f87171;
      --red-glow: rgba(248,113,113,0.15);
      --blue: #60a5fa;
      --blue-glow: rgba(96,165,250,0.15);
      --purple: #a78bfa;
      --orange: #fb923c;
      --cyan: #22d3ee;
      --card-r: 16px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-abyss);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* === BACKGROUND === */
    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(255,181,71,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(96,165,250,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 100%, rgba(34,139,34,0.04) 0%, transparent 50%);
      z-index:0; pointer-events:none;
    }
    body::after {
      content:'';
      position:fixed; bottom:0; left:0; width:100%; height:35%;
      background:
        linear-gradient(0deg, transparent 49%, rgba(255,255,255,0.012) 49%, rgba(255,255,255,0.012) 51%, transparent 51%),
        radial-gradient(circle at 50% 50%, transparent 7%, rgba(255,255,255,0.01) 7%, rgba(255,255,255,0.01) 7.5%, transparent 7.5%),
        repeating-linear-gradient(90deg, rgba(34,139,34,0.012) 0px, rgba(34,139,34,0.012) 50px, rgba(34,139,34,0.02) 50px, rgba(34,139,34,0.02) 100px);
      opacity:0.5; z-index:0; pointer-events:none;
      mask-image: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 80%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 80%);
    }

    .app { position:relative; z-index:1; max-width:600px; margin:0 auto; padding:12px 12px 80px; }

    /* === TOPBAR === */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px; margin-bottom:16px;
      background: var(--bg-glass); backdrop-filter: blur(20px);
      border:1px solid var(--border); border-radius:14px;
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar-back {
      width:34px; height:34px; border-radius:9px;
      background: rgba(255,255,255,0.04); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-dim); font-size:16px; cursor:pointer;
      text-decoration:none; transition: all 0.2s;
    }
    .topbar-back:hover { border-color:var(--gold); color:var(--gold); }
    .topbar-title { font-weight:800; font-size:16px; }
    .topbar-title span { color:var(--gold); }
    .topbar-user {
      display:flex; align-items:center; gap:8px;
      padding:5px 12px 5px 5px; border-radius:10px;
      background: rgba(255,255,255,0.04); border:1px solid var(--border);
    }
    .topbar-avatar {
      width:28px; height:28px; border-radius:7px;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800; color:#000;
    }
    .topbar-avatar img { width:28px; height:28px; border-radius:7px; object-fit:cover; }
    .topbar-info { line-height:1.2; }
    .topbar-name { font-size:11px; font-weight:700; }
    .topbar-xp { font-size:9px; color:var(--text-dim); font-weight:600; }

    /* === DATE SELECTOR === */
    .date-selector {
      display:flex; gap:6px; margin-bottom:16px;
      overflow-x:auto; padding:2px 0;
      -ms-overflow-style:none; scrollbar-width:none;
    }
    .date-selector::-webkit-scrollbar { display:none; }
    .date-btn {
      flex-shrink:0; padding:8px 16px; border-radius:10px;
      background: var(--bg-card); border:1px solid var(--border);
      color:var(--text-dim); font-size:12px; font-weight:600;
      cursor:pointer; font-family:'Outfit',sans-serif;
      transition: all 0.2s; white-space:nowrap;
    }
    .date-btn:hover { border-color:var(--gold); color:var(--text); }
    .date-btn.active { background:var(--gold-glow); border-color:rgba(255,181,71,0.3); color:var(--gold); }
    .date-btn .day-name { font-size:9px; display:block; text-transform:uppercase; letter-spacing:0.5px; opacity:0.7; }
    .date-btn .day-num { font-size:14px; font-weight:800; display:block; margin-top:1px; }

    /* === SECTION === */
    .section { margin-bottom:20px; }
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px; padding:0 4px;
    }
    .section-title {
      font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px;
    }
    .section-count {
      font-size:11px; font-weight:600; color:var(--text-muted);
      padding:2px 8px; border-radius:6px;
      background: rgba(255,255,255,0.03);
    }
    .section-badge {
      display:flex; align-items:center; gap:4px;
      padding:3px 10px; border-radius:8px;
      font-size:10px; font-weight:700; letter-spacing:0.5px;
    }
    .section-badge.live {
      background: var(--red-glow); color:var(--red);
      animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .section-badge.live::before {
      content:''; width:6px; height:6px; border-radius:50%;
      background:var(--red); animation: livePulse 1.5s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
    .section-badge.scheduled { background: var(--blue-glow); color:var(--blue); }
    .section-badge.finished { background: rgba(255,255,255,0.05); color:var(--text-muted); }

    /* === GAME CARD === */
    .game-card {
      background: var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--card-r);
      padding:16px;
      margin-bottom:10px;
      cursor:pointer;
      transition: all 0.25s ease;
      position:relative;
      overflow:hidden;
    }
    .game-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, var(--team-a-color, #28a745), var(--gold), var(--team-b-color, #dc3545));
      opacity:0; transition: opacity 0.3s;
    }
    .game-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 0 1px var(--border-hover);
    }
    .game-card:hover::before { opacity:1; }
    .game-card:active { transform: translateY(0); }

    .game-card.live {
      border-color: rgba(248,113,113,0.2);
      box-shadow: 0 0 30px var(--red-glow);
    }
    .game-card.live::before { opacity:1; }

    .game-top {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:12px;
    }
    .game-league {
      display:flex; align-items:center; gap:6px;
      font-size:10px; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.8px;
    }
    .game-league img { width:16px; height:16px; border-radius:3px; }
    .game-status {
      padding:3px 8px; border-radius:6px;
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
    }
    .game-status.live { background:var(--red-glow); color:var(--red); }
    .game-status.soon { background:var(--gold-glow); color:var(--gold); }
    .game-status.scheduled { background:var(--blue-glow); color:var(--blue); }
    .game-status.finished { background:rgba(255,255,255,0.05); color:var(--text-muted); }

    .game-teams {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; gap:10px; margin-bottom:12px;
    }
    .game-team {
      display:flex; align-items:center; gap:10px;
    }
    .game-team.away { flex-direction:row-reverse; text-align:right; }
    .game-team-shield {
      width:44px; height:44px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; position:relative;
    }
    .game-team-shield.home { background: rgba(var(--ta-r,40), var(--ta-g,167), var(--ta-b,69), 0.15); }
    .game-team-shield.away { background: rgba(var(--tb-r,220), var(--tb-g,53), var(--tb-b,69), 0.15); }
    .game-team-shield img {
      width:32px; height:32px; object-fit:contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }
    .game-team-shield .emoji-shield { font-size:24px; }
    .game-team-name {
      font-size:13px; font-weight:700; line-height:1.3;
      letter-spacing:-0.2px;
    }
    .game-team-sub { font-size:10px; color:var(--text-muted); font-weight:500; }

    .game-center { text-align:center; min-width:60px; }
    .game-time {
      font-family:'JetBrains Mono',monospace;
      font-size:20px; font-weight:800; letter-spacing:1px;
    }
    .game-time.live-score { color:var(--text); }
    .game-time.upcoming {
      font-size:16px; color:var(--gold);
    }
    .game-minute {
      display:inline-flex; align-items:center; gap:3px;
      font-family:'JetBrains Mono',monospace;
      font-size:10px; font-weight:700; color:var(--red);
      margin-top:2px;
    }
    .game-minute::before {
      content:''; width:5px; height:5px; border-radius:50%;
      background:var(--red); animation: livePulse 1.5s ease-in-out infinite;
    }
    .game-date-text {
      font-size:10px; color:var(--text-muted); font-weight:500;
      margin-top:2px;
    }

    .game-bottom {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:10px; border-top:1px solid var(--border);
    }
    .game-meta {
      display:flex; gap:8px;
    }
    .game-meta-item {
      display:flex; align-items:center; gap:3px;
      font-size:10px; color:var(--text-muted); font-weight:500;
    }
    .game-enter-btn {
      display:flex; align-items:center; gap:4px;
      padding:6px 14px; border-radius:8px;
      font-size:11px; font-weight:700;
      border:none; cursor:pointer; font-family:'Outfit',sans-serif;
      transition: all 0.2s;
    }
    .game-enter-btn.live {
      background: linear-gradient(135deg, var(--red), #dc2626);
      color:#fff; box-shadow: 0 4px 15px var(--red-glow);
    }
    .game-enter-btn.live:hover { transform:translateY(-1px); box-shadow: 0 6px 20px var(--red-glow); }
    .game-enter-btn.soon {
      background: linear-gradient(135deg, var(--gold), #e09800);
      color:#000; box-shadow: 0 4px 15px var(--gold-glow);
    }
    .game-enter-btn.soon:hover { transform:translateY(-1px); box-shadow: 0 6px 20px var(--gold-glow); }
    .game-enter-btn.scheduled {
      background: var(--bg-elevated); border:1px solid var(--border);
      color:var(--text-dim);
    }
    .game-enter-btn.scheduled:hover { border-color:var(--blue); color:var(--blue); }
    .game-enter-btn.finished {
      background: var(--bg-elevated); border:1px solid var(--border);
      color:var(--text-muted);
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align:center; padding:40px 20px;
      background: var(--bg-card); border:1px solid var(--border);
      border-radius:var(--card-r);
    }
    .empty-icon { font-size:40px; margin-bottom:10px; }
    .empty-text { font-size:14px; color:var(--text-dim); font-weight:500; }
    .empty-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }

    /* === LOADING === */
    .loading-state {
      text-align:center; padding:60px 20px;
    }
    .loading-spinner {
      width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--gold); border-radius:50%;
      animation: spin 0.8s linear infinite; margin:0 auto 12px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:13px; color:var(--text-dim); font-weight:500; }

    /* === QUICK STATS === */
    .quick-stats {
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
      margin-bottom:16px;
    }
    .qs-card {
      background: var(--bg-card); border:1px solid var(--border);
      border-radius:12px; padding:12px; text-align:center;
    }
    .qs-val {
      font-family:'JetBrains Mono',monospace;
      font-size:20px; font-weight:800;
    }
    .qs-val.live { color:var(--red); }
    .qs-val.today { color:var(--gold); }
    .qs-val.next { color:var(--blue); }
    .qs-label {
      font-size:9px; font-weight:700; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.8px; margin-top:2px;
    }

    /* === TOAST === */
    .toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(100px);
      padding:10px 20px; border-radius:10px;
      background: var(--bg-card); border:1px solid var(--border);
      color:var(--text); font-size:13px; font-weight:600;
      z-index:999; opacity:0; transition: all 0.3s;
      white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* === BOTTOM NAV === */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      background: var(--bg-glass); backdrop-filter: blur(20px);
      border-top:1px solid var(--border);
      padding:6px 12px env(safe-area-inset-bottom);
      z-index:100;
    }
    .nav-content {
      max-width:600px; margin:0 auto;
      display:flex; justify-content:space-around;
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      font-size:9px; font-weight:600; color:var(--text-muted);
      text-decoration:none; padding:4px 8px; border-radius:8px;
      transition: all 0.2s; position:relative;
    }
    .nav-item:hover { color:var(--text-dim); }
    .nav-item.active { color:var(--gold); }
    .nav-item .nav-icon { font-size:18px; }
    .nav-item .nav-badge {
      position:absolute; top:0; right:2px;
      width:14px; height:14px; border-radius:50%;
      background:var(--red); font-size:8px; font-weight:800;
      display:flex; align-items:center; justify-content:center; color:#fff;
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:3px; }

    @media (max-width: 400px) {
      .game-team-shield { width:36px; height:36px; }
      .game-team-shield img { width:26px; height:26px; }
      .game-team-name { font-size:12px; }
      .game-time { font-size:18px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="painel.html" class="topbar-back">←</a>
      <div class="topbar-title">⚽ <span>Jogos</span></div>
    </div>
    <div class="topbar-user" id="topbarUser" style="display:none">
      <div class="topbar-avatar" id="topbarAvatar">U</div>
      <div class="topbar-info">
        <div class="topbar-name" id="topbarName">...</div>
        <div class="topbar-xp" id="topbarXP">0 XP</div>
      </div>
    </div>
  </div>

  <!-- DATE SELECTOR -->
  <div class="date-selector" id="dateSelector"></div>

  <!-- QUICK STATS -->
  <div class="quick-stats">
    <div class="qs-card">
      <div class="qs-val live" id="qsLive">0</div>
      <div class="qs-label">🔴 Ao Vivo</div>
    </div>
    <div class="qs-card">
      <div class="qs-val today" id="qsToday">0</div>
      <div class="qs-label">📅 Hoje</div>
    </div>
    <div class="qs-card">
      <div class="qs-val next" id="qsNext">0</div>
      <div class="qs-label">📆 Próximos</div>
    </div>
  </div>

  <!-- JOGOS CONTAINER -->
  <div id="jogosContainer">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Carregando jogos...</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-content">
    <a href="painel.html" class="nav-item">
      <span class="nav-icon">🏠</span> Início
    </a>
    <a href="jogos-hoje.html" class="nav-item active">
      <span class="nav-icon">⚽</span> Jogos
      <span class="nav-badge" id="navBadgeLive" style="display:none">0</span>
    </a>
    <a href="ranking.html" class="nav-item">
      <span class="nav-icon">🏆</span> Ranking
    </a>
    <a href="perfil.html" class="nav-item">
      <span class="nav-icon">👤</span> Perfil
    </a>
  </div>
</nav>

<script>
  // ===========================
  // 🔥 FIREBASE
  // ===========================
  firebase.initializeApp({
    apiKey: "AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
    authDomain: "painel-yellup.firebaseapp.com",
    projectId: "painel-yellup",
    storageBucket: "painel-yellup.appspot.com",
    messagingSenderId: "608347210297",
    appId: "1:608347210297:web:75092713724e617c7203e8"
  });
  const db = firebase.firestore();
  const auth = firebase.auth();

  // ===========================
  // 📦 STATE
  // ===========================
  let currentUser = null;
  let currentUserData = null;
  let selectedDate = new Date();
  let timesCache = {};
  let campeonatosCache = {};

  // ===========================
  // 🔐 AUTH
  // ===========================
  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    try {
      const userDoc = await db.collection('usuarios').doc(user.uid).get();
      if (userDoc.exists) {
        currentUserData = userDoc.data();
        renderUserInfo();
      }
    } catch(e) { console.error('Erro ao carregar usuário:', e); }

    buildDateSelector();
    carregarJogos();
  });

  function renderUserInfo() {
    const el = document.getElementById('topbarUser');
    el.style.display = 'flex';
    const d = currentUserData;
    const nome = d.nome || d.displayName || d.apelido || 'Jogador';
    const xp = d.xpTotal || d.xp || 0;
    document.getElementById('topbarName').textContent = nome;
    document.getElementById('topbarXP').textContent = xp + ' XP';

    const avatarEl = document.getElementById('topbarAvatar');
    if (d.avatarUrl || d.avatar || d.photoURL) {
      avatarEl.innerHTML = `<img src="${d.avatarUrl || d.avatar || d.photoURL}" alt="">`;
    } else {
      avatarEl.textContent = nome.charAt(0).toUpperCase();
    }
  }

  // ===========================
  // 📅 DATE SELECTOR
  // ===========================
  function buildDateSelector() {
    const container = document.getElementById('dateSelector');
    const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const hoje = new Date();
    hoje.setHours(0,0,0,0);

    let html = '';
    for (let i = -1; i < 7; i++) {
      const d = new Date(hoje);
      d.setDate(d.getDate() + i);
      const isToday = i === 0;
      const isActive = isSameDay(d, selectedDate);

      let label;
      if (i === -1) label = 'Ontem';
      else if (i === 0) label = 'Hoje';
      else if (i === 1) label = 'Amanhã';
      else label = diasSemana[d.getDay()];

      html += `
        <button class="date-btn ${isActive ? 'active' : ''}" onclick="selecionarData(${d.getTime()})">
          <span class="day-name">${label}</span>
          <span class="day-num">${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}</span>
        </button>
      `;
    }
    container.innerHTML = html;
  }

  function selecionarData(timestamp) {
    selectedDate = new Date(timestamp);
    buildDateSelector();
    carregarJogos();
  }

  function isSameDay(a, b) {
    return a.getDate() === b.getDate() && a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear();
  }

  // ===========================
  // ⚽ CARREGAR JOGOS
  // ===========================
  async function carregarJogos() {
    const container = document.getElementById('jogosContainer');
    container.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div><div class="loading-text">Carregando jogos...</div></div>`;

    try {
      // Buscar jogos numa janela de tempo (dia selecionado)
      const iniciodia = new Date(selectedDate);
      iniciodia.setHours(0, 0, 0, 0);
      const fimdia = new Date(selectedDate);
      fimdia.setHours(23, 59, 59, 999);

      // Buscar todos os jogos e filtrar localmente (mais flexível)
      const snapshot = await db.collection('jogos')
        .orderBy('dataInicio', 'asc')
        .get();

      const jogos = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        data.id = doc.id;
        // Converter timestamp
        if (data.dataInicio) {
          data._dataInicio = data.dataInicio.toDate ? data.dataInicio.toDate() : new Date(data.dataInicio);
        }
        if (data.dataFim) {
          data._dataFim = data.dataFim.toDate ? data.dataFim.toDate() : new Date(data.dataFim);
        }
        jogos.push(data);
      });

      // Classificar status
      const agora = new Date();
      jogos.forEach(j => {
        if (!j._dataInicio) { j._status = 'agendado'; return; }
        if (j._dataFim && agora >= j._dataFim) j._status = 'finalizado';
        else if (agora >= j._dataInicio) j._status = 'ao_vivo';
        else j._status = 'agendado';
      });

      // Filtrar por dia selecionado
      const jogosDoDia = jogos.filter(j => j._dataInicio && isSameDay(j._dataInicio, selectedDate));

      // Também pegar ao vivo (sempre mostra independente do dia)
      const jogosAoVivo = jogos.filter(j => j._status === 'ao_vivo');

      // Próximos (agendados futuros)
      const hoje = new Date(); hoje.setHours(0,0,0,0);
      const proximos = jogos.filter(j => j._status === 'agendado' && j._dataInicio && j._dataInicio >= hoje);

      // Stats
      document.getElementById('qsLive').textContent = jogosAoVivo.length;
      document.getElementById('qsToday').textContent = jogosDoDia.length;
      document.getElementById('qsNext').textContent = Math.min(proximos.length, 99);

      // Badge
      const badge = document.getElementById('navBadgeLive');
      if (jogosAoVivo.length > 0) {
        badge.style.display = 'flex';
        badge.textContent = jogosAoVivo.length;
      } else {
        badge.style.display = 'none';
      }

      // Pre-fetch times
      const teamIds = new Set();
      jogosDoDia.forEach(j => {
        if (j.timeCasaId) teamIds.add(j.timeCasaId);
        if (j.timeForaId) teamIds.add(j.timeForaId);
      });
      // Adicionar ao vivo que não está no dia
      jogosAoVivo.forEach(j => {
        if (j.timeCasaId) teamIds.add(j.timeCasaId);
        if (j.timeForaId) teamIds.add(j.timeForaId);
      });

      await fetchTimes([...teamIds]);

      // Render
      let html = '';

      // 🔴 Ao Vivo (sempre aparece no topo)
      const aoVivoDoDia = jogosDoDia.filter(j => j._status === 'ao_vivo');
      const aoVivoOutros = jogosAoVivo.filter(j => !isSameDay(j._dataInicio, selectedDate));

      const todosAoVivo = [...aoVivoDoDia, ...aoVivoOutros];
      if (todosAoVivo.length > 0) {
        html += renderSection('🔴 Ao Vivo', todosAoVivo, 'live');
      }

      // 📅 Agendados do dia
      const agendadosDoDia = jogosDoDia.filter(j => j._status === 'agendado');
      if (agendadosDoDia.length > 0) {
        html += renderSection('📅 Agendados', agendadosDoDia, 'scheduled');
      }

      // ✅ Finalizados do dia
      const finalizadosDoDia = jogosDoDia.filter(j => j._status === 'finalizado');
      if (finalizadosDoDia.length > 0) {
        html += renderSection('✅ Finalizados', finalizadosDoDia, 'finished');
      }

      if (html === '') {
        html = `
          <div class="empty-state">
            <div class="empty-icon">😴</div>
            <div class="empty-text">Nenhum jogo neste dia</div>
            <div class="empty-sub">Selecione outra data ou aguarde novos jogos</div>
          </div>
        `;
      }

      container.innerHTML = html;

    } catch(e) {
      console.error('Erro ao carregar jogos:', e);
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-text">Erro ao carregar jogos</div>
          <div class="empty-sub">${e.message}</div>
        </div>
      `;
    }
  }

  // ===========================
  // 🎨 RENDER
  // ===========================
  function renderSection(title, jogos, type) {
    let badgeClass = '';
    if (type === 'live') badgeClass = 'live';
    else if (type === 'scheduled') badgeClass = 'scheduled';
    else badgeClass = 'finished';

    let html = `
      <div class="section">
        <div class="section-header">
          <div class="section-title">${title} <span class="section-count">${jogos.length}</span></div>
          <div class="section-badge ${badgeClass}">${type === 'live' ? 'AO VIVO' : type === 'scheduled' ? 'EM BREVE' : 'ENCERRADO'}</div>
        </div>
    `;

    jogos.forEach(j => { html += renderGameCard(j); });
    html += '</div>';
    return html;
  }

  function renderGameCard(jogo) {
    const status = jogo._status;
    const timeCasa = timesCache[jogo.timeCasaId] || {};
    const timeFora = timesCache[jogo.timeForaId] || {};

    const nomeCasa = timeCasa.nome || jogo.timeCasaNome || 'Time A';
    const nomeFora = timeFora.nome || jogo.timeForaNome || 'Time B';
    const escudoCasa = timeCasa.escudo || '';
    const escudoFora = timeFora.escudo || '';
    const corCasa = timeCasa.primaria || '#28a745';
    const corFora = timeFora.primaria || '#dc3545';

    const liga = jogo.liga || jogo.campeonato || jogo.campeonatoNome || 'Partida';

    // Horário
    let centerHtml = '';
    if (status === 'ao_vivo') {
      const placar = `${jogo.placarCasa || 0} — ${jogo.placarFora || 0}`;
      centerHtml = `
        <div class="game-time live-score">${placar}</div>
        <div class="game-minute">${calcMinute(jogo)}'</div>
      `;
    } else if (status === 'agendado') {
      const hora = jogo._dataInicio ? jogo._dataInicio.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : '--:--';
      centerHtml = `<div class="game-time upcoming">${hora}</div>`;
    } else {
      const placar = `${jogo.placarCasa || 0} — ${jogo.placarFora || 0}`;
      centerHtml = `
        <div class="game-time" style="color:var(--text-muted)">${placar}</div>
        <div class="game-date-text">Encerrado</div>
      `;
    }

    // Escudo HTML
    const shieldCasa = escudoCasa
      ? `<img src="${escudoCasa}" alt="${nomeCasa}">`
      : `<span class="emoji-shield">⚽</span>`;
    const shieldFora = escudoFora
      ? `<img src="${escudoFora}" alt="${nomeFora}">`
      : `<span class="emoji-shield">⚽</span>`;

    // Botão
    let btnClass = status === 'ao_vivo' ? 'live' : status === 'agendado' ? 'soon' : 'finished';
    let btnText = status === 'ao_vivo' ? '🔴 Entrar Agora' : status === 'agendado' ? '⚡ Entrar' : '📊 Ver';

    // Meta
    const participantes = jogo.participantes || 0;
    const pote = jogo.pote || 0;

    // Destino — aponta pra arena-yellup.html (testes) ou painel-jogo.html (produção)
    const destino = `arena-yellup.html?id=${jogo.id}`;

    return `
      <div class="game-card ${status === 'ao_vivo' ? 'live' : ''}" 
           style="--team-a-color:${corCasa}; --team-b-color:${corFora}"
           onclick="window.location.href='${destino}'">
        <div class="game-top">
          <div class="game-league">
            <span>🏆</span> ${liga}
          </div>
          <div class="game-status ${status === 'ao_vivo' ? 'live' : status === 'agendado' ? 'scheduled' : 'finished'}">
            ${status === 'ao_vivo' ? '🔴 AO VIVO' : status === 'agendado' ? '📅 AGENDADO' : '✅ ENCERRADO'}
          </div>
        </div>

        <div class="game-teams">
          <div class="game-team home">
            <div class="game-team-shield home">${shieldCasa}</div>
            <div>
              <div class="game-team-name">${nomeCasa}</div>
              <div class="game-team-sub">Mandante</div>
            </div>
          </div>
          <div class="game-center">${centerHtml}</div>
          <div class="game-team away">
            <div class="game-team-shield away">${shieldFora}</div>
            <div>
              <div class="game-team-name">${nomeFora}</div>
              <div class="game-team-sub">Visitante</div>
            </div>
          </div>
        </div>

        <div class="game-bottom">
          <div class="game-meta">
            <div class="game-meta-item">👥 ${participantes} jogadores</div>
            ${pote > 0 ? `<div class="game-meta-item">💰 Pote: ${pote}</div>` : ''}
          </div>
          <button class="game-enter-btn ${btnClass}" onclick="event.stopPropagation(); window.location.href='${destino}'">
            ${btnText}
          </button>
        </div>
      </div>
    `;
  }

  function calcMinute(jogo) {
    if (!jogo._dataInicio) return '0';
    const diffMs = Date.now() - jogo._dataInicio.getTime();
    const mins = Math.floor(diffMs / 60000);
    return Math.min(Math.max(mins, 0), 90);
  }

  // ===========================
  // 📡 FETCH TIMES (batch)
  // ===========================
  async function fetchTimes(ids) {
    const toFetch = ids.filter(id => id && !timesCache[id]);
    if (toFetch.length === 0) return;

    // Firestore 'in' aceita max 30 — dividir em batches
    const batches = [];
    for (let i = 0; i < toFetch.length; i += 30) {
      batches.push(toFetch.slice(i, i + 30));
    }

    for (const batch of batches) {
      try {
        const snap = await db.collection('times').where(firebase.firestore.FieldPath.documentId(), 'in', batch).get();
        snap.forEach(doc => {
          timesCache[doc.id] = { id: doc.id, ...doc.data() };
        });
      } catch(e) {
        console.warn('Erro ao buscar times:', e);
        // Fallback: buscar um a um
        for (const id of batch) {
          try {
            const d = await db.collection('times').doc(id).get();
            if (d.exists) timesCache[d.id] = { id: d.id, ...d.data() };
          } catch(e2) { /* skip */ }
        }
      }
    }
  }

  // ===========================
  // 🔄 AUTO-REFRESH
  // ===========================
  setInterval(() => {
    carregarJogos();
  }, 60000); // Atualiza a cada 60 segundos

  // ===========================
  // 🔔 TOAST
  // ===========================
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
