<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitor de Jogos — Yellup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--bg2:#0D1018;--bg3:#131620;--bg4:#1A1E2E;
  --brd:#232840;--brd2:#2E3550;
  --t1:#F0F2FF;--t2:#A8AECB;--t3:#5A6080;
  --acc:#00E5A0;--blu:#4B8EFF;--red:#FF4560;--yel:#FFB800;--pur:#9B6DFF;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Syne',sans-serif;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;}
.header h1{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.header-right{display:flex;align-items:center;gap:10px;}
.badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--brd);}
.badge.live{background:rgba(255,69,96,.12);border-color:rgba(255,69,96,.3);color:var(--red);}
.btn{padding:6px 14px;border-radius:8px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t2);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.on{background:rgba(0,229,160,.12);border-color:var(--acc);color:var(--acc);}
.btn-red{border-color:rgba(255,69,96,.3);color:var(--red);}
.btn-red:hover{background:rgba(255,69,96,.1);}

/* STATUS BAR */
.statusbar{display:flex;gap:0;border-bottom:1px solid var(--brd);}
.sb-item{flex:1;padding:10px 16px;background:var(--bg2);border-right:1px solid var(--brd);}
.sb-item:last-child{border-right:none;}
.sb-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.sb-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-top:2px;}

/* JOGOS ATIVOS */
.section{padding:14px 20px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px;font-family:'DM Mono',monospace;}
.jogos-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.jogo-chip{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);font-size:11px;font-family:'DM Mono',monospace;}
.jogo-chip.live{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.05);}
.jogo-chip .min{color:var(--acc);font-weight:700;min-width:30px;}
.jogo-chip .placar{color:var(--t1);font-weight:700;}
.jogo-chip .times{color:var(--t2);}
.chip-status{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;}
.chip-status.live{background:var(--acc);}

/* TABELA */
.table-wrap{overflow-x:auto;overflow-y:auto;border-top:1px solid var(--brd);}
table{width:100%;border-collapse:collapse;font-size:10.5px;font-family:'DM Mono',monospace;white-space:nowrap;}
thead th{padding:6px 8px;text-align:right;font-size:9px;color:var(--t3);border-bottom:2px solid var(--brd2);position:sticky;top:0;background:var(--bg2);font-weight:600;letter-spacing:.3px;}
thead th.left{text-align:left;}
thead th.sep{border-left:2px solid var(--brd2);}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;}
tbody tr:hover{background:rgba(255,255,255,.03);}
tbody tr.new-game{border-top:2px solid var(--brd2);}
tbody tr.highlight{background:rgba(245,165,36,.05);}
td{padding:5px 8px;text-align:right;color:var(--t2);}
td.left{text-align:left;}
td.home{color:var(--acc);}
td.away{color:var(--blu);}
td.bold{font-weight:700;color:var(--t1);}
td.dim{color:var(--t3);}
td.sep{border-left:2px solid rgba(255,255,255,.04);}
td.iyo-hot{font-weight:800;color:var(--yel);}

/* PAGINAÇÃO */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-top:1px solid var(--brd);}
.pg-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t2);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;}
.pg-btn:hover{border-color:var(--acc);color:var(--acc);}
.pg-btn.on{background:rgba(0,229,160,.12);border-color:var(--acc);color:var(--acc);}
.pg-info{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;}

/* EMPTY */
.empty{padding:40px;text-align:center;color:var(--t3);font-family:'DM Mono',monospace;font-size:12px;}
.empty .ico{font-size:32px;margin-bottom:10px;}

/* LOADER */
#pgLoad{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
.spinner{width:32px;height:32px;border:2px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#pgLoad p{font-size:12px;color:var(--t3);font-family:'DM Mono',monospace;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;background:var(--bg3);border:1px solid var(--brd2);color:var(--t1);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--acc);color:var(--acc);}
#toast.err{border-color:var(--red);color:var(--red);}

/* FILTROS */
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--brd);background:var(--bg2);}
.filters select,.filters input{padding:5px 8px;border:1px solid var(--brd2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;outline:none;}
.filters select:focus,.filters input:focus{border-color:var(--acc);}
.filters label{font-size:10px;color:var(--t3);}
</style>
</head>
<body>

<div id="pgLoad">
  <div class="spinner"></div>
  <p id="pgMsg">Autenticando...</p>
</div>

<div id="app" style="display:none;min-height:100vh;display:none;">

  <div class="header">
    <h1><div class="pulse" id="pulseEl" style="background:var(--t3)"></div> Monitor de Jogos</h1>
    <div class="header-right">
      <span class="badge live" id="badgeLive">0 ao vivo</span>
      <span class="badge" id="badgeTotal">0 registros</span>
      <span class="badge" id="badgeTimer" style="color:var(--acc);">--</span>
      <button class="btn on" id="btnMonitor" onclick="toggleMonitor()">⏸ Pausar</button>
      <button class="btn btn-red" onclick="confirmarLimpar()" style="font-size:11px">🗑 Limpar</button>
    </div>
  </div>

  <div class="statusbar">
    <div class="sb-item"><div class="sb-val" id="sbJogos" style="color:var(--acc)">0</div><div class="sb-lbl">jogos monitorados</div></div>
    <div class="sb-item"><div class="sb-val" id="sbRegistros" style="color:var(--blu)">0</div><div class="sb-lbl">registros hoje</div></div>
    <div class="sb-item"><div class="sb-val" id="sbTotal" style="color:var(--t1)">0</div><div class="sb-lbl">total registros</div></div>
    <div class="sb-item"><div class="sb-val" id="sbUltMin" style="color:var(--yel)">--</div><div class="sb-lbl">último ciclo</div></div>
  </div>

  <!-- Jogos ativos -->
  <div class="section">
    <div class="section-title">Jogos ao vivo sendo monitorados</div>
    <div class="jogos-grid" id="jogosGrid">
      <div style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;">Aguardando jogos ao vivo...</div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <label>Jogo:</label>
    <select id="filtJogo" onchange="renderTabela()">
      <option value="">Todos os jogos</option>
    </select>
    <label>Data:</label>
    <input type="date" id="filtData" onchange="carregarRegistros()" />
    <label>Min/página:</label>
    <select id="filtPerPage" onchange="renderTabela()">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="200">200</option>
    </select>
    <span style="font-size:10px;color:var(--t3);margin-left:auto;" id="filtInfo"></span>
  </div>

  <!-- Tabela -->
  <div class="table-wrap" id="tableWrap">
    <table>
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>

</div>

<div id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
});
const auth = firebase.auth();
const db   = firebase.firestore();
const fns  = firebase.functions();

// ── ESTADO ────────────────────────────────────────────────────────────────────
let monitorAtivo   = true;
let monitorTimer   = null;
let countdownTimer = null;
let CICLO_SEG      = 60; // a cada 60s busca stats de todos os jogos
let countdown      = CICLO_SEG;
let jogosAtivos    = []; // jogos ao_vivo no momento
let forcaCache     = {}; // {teamApiId: {elo, eloNota, forca5}} — lido antes do 1o registro
let registros      = []; // todos os registros carregados do Firestore
let paginaAtual    = 0;
const COLECAO      = 'monitor-minutos'; // nova coleção separada

// ── AUTH ─────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async u => {
  if (!u || u.email !== 'admin@yellup.com') {
    window.location.href = 'login.html'; return;
  }
  gc('pgMsg').textContent = 'Carregando...';
  // Data padrão = hoje
  gc('filtData').value = toBRTDate(new Date());
  await carregarRegistros();
  gc('pgLoad').style.display = 'none';
  gc('app').style.display = 'block';
  iniciarMonitor();
});

// ── HELPERS ──────────────────────────────────────────────────────────────────
const gc = id => document.getElementById(id);

function toBRTDate(d) {
  return new Date(d.getTime() - 3*3600000).toISOString().split('T')[0];
}

function toast(msg, tipo='') {
  const el = gc('toast');
  el.textContent = msg;
  el.className = 'show' + (tipo ? ' '+tipo : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.className='', 3000);
}

function pn(v) {
  if (v == null || v === '') return null;
  const n = parseFloat(String(v).replace('%',''));
  return isNaN(n) ? null : n;
}

// Fallback YAI quando API não retorna Dangerous Attacks
function calcAP(stats) {
  const da = pn(stats['Dangerous Attacks']);
  if (da != null && da > 0) return { val: da, estimado: false };
  const sOn  = pn(stats['Shots on Goal'])  || 0;
  const sOff = pn(stats['Shots off Goal']) || 0;
  const sBlk = pn(stats['Blocked Shots'])  || 0;
  const cor  = pn(stats['Corner Kicks'])   || 0;
  if (!sOn && !sOff && !cor) return { val: null, estimado: true };
  return { val: Math.round(sOn*3.0 + sOff*1.2 + sBlk*1.0 + cor*0.6), estimado: true };
}

function calcIYO(ap, corners, shotsOn, shots, passes) {
  if (!passes || passes <= 0) return null;
  const num = (ap||0) + (corners||0) + (shotsOn||0) + (shots||0);
  return Math.round(num / passes * 1000) / 1000;
}

// ── FORÇA DOS TIMES (lida 1 vez por jogo, antes do 1o registro) ───────────────
async function carregarForca(teamApiId) {
  if (forcaCache[teamApiId] !== undefined) return forcaCache[teamApiId];
  try {
    const snap = await db.collection('perfis-times').doc(String(teamApiId)).get();
    if (snap.exists) {
      const d = snap.data();
      forcaCache[teamApiId] = { elo: d.elo||null, eloNota: d.eloNota||null, forca5: d.forca5||null };
    } else {
      forcaCache[teamApiId] = null;
    }
  } catch(e) {
    forcaCache[teamApiId] = null;
  }
  return forcaCache[teamApiId];
}

// ── CARREGAR JOGOS AO VIVO DO FIRESTORE ───────────────────────────────────────
async function buscarJogosAoVivo() {
  try {
    const snap = await db.collection('jogos-admin')
      .where('status', '==', 'ao_vivo')
      .limit(30)
      .get();
    const jogos = [];
    snap.forEach(d => jogos.push({ _id: d.id, ...d.data() }));
    return jogos;
  } catch(e) {
    console.warn('buscarJogosAoVivo:', e.message);
    return [];
  }
}

// ── CICLO PRINCIPAL ─────────────────────────────────────────────────────────
async function cicloPrincipal() {
  if (!monitorAtivo) return;

  const inicio = Date.now();

  // 1. Buscar jogos ao vivo
  jogosAtivos = await buscarJogosAoVivo();
  renderChips();

  if (!jogosAtivos.length) {
    gc('sbJogos').textContent = '0';
    gc('sbUltMin').textContent = new Date().toLocaleTimeString('pt-BR');
    return;
  }

  gc('sbJogos').textContent = jogosAtivos.length;

  // 2. Para cada jogo, buscar stats e registrar
  let registradosNoCiclo = 0;
  const batch = db.batch();

  for (const jogo of jogosAtivos) {
    const fixtureId = String(jogo.apiFixtureId || jogo.apiFootballId || '');
    if (!fixtureId) continue;

    try {
      // Buscar dados via Cloud Function existente
      const fn = fns.httpsCallable('buscarDadosJogo', { timeout: 25000 });
      const r = await fn({ fixtureId: parseInt(fixtureId) });
      const dados = r.data;
      if (!dados?.fixture || !dados?.estatisticas?.length) continue;

      const f   = dados.fixture;
      const sts = dados.estatisticas;
      const min = f.status?.elapsed || 0;
      if (min < 1) continue; // jogo ainda não começou

      // Identificar stats casa/fora por ID
      const stCasa = sts.find(t => String(t.time.id) === String(f.timeCasa.id))?.stats || {};
      const stFora = sts.find(t => String(t.time.id) === String(f.timeFora.id))?.stats || {};

      // Normalizar stats (pode vir como array ou objeto)
      const norm = raw => {
        if (Array.isArray(raw)) {
          const o = {};
          raw.forEach(s => { if (s?.type != null) o[s.type] = s.value; });
          return o;
        }
        return raw || {};
      };
      const sC = norm(stCasa);
      const sF = norm(stFora);

      // Calcular AP com YAI fallback
      const apC = calcAP(sC);
      const apF = calcAP(sF);

      // Passes
      const passesCasa = pn(sC['Total passes']) || 0;
      const passesFora = pn(sF['Total passes']) || 0;

      // Chutes
      const chutesCasa  = pn(sC['Total Shots']);
      const chutesForа  = pn(sF['Total Shots']);
      const alvoCasa    = pn(sC['Shots on Goal']);
      const alvoFora    = pn(sF['Shots on Goal']);

      // Escanteios
      const escCasa = pn(sC['Corner Kicks']);
      const escFora = pn(sF['Corner Kicks']);

      // IYO
      const iyoCasa = calcIYO(apC.val, escCasa, alvoCasa, chutesCasa, passesCasa);
      const iyoFora = calcIYO(apF.val, escFora, alvoFora, chutesForа, passesFora);

      // Cartões
      const amarCasa = pn(sC['Yellow Cards']);
      const amarFora = pn(sF['Yellow Cards']);
      const vermCasa = pn(sC['Red Cards']);
      const vermFora = pn(sF['Red Cards']);

      // Força dos times (lida 1x, antes do jogo mudar)
      const fC = await carregarForca(f.timeCasa.id);
      const fF = await carregarForca(f.timeFora.id);

      // API tem ~1min de atraso — elapsed=33 entrega dados do min 32
      // Gravar como minuto anterior para refletir a realidade
      const minExtra = f.status?.extra || 0;
      const minGrav  = Math.max(1, min - 1);
      const docId = `${fixtureId}_${String(minGrav).padStart(3,'0')}${minExtra>0?'+'+String(minExtra).padStart(2,'0'):''}`;

      const doc = {
        fixtureId:     Number(fixtureId),
        minuto:        minGrav,
        minutoAPI:     min,
        minutoExtra:   minExtra || 0,
        minutoLabel:   minExtra > 0 ? `${minGrav}+${minExtra}` : String(minGrav),
        statusJogo:    f.status?.short || '',
        tsRegistro:    firebase.firestore.FieldValue.serverTimestamp(),
        dataJogo:      toBRTDate(new Date()),

        timeCasa: { id: f.timeCasa.id, nome: f.timeCasa.nome, logo: f.timeCasa.logo },
        timeFora: { id: f.timeFora.id, nome: f.timeFora.nome, logo: f.timeFora.logo },

        // Força PRÉ-JOGO (lida antes do jogo, não muda mesmo se time ganhar depois)
        forcaCasa:      fC?.forca5  ?? null,
        eloCasa:        fC?.elo     ?? null,
        eloNotaCasa:    fC?.eloNota ?? null,
        forcaFora:      fF?.forca5  ?? null,
        eloFora:        fF?.elo     ?? null,
        eloNotaFora:    fF?.eloNota ?? null,

        placarCasa:    dados.placarCasa ?? f.placar?.casa ?? 0,
        placarFora:    dados.placarFora ?? f.placar?.fora ?? 0,

        posseCasa:     pn(sC['Ball Possession']),
        posseFora:     pn(sF['Ball Possession']),

        apCasa:        apC.val,
        apFora:        apF.val,
        apEstimado:    apC.estimado || apF.estimado,

        chutesCasa,
        chutesForа,
        alvoCasa,
        alvoFora,
        passesCasa,
        passesFora,
        passosErradosCasa: passesCasa > 0 ? passesCasa - (pn(sC['Passes accurate'])||0) : null,
        passosErradosFora: passesFora > 0 ? passesFora - (pn(sF['Passes accurate'])||0) : null,

        faltasCasa:    pn(sC['Fouls']),
        faltasFora:    pn(sF['Fouls']),

        escCasa,
        escFora,

        amarCasa,
        amarFora,
        vermCasa,
        vermFora,

        xgCasa:        pn(sC['expected_goals']),
        xgFora:        pn(sF['expected_goals']),

        iyoCasa,
        iyoFora,
      };

      const ref = db.collection(COLECAO).doc(docId);
      batch.set(ref, doc); // set sobrescreve se minuto repetir (ok)
      registradosNoCiclo++;

    } catch(e) {
      console.warn(`Erro fixture ${fixtureId}:`, e.message);
    }
  }

  if (registradosNoCiclo > 0) {
    await batch.commit().catch(e => console.warn('Batch commit:', e.message));
    toast(`📸 ${registradosNoCiclo} snapshot(s) registrado(s)`, 'ok');
    // Recarregar tabela com novos dados
    await carregarRegistros();
  }

  gc('sbUltMin').textContent = new Date().toLocaleTimeString('pt-BR');
}

// ── MONITOR LOOP ─────────────────────────────────────────────────────────────
function iniciarMonitor() {
  pararMonitor();
  monitorAtivo = true;
  gc('btnMonitor').textContent = '⏸ Pausar';
  gc('btnMonitor').className = 'btn on';
  gc('pulseEl').style.background = 'var(--red)';

  // Executar imediatamente
  cicloPrincipal();

  // Countdown + ciclo a cada 60s
  countdown = CICLO_SEG;
  countdownTimer = setInterval(() => {
    countdown--;
    gc('badgeTimer').textContent = `próximo: ${countdown}s`;
    if (countdown <= 0) {
      countdown = CICLO_SEG;
      cicloPrincipal();
    }
  }, 1000);
}

function pararMonitor() {
  clearInterval(monitorTimer);
  clearInterval(countdownTimer);
  monitorTimer = null;
  countdownTimer = null;
}

function toggleMonitor() {
  if (monitorAtivo) {
    monitorAtivo = false;
    pararMonitor();
    gc('btnMonitor').textContent = '▶ Retomar';
    gc('btnMonitor').className = 'btn';
    gc('pulseEl').style.background = 'var(--t3)';
    gc('badgeTimer').textContent = 'pausado';
    toast('Monitor pausado');
  } else {
    iniciarMonitor();
    toast('Monitor retomado', 'ok');
  }
}

// ── CARREGAR REGISTROS DO FIRESTORE ──────────────────────────────────────────
async function carregarRegistros() {
  const data = gc('filtData').value || toBRTDate(new Date());
  try {
    const snap = await db.collection(COLECAO)
      .where('dataJogo', '==', data)
      .orderBy('fixtureId')
      .orderBy('minuto')
      .limit(2000)
      .get();

    registros = [];
    snap.forEach(d => registros.push({ _id: d.id, ...d.data() }));

    // Atualizar filtro de jogo
    atualizarFiltroJogo();

    gc('sbRegistros').textContent = registros.length;

    // Total geral (aproximado)
    const totalSnap = await db.collection(COLECAO).limit(1).get();
    // Não busca count exato (caro), usa o que temos
    gc('sbTotal').textContent = '—';

    paginaAtual = 0;
    renderTabela();

  } catch(e) {
    console.warn('carregarRegistros:', e.message);
    // Pode ser que o índice ainda não existe — criar registros faz o índice aparecer
    if (e.message?.includes('index') || e.message?.includes('requires an index')) {
      gc('tBody').innerHTML = `<tr><td colspan="99" class="empty">
        <div>⚙️ Criando índice do Firestore...</div>
        <div style="font-size:10px;margin-top:6px;color:var(--t3)">Aguarde 1-2 minutos e recarregue. Isso só acontece uma vez.</div>
      </td></tr>`;
    }
  }
}

function atualizarFiltroJogo() {
  const sel = gc('filtJogo');
  const cur = sel.value;
  const jogosUnicos = {};
  registros.forEach(r => {
    const key = String(r.fixtureId);
    if (!jogosUnicos[key]) {
      jogosUnicos[key] = `${r.timeCasa?.nome||'?'} × ${r.timeFora?.nome||'?'}`;
    }
  });
  sel.innerHTML = '<option value="">Todos os jogos</option>';
  Object.entries(jogosUnicos).forEach(([id, nome]) => {
    const o = document.createElement('option');
    o.value = id; o.textContent = `#${id} · ${nome}`;
    if (id === cur) o.selected = true;
    sel.appendChild(o);
  });
  gc('badgeLive').textContent = `${jogosAtivos.length} ao vivo`;
}

// ── RENDER CHIPS DE JOGOS ATIVOS ─────────────────────────────────────────────
function renderChips() {
  const grid = gc('jogosGrid');
  if (!jogosAtivos.length) {
    grid.innerHTML = '<div style="font-size:11px;color:var(--t3);font-family:\'DM Mono\',monospace;">Nenhum jogo ao vivo no momento</div>';
    return;
  }
  grid.innerHTML = jogosAtivos.map(j => {
    const pC = j.placarCasa ?? '?';
    const pF = j.placarFora ?? '?';
    const min = j.minutosJogo || j.minuto || '?';
    const casa = j.timeCasa?.nome || '?';
    const fora = j.timeFora?.nome || '?';
    return `<div class="jogo-chip live">
      <div class="chip-status live"></div>
      <span class="min">${min}'</span>
      <span class="placar">${pC}–${pF}</span>
      <span class="times">${casa} × ${fora}</span>
    </div>`;
  }).join('');
  gc('badgeLive').textContent = `${jogosAtivos.length} ao vivo`;
}

// ── RENDER TABELA ─────────────────────────────────────────────────────────────
function renderTabela() {
  const head = gc('tHead');
  const body = gc('tBody');
  const perPage = parseInt(gc('filtPerPage').value) || 100;
  const filtFixture = gc('filtJogo').value;

  let dados = registros;
  if (filtFixture) dados = dados.filter(r => String(r.fixtureId) === filtFixture);

  const total = dados.length;
  const totalPags = Math.max(1, Math.ceil(total / perPage));
  if (paginaAtual >= totalPags) paginaAtual = totalPags - 1;

  const inicio = paginaAtual * perPage;
  const fim    = Math.min(inicio + perPage, total);
  const pagina = dados.slice(inicio, fim);

  gc('filtInfo').textContent = `${total} registros · pág ${paginaAtual+1}/${totalPags}`;
  gc('badgeTotal').textContent = `${total} registros`;

  // Cabeçalho
  const th = (label, cls='') => `<th class="${cls}">${label}</th>`;
  head.innerHTML = `<tr>
    ${th('Min','left')}
    ${th('Jogo','left')}
    ${th('Placar','left')}
    ${th('F.Casa','sep')} ${th('F.Fora')}
    ${th('PosCasa','sep')} ${th('PosFora')}
    ${th('APCasa','sep')} ${th('APFora')}
    ${th('ChtCasa','sep')} ${th('ChtFora')}
    ${th('AlvCasa','sep')} ${th('AlvFora')}
    ${th('PasCasa','sep')} ${th('PasFora')}
    ${th('FalCasa','sep')} ${th('FalFora')}
    ${th('EscCasa','sep')} ${th('EscFora')}
    ${th('CartC','sep')} ${th('CartF')}
    ${th('xGCasa','sep')} ${th('xGFora')}
    ${th('IYOCasa','sep')} ${th('IYOFora')}
  </tr>`;

  if (!pagina.length) {
    body.innerHTML = `<tr><td colspan="99" class="empty">
      <div class="ico">📭</div>
      <div>Nenhum registro para esta data.</div>
      <div style="font-size:10px;margin-top:4px;color:var(--t3)">O monitor registra automaticamente enquanto há jogos ao vivo.</div>
    </td></tr>`;
    renderPaginacao(totalPags);
    return;
  }

  // Detectar quebra de jogo para linha separadora
  let prevFixture = null;
  const f = v => v ?? '—';
  const fp = (v, dec=2) => v != null ? v.toFixed(dec) : '—';

  body.innerHTML = pagina.map(r => {
    const isNewGame = r.fixtureId !== prevFixture;
    prevFixture = r.fixtureId;

    const casa = r.timeCasa?.nome || '?';
    const fora = r.timeFora?.nome || '?';
    const pC   = r.placarCasa ?? '?';
    const pF   = r.placarFora ?? '?';

    // Força: usar eloNota (0-10) ou forca5 (0-10)
    const forcaC = r.eloNotaCasa ?? r.forcaCasa;
    const forcaF = r.eloNotaFora ?? r.forcaFora;

    // IYO destaque
    const iyoCls = (v) => v != null && v > 0.09 ? 'iyo-hot' : '';

    // Cartões: amarelo + vermelho
    const cartC = ((r.amarCasa||0) + (r.vermCasa||0)) || null;
    const cartF = ((r.amarFora||0) + (r.vermFora||0)) || null;
    const cartCstr = cartC != null ? `${r.amarCasa||0}🟨${r.vermCasa>0?r.vermCasa+'🟥':''}` : '—';
    const cartFstr = cartF != null ? `${r.amarFora||0}🟨${r.vermFora>0?r.vermFora+'🟥':''}` : '—';

    // AP estimado
    const apSuf = r.apEstimado ? '~' : '';

    return `<tr class="${isNewGame ? 'new-game' : ''}">
      <td class="left bold">${r.minutoLabel||r.minuto}'</td>
      <td class="left" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;color:var(--t1)">${casa} × ${fora}</td>
      <td class="left bold" style="color:var(--yel)">${pC}–${pF}</td>
      <td class="home sep">${forcaC != null ? forcaC.toFixed(1) : '—'}</td>
      <td class="away">${forcaF != null ? forcaF.toFixed(1) : '—'}</td>
      <td class="home sep">${r.posseCasa != null ? r.posseCasa+'%' : '—'}</td>
      <td class="away">${r.posseFora != null ? r.posseFora+'%' : '—'}</td>
      <td class="home sep">${r.apCasa != null ? r.apCasa+apSuf : '—'}</td>
      <td class="away">${r.apFora != null ? r.apFora+apSuf : '—'}</td>
      <td class="home sep">${f(r.chutesCasa)}</td>
      <td class="away">${f(r.chutesForа)}</td>
      <td class="home sep">${f(r.alvoCasa)}</td>
      <td class="away">${f(r.alvoFora)}</td>
      <td class="home sep">${f(r.passesCasa)}</td>
      <td class="away">${f(r.passesFora)}</td>
      <td class="home sep">${f(r.faltasCasa)}</td>
      <td class="away">${f(r.faltasFora)}</td>
      <td class="home sep">${f(r.escCasa)}</td>
      <td class="away">${f(r.escFora)}</td>
      <td class="sep" style="text-align:center">${cartCstr}</td>
      <td style="text-align:center">${cartFstr}</td>
      <td class="home sep">${fp(r.xgCasa)}</td>
      <td class="away">${fp(r.xgFora)}</td>
      <td class="sep ${iyoCls(r.iyoCasa)}" style="text-align:right">${fp(r.iyoCasa,3)}</td>
      <td class="${iyoCls(r.iyoFora)}">${fp(r.iyoFora,3)}</td>
    </tr>`;
  }).join('');

  renderPaginacao(totalPags);
}

function renderPaginacao(totalPags) {
  const pg = gc('pagination');
  if (totalPags <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="pg-btn" onclick="irPag(${paginaAtual-1})" ${paginaAtual===0?'disabled':''}>← Ant</button>`;
  // Botões de página (max 7 visíveis)
  const start = Math.max(0, paginaAtual - 3);
  const end   = Math.min(totalPags, start + 7);
  for (let i = start; i < end; i++) {
    html += `<button class="pg-btn ${i===paginaAtual?'on':''}" onclick="irPag(${i})">${i+1}</button>`;
  }
  html += `<button class="pg-btn" onclick="irPag(${paginaAtual+1})" ${paginaAtual>=totalPags-1?'disabled':''}>Próx →</button>`;
  pg.innerHTML = html;
}

function irPag(n) {
  const perPage = parseInt(gc('filtPerPage').value) || 100;
  const filtFixture = gc('filtJogo').value;
  let dados = registros;
  if (filtFixture) dados = dados.filter(r => String(r.fixtureId) === filtFixture);
  const totalPags = Math.ceil(dados.length / perPage);
  paginaAtual = Math.max(0, Math.min(n, totalPags - 1));
  renderTabela();
  gc('tableWrap').scrollTop = 0;
}

// ── LIMPAR ────────────────────────────────────────────────────────────────────
function confirmarLimpar() {
  if (!confirm('⚠️ Isso vai apagar TODOS os registros da data selecionada. Confirmar?')) return;
  limparRegistrosDoDia();
}

async function limparRegistrosDoDia() {
  const data = gc('filtData').value || toBRTDate(new Date());
  try {
    const snap = await db.collection(COLECAO).where('dataJogo','==',data).limit(500).get();
    if (snap.empty) { toast('Nenhum registro para apagar'); return; }
    const batch = db.batch();
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    toast(`🗑 ${snap.size} registros apagados`, 'ok');
    await carregarRegistros();
  } catch(e) {
    toast('Erro: '+e.message, 'err');
  }
}
</script>
