<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitor · Yellup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--bg2:#0D1018;--bg3:#131620;--bg4:#1A1E2E;
  --brd:#232840;--brd2:#2E3550;
  --t1:#F0F2FF;--t2:#A8AECB;--t3:#5A6080;
  --acc:#00E5A0;--blu:#4B8EFF;--red:#FF4560;--yel:#FFB800;--pur:#9B6DFF;
  --r:10px;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Syne',sans-serif;}

/* ── LOAD ── */
#pgLoad{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
.spin{width:32px;height:32px;border:2px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#pgMsg{font-size:12px;color:var(--t3);font-family:'DM Mono',monospace;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.hdr-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:pulseAnim 1.4s infinite;}
.pulse.live{background:var(--red);}
@keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.badge{font-size:10px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--brd);color:var(--t2);}
.badge.live{background:rgba(255,69,96,.12);border-color:rgba(255,69,96,.3);color:var(--red);}
.badge.acc{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.25);color:var(--acc);}
.btn{padding:6px 13px;border-radius:7px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t2);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.on{background:rgba(0,229,160,.1);border-color:var(--acc);color:var(--acc);}

/* ── COUNTDOWN BAR ── */
.cbar{height:2px;background:var(--brd);position:sticky;top:49px;z-index:99;}
.cbar-fill{height:100%;background:var(--acc);transition:width linear;}

/* ── FILTROS ── */
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 18px;border-bottom:1px solid var(--brd);background:var(--bg2);}
.filters select,.filters input[type=date]{padding:5px 8px;border:1px solid var(--brd2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;outline:none;}
.filters label{font-size:10px;color:var(--t3);}
.filter-sep{width:1px;height:18px;background:var(--brd);margin:0 2px;}

/* ── CARDS GRID ── */
.cards-wrap{padding:14px 16px;}
.section-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px;font-family:'DM Mono',monospace;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-bottom:16px;}

/* ── GAME CARD ── */
.gcard{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;transition:border-color .15s;cursor:pointer;}
.gcard:hover{border-color:var(--brd2);}
.gcard.alerta{border-color:rgba(255,69,96,.4);}
.gcard.alerta-med{border-color:rgba(255,184,0,.35);}

/* Card header */
.gc-head{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:1px solid var(--brd);gap:6px;}
.gc-liga{font-size:8px;font-family:'DM Mono',monospace;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gc-min{font-size:10px;font-family:'DM Mono',monospace;font-weight:700;color:var(--acc);}
.gc-min.ft{color:var(--t3);}
.gc-min.ht{color:var(--yel);}
.gc-forte{display:flex;gap:4px;}
.forte-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;}

/* Match row */
.gc-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:10px 11px;}
.gc-team{display:flex;flex-direction:column;gap:3px;}
.gc-team.r{text-align:right;align-items:flex-end;}
.gc-nome{font-size:11px;font-weight:700;color:var(--t1);line-height:1.2;}
.gc-score{font-size:28px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;letter-spacing:-1px;color:var(--t1);}

/* Stats mini */
.gc-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;border-top:1px solid var(--brd);}
.gc-stat{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--bg3);}
.gc-stat-lbl{font-size:8px;color:var(--t3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.4px;}
.gc-stat-vals{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;font-weight:700;}
.gc-stat-vals .ca{color:var(--acc);}
.gc-stat-vals .fo{color:var(--blu);}
.gc-stat-vals .sep{color:var(--t3);font-size:9px;}

/* Status indicator */
.gc-sbar{height:3px;background:var(--brd);}
.gc-sbar-fill{height:100%;transition:width .4s;border-radius:2px;}

/* Alerts strip */
.gc-alerts{display:flex;flex-direction:column;gap:2px;padding:6px 10px;border-top:1px solid var(--brd);}
.gc-alert{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:5px;font-size:10px;}
.gc-alert.alto{background:rgba(255,69,96,.08);color:var(--t1);}
.gc-alert.med{background:rgba(255,184,0,.07);color:var(--t2);}
.gc-alert.jan{background:rgba(155,109,255,.07);color:var(--t2);}

/* ── DETAIL PANEL ── */
#detailPanel{display:none;position:fixed;inset:0;background:rgba(5,7,15,.92);z-index:200;overflow-y:auto;}
.dp-inner{max-width:900px;margin:0 auto;padding:16px;}
.dp-close{display:flex;justify-content:flex-end;margin-bottom:10px;}
.dp-close button{background:var(--bg3);border:1px solid var(--brd2);color:var(--t2);padding:6px 14px;border-radius:7px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;}

/* Detail header */
.dp-head{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.dp-match{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.dp-tnome{font-size:15px;font-weight:700;}
.dp-score{font-size:36px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-2px;}
.dp-forte-row{display:flex;gap:8px;flex-wrap:wrap;}
.dp-forte-item{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:10px;font-family:'DM Mono',monospace;}
.dp-forte-item span{font-size:13px;font-weight:700;margin-right:4px;}

/* Detail intervals */
.dp-intervals{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.dp-int-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:8px;}
.dp-int-grid{display:flex;gap:2px;align-items:flex-end;overflow-x:auto;padding-bottom:4px;}
.dp-int-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:24px;}
.dp-int-bars{display:flex;align-items:flex-end;gap:1px;height:50px;}
.dp-int-bar{width:6px;border-radius:1px 1px 0 0;min-height:2px;transition:height .5s;}
.dp-int-lbl{font-size:6px;color:var(--t3);text-align:center;white-space:nowrap;}

/* Detail table */
.dp-table-wrap{overflow-x:auto;border:1px solid var(--brd);border-radius:var(--r);}
table{width:100%;border-collapse:collapse;font-size:10px;font-family:'DM Mono',monospace;white-space:nowrap;}
thead th{padding:6px 8px;text-align:right;font-size:8px;color:var(--t3);border-bottom:2px solid var(--brd2);background:var(--bg2);font-weight:700;letter-spacing:.3px;position:sticky;top:0;}
thead th.l{text-align:left;}
tbody td{padding:5px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03);}
tbody td.l{text-align:left;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
tbody tr.gol-row td{background:rgba(0,229,160,.05);border-top:1px solid rgba(0,229,160,.2);border-bottom:1px solid rgba(0,229,160,.2);}
tbody tr.alert-row td{background:rgba(255,184,0,.04);}
.ref-up{color:var(--acc);font-weight:700;}
.ref-dn{color:var(--blu);}
.ref-ht{color:var(--red);font-weight:700;}

/* Export modal */
#expModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;}
.exp-box{background:var(--bg2);border:1px solid var(--brd2);border-radius:14px;padding:22px;width:min(480px,93vw);}
.exp-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.exp-section{margin-bottom:12px;}
.exp-slbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px;}
.exp-modes{display:flex;gap:5px;flex-wrap:wrap;}
.exp-preview{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:8px 10px;font-size:9px;font-family:'DM Mono',monospace;color:var(--t3);min-height:32px;margin-bottom:12px;}
.exp-actions{display:flex;gap:7px;}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--t2);opacity:0;transition:all .25s;pointer-events:none;z-index:999;font-family:'DM Mono',monospace;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--acc);color:var(--acc);}
#toast.err{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<div id="pgLoad"><div class="spin"></div><p id="pgMsg">Autenticando...</p></div>

<div id="app" style="display:none;min-height:100vh;">

  <div class="hdr">
    <div class="hdr-title">
      <div class="pulse" id="pulseEl"></div>
      Monitor · Yellup
    </div>
    <div class="hdr-right">
      <span class="badge live" id="badgeLive">0 ao vivo</span>
      <span class="badge" id="badgeCount">—</span>
      <span class="badge acc" id="badgeTimer">—</span>
      <button class="btn on" id="btnMon" onclick="toggleMonitor()">⏸ Pausar</button>
      <button class="btn" onclick="abrirExport()" style="border-color:rgba(155,109,255,.4);color:var(--pur);">📊 Exportar</button>
    </div>
  </div>
  <div class="cbar"><div class="cbar-fill" id="cbarFill" style="width:100%"></div></div>

  <div class="filters">
    <label>Data:</label>
    <input type="date" id="filtData" onchange="carregarHistorico()">
    <div class="filter-sep"></div>
    <label>Filtrar:</label>
    <select id="filtLiga" onchange="renderCards()">
      <option value="">Todas as ligas</option>
    </select>
    <div class="filter-sep"></div>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;">
      <input type="checkbox" id="filtAlertas" onchange="renderCards()"> Só com alertas
    </label>
  </div>

  <div class="cards-wrap">
    <div class="section-lbl" id="secLive" style="display:none">⚡ Ao Vivo</div>
    <div class="cards-grid" id="gridLive"></div>
    <div class="section-lbl" id="secHist" style="display:none">📋 Histórico do dia</div>
    <div class="cards-grid" id="gridHist"></div>
    <div id="emptyMsg" style="text-align:center;padding:40px;color:var(--t3);font-size:12px;font-family:'DM Mono',monospace;display:none;">
      Sem jogos monitorados hoje. Aguardando jogos ao vivo...
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div id="detailPanel">
  <div class="dp-inner">
    <div class="dp-close"><button onclick="fecharDetalhe()">✕ Fechar</button></div>
    <div id="dpContent"></div>
  </div>
</div>

<!-- Export Modal -->
<div id="expModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;">
  <div class="exp-box">
    <div class="exp-title">
      📊 Exportar
      <button onclick="fecharExport()" style="background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;">✕</button>
    </div>
    <div class="exp-section">
      <div class="exp-slbl">Período</div>
      <div class="exp-modes">
        <button id="emBtnHoje" class="btn on" onclick="setExpMode('hoje')" style="font-size:11px">📅 Hoje</button>
        <button id="emBtnData" class="btn" onclick="setExpMode('data')" style="font-size:11px">🗓 Data</button>
        <button id="emBtnJogo" class="btn" onclick="setExpMode('jogo')" style="font-size:11px">⚽ Jogo</button>
        <button id="emBtnTudo" class="btn" onclick="setExpMode('tudo')" style="font-size:11px">📦 Tudo</button>
      </div>
    </div>
    <div id="emDataWrap" style="display:none;margin-bottom:10px;">
      <input type="date" id="emData" style="padding:5px 8px;border:1px solid var(--brd2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;width:100%;outline:none;">
    </div>
    <div id="emJogoWrap" style="display:none;margin-bottom:10px;">
      <select id="emJogo" style="padding:5px 8px;border:1px solid var(--brd2);border-radius:6px;background:var(--bg3);color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;width:100%;outline:none;">
        <option value="">Selecione...</option>
      </select>
    </div>
    <div class="exp-preview" id="emPreview">Selecione o período...</div>
    <div class="exp-actions">
      <button onclick="executarExport()" id="emBtnGerar" style="flex:1;padding:9px;border-radius:7px;background:var(--pur);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;">⬇ Baixar JSON</button>
      <button onclick="fecharExport()" style="padding:9px 14px;border-radius:7px;border:1px solid var(--brd2);background:var(--bg3);color:var(--t3);cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;">Cancelar</button>
    </div>
    <div id="emStatus" style="font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:7px;text-align:center;"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── FIREBASE ─────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
});
const auth=firebase.auth(), db=firebase.firestore(), fns=firebase.functions();

// ── ESTADO ────────────────────────────────────────────────────────────
const COLECAO     = 'monitor-minutos';
const CICLO_SEG   = 60;
let monitorAtivo  = true;
let monitorTimer  = null, cdTimer = null, countdown = CICLO_SEG;
let jogosAtivos   = [];
let jogosSessao   = {};   // { fixtureId: {meta, snaps[], alertas[], refCasa, refFora, forte, intervalos} }
let historico     = [];   // registros do Firestore para o dia filtrado
let ultimoValor   = {};   // anti-regressão
let expMode       = 'hoje';
let detalheAberto = null;

// ── UTILS ─────────────────────────────────────────────────────────────
const gc = id => document.getElementById(id);
const pn = v => { if(v==null||v==='')return null; const n=parseFloat(String(v).replace('%','')); return isNaN(n)?null:n; };
const nz = (v,fb) => (v!=null&&v>0)?v:fb;

function toBRTDate(d) {
  return d.toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'}).split('/').reverse().join('-');
}

function calcAP(stats) {
  const da=pn(stats['Dangerous Attacks']);
  if(da!=null&&da>0)return{val:da,est:false};
  const sOn=pn(stats['Shots on Goal'])||0, sOff=pn(stats['Shots off Goal'])||0;
  const sBlk=pn(stats['Blocked Shots'])||0, cor=pn(stats['Corner Kicks'])||0;
  if(!sOn&&!sOff&&!cor)return{val:null,est:true};
  return{val:Math.round(sOn*3+sOff*1.2+sBlk+cor*0.6),est:true};
}

function normStats(raw) {
  if(!raw)return{};
  if(Array.isArray(raw)){const o={};raw.forEach(s=>{if(s?.type!=null)o[s.type]=s.value;});return o;}
  return raw;
}

function toast(msg,tipo='') {
  const el=gc('toast'); el.textContent=msg; el.className='show'+(tipo?' '+tipo:'');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.className='',3000);
}

function forteColor(s) {
  if(s==null)return'var(--t3)';
  if(s>=8)return'var(--acc)'; if(s>=6.5)return'#6ee7b7';
  if(s>=5)return'var(--yel)'; if(s>=3.5)return'#fb923c';
  return'var(--red)';
}

// ── ForteScore pré-jogo — busca do Firestore uma vez por time ────────
// Cache em memória: { teamApiId: score|null }
const fsPreCache = {};

async function buscarFortePre(teamApiId) {
  const key = String(teamApiId);
  if (fsPreCache[key] !== undefined) return fsPreCache[key];

  // 1) Tenta localStorage primeiro (raiox-times pode já ter calculado)
  const ls = getForteScore(teamApiId);
  if (ls != null) { fsPreCache[key] = ls; return ls; }

  // 2) Busca Firestore — coleção perfis-times
  try {
    const doc = await db.collection('perfis-times').doc(key).get();
    if (doc.exists) {
      const d = doc.data();
      const score = d.forca5 ?? d.forteScore ?? null;
      fsPreCache[key] = score;
      return score;
    }
  } catch(e) { console.warn('fortePre:', e.message); }

  // 3) Tenta coleção forteScores (nome alternativo)
  try {
    const doc = await db.collection('forteScores').doc(key).get();
    if (doc.exists) {
      const d = doc.data();
      const score = d.score ?? d.forca5 ?? null;
      fsPreCache[key] = score;
      return score;
    }
  } catch(e) { /* silencioso */ }

  fsPreCache[key] = null;
  return null;
}
function lsGet(key) { try{const s=localStorage.getItem(key);return s?JSON.parse(s):null;}catch{return null;} }
function getForteScore(apiId) { const c=lsGet('yellup_forteCache_v1'); return c?c[String(apiId)]??null:null; }
function getTeamRef(apiId)    { return lsGet(`yellup_teamRef_${apiId}`); }
function getIntervalos(idA,idB) {
  return lsGet(`yellup_intervalos_${idA}_${idB}`) || lsGet(`yellup_intervalos_${idB}_${idA}`);
}

// ── ALERT ENGINE — funciona sem xG ───────────────────────────────────
const BUCKET_LABELS=['0–5','6–10','11–15','16–20','21–25','26–30','31–35','36–40','41–45','AC 1T',
  '46–50','51–55','56–60','61–65','66–70','71–75','76–80','81–85','86–90','AC 2T'];

function getBucket(min) {
  if(min<=45)return Math.min(8,Math.floor((Math.max(1,min)-1)/5));
  if(min>90)return 19;
  return Math.min(18,10+Math.floor((min-46)/5));
}

function calcAlertas(snap, refC, refF, intervalos, min) {
  const alertas = [];

  // Helpers
  const rate = (v,m) => m>0&&v!=null ? v/m : null;
  const refRate = (v,d=90) => v!=null&&v>0 ? v/d : null;

  // AP rate vs referência histórica
  const apC = snap.apCasa, apF = snap.apFora;
  const refApC = refC?.shots ? refC.shots/90*2.8 : null; // shots proxy para AP
  const refApF = refF?.shots ? refF.shots/90*2.8 : null;

  // Chutes
  const shC = snap.chutesCasa, shF = snap.chutesFora;
  const refShC = refRate(refC?.shots), refShF = refRate(refF?.shots);

  // Posse
  const posC = snap.posseCasa, posF = snap.posseFora;

  // --- Alerta: AP acima da referência ---
  if(apC!=null&&refApC&&rate(apC,min)>refApC*1.25) alertas.push({nivel:'med',ico:'🔥',txt:`${snap.timeCasa?.nome} — AP acima da média (${apC} acumulado)`});
  if(apF!=null&&refApF&&rate(apF,min)>refApF*1.25) alertas.push({nivel:'med',ico:'🔥',txt:`${snap.timeFora?.nome} — AP acima da média (${apF} acumulado)`});

  // --- Alerta: Múltiplos stats acima (sem dependência de xG) ---
  let acimaC=0, acimaF=0;
  if(apC!=null&&refApC&&rate(apC,min)>refApC*1.15)acimaC++;
  if(shC!=null&&refShC&&rate(shC,min)>refShC*1.15)acimaC++;
  if(posC!=null&&posC>58)acimaC++;
  if(apF!=null&&refApF&&rate(apF,min)>refApF*1.15)acimaF++;
  if(shF!=null&&refShF&&rate(shF,min)>refShF*1.15)acimaF++;
  if(posF!=null&&posF>58)acimaF++;

  if(acimaC>=2) alertas.push({nivel:'alto',ico:'⚡',txt:`${snap.timeCasa?.nome} — números batendo (${acimaC} indicadores acima)`});
  if(acimaF>=2) alertas.push({nivel:'alto',ico:'⚡',txt:`${snap.timeFora?.nome} — números batendo (${acimaF} indicadores acima)`});

  // --- Alerta: Janela quente histórica ---
  if(intervalos&&min>=5) {
    const bi = getBucket(min);
    const { asc=[], acn=[], bsc=[], bcn=[] } = intervalos;
    const maxVal = Math.max(...asc,...acn,...bsc,...bcn,1);
    const idxC = (asc[bi]||0)*(bcn[bi]||0);
    const idxF = (bsc[bi]||0)*(acn[bi]||0);
    const maxIdx = Math.max(...asc.map((_,i)=>(asc[i]||0)*(bcn[i]||0)),...bsc.map((_,i)=>(bsc[i]||0)*(acn[i]||0)),1);
    if(idxC/maxIdx>=0.6) alertas.push({nivel:'jan',ico:'🕐',txt:`Janela ${BUCKET_LABELS[bi]}' → histórico favorece ${snap.timeCasa?.nome}`});
    else if(idxF/maxIdx>=0.6) alertas.push({nivel:'jan',ico:'🕐',txt:`Janela ${BUCKET_LABELS[bi]}' → histórico favorece ${snap.timeFora?.nome}`});
  }

  // --- Alerta: P/F eficiência (menos passes por chute que o normal) ---
  if(shC&&shC>0&&snap.passesCasa&&refC?.passTotal&&refC?.shots) {
    const pfAtual = snap.passesCasa/shC;
    const pfRef   = refC.passTotal/refC.shots;
    if(pfRef>0&&pfAtual<pfRef*0.75) alertas.push({nivel:'med',ico:'🎯',txt:`${snap.timeCasa?.nome} — eficiência alta: ${pfAtual.toFixed(0)} passes/chute (ref ${pfRef.toFixed(0)})`});
  }
  if(shF&&shF>0&&snap.passesFora&&refF?.passTotal&&refF?.shots) {
    const pfAtual = snap.passesFora/shF;
    const pfRef   = refF.passTotal/refF.shots;
    if(pfRef>0&&pfAtual<pfRef*0.75) alertas.push({nivel:'med',ico:'🎯',txt:`${snap.timeFora?.nome} — eficiência alta: ${pfAtual.toFixed(0)} passes/chute (ref ${pfRef.toFixed(0)})`});
  }

  return alertas;
}

// ── CICLO PRINCIPAL ───────────────────────────────────────────────────
async function cicloPrincipal() {
  // 1. Buscar jogos ao vivo
  try {
    const snap = await db.collection('jogos-admin').where('status','in',['ao_vivo','programado']).get();
    jogosAtivos = [];
    snap.forEach(d=>{
      const r=d.data();
      if(['ao_vivo'].includes(r.status)) jogosAtivos.push({...r,_id:d.id});
    });
    gc('badgeLive').textContent=`${jogosAtivos.length} ao vivo`;
    gc('badgeCount').textContent=`${Object.keys(jogosSessao).length} sessão`;
  } catch(e){ console.warn('jogos-admin:',e.message); }

  // 2. Para cada jogo ao vivo, buscar e processar stats
  for(const jogo of jogosAtivos) {
    const fid = String(jogo.apiFixtureId||jogo.apiFootballId||'');
    if(!fid)continue;
    try {
      const fn = fns.httpsCallable('buscarDadosJogo',{timeout:25000});
      const r = await fn({fixtureId:parseInt(fid)});
      const dados = r.data;
      if(!dados?.fixture||!dados?.estatisticas?.length)continue;
      await processarJogo(fid, dados, jogo);
    } catch(e){ console.warn(`Erro ${fid}:`,e.message); }
  }
  renderCards();
}

// ── PROCESSAR JOGO ────────────────────────────────────────────────────
async function processarJogo(fid, dados, jogoMeta) {
  const f   = dados.fixture;
  const sts = dados.estatisticas;
  const min = f.status?.elapsed||0;
  if(min<1)return;

  const sC = normStats(sts.find(t=>String(t.time.id)===String(f.timeCasa.id))?.stats||{});
  const sF = normStats(sts.find(t=>String(t.time.id)===String(f.timeFora.id))?.stats||{});

  const apC=calcAP(sC), apF=calcAP(sF);
  const prev=ultimoValor[fid]||{};
  const nr=(v,k)=>v!=null?Math.max(v,prev[k]??0):(prev[k]??null);

  const snap = {
    fixtureId: Number(fid), minuto: min, minutoLabel: String(min),
    statusJogo: f.status?.short||'',
    dataJogo: toBRTDate(new Date()),
    timeCasa:{id:f.timeCasa.id,nome:f.timeCasa.nome,logo:f.timeCasa.logo},
    timeFora:{id:f.timeFora.id,nome:f.timeFora.nome,logo:f.timeFora.logo},
    liga: f.liga?.nome||'',
    placarCasa: dados.placarCasa??f.placar?.casa??0,
    placarFora: dados.placarFora??f.placar?.fora??0,
    apCasa: apC.val, apFora: apF.val,
    chutesCasa:   nr(pn(sC['Total Shots']),'chutesCasa'),
    chutesFora:   nr(pn(sF['Total Shots']),'chutesFora'),
    alvoCasa:     nr(pn(sC['Shots on Goal']),'alvoCasa'),
    alvoFora:     nr(pn(sF['Shots on Goal']),'alvoFora'),
    passesCasa:   nr(pn(sC['Total passes']),'passesCasa'),
    passesFora:   nr(pn(sF['Total passes']),'passesFora'),
    posseCasa:    pn(sC['Ball Possession']),
    posseFora:    pn(sF['Ball Possession']),
    xgCasa:       pn(sC['expected_goals']),
    xgFora:       pn(sF['expected_goals']),
    escCasa:      nr(pn(sC['Corner Kicks']),'escCasa'),
    escFora:      nr(pn(sF['Corner Kicks']),'escFora'),
  };

  // Anti-regressão
  ultimoValor[fid]={
    chutesCasa:snap.chutesCasa,chutesFora:snap.chutesFora,
    alvoCasa:snap.alvoCasa,alvoFora:snap.alvoFora,
    passesCasa:snap.passesCasa,passesFora:snap.passesFora,
    escCasa:snap.escCasa,escFora:snap.escFora,
  };

  // Referências (localStorage do raiox-times)
  const refC = getTeamRef(f.timeCasa.id);
  const refF = getTeamRef(f.timeFora.id);
  const intervalos = getIntervalos(f.timeCasa.id, f.timeFora.id);

  // ForteScore pré-jogo — busca Firestore uma vez, depois usa cache
  const [fsC, fsF] = await Promise.all([
    buscarFortePre(f.timeCasa.id),
    buscarFortePre(f.timeFora.id),
  ]);

  // Alertas
  const alertas = calcAlertas(snap, refC, refF, intervalos, min);
  snap.alertas = alertas;

  // Salvar sessão
  if(!jogosSessao[fid]) {
    jogosSessao[fid]={meta:f,snaps:[],alertasHist:[],refC,refF,intervalos,fsC,fsF};
  }
  const sess=jogosSessao[fid];
  // Atualiza snap existente ou adiciona
  const ei=sess.snaps.findIndex(s=>s.minuto===min);
  if(ei>=0)sess.snaps[ei]=snap; else sess.snaps.push(snap);
  if(alertas.length) sess.alertasHist.push({min,alertas});

  // Salvar no Firestore — best effort
  const docId=`${fid}_${String(min).padStart(3,'0')}`;
  db.collection(COLECAO).doc(docId).set({
    ...snap,
    forcaCasa:fsC,forcaFora:fsF,
    tsRegistro:firebase.firestore.FieldValue.serverTimestamp(),
  },{merge:true}).catch(()=>{});
}

// ── RENDER CARDS ─────────────────────────────────────────────────────
function renderCards() {
  const filtLiga  = gc('filtLiga').value;
  const filtAlert = gc('filtAlertas').checked;

  // --- Ao vivo (sessão atual) ---
  const liveEntries = Object.values(jogosSessao).filter(sess=>{
    const ultimo = sess.snaps[sess.snaps.length-1];
    if(!ultimo)return false;
    const isLive=['1H','HT','2H','ET','BT','P'].includes(ultimo.statusJogo);
    if(!isLive)return false;
    if(filtLiga&&ultimo.liga!==filtLiga)return false;
    if(filtAlert&&!ultimo.alertas?.length)return false;
    return true;
  });

  // --- Histórico ---
  // Agrupar histórico por fixtureId
  const histMap={};
  historico.forEach(r=>{
    const k=String(r.fixtureId);
    if(!histMap[k]){
      // ForteScore: usa o do Firestore, com fallback para localStorage (caso o monitor
      // tenha rodado antes do raiox-times calcular o score)
      const fsC = r.forcaCasa ?? getForteScore(r.timeCasa?.id);
      const fsF = r.forcaFora ?? getForteScore(r.timeFora?.id);
      histMap[k]={snaps:[],meta:{timeCasa:r.timeCasa,timeFora:r.timeFora,liga:r.liga||''},fsC,fsF};
    }
    histMap[k].snaps.push(r);
  });
  const histEntries=Object.values(histMap).filter(e=>{
    const ultimo=e.snaps[e.snaps.length-1];
    if(!ultimo)return false;
    // Não mostrar jogos que já estão na sessão ao vivo
    const fid=String(ultimo.fixtureId);
    if(jogosSessao[fid])return false;
    if(filtLiga&&ultimo.liga!==filtLiga)return false;
    return true;
  });

  // Atualizar filtro liga
  const ligas=new Set();
  Object.values(jogosSessao).forEach(s=>s.snaps[s.snaps.length-1]?.liga&&ligas.add(s.snaps[s.snaps.length-1].liga));
  historico.forEach(r=>r.liga&&ligas.add(r.liga));
  const sel=gc('filtLiga');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as ligas</option>';
  [...ligas].sort().forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;if(l===cur)o.selected=true;sel.appendChild(o);});

  // Render
  gc('secLive').style.display=liveEntries.length?'block':'none';
  gc('gridLive').innerHTML=liveEntries.map(s=>buildCard(s,true)).join('');

  gc('secHist').style.display=histEntries.length?'block':'none';
  gc('gridHist').innerHTML=histEntries.map(e=>buildCard(e,false)).join('');

  const total=liveEntries.length+histEntries.length;
  gc('emptyMsg').style.display=total?'none':'block';
}

function buildCard(sess, isLive) {
  const snaps = sess.snaps||[];
  const ultimo = snaps[snaps.length-1]; if(!ultimo)return'';
  const meta   = sess.meta||{};
  const nC=meta.timeCasa?.nome||ultimo.timeCasa?.nome||'Casa';
  const nF=meta.timeFora?.nome||ultimo.timeFora?.nome||'Fora';
  const fsC=sess.fsC, fsF=sess.fsF;
  const fid=String(ultimo.fixtureId);
  const alertas=ultimo.alertas||[];
  const min=ultimo.minuto;
  const status=ultimo.statusJogo||'';

  // Min label
  let minLabel=min+"'";
  if(status==='HT')minLabel='HT';
  else if(['FT','AET','PEN'].includes(status))minLabel='FT';

  // Status da barra de pressão (AP casa vs fora)
  const apC=ultimo.apCasa||0, apF=ultimo.apFora||0;
  const apTotal=apC+apF||1;
  const apPctC=Math.round(apC/apTotal*100);

  // Card class
  const hasAltoAlert=alertas.some(a=>a.nivel==='alto');
  const hasMedAlert =alertas.some(a=>a.nivel==='med'||a.nivel==='jan');
  const cardCls=hasAltoAlert?'gcard alerta':hasMedAlert?'gcard alerta-med':'gcard';

  // Forte badges
  const fbC=fsC!=null?`<span class="forte-badge" style="background:${forteColor(fsC)}22;color:${forteColor(fsC)};border:1px solid ${forteColor(fsC)}44">${fsC.toFixed(1)}</span>`:'';
  const fbF=fsF!=null?`<span class="forte-badge" style="background:${forteColor(fsF)}22;color:${forteColor(fsF)};border:1px solid ${forteColor(fsF)}44">${fsF.toFixed(1)}</span>`:'';

  // Stats row: AP, chutes, posse
  const fmtStat = (vC,vF) => `<span class="ca">${vC??'—'}</span><span class="sep">·</span><span class="fo">${vF??'—'}</span>`;
  const statsHtml=`
    <div class="gc-stat"><span class="gc-stat-lbl">AP</span><div class="gc-stat-vals">${fmtStat(apC||null,apF||null)}</div></div>
    <div class="gc-stat"><span class="gc-stat-lbl">Chutes</span><div class="gc-stat-vals">${fmtStat(ultimo.chutesCasa,ultimo.chutesFora)}</div></div>
    <div class="gc-stat"><span class="gc-stat-lbl">Posse</span><div class="gc-stat-vals">${fmtStat(ultimo.posseCasa?ultimo.posseCasa+'%':null,ultimo.posseFora?ultimo.posseFora+'%':null)}</div></div>
    <div class="gc-stat"><span class="gc-stat-lbl">xG</span><div class="gc-stat-vals">${fmtStat(ultimo.xgCasa?.toFixed(2),ultimo.xgFora?.toFixed(2))}</div></div>`;

  // Alerts
  const alertsHtml=alertas.length?`<div class="gc-alerts">${alertas.slice(0,3).map(a=>`<div class="gc-alert ${a.nivel}">${a.ico} ${a.txt}</div>`).join('')}</div>`:'';

  // AP pressure bar color
  const barCor=apPctC>60?'var(--acc)':apPctC<40?'var(--blu)':'var(--yel)';

  return `<div class="${cardCls}" onclick="abrirDetalhe('${fid}')">
    <div class="gc-head">
      <span class="gc-liga">${ultimo.liga||''}</span>
      <div class="gc-forte">${fbC}${fbF}</div>
      <span class="gc-min ${['FT','AET','PEN'].includes(status)?'ft':status==='HT'?'ht':''}">${minLabel}</span>
    </div>
    <div class="gc-match">
      <div class="gc-team">
        ${meta.timeCasa?.logo?`<img src="${meta.timeCasa.logo}" style="width:22px;height:22px;object-fit:contain">`:''}
        <div class="gc-nome">${nC}</div>
      </div>
      <div class="gc-score">${ultimo.placarCasa??0} : ${ultimo.placarFora??0}</div>
      <div class="gc-team r">
        ${meta.timeFora?.logo?`<img src="${meta.timeFora.logo}" style="width:22px;height:22px;object-fit:contain">`:''}
        <div class="gc-nome">${nF}</div>
      </div>
    </div>
    <div class="gc-sbar"><div class="gc-sbar-fill" style="width:${apPctC}%;background:${barCor}"></div></div>
    <div class="gc-stats">${statsHtml}</div>
    ${alertsHtml}
  </div>`;
}

// ── DETALHE ───────────────────────────────────────────────────────────
function abrirDetalhe(fid) {
  const sess=jogosSessao[fid];
  // Tenta encontrar nos histórico também
  const histSnaps=historico.filter(r=>String(r.fixtureId)===fid).sort((a,b)=>a.minuto-b.minuto);
  const snaps=sess?.snaps?.length?sess.snaps:histSnaps;
  if(!snaps.length)return;

  const meta=sess?.meta||{};
  const nC=meta.timeCasa?.nome||snaps[0].timeCasa?.nome||'Casa';
  const nF=meta.timeFora?.nome||snaps[0].timeFora?.nome||'Fora';
  const ultimo=snaps[snaps.length-1];
  const fsC=sess?.fsC??snaps[0].forcaCasa;
  const fsF=sess?.fsF??snaps[0].forcaFora;
  const refC=sess?.refC||getTeamRef(meta.timeCasa?.id||snaps[0].timeCasa?.id);
  const refF=sess?.refF||getTeamRef(meta.timeFora?.id||snaps[0].timeFora?.id);
  const intervalos=sess?.intervalos||getIntervalos(meta.timeCasa?.id,meta.timeFora?.id);

  // Forte info
  const fcHtml=fsC!=null?`<div class="dp-forte-item"><span style="color:${forteColor(fsC)}">${fsC.toFixed(2)}</span>${nC}</div>`:'';
  const ffHtml=fsF!=null?`<div class="dp-forte-item"><span style="color:${forteColor(fsF)}">${fsF.toFixed(2)}</span>${nF}</div>`:'';

  // Ref info
  const refHtml=refC||refF?`
    <div class="dp-forte-item"><span style="color:var(--t2)">${nC}</span> xG ref ${refC?.xg?.toFixed(2)||'—'} · ${Math.round(refC?.shots||0)} fin · ${Math.round(refC?.passTotal||0)} passes</div>
    <div class="dp-forte-item"><span style="color:var(--blu)">${nF}</span> xG ref ${refF?.xg?.toFixed(2)||'—'} · ${Math.round(refF?.shots||0)} fin · ${Math.round(refF?.passTotal||0)} passes</div>`:'';

  // Interval chart
  let intHtml='';
  if(intervalos){
    const{asc=[],acn=[],bsc=[],bcn=[]}=intervalos;
    const maxV=Math.max(...asc,...acn,...bsc,...bcn,1);
    const MH=50;
    const cols=[...Array(20)].map((_,i)=>{
      const hAsc=Math.max(2,Math.round(asc[i]/maxV*MH));
      const hAcn=Math.max(2,Math.round(acn[i]/maxV*MH));
      const hBsc=Math.max(2,Math.round(bsc[i]/maxV*MH));
      const hBcn=Math.max(2,Math.round(bcn[i]/maxV*MH));
      const lbl=BUCKET_LABELS[i];
      const ac=i===9||i===19;
      return `<div class="dp-int-col">
        <div class="dp-int-bars">
          <div class="dp-int-bar" style="height:${hAsc}px;background:var(--acc)"></div>
          <div class="dp-int-bar" style="height:${hAcn}px;background:var(--red)"></div>
          <div class="dp-int-bar" style="height:${hBsc}px;background:rgba(0,229,160,.4);border:1px solid rgba(0,229,160,.6)"></div>
          <div class="dp-int-bar" style="height:${hBcn}px;background:rgba(255,69,96,.35);border:1px solid rgba(255,69,96,.5)"></div>
        </div>
        <div class="dp-int-lbl" style="${ac?'color:var(--yel)':''}">${lbl}</div>
      </div>`;
    }).join('');
    intHtml=`<div class="dp-intervals">
      <div class="dp-int-title">Gols por Intervalo Histórico
        <span style="font-size:8px;margin-left:8px;color:var(--t3)">
          ■ <span style="color:var(--acc)">${nC} marcou</span> &nbsp;
          ■ <span style="color:var(--red)">${nC} sofreu</span> &nbsp;
          ■ <span style="color:rgba(0,229,160,.7)">${nF} marcou</span> &nbsp;
          ■ <span style="color:rgba(255,69,96,.7)">${nF} sofreu</span>
        </span>
      </div>
      <div class="dp-int-grid">${cols}</div>
    </div>`;
  }

  // Table
  let prevPlacar='0-0';
  const rows=snaps.map(s=>{
    const pl=`${s.placarCasa??0}-${s.placarFora??0}`;
    const golRow=pl!==prevPlacar;
    if(golRow)prevPlacar=pl;
    const als=s.alertas||[];
    const alertRow=als.length>0;
    const cls=golRow?'gol-row':alertRow?'alert-row':'';

    // P/F
    const pfC=s.chutesCasa&&s.passesCasa?Math.round(s.passesCasa/s.chutesCasa):null;
    const pfF=s.chutesFora&&s.passesFora?Math.round(s.passesFora/s.chutesFora):null;

    const fn=(v,dec=0)=>v!=null?(dec?v.toFixed(dec):v):'—';
    return `<tr class="${cls}">
      <td class="l" style="color:var(--t3)">${s.minutoLabel||s.minuto}'</td>
      <td style="color:var(--t1);font-weight:700">${pl}</td>
      <td style="color:var(--acc)">${fn(s.apCasa)}</td><td style="color:var(--blu)">${fn(s.apFora)}</td>
      <td style="color:var(--acc)">${fn(s.chutesCasa)}</td><td style="color:var(--blu)">${fn(s.chutesFora)}</td>
      <td style="color:var(--acc)">${fn(s.alvoCasa)}</td><td style="color:var(--blu)">${fn(s.alvoFora)}</td>
      <td style="color:var(--acc)">${fn(s.passesCasa)}</td><td style="color:var(--blu)">${fn(s.passesFora)}</td>
      <td style="color:var(--acc)">${fn(s.posseCasa)}${s.posseCasa?'%':''}</td><td style="color:var(--blu)">${fn(s.posseFora)}${s.posseFora?'%':''}</td>
      <td style="color:var(--acc)">${fn(s.xgCasa,2)}</td><td style="color:var(--blu)">${fn(s.xgFora,2)}</td>
      <td style="color:var(--acc)">${pfC??'—'}</td><td style="color:var(--blu)">${pfF??'—'}</td>
      <td style="color:${als.length?'var(--yel)':'var(--t3)'}">${als.map(a=>a.ico).join(' ')||'—'}</td>
    </tr>`;
  }).join('');

  const tableHtml=`<div class="dp-table-wrap"><table>
    <thead><tr>
      <th class="l">Min</th><th>Placar</th>
      <th colspan="2">Ataques Per.</th>
      <th colspan="2">Chutes</th>
      <th colspan="2">No Alvo</th>
      <th colspan="2">Passes</th>
      <th colspan="2">Posse</th>
      <th colspan="2">xG</th>
      <th colspan="2">P/Fin.</th>
      <th>Alertas</th>
    </tr>
    <tr>
      <th class="l"></th><th></th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th style="color:var(--acc)">${nC.split(' ')[0]}</th><th style="color:var(--blu)">${nF.split(' ')[0]}</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  // Exportar jogo
  const exportBtn=`<div style="text-align:right;margin-top:10px;">
    <button onclick="exportarJogo('${fid}')"
      style="padding:7px 16px;border-radius:7px;border:1px solid rgba(155,109,255,.4);background:rgba(155,109,255,.1);color:var(--pur);font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;">
      📊 Exportar este jogo
    </button>
  </div>`;

  gc('dpContent').innerHTML=`
    <div class="dp-head">
      <div class="dp-match">
        <div class="dp-tnome" style="color:var(--acc)">${nC}</div>
        <div class="dp-score">${ultimo.placarCasa??0} — ${ultimo.placarFora??0}</div>
        <div class="dp-tnome" style="color:var(--blu)">${nF}</div>
      </div>
      <div class="dp-forte-row">${fcHtml}${ffHtml}${refHtml}</div>
    </div>
    ${intHtml}
    ${tableHtml}
    ${exportBtn}`;

  gc('detailPanel').style.display='block';
  detalheAberto=fid;
}

function fecharDetalhe(){gc('detailPanel').style.display='none';detalheAberto=null;}

// ── CARREGAR HISTÓRICO ────────────────────────────────────────────────
async function carregarHistorico() {
  const data=gc('filtData').value||toBRTDate(new Date());
  try {
    const snap=await db.collection(COLECAO).where('dataJogo','==',data).limit(3000).get();
    historico=[];
    snap.forEach(d=>historico.push({_id:d.id,...d.data()}));
    historico.sort((a,b)=>{
      if((a.fixtureId||0)!==(b.fixtureId||0))return(a.fixtureId||0)-(b.fixtureId||0);
      return(a.minuto||0)-(b.minuto||0);
    });
    renderCards();
  } catch(e){ console.warn('carregarHistorico:',e.message); }
}

// ── EXPORT ────────────────────────────────────────────────────────────
function abrirExport(){
  gc('expModal').style.display='flex';
  gc('emData').value=toBRTDate(new Date());
  // Popula jogo select
  const sel=gc('emJogo');
  sel.innerHTML='<option value="">Selecione...</option>';
  const map={};
  [...Object.values(jogosSessao),...Object.values(
    historico.reduce((m,r)=>{const k=String(r.fixtureId);if(!m[k])m[k]=r;return m;},{}))
  ].forEach(item=>{
    const snap=item.snaps?.[item.snaps.length-1]||item;
    const k=String(snap.fixtureId||item.fixtureId);
    if(!map[k])map[k]=`${snap.timeCasa?.nome||'?'} × ${snap.timeFora?.nome||'?'} (${snap.dataJogo||'?'})`;
  });
  Object.entries(map).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,nome])=>{
    const o=document.createElement('option');o.value=id;o.textContent=`#${id} · ${nome}`;sel.appendChild(o);
  });
  setExpMode('hoje');
}
function fecharExport(){gc('expModal').style.display='none';}
function setExpMode(m){
  expMode=m;
  ['hoje','data','jogo','tudo'].forEach(x=>{gc('emBtn'+x[0].toUpperCase()+x.slice(1)).className='btn'+(x===m?' on':'');});
  gc('emDataWrap').style.display=m==='data'?'block':'none';
  gc('emJogoWrap').style.display=m==='jogo'?'block':'none';
  gc('emPreview').textContent='Calculando...';
  _calcPreview().then(n=>gc('emPreview').textContent=n);
}
async function _calcPreview(){
  try{const d=await _fetchExportDocs();return`${d.length} snapshots · ${new Set(d.map(x=>x.fixtureId)).size} jogos · ~${Math.round(JSON.stringify(d).length/1024)}kb`;}
  catch(e){return'Erro: '+e.message;}
}
async function _fetchExportDocs(){
  const data=gc('emData').value||toBRTDate(new Date());
  const jogoId=gc('emJogo').value;
  let q=db.collection(COLECAO);
  if(expMode==='hoje') q=q.where('dataJogo','==',toBRTDate(new Date())).limit(5000);
  else if(expMode==='data') q=q.where('dataJogo','==',data).limit(5000);
  else if(expMode==='jogo'&&jogoId) q=q.where('fixtureId','==',Number(jogoId)).limit(2000);
  else q=q.limit(5000);
  const snap=await q.get();
  const docs=[];
  snap.forEach(d=>docs.push({_id:d.id,...d.data()}));
  docs.sort((a,b)=>{
    if((a.fixtureId||0)!==(b.fixtureId||0))return(a.fixtureId||0)-(b.fixtureId||0);
    return(a.minuto||0)-(b.minuto||0);
  });
  return docs;
}

async function exportarJogo(fid){
  try{
    const snap=await db.collection(COLECAO).where('fixtureId','==',Number(fid)).limit(2000).get();
    const docs=[];
    snap.forEach(d=>docs.push({_id:d.id,...d.data()}));
    docs.sort((a,b)=>(a.minuto||0)-(b.minuto||0));
    _baixarJSON([docs],`yellup_jogo_${fid}.json`);
    toast('✓ Exportado','ok');
  }catch(e){toast('Erro: '+e.message,'err');}
}

async function executarExport(){
  const btn=gc('emBtnGerar'),status=gc('emStatus');
  btn.textContent='⏳...';btn.disabled=true;
  try{
    const docs=await _fetchExportDocs();
    if(!docs.length){status.textContent='⚠ Sem dados.';return;}
    // Agrupar por jogo
    const map={};
    docs.forEach(d=>{
      const k=String(d.fixtureId);
      if(!map[k]){
        // Enriquece ForteScore do localStorage se não veio do Firestore
        const fsC = d.forcaCasa ?? getForteScore(d.timeCasa?.id);
        const fsF = d.forcaFora ?? getForteScore(d.timeFora?.id);
        map[k]={fixtureId:d.fixtureId,jogo:`${d.timeCasa?.nome} vs ${d.timeFora?.nome}`,data:d.dataJogo,forcaCasa:fsC,forcaFora:fsF,nomeCasa:d.timeCasa?.nome,nomeFora:d.timeFora?.nome,snapshots:[]};
      }
      const s={min:d.minuto,label:d.minutoLabel,placar:`${d.placarCasa??0}-${d.placarFora??0}`,
        apC:d.apCasa,apF:d.apFora,shC:d.chutesCasa,shF:d.chutesFora,
        alC:d.alvoCasa,alF:d.alvoFora,psC:d.passesCasa,psF:d.passesFora,
        posC:d.posseCasa,posF:d.posseFora,xgC:d.xgCasa,xgF:d.xgFora,
        escC:d.escCasa,escF:d.escFora};
      // Remove nulls
      Object.keys(s).forEach(k=>{if(s[k]==null)delete s[k];});
      map[k].snapshots.push(s);
    });
    const data=gc('emData').value||toBRTDate(new Date());
    _baixarJSON(Object.values(map),`yellup_monitor_${expMode==='jogo'?gc('emJogo').value:data.replace(/-/g,'')}.json`);
    const kb=(JSON.stringify(Object.values(map)).length/1024).toFixed(1);
    status.textContent=`✓ ${docs.length} snaps · ${Object.keys(map).length} jogos · ${kb}kb`;
    toast(`✓ ${Object.keys(map).length} jogos exportados`,'ok');
  }catch(e){status.textContent='❌ '+e.message;toast('Erro: '+e.message,'err');}
  finally{btn.textContent='⬇ Baixar JSON';btn.disabled=false;}
}

function _baixarJSON(jogos,nome){
  const rel={yellup:'monitor-v2',exportadoEm:new Date().toLocaleString('pt-BR'),jogos};
  const blob=new Blob([JSON.stringify(rel)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=nome;a.click();
  URL.revokeObjectURL(url);
}
