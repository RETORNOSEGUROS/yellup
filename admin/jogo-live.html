<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellup · Partida ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090F;--bg2:#0D1018;--bg3:#131620;--bg4:#1A1E2E;
  --brd:#232840;--brd2:#2E3550;
  --t1:#F0F2FF;--t2:#A8AECB;--t3:#5A6080;
  --acc:#00E5A0;--blu:#4B8EFF;--red:#FF4560;--yel:#FFB800;--pur:#9B6DFF;
  --r:12px;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:"Syne",sans-serif;}
#pgLoad{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;}
.spinner{width:36px;height:36px;border:2px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#pgLoadMsg{color:var(--t3);font-size:13px;font-family:"DM Mono",monospace;}
#pgLoadLog{width:340px;max-height:180px;overflow-y:auto;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;font-size:11px;font-family:"DM Mono",monospace;color:var(--t3);display:none;}
#pgLoadLog div{padding:2px 0;border-bottom:1px solid var(--brd);}
.retry-btn{display:none;margin-top:8px;padding:8px 24px;border:1px solid var(--brd2);border-radius:8px;background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:"Syne",sans-serif;}
#pgMain{display:none;min-height:100vh;padding-bottom:60px;}
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#10152A 0%,var(--bg) 100%);border-bottom:1px solid var(--brd);padding:16px 16px 0;}
.hero-bg-shields{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.hero-bg-shield{position:absolute;top:50%;transform:translateY(-50%);width:130px;height:130px;object-fit:contain;opacity:.05;filter:blur(3px);}
.hero-bg-shield.left{left:-15px;}
.hero-bg-shield.right{right:-15px;}
.hero-league{display:flex;align-items:center;gap:7px;font-size:10px;font-family:"DM Mono",monospace;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;position:relative;}
.hero-league img{width:14px;height:14px;object-fit:contain;opacity:.7;}
.hero-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;position:relative;padding-bottom:16px;}
.hero-team{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:opacity .15s;}
.hero-team:hover{opacity:.8;}
.hero-team-shield{width:62px;height:62px;}
.hero-team-shield img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(0,0,0,.6));transition:transform .2s;}
.hero-team:hover .hero-team-shield img{transform:scale(1.06);}
.hero-team-name{font-size:13px;font-weight:700;text-align:center;color:var(--t1);line-height:1.2;max-width:100px;}
.hero-team-hint{font-size:9px;color:var(--t3);font-family:"DM Mono",monospace;}
.hero-center{display:flex;flex-direction:column;align-items:center;gap:5px;}
.hero-score{font-size:48px;font-weight:800;font-family:"DM Mono",monospace;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,var(--t1) 50%,var(--t3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-ht{font-size:10px;color:var(--t3);font-family:"DM Mono",monospace;}
.hero-minute{display:flex;align-items:center;gap:5px;font-size:12px;font-family:"DM Mono",monospace;color:var(--t2);}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.status-badge{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:"DM Mono",monospace;}
.status-live{background:rgba(255,69,96,.15);color:var(--red);border:1px solid rgba(255,69,96,.3);}
.status-ft{background:rgba(0,229,160,.1);color:var(--acc);border:1px solid rgba(0,229,160,.2);}
.status-ht{background:rgba(255,184,0,.1);color:var(--yel);border:1px solid rgba(255,184,0,.2);}
.status-ns{background:var(--bg3);color:var(--t3);border:1px solid var(--brd);}
.refresh-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--brd);}
.refresh-progress{height:100%;background:var(--acc);transition:width linear;}
.tabs{display:flex;gap:2px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--brd);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent;cursor:pointer;transition:all .15s;color:var(--t3);background:transparent;font-family:"Syne",sans-serif;}
.tab:hover{color:var(--t2);background:var(--bg3);}
.tab.on{color:var(--t1);background:var(--bg3);border-color:var(--brd2);}
.tab-badge{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;vertical-align:middle;animation:pulse 1.4s ease-in-out infinite;}
.pane{display:none;padding:14px;}
.pane.on{display:block;}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:12px;font-family:"DM Mono",monospace;}
.posse-big{display:flex;height:38px;border-radius:10px;overflow:hidden;margin:10px 0;}
.posse-home{background:linear-gradient(90deg,rgba(0,229,160,.35),rgba(0,229,160,.15));display:flex;align-items:center;justify-content:flex-start;padding:0 12px;font-size:17px;font-weight:800;font-family:"DM Mono",monospace;color:var(--acc);transition:width .8s cubic-bezier(.4,0,.2,1);}
.posse-away{background:linear-gradient(90deg,rgba(75,142,255,.15),rgba(75,142,255,.35));display:flex;align-items:center;justify-content:flex-end;padding:0 12px;font-size:17px;font-weight:800;font-family:"DM Mono",monospace;color:var(--blu);transition:width .8s cubic-bezier(.4,0,.2,1);}
.stat-row{display:grid;grid-template-columns:1fr 110px 1fr;align-items:center;gap:8px;margin-bottom:10px;}
.stat-row:last-child{margin-bottom:0;}
.stat-val{font-family:"DM Mono",monospace;font-size:14px;font-weight:500;}
.stat-val.home{text-align:right;color:var(--acc);}
.stat-val.away{color:var(--blu);}
.stat-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.stat-label{font-size:9px;color:var(--t3);text-align:center;font-family:"DM Mono",monospace;text-transform:uppercase;letter-spacing:.5px;}
.stat-bar{width:100%;height:4px;background:var(--brd);border-radius:2px;overflow:hidden;display:flex;}
.stat-bar-home{background:var(--acc);border-radius:2px 0 0 2px;transition:width .6s ease;}
.stat-bar-away{background:var(--blu);border-radius:0 2px 2px 0;transition:width .6s ease;}
.donuts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;}
.donut-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.donut-wrap{position:relative;width:74px;height:74px;}
.donut-wrap svg{transform:rotate(-90deg);}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.donut-num{font-size:15px;font-weight:700;font-family:"DM Mono",monospace;line-height:1;}
.donut-sub{font-size:8px;color:var(--t3);font-family:"DM Mono",monospace;}
.donut-label{font-size:10px;color:var(--t2);text-align:center;font-family:"DM Mono",monospace;line-height:1.3;}
.event-list{display:flex;flex-direction:column;gap:5px;}
.event-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--brd);}
.event-min{font-family:"DM Mono",monospace;font-size:11px;color:var(--t3);width:34px;flex-shrink:0;text-align:center;}
.event-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.event-desc{font-size:12px;color:var(--t2);flex:1;line-height:1.4;}
.event-desc strong{color:var(--t1);font-weight:600;}
.event-bar{width:3px;height:26px;border-radius:2px;flex-shrink:0;}
.score-duo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.score-box{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:14px;text-align:center;transition:all .3s;}
.score-box.hot{border-color:rgba(255,69,96,.4);background:rgba(255,69,96,.06);}
.score-num{font-size:36px;font-weight:800;font-family:"DM Mono",monospace;line-height:1;}
.score-lbl{font-size:10px;color:var(--t3);font-family:"DM Mono",monospace;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-arc{height:4px;border-radius:2px;margin-top:10px;background:var(--brd);overflow:hidden;}
.score-arc-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.sinal-list{display:flex;flex-direction:column;gap:7px;}
.sinal{padding:10px 12px;border-radius:8px;display:flex;gap:10px;align-items:flex-start;border-left:3px solid;}
.sinal.alto{background:rgba(255,69,96,.07);border-color:var(--red);}
.sinal.medio{background:rgba(255,184,0,.06);border-color:var(--yel);}
.sinal.baixo{background:rgba(75,142,255,.05);border-color:var(--blu);}
.sinal-ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.sinal-titulo{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;}
.sinal-detalhe{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.4;font-family:"DM Mono",monospace;}
.narrativa{background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;padding:12px;font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:12px;white-space:pre-line;}
.insight-list{display:flex;flex-direction:column;gap:7px;}
.insight{padding:10px 12px;border-radius:8px;display:flex;gap:9px;align-items:flex-start;border-left:3px solid transparent;}
.insight.positive{background:rgba(0,229,160,.06);border-color:var(--acc);}
.insight.warning{background:rgba(255,184,0,.06);border-color:var(--yel);}
.insight.info{background:rgba(75,142,255,.06);border-color:var(--blu);}
.insight.neutral{background:var(--bg3);border-color:var(--brd2);}
.insight-ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.insight-text{font-size:12px;color:var(--t2);line-height:1.5;}
.insight-text strong{color:var(--t1);font-weight:600;}
.empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:13px;font-family:"DM Mono",monospace;}
.last-update{text-align:center;padding:8px;font-size:10px;color:var(--t3);font-family:"DM Mono",monospace;}
</style>
</head>
<body>
<div id="pgLoad">
  <div class="spinner"></div>
  <p id="pgLoadMsg">Conectando...</p>
  <div id="pgLoadLog"></div>
  <button class="retry-btn" id="pgLoadRetry" onclick="location.reload()">&#8635; Tentar novamente</button>
</div>
<div id="pgMain">
  <div class="hero">
    <div class="hero-bg-shields">
      <img class="hero-bg-shield left"  id="bgShieldCasa" src="">
      <img class="hero-bg-shield right" id="bgShieldFora"  src="">
    </div>
    <div class="hero-league">
      <img id="hLigaLogo" src="" style="display:none">
      <span id="hLigaNome">&#8212;</span>
      <span id="hRodada" style="margin-left:4px;"></span>
    </div>
    <div class="hero-match">
      <div class="hero-team" onclick="abrirPerfil('casa')" title="Ver perfil">
        <div class="hero-team-shield"><img id="hLogoCasa" src="" onerror="this.style.display='none'"></div>
        <div class="hero-team-name" id="hNomeCasa">&#8212;</div>
        <div class="hero-team-hint">ver perfil &#8594;</div>
      </div>
      <div class="hero-center">
        <div class="hero-score" id="hPlacar">&#8211; : &#8211;</div>
        <div id="hHt" class="hero-ht" style="display:none;"></div>
        <div class="hero-minute">
          <span class="pulse-dot" id="hDot" style="display:none;"></span>
          <span id="hMinStr">&#8212;</span>
        </div>
        <span class="status-badge status-ns" id="hStatus">&#8212;</span>
      </div>
      <div class="hero-team" onclick="abrirPerfil('fora')" title="Ver perfil">
        <div class="hero-team-shield"><img id="hLogoFora" src="" onerror="this.style.display='none'"></div>
        <div class="hero-team-name" id="hNomeFora">&#8212;</div>
        <div class="hero-team-hint">&#8592; ver perfil</div>
      </div>
    </div>
    <div class="refresh-bar"><div class="refresh-progress" id="refreshBar" style="width:100%"></div></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('stats',this)">&#128202; Estat&#237;sticas</button>
    <button class="tab"    onclick="switchTab('eventos',this)">&#9889; Eventos</button>
    <button class="tab"    onclick="switchTab('sinais',this)" id="tabSinais">&#128308; Sinais</button>
    <button class="tab"    onclick="switchTab('insights',this)">&#129504; An&#225;lise</button>
  </div>
  <div class="pane on" id="pane-stats">
    <div class="card">
      <div class="card-title">Posse de Bola</div>
      <div class="posse-big">
        <div class="posse-home" id="posseCasaBar" style="width:50%">50%</div>
        <div class="posse-away" id="posseForaBar" style="width:50%">50%</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:4px;">
        <span id="hNomeCasaSmall">Casa</span><span id="hNomeForaSmall">Fora</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Comparativo</div>
      <div id="statsRows"><div class="empty">Aguardando dados...</div></div>
    </div>
    <div class="card">
      <div class="card-title">M&#233;tricas-Chave</div>
      <div class="donuts-grid" id="donutsGrid"><div class="empty" style="grid-column:1/-1">Aguardando...</div></div>
    </div>
  </div>
  <div class="pane" id="pane-eventos">
    <div class="card">
      <div class="card-title">Linha do Tempo</div>
      <div class="event-list" id="eventList"><div class="empty">Nenhum evento ainda</div></div>
    </div>
  </div>
  <div class="pane" id="pane-sinais">
    <div class="score-duo">
      <div class="score-box" id="scoreCasaBox">
        <div class="score-num" id="scoreCasaNum" style="color:var(--acc)">&#8212;</div>
        <div class="score-lbl" id="scoreCasaLbl">Casa</div>
        <div class="score-arc"><div class="score-arc-fill" id="scoreCasaArc" style="width:0;background:var(--acc)"></div></div>
      </div>
      <div class="score-box" id="scoreForaBox">
        <div class="score-num" id="scoreForaNum" style="color:var(--blu)">&#8212;</div>
        <div class="score-lbl" id="scoreForaLbl">Fora</div>
        <div class="score-arc"><div class="score-arc-fill" id="scoreForaArc" style="width:0;background:var(--blu)"></div></div>
      </div>
    </div>
    <div class="card" id="narrativaCard" style="display:none">
      <div class="narrativa" id="narrativaEl"></div>
    </div>
    <div class="card">
      <div class="card-title">Padr&#245;es Detectados</div>
      <div class="sinal-list" id="sinaisEl"><div class="empty">Aguardando dados ao vivo...</div></div>
    </div>
  </div>
  <div class="pane" id="pane-insights">
    <div class="card">
      <div class="card-title">O que est&#225; acontecendo</div>
      <div class="insight-list" id="insightList"><div class="empty">Aguardando dados...</div></div>
    </div>
  </div>
  <div class="last-update" id="lastUpdate"></div>
</div>
<script>
const gc=id=>document.getElementById(id);
firebase.initializeApp({apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",authDomain:"painel-yellup.firebaseapp.com",projectId:"painel-yellup",storageBucket:"painel-yellup.appspot.com",messagingSenderId:"608347210297",appId:"1:608347210297:web:75092713724e617c7203e8"});
const auth=firebase.auth(),fns=firebase.functions();
let DADOS=null,FIX_ID=null,DOC_ID=null,refreshTimer=null,sinaisTimer=null,progressTimer=null;
const REFRESH_SEC=15;
function log(msg,isErr){gc("pgLoadMsg").textContent=msg;const b=gc("pgLoadLog");b.style.display="block";const d=document.createElement("div");d.style.color=isErr?"var(--red)":"var(--t2)";d.textContent="["+new Date().toLocaleTimeString("pt-BR")+"] "+msg;b.appendChild(d);b.scrollTop=b.scrollHeight;}
function errPage(m){log("X "+m,true);gc("pgLoadRetry").style.display="block";const s=gc("pgLoad").querySelector(".spinner");if(s)s.style.display="none";}
auth.onAuthStateChanged(async u=>{
  if(!u||u.email!=="admin@yellup.com"){window.location.href="login.html";return;}
  const p=new URLSearchParams(location.search);FIX_ID=p.get("id");DOC_ID=p.get("doc");
  if(!FIX_ID){errPage("Parametro id= nao encontrado");return;}
  await iniciar();
});
async function iniciar(){
  log("Buscando dados da partida #"+FIX_ID+"...");
  const ok=await buscarDados();if(!ok)return;
  gc("pgLoad").style.display="none";gc("pgMain").style.display="block";
  renderTudo();
  if(isAoVivo()){iniciarAutoRefresh();iniciarSinaisLoop();}
  else buscarSinais();
}
async function buscarDados(){
  try{
    const fn=fns.httpsCallable("buscarDadosJogo",{timeout:30000});
    const r=await Promise.race([fn({fixtureId:parseInt(FIX_ID)}),new Promise((_,rej)=>setTimeout(()=>rej(new Error("Timeout 30s")),30000))]);
    if(!r?.data?.fixture){errPage("Dados invalidos fixture #"+FIX_ID);return false;}
    DADOS=r.data;log("OK dados recebidos");return true;
  }catch(e){errPage("Erro: "+e.message);return false;}
}
function iniciarAutoRefresh(){
  clearInterval(refreshTimer);animarBarra();
  refreshTimer=setInterval(async()=>{await buscarDados();renderTudo();animarBarra();},REFRESH_SEC*1000);
}
function animarBarra(){
  clearInterval(progressTimer);const bar=gc("refreshBar");if(!bar)return;
  bar.style.transition="none";bar.style.width="100%";bar.getBoundingClientRect();
  bar.style.transition="width "+REFRESH_SEC+"s linear";bar.style.width="0%";
}
function iniciarSinaisLoop(){clearInterval(sinaisTimer);buscarSinais();sinaisTimer=setInterval(buscarSinais,60000);}
async function buscarSinais(){
  try{
    const fn=fns.httpsCallable("correlacionarEstadoAtual",{timeout:15000});
    const r=await fn({fixtureId:parseInt(FIX_ID)});
    if(r?.data)renderSinais(r.data);
  }catch(e){console.warn("Sinais:",e.message);}
}
function isAoVivo(){return["1H","HT","2H","ET","BT","P"].includes(DADOS?.fixture?.status?.short);}
function fmtMinuto(status){
  const{short,elapsed,extra}=status;
  if(["NS","TBD"].includes(short))return{str:"Nao iniciado",dot:false,cls:"status-ns"};
  if(short==="HT")return{str:"Intervalo",dot:false,cls:"status-ht"};
  if(short==="FT")return{str:"Encerrado",dot:false,cls:"status-ft"};
  if(short==="AET")return{str:"Prorrogacao - Encerrado",dot:false,cls:"status-ft"};
  if(short==="PEN")return{str:"Penaltis - Encerrado",dot:false,cls:"status-ft"};
  if(["CANC","ABD","AWD","WO"].includes(short))return{str:"Cancelado",dot:false,cls:"status-ns"};
  if(["SUSP","INT","PST"].includes(short))return{str:"Suspenso",dot:false,cls:"status-ht"};
  const base=elapsed||0;
  let minStr=base+"'";
  if(base>=45&&short==="1H")minStr="45+"+(base-45)+"'";
  else if(base>=90&&short==="2H")minStr="90+"+(base-90)+"'";
  if(short==="ET")minStr="Pror. "+base+"'";
  if(short==="BT")minStr="Pror. Int.";
  if(short==="P")minStr="Penaltis";
  return{str:minStr,dot:true,cls:"status-live"};
}
function renderTudo(){
  if(!DADOS)return;renderHero();renderStats();renderEventos();renderInsights();
  gc("lastUpdate").textContent="Atualizado as "+new Date().toLocaleTimeString("pt-BR");
}
function renderHero(){
  const f=DADOS.fixture,l=f.liga||{};
  if(l.logo){gc("hLigaLogo").src=l.logo;gc("hLigaLogo").style.display="block";}
  gc("hLigaNome").textContent=l.nome||"";
  gc("hRodada").textContent=l.rodada?"- "+l.rodada:"";
  const logoCasa=f.timeCasa.logo||"",logoFora=f.timeFora.logo||"";
  gc("hLogoCasa").src=logoCasa;gc("hLogoFora").src=logoFora;
  gc("bgShieldCasa").src=logoCasa;gc("bgShieldFora").src=logoFora;
  gc("hNomeCasa").textContent=f.timeCasa.nome;gc("hNomeFora").textContent=f.timeFora.nome;
  gc("hNomeCasaSmall").textContent=f.timeCasa.nome;gc("hNomeForaSmall").textContent=f.timeFora.nome;
  gc("scoreCasaLbl").textContent=f.timeCasa.nome;gc("scoreForaLbl").textContent=f.timeFora.nome;
  const pc=f.placar.casa??"-",pf=f.placar.fora??"-";
  gc("hPlacar").textContent=pc+" : "+pf;
  const ht=f.placar.meioTempo;
  if(ht&&(ht.casa!==null||ht.fora!==null)){gc("hHt").textContent="Intervalo: "+(ht.casa??0)+" - "+(ht.fora??0);gc("hHt").style.display="block";}
  const m=fmtMinuto(f.status);
  gc("hMinStr").textContent=m.str;gc("hDot").style.display=m.dot?"block":"none";
  const sb=gc("hStatus");sb.textContent=m.dot?"Ao Vivo":m.str;sb.className="status-badge "+m.cls;
  const ts=gc("tabSinais");if(m.dot&&!ts.querySelector(".tab-badge"))ts.innerHTML+="<span class='tab-badge'></span>";
}
function renderStats(){
  const sts=DADOS.estatisticas||[],f=DADOS.fixture;
  if(sts.length<2){gc("statsRows").innerHTML="<div class='empty'>Estatisticas nao disponiveis</div>";gc("donutsGrid").innerHTML="<div class='empty' style='grid-column:1/-1'>Aguardando...</div>";return;}
  const home=sts.find(t=>t.time.id===f.timeCasa.id)?.stats||{};
  const away=sts.find(t=>t.time.id===f.timeFora.id)?.stats||{};
  const posseC=parseInt(home["Ball Possession"])||50,posseF=parseInt(away["Ball Possession"])||(100-posseC);
  gc("posseCasaBar").style.width=posseC+"%";gc("posseCasaBar").textContent=posseC+"%";
  gc("posseForaBar").style.width=posseF+"%";gc("posseForaBar").textContent=posseF+"%";
  const linhas=[
    {label:"Chutes",hk:"Total Shots",ak:"Total Shots"},
    {label:"No Alvo",hk:"Shots on Goal",ak:"Shots on Goal"},
    {label:"Ataques Per.",hk:"Dangerous Attacks",ak:"Dangerous Attacks"},
    {label:"Passes",hk:"Total passes",ak:"Total passes"},
    {label:"Precisao",hk:"Passes %",ak:"Passes %",unit:"%"},
    {label:"Faltas",hk:"Fouls",ak:"Fouls"},
    {label:"Escanteios",hk:"Corner Kicks",ak:"Corner Kicks"},
    {label:"Amarelos",hk:"Yellow Cards",ak:"Yellow Cards"},
    {label:"xG",hk:"expected_goals",ak:"expected_goals",dec:2},
  ];
  let html="";
  linhas.forEach(({label,hk,ak,unit,dec})=>{
    const hv=home[hk],av=away[ak];
    const hn=parseFloat(hv)||0,an=parseFloat(av)||0,total=hn+an||1;
    const hPct=Math.round(hn/total*100);
    const fV=v=>v===null||v===undefined?"--":(dec?parseFloat(v).toFixed(dec):v)+(unit||"");
    html+="<div class='stat-row'><div class='stat-val home'>"+fV(hv)+"</div><div class='stat-bar-wrap'><div class='stat-label'>"+label+"</div><div class='stat-bar'><div class='stat-bar-home' style='width:"+hPct+"%'></div><div class='stat-bar-away' style='width:"+(100-hPct)+"%'></div></div></div><div class='stat-val away'>"+fV(av)+"</div></div>";
  });
  gc("statsRows").innerHTML=html;
  const dd=[
    {label:"Posse",hv:posseC,av:posseF,unit:"%",cor:"#00E5A0"},
    {label:"Chutes Alvo",hv:parseInt(home["Shots on Goal"])||0,av:parseInt(away["Shots on Goal"])||0,unit:"",cor:"#4B8EFF"},
    {label:"Ataques Per.",hv:parseInt(home["Dangerous Attacks"])||0,av:parseInt(away["Dangerous Attacks"])||0,unit:"",cor:"#9B6DFF"},
    {label:"Precisao",hv:parseInt(home["Passes %"])||0,av:parseInt(away["Passes %"])||0,unit:"%",cor:"#FFB800"},
  ];
  gc("donutsGrid").innerHTML=dd.map(d=>{const tot=d.hv+d.av||1,p=Math.round(d.hv/tot*100);return donutSVG(d.label,d.hv+d.unit,d.av+d.unit,p,d.cor);}).join("");
}
function donutSVG(label,valH,valA,pctH,color){
  const r=28,cx=38,cy=38,sw=6,circ=2*Math.PI*r,dH=(pctH/100)*circ,dA=circ-dH;
  return "<div class='donut-item'><div class='donut-wrap'><svg width='76' height='76' viewBox='0 0 76 76'><circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='var(--brd2)' stroke-width='"+sw+"'/><circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='"+color+"' stroke-width='"+sw+"' stroke-dasharray='"+dH.toFixed(1)+" "+dA.toFixed(1)+"' stroke-linecap='round'/><circle cx='"+cx+"' cy='"+cy+"' r='"+r+"' fill='none' stroke='var(--blu)' stroke-width='"+sw+"' opacity='.4' stroke-dasharray='"+dA.toFixed(1)+" "+dH.toFixed(1)+"' stroke-dashoffset='-"+dH.toFixed(1)+"' stroke-linecap='round'/></svg><div class='donut-center'><div class='donut-num' style='color:"+color+"'>"+valH+"</div><div class='donut-sub'>vs "+valA+"</div></div></div><div class='donut-label'>"+label+"</div></div>";
}
function renderEventos(){
  const evs=DADOS.eventos||[],f=DADOS.fixture;
  if(!evs.length){gc("eventList").innerHTML="<div class='empty'>Nenhum evento registrado</div>";return;}
  const icos={"Goal":"⚽","Normal Goal":"⚽","Own Goal":"🙈","Penalty":"⚽","Yellow Card":"🟨","Red Card":"🟥","Yellow Red Card":"🟥","subst":"🔄","Var":"📺","Goal cancelled":"🚫"};
  const lbls={"Normal Goal":"Gol","Own Goal":"Gol contra","Penalty":"Gol de penalti","Yellow Card":"Cartao amarelo","Red Card":"Cartao vermelho","Yellow Red Card":"2o Amarelo","subst":"Substituicao","Var":"VAR","Goal cancelled":"Gol anulado"};
  gc("eventList").innerHTML=[...evs].reverse().map(e=>{
    const isH=e.time?.id===f.timeCasa.id,cor=isH?"var(--acc)":"var(--blu)";
    const ico=icos[e.detalhe]||icos[e.tipo]||"•";
    const lbl=lbls[e.detalhe]||lbls[e.tipo]||e.tipo||"";
    const min=e.minuto?(e.minuto+(e.minutoExtra?"+"+e.minutoExtra:""))+"'":"--";
    const assist=e.assistente?.nome?" <span style='color:var(--t3)'>- "+e.assistente.nome+"</span>":"";
    return "<div class='event-item'><div class='event-min'>"+min+"</div><div class='event-ico'>"+ico+"</div><div class='event-desc'><strong>"+(e.jogador?.nome||"")+"</strong>"+assist+"<br><span style='font-size:10px;color:var(--t3)'>"+lbl+(e.time?.nome?" - "+e.time.nome:"")+"</span></div><div class='event-bar' style='background:"+cor+"'></div></div>";
  }).join("");
}
function renderSinais(data){
  const{scores={},alertas=[],narrativa=""}=data;
  const sC=scores.casa||0,sF=scores.fora||0;
  gc("scoreCasaNum").textContent=sC;gc("scoreForaNum").textContent=sF;
  gc("scoreCasaArc").style.width=sC+"%";gc("scoreForaArc").style.width=sF+"%";
  gc("scoreCasaBox").className="score-box"+(sC>=60?" hot":"");
  gc("scoreForaBox").className="score-box"+(sF>=60?" hot":"");
  gc("scoreCasaNum").style.color=sC>=60?"var(--red)":sC>=40?"var(--yel)":"var(--acc)";
  gc("scoreForaNum").style.color=sF>=60?"var(--red)":sF>=40?"var(--yel)":"var(--blu)";
  if(narrativa){gc("narrativaEl").textContent=narrativa;gc("narrativaCard").style.display="block";}
  if(!alertas.length){gc("sinaisEl").innerHTML="<div class='empty'>Nenhum padrao ativo no momento</div>";return;}
  const nIco={alto:"🔴",medio:"🟡",baixo:"🔵"};
  gc("sinaisEl").innerHTML=alertas.map(a=>"<div class='sinal "+(a.nivel||"baixo")+"'><div class='sinal-ico'>"+(nIco[a.nivel]||"•")+"</div><div class='sinal-body'><div class='sinal-titulo'>"+(a.titulo||"")+"</div><div class='sinal-detalhe'>"+(a.detalhe||"")+"</div></div></div>").join("");
}
function renderInsights(){
  const sts=DADOS.estatisticas||[],f=DADOS.fixture,evs=DADOS.eventos||[],insights=[];
  if(sts.length<2){gc("insightList").innerHTML="<div class='empty'>Dados insuficientes</div>";return;}
  const home=sts.find(t=>t.time.id===f.timeCasa.id)?.stats||{};
  const away=sts.find(t=>t.time.id===f.timeFora.id)?.stats||{};
  const min=f.status.elapsed||0,nC=f.timeCasa.nome,nF=f.timeFora.nome;
  const posseC=parseInt(home["Ball Possession"])||50,posseF=100-posseC;
  const chutsH=parseInt(home["Total Shots"])||0,chutsA=parseInt(away["Total Shots"])||0;
  const golH=parseInt(home["Shots on Goal"])||0,golA=parseInt(away["Shots on Goal"])||0;
  const apH=parseInt(home["Dangerous Attacks"])||0,apA=parseInt(away["Dangerous Attacks"])||0;
  const xgH=parseFloat(home["expected_goals"])||0,xgA=parseFloat(away["expected_goals"])||0;
  const pc=f.placar.casa??0,pf=f.placar.fora??0;
  if(posseC>=58)insights.push({cls:"positive",ico:"🟢",text:"<strong>"+nC+"</strong> domina com <strong>"+posseC+"%</strong> de posse."});
  else if(posseF>=58)insights.push({cls:"positive",ico:"🔵",text:"<strong>"+nF+"</strong> domina com <strong>"+posseF+"%</strong>."});
  else insights.push({cls:"neutral",ico:"⚖️",text:"Equilibrio na posse - <strong>"+nC+" "+posseC+"% x "+posseF+"% "+nF+"</strong>."});
  if(posseC>=55&&xgH<0.3&&min>25)insights.push({cls:"warning",ico:"⚠️",text:"<strong>"+nC+"</strong>: posse alta mas xG de apenas <strong>"+xgH.toFixed(2)+"</strong> - pressao sem criatividade."});
  if(posseF>=55&&xgA<0.3&&min>25)insights.push({cls:"warning",ico:"⚠️",text:"<strong>"+nF+"</strong>: posse alta mas xG de apenas <strong>"+xgA.toFixed(2)+"</strong>."});
  if(chutsH>4){const eff=Math.round(golH/chutsH*100);insights.push({cls:eff>=40?"positive":eff<=20?"warning":"info",ico:"🎯",text:"<strong>"+nC+"</strong>: "+golH+"/"+chutsH+" chutes no alvo - eficiencia <strong>"+eff+"%</strong>."});}
  if(chutsA>4){const eff=Math.round(golA/chutsA*100);insights.push({cls:eff>=40?"positive":eff<=20?"warning":"info",ico:"🎯",text:"<strong>"+nF+"</strong>: "+golA+"/"+chutsA+" - eficiencia <strong>"+eff+"%</strong>."});}
  if(xgH>0.5&&pc===0&&min>30)insights.push({cls:"warning",ico:"📉",text:"<strong>"+nC+"</strong> criou "+xgH.toFixed(2)+" xG mas nao marcou."});
  if(xgA>0.5&&pf===0&&min>30)insights.push({cls:"warning",ico:"📉",text:"<strong>"+nF+"</strong> criou "+xgA.toFixed(2)+" xG sem marcar."});
  if(apH>apA*2&&apA>0)insights.push({cls:"positive",ico:"🔥",text:"<strong>"+nC+"</strong>: "+apH+" ataques perigosos vs "+apA+" - pressao muito superior."});
  else if(apA>apH*2&&apH>0)insights.push({cls:"info",ico:"🔥",text:"<strong>"+nF+"</strong>: "+apA+" ataques vs "+apH+" - dominio visitante."});
  if(pc>pf)insights.push({cls:"positive",ico:"🏆",text:"<strong>"+nC+"</strong> vencendo por <strong>"+pc+"-"+pf+"</strong>."});
  else if(pf>pc)insights.push({cls:"info",ico:"🏆",text:"<strong>"+nF+"</strong> vencendo por <strong>"+pf+"-"+pc+"</strong>."});
  else if(pc+pf>0)insights.push({cls:"neutral",ico:"🤝",text:"Empate <strong>"+pc+"-"+pf+"</strong>. Qualquer gol decide."});
  gc("insightList").innerHTML=insights.map(i=>"<div class='insight "+i.cls+"'><div class='insight-ico'>"+i.ico+"</div><div class='insight-text'>"+i.text+"</div></div>").join("");
}
function switchTab(id,btn){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  btn.classList.add("on");gc("pane-"+id).classList.add("on");
}
function abrirPerfil(lado){
  if(!DADOS)return;const f=DADOS.fixture,t=lado==="casa"?f.timeCasa:f.timeFora;
  window.open("time-perfil.html?teamId="+t.id+"&nome="+encodeURIComponent(t.nome)+"&logo="+encodeURIComponent(t.logo||"")+"&fixId="+FIX_ID,"_blank");
}
