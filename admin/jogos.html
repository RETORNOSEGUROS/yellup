<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Cadastrados - Yellup Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg-primary:#0c0e14; --bg-card:#181a24; --bg-card-hover:#1e2030;
  --border:#1e2030; --border-light:#282a3a;
  --text-primary:#e8e9ed; --text-secondary:#8b8d9a; --text-muted:#5c5e6e;
  --accent:#f0b429; --accent-dim:rgba(240,180,41,0.12);
  --live:#ef4444; --live-dim:rgba(239,68,68,0.14);
  --sched:#3b82f6; --sched-dim:rgba(59,130,246,0.14);
  --done:#22c55e; --done-dim:rgba(34,197,94,0.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* Topbar */
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:16px;
  padding:16px 24px;background:rgba(12,14,20,0.9);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .logo{width:34px;height:34px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#000;}
.brand h1{font-size:16px;font-weight:700;}
.brand h1 span{color:var(--text-muted);font-weight:500;font-size:12px;margin-left:6px;}
.count-pill{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-dim);
  padding:5px 11px;border-radius:999px;}
.topbar .spacer{flex:1;}
.search{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border-light);
  border-radius:10px;padding:8px 12px;min-width:220px;}
.search input{background:none;border:none;outline:none;color:var(--text-primary);font-size:13px;width:100%;font-family:inherit;}
.search input::placeholder{color:var(--text-muted);}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border-light);
  color:var(--text-secondary);padding:8px 12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn:hover{background:var(--bg-card-hover);color:var(--text-primary);}
.dt{background:var(--bg-card);border:1px solid var(--border-light);color:var(--text-primary);border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;}

/* Layout */
.wrap{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* Card */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:16px;transition:.15s;}
.card:hover{border-color:var(--border-light);background:var(--bg-card-hover);}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;}
.league{display:flex;align-items:center;gap:7px;min-width:0;}
.league img{width:18px;height:18px;object-fit:contain;border-radius:3px;}
.league span{font-size:12px;color:var(--text-secondary);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.badge.live{color:var(--live);background:var(--live-dim);}
.badge.sched{color:var(--sched);background:var(--sched-dim);}
.badge.done{color:var(--done);background:var(--done-dim);}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;background:currentColor;
  animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
.team{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0;width:100%;}
.crest{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;}
.crest img{width:100%;height:100%;object-fit:contain;}
.team-name{font-size:13px;font-weight:600;text-align:center;line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.center{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:54px;}
.score{font-size:22px;font-weight:700;letter-spacing:1px;}
.vs{font-size:13px;font-weight:700;color:var(--text-muted);}
.minute{font-size:10px;color:var(--live);font-weight:700;}

.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-secondary);}
.card-foot .when{display:flex;flex-direction:column;gap:1px;}
.card-foot .when .d{font-weight:600;color:var(--text-primary);}
.fans{display:flex;align-items:center;gap:5px;font-weight:600;}
.fans .n{color:var(--accent);}
.acessar{display:block;margin-top:12px;text-align:center;background:var(--accent);color:#000;font-weight:700;font-size:13px;padding:10px;border-radius:10px;transition:.15s;}
.acessar:hover{filter:brightness(1.08);}

.state{text-align:center;padding:80px 20px;color:var(--text-muted);}
.state .ic{font-size:40px;margin-bottom:12px;}
.state p{font-size:14px;}
.spin{width:34px;height:34px;border:3px solid var(--border-light);border-top-color:var(--accent);
  border-radius:50%;margin:0 auto 14px;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

@media(max-width:560px){
  .topbar{flex-wrap:wrap;}
  .search{order:3;min-width:100%;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="dashboard.html">
    <div class="logo">Y</div>
    <h1>Jogos cadastrados<span>Yellup Admin</span></h1>
  </a>
  <span class="count-pill" id="countPill">—</span>
  <div class="spacer"></div>
  <input type="date" id="fData" class="dt" onchange="SEL_DATE=this.value;filtrar()" title="Ver jogos de uma data (inclui encerrados)">
  <button class="btn" onclick="SEL_DATE='';document.getElementById('fData').value='';filtrar()">Próximos</button>
  <div class="search">
    <span>🔎</span>
    <input id="busca" type="text" placeholder="Buscar time ou liga..." oninput="filtrar()">
  </div>
  <button class="btn" onclick="carregarJogos()">↺ Atualizar</button>
  <a class="btn" href="jogos-admin.html">⚙️ Cadastrar</a>
  <button class="btn" onclick="sair()">⏻ Sair</button>
</div>

<div class="wrap">
  <div id="lista" class="grid"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
});
const db = firebase.firestore();
const auth = firebase.auth();

let jogos = [];
let SEL_DATE = '';
let torcidaCount = {};

auth.onAuthStateChanged(user => {
  if (!user || user.email !== 'admin@yellup.com') { window.location.href = 'login.html'; return; }
  carregarJogos();
});

function sair(){ auth.signOut().then(()=>window.location.href='login.html'); }

function esc(t){ const d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }
function toDate(v){ return v?.toDate ? v.toDate() : (v ? new Date(v) : null); }

// Conta quantos usuários torceram em cada jogo
async function carregarContagem(){
  torcidaCount = {};
  try{
    const snap = await db.collection('usuarios').get();
    snap.forEach(doc=>{
      const u = doc.data();
      if(u.torcidas) Object.keys(u.torcidas).forEach(jid=>{ torcidaCount[jid]=(torcidaCount[jid]||0)+1; });
    });
  }catch(e){ console.warn('Contagem de torcedores indisponível:', e.message); }
}

async function carregarJogos(){
  const lista = document.getElementById('lista');
  lista.innerHTML = `<div class="state" style="grid-column:1/-1"><div class="spin"></div><p>Carregando jogos...</p></div>`;
  try{
    await carregarContagem();
    const snap = await db.collection('jogos').get();
    jogos = [];
    snap.forEach(doc=>{
      const d = doc.data();
      if(d.origem === 'jogos-admin') jogos.push({ id: doc.id, ...d });
    });
    // Ordena: ao vivo, depois mais próximos por data
    const rank = s => s==='ao_vivo'?0 : s==='agendado'?1 : 2;
    jogos.sort((a,b)=>{
      const ra=rank(a.status), rb=rank(b.status);
      if(ra!==rb) return ra-rb;
      const da=toDate(a.dataInicio)?.getTime()||0, dbb=toDate(b.dataInicio)?.getTime()||0;
      return da-dbb;
    });
    filtrar();
  }catch(e){
    console.error('Erro ao carregar jogos:', e);
    lista.innerHTML = `<div class="state" style="grid-column:1/-1"><div class="ic">⚠️</div><p>Erro ao carregar: ${esc(e.message)}</p></div>`;
  }
}

function noPeriodo(j){
  const t = toDate(j.dataInicio)?.getTime();
  if(SEL_DATE){
    const d0=new Date(SEL_DATE+'T00:00:00').getTime(), d1=new Date(SEL_DATE+'T23:59:59').getTime();
    return t!=null && t>=d0 && t<=d1;
  }
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  return t==null || t>=hoje.getTime();
}
function filtrar(){
  const q = (document.getElementById('busca').value||'').toLowerCase().trim();
  let base = jogos.filter(noPeriodo);
  const filtrados = !q ? base : base.filter(j=>{
    const h = [j.timeCasaNome, j.timeForaNome, j.liga].join(' ').toLowerCase();
    return h.includes(q);
  });
  render(filtrados);
}

function crest(nome, escudo, cor){
  if(escudo) return `<div class="crest"><img src="${esc(escudo)}" onerror="this.parentNode.textContent='${esc((nome||'?').charAt(0))}'"></div>`;
  const c = cor || '#3a3d4d';
  return `<div class="crest" style="background:linear-gradient(135deg,${c},${c}99)">${esc((nome||'?').charAt(0).toUpperCase())}</div>`;
}

function render(arr){
  const lista = document.getElementById('lista');
  document.getElementById('countPill').textContent = `${arr.length} jogo${arr.length===1?'':'s'}`;

  if(!arr.length){
    lista.innerHTML = `<div class="state" style="grid-column:1/-1"><div class="ic">⚽</div><p>${SEL_DATE?'Nenhum jogo nesse dia.':'Nenhum jogo de hoje em diante. Use o calendário para ver dias anteriores.'}</p></div>`;
    return;
  }

  lista.innerHTML = arr.map(j=>{
    const ini = toDate(j.dataInicio);
    const temPlacar = (j.placarCasa!=null && j.placarFora!=null);
    const isLive = j.status==='ao_vivo';
    const isDone = j.status==='finalizado' || j.status==='encerrado';
    const minutoVivo = (j.minutosJogo ?? j.minuto);

    const badge = isLive
      ? `<span class="badge live"><span class="dot"></span>Ao vivo</span>`
      : isDone
      ? `<span class="badge done">Encerrado</span>`
      : `<span class="badge sched">Agendado</span>`;

    const centro = temPlacar
      ? `<div class="center"><div class="score">${j.placarCasa} <span style="color:var(--text-muted)">×</span> ${j.placarFora}</div>${isLive&&minutoVivo?`<div class="minute">${esc(minutoVivo)}'</div>`:''}</div>`
      : `<div class="center"><div class="vs">VS</div></div>`;

    const dataLinha = ini
      ? `<div class="when"><span class="d">${ini.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</span><span>${ini.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}${j.rodada?` · Rodada ${esc(j.rodada)}`:''}</span></div>`
      : `<div class="when"><span class="d">Sem data</span></div>`;

    const fans = torcidaCount[j.id] || 0;

    const liga = j.liga
      ? `<div class="league">${j.ligaLogo?`<img src="${esc(j.ligaLogo)}" onerror="this.style.display='none'">`:''}<span>${esc(j.liga)}</span></div>`
      : `<div class="league"><span>Partida</span></div>`;

    return `<div class="card">
      <div class="card-top">${liga}${badge}</div>
      <div class="match">
        <div class="team">${crest(j.timeCasaNome,j.timeCasaEscudo,j.timeCasaPrimaria)}<span class="team-name">${esc(j.timeCasaNome||'Time A')}</span></div>
        ${centro}
        <div class="team">${crest(j.timeForaNome,j.timeForaEscudo,j.timeForaPrimaria)}<span class="team-name">${esc(j.timeForaNome||'Time B')}</span></div>
      </div>
      <div class="card-foot">
        ${dataLinha}
        <div class="fans">👥 <span class="n">${fans}</span> torcendo</div>
      </div>
      <a class="acessar" href="arena-yell.html?jogoId=${j.id}">▶ Acessar partida</a>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
