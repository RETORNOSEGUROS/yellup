<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raio-X · Preview do App — Yellup Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#060810; --s1:#0a0e18; --s2:#0e1420; --s3:#131a28; --line:#1b2435;
  --tx:#cddaee; --tx2:#8898b8; --tx3:#46587a;
  --A:#00d4ff; --Ad:rgba(0,212,255,.13);
  --B:#ff8a3d; --Bd:rgba(255,138,61,.13);
  --gn:#0fe898; --rd:#f43f5e; --yl:#fbbf24;
  --fD:'Rajdhani',sans-serif; --fM:'JetBrains Mono',monospace; --fB:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fB);background:#05070d;color:var(--tx);min-height:100vh}
.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:13px 22px;background:rgba(6,8,16,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar .logo{width:30px;height:30px;background:var(--A);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#04121a;font-family:var(--fD)}
.bar h1{font-family:var(--fD);font-size:17px;font-weight:700;letter-spacing:.5px}
.bar h1 span{color:var(--tx3);font-weight:500;font-size:12px;margin-left:6px;font-family:var(--fB)}
.bar #cnt{font-size:11px;color:var(--A);font-weight:700;font-family:var(--fM)}
.bar select{margin-left:auto;background:var(--s2);color:var(--tx);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13px;font-family:var(--fB);min-width:230px;outline:none}
.bar a{color:var(--tx2);text-decoration:none;font-size:13px;font-weight:600;border:1px solid var(--line);padding:8px 12px;border-radius:9px}

.stage{display:flex;justify-content:center;padding:28px 16px 60px}
.phone{width:392px;max-width:100%;background:var(--bg);border:9px solid #161c28;border-radius:40px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.6)}
.notch{height:24px;background:#161c28;width:130px;margin:0 auto;border-radius:0 0 14px 14px}
.scr{height:766px;overflow-y:auto}
.scr::-webkit-scrollbar{width:0}

/* header */
.hd{padding:20px 18px 6px;position:relative}
.hd .liga{font-family:var(--fM);font-size:10.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:18px}
.hd .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.tm{display:flex;flex-direction:column;align-items:center;gap:9px}
.crest{width:62px;height:62px;border-radius:17px;display:flex;align-items:center;justify-content:center;font-family:var(--fD);font-size:26px;font-weight:700;color:#fff;overflow:hidden;border:1px solid var(--line)}
.crest img{width:100%;height:100%;object-fit:contain;padding:6px}
.tm .nm{font-family:var(--fD);font-size:16px;font-weight:600;line-height:1.1;text-align:center;max-width:130px;letter-spacing:.3px}
.fwrap{text-align:center}
.fwrap .fnum{font-family:var(--fM);font-size:30px;font-weight:800;line-height:1}
.fwrap .flbl{font-family:var(--fM);font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.tm.a .fnum{color:var(--A)} .tm.b .fnum{color:var(--B)}
.midvs{font-family:var(--fD);font-size:15px;font-weight:700;color:var(--tx3)}
.forcebar{display:flex;height:6px;border-radius:4px;overflow:hidden;background:var(--s3);margin:16px 6px 2px}
.forcebar .a{background:var(--A)} .forcebar .b{background:var(--B)}

/* sections */
.sec{margin:13px 13px;background:var(--s1);border:1px solid var(--line);border-radius:15px;padding:15px 15px 16px}
.sec .ttl{font-family:var(--fD);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--tx);margin-bottom:15px;display:flex;align-items:center;gap:8px}
.sec .ttl::before{content:"";width:3px;height:14px;background:var(--A);border-radius:2px}

.cmp{margin-bottom:14px}.cmp:last-child{margin-bottom:0}
.cmp .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cmp .v{font-family:var(--fM);font-size:15px;font-weight:700}
.cmp .v.a{color:var(--A)} .cmp .v.b{color:var(--B)}
.cmp .v.dim{opacity:.4;font-weight:500}
.cmp .lbl{font-family:var(--fB);font-size:11px;color:var(--tx2);font-weight:500}
.track{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--s3);gap:2px}
.track .pa{background:var(--A);border-radius:4px 0 0 4px} .track .pb{background:var(--B);border-radius:0 4px 4px 0}
.track .pa.lo{opacity:.35} .track .pb.lo{opacity:.35}

.forma{display:flex;align-items:center;gap:9px;margin-bottom:11px}.forma:last-child{margin-bottom:0}
.forma .who{font-family:var(--fD);font-size:13px;font-weight:600;width:88px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
.forma .who.a{color:var(--A)} .forma .who.b{color:var(--B)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fM);font-size:11px;font-weight:700}
.chip.v{background:rgba(15,232,152,.16);color:var(--gn)} .chip.e{background:rgba(136,152,184,.16);color:var(--tx2)} .chip.d{background:rgba(244,63,94,.16);color:var(--rd)}

.heat{margin-bottom:15px}.heat:last-child{margin-bottom:0}
.heat .who{font-family:var(--fD);font-size:12px;font-weight:600;margin-bottom:7px;letter-spacing:.3px}
.heat .who.a{color:var(--A)} .heat .who.b{color:var(--B)}
.strip{display:flex;gap:2px;height:32px;align-items:flex-end}
.strip .c{flex:1;border-radius:2px;min-height:3px}
.mstrip{display:flex;gap:1px;height:36px;align-items:flex-end}
.mstrip .c{flex:1;border-radius:1px;min-height:2px}
.axis{display:flex;justify-content:space-between;font-family:var(--fM);font-size:9px;color:var(--tx3);margin-top:5px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-family:var(--fM);font-size:12px}
.pill b{font-weight:800}
.gridref{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.state{text-align:center;padding:80px 24px;color:var(--tx3)}.state .ic{font-size:36px;margin-bottom:12px}
.spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--A);border-radius:50%;margin:0 auto 14px;animation:r .8s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
@media(max-width:480px){.bar h1 span{display:none}.bar select{min-width:150px}}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">Y</div>
  <h1>RAIO-X<span>preview do app do usuário</span></h1>
  <span id="cnt">—</span>
  <select id="sel" onchange="abrir(this.value)"><option>Carregando...</option></select>
  <a href="dashboard.html">← Admin</a>
</div>
<div class="stage"><div class="phone"><div class="notch"></div><div class="scr" id="scr">
  <div class="state"><div class="spin"></div>Carregando...</div>
</div></div></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",authDomain:"painel-yellup.firebaseapp.com",projectId:"painel-yellup",storageBucket:"painel-yellup.appspot.com",messagingSenderId:"608347210297",appId:"1:608347210297:web:75092713724e617c7203e8"});
const db=firebase.firestore(), auth=firebase.auth();
const esc=t=>{const d=document.createElement('div');d.textContent=(t==null?'':t);return d.innerHTML;};
const num=v=>(v===null||v===undefined||v==='—'||isNaN(parseFloat(v)))?null:parseFloat(v);
let JOGOS={};

function crest(n,e,c){return e?`<div class="crest"><img src="${esc(e)}" onerror="this.parentNode.innerHTML='${esc((n||'?').charAt(0))}'"></div>`:`<div class="crest" style="background:linear-gradient(140deg,${c}44,${c}18);color:${c}">${esc((n||'?').charAt(0).toUpperCase())}</div>`;}

// linha comparativa com destaque pro maior (menor = lo). inv=true → menor é melhor
function cmp(label,a,b,fmt,inv){
  fmt=fmt||(x=>x); const va=num(a),vb=num(b);
  let pa=50,pb=50,aWin=false,bWin=false;
  if(va!==null&&vb!==null){
    const sum=va+vb; if(sum>0){pa=va/sum*100;pb=100-pa;}
    if(va!==vb){ const aBetter = inv ? va<vb : va>vb; aWin=aBetter; bWin=!aBetter; }
  }
  return `<div class="cmp"><div class="top">
    <span class="v a ${va!==null&&!aWin&&vb!==null?'dim':''}">${va!==null?fmt(va):'—'}</span>
    <span class="lbl">${label}</span>
    <span class="v b ${vb!==null&&!bWin&&va!==null?'dim':''}">${vb!==null?fmt(vb):'—'}</span>
  </div><div class="track"><div class="pa ${aWin?'':'lo'}" style="width:${pa}%"></div><div class="pb ${bWin?'':'lo'}" style="width:${pb}%"></div></div></div>`;
}
function ppg(compact){ if(!Array.isArray(compact)||!compact.length)return null;
  let p=0,n=0; compact.forEach(s=>{const r=(String(s).split('|')[9]||'').toLowerCase();if(!r)return;n++;p+=r==='v'?3:r==='e'?1:0;}); return n?p/n:null; }
function formaChips(c){ if(!Array.isArray(c))return '<span style="color:var(--tx3);font-size:11px">sem dados</span>';
  return c.slice(0,10).map(s=>{const r=(String(s).split('|')[9]||'').toLowerCase();const cl=r==='v'?'v':r==='d'?'d':'e';return `<div class="chip ${cl}">${r==='v'?'V':r==='d'?'D':'E'}</div>`;}).join(''); }
function strip(b,c,cls){ const sc=b?.sc; if(!Array.isArray(sc))return '<span style="color:var(--tx3);font-size:11px">sem dados</span>';
  const mx=Math.max(1,...sc); const inner=sc.map(v=>`<div class="c" style="height:${3+(v/mx)*(cls==='mstrip'?33:29)}px;background:${c};opacity:${v===0?.12:.4+(v/mx)*.6}"></div>`).join('');
  return `<div class="${cls}">${inner}</div><div class="axis"><span>0'</span><span>45'</span><span>90'+</span></div>`; }
function mstrip(m,c){ if(!Array.isArray(m))return '<span style="color:var(--tx3);font-size:11px">sem dados</span>';
  const mx=Math.max(1,...m); const inner=m.map(v=>`<div class="c" style="height:${2+(v/mx)*34}px;background:${c};opacity:${v===0?.10:.45+(v/mx)*.55}"></div>`).join('');
  return `<div class="mstrip">${inner}</div><div class="axis"><span>0'</span><span>45'</span><span>90'</span></div>`; }

function render(s){
  const A=s.teamA||{},B=s.teamB||{},fA=s.forteFull?.A||{},fB=s.forteFull?.B||{},aA=s.agg?.A||{},aB=s.agg?.B||{};
  const rA=s.referenciaMin?.A||{},rB=s.referenciaMin?.B||{};
  const cA='#00d4ff',cB='#ff8a3d';
  const FA=Math.round(num(s.forteScore?.A)||0),FB=Math.round(num(s.forteScore?.B)||0);
  let fpa=50; if(FA+FB>0)fpa=FA/(FA+FB)*100;
  const ppgA=ppg(s.enrichedCompact?.A),ppgB=ppg(s.enrichedCompact?.B);
  const has=(o)=>o&&Object.keys(o).length;

  document.getElementById('scr').innerHTML=`
  <div class="hd">
    <div class="liga">${esc(s.liga||'Análise da partida')}</div>
    <div class="row">
      <div class="tm a">${crest(A.nome,A.escudo,cA)}<div class="nm">${esc(A.nome||'Time A')}</div></div>
      <div class="midvs">×</div>
      <div class="tm b">${crest(B.nome,B.escudo,cB)}<div class="nm">${esc(B.nome||'Time B')}</div></div>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="fwrap"><div class="fnum" style="color:var(--A)">${FA||'—'}</div><div class="flbl">força</div></div>
      <div class="midvs"></div>
      <div class="fwrap"><div class="fnum" style="color:var(--B)">${FB||'—'}</div><div class="flbl">força</div></div>
    </div>
    <div class="forcebar"><div class="a" style="width:${fpa}%"></div><div class="b" style="width:${100-fpa}%"></div></div>
  </div>

  ${(has(fA)||has(fB))?`<div class="sec"><div class="ttl">Como cada um chega</div>
    ${cmp('Ataque',fA.io,fB.io,x=>x.toFixed(0))}
    ${cmp('Defesa',fA.id,fB.id,x=>x.toFixed(0))}
    ${cmp('Domínio de jogo',fA.idom,fB.idom,x=>x.toFixed(0))}
    ${cmp('Aproveitamento',fA.wrs,fB.wrs,x=>(x<=1?Math.round(x*100):Math.round(x))+'%')}</div>`:''}

  <div class="sec"><div class="ttl">Desempenho · últimos 20 jogos</div>
    ${cmp('Pontos por jogo',ppgA,ppgB,x=>x.toFixed(2))}
    ${cmp('Posse de bola',aA.poss,aB.poss,x=>x+'%')}
    ${cmp('Gols esperados (xG)',aA.xg,aB.xg,x=>x.toFixed(2))}
    ${cmp('Finalizações',aA.shots,aB.shots,x=>x.toFixed(0))}
    ${cmp('Finalizações no gol',aA.shotsOG,aB.shotsOG,x=>x.toFixed(0))}
    ${cmp('Acerto de passe',aA.pass,aB.pass,x=>x+'%')}
    ${cmp('Gols marcados',aA.gfJ,aB.gfJ,x=>x.toFixed(2))}
    ${cmp('Gols sofridos',aA.gcJ,aB.gcJ,x=>x.toFixed(2),true)}</div>

  ${(rA.xgEsperado90!=null||rB.xgEsperado90!=null)?`<div class="sec"><div class="ttl">Ritmo esperado · 90 min</div>
    <div class="gridref">
      <div class="pill" style="justify-content:center;color:var(--A)">xG <b>${rA.xgEsperado90!=null?(+rA.xgEsperado90).toFixed(2):'—'}</b></div>
      <div class="pill" style="justify-content:center;color:var(--B)">xG <b>${rB.xgEsperado90!=null?(+rB.xgEsperado90).toFixed(2):'—'}</b></div>
    </div>
    <div style="font-size:10.5px;color:var(--tx3);text-align:center;margin-top:8px;font-family:var(--fM)">gols esperados num jogo inteiro, pelo histórico</div></div>`:''}

  <div class="sec"><div class="ttl">Forma recente</div>
    <div class="forma"><span class="who a">${esc(A.nome||'A')}</span><div class="chips">${formaChips(s.enrichedCompact?.A)}</div></div>
    <div class="forma"><span class="who b">${esc(B.nome||'B')}</span><div class="chips">${formaChips(s.enrichedCompact?.B)}</div></div></div>

  <div class="sec"><div class="ttl">Quando o gol sai · faixas de 5 min</div>
    <div class="heat"><div class="who a">${esc(A.nome||'A')}</div>${strip(s.bucketsA,cA,'strip')}</div>
    <div class="heat"><div class="who b">${esc(B.nome||'B')}</div>${strip(s.bucketsB,cB,'strip')}</div></div>

  <div class="sec" style="margin-bottom:22px"><div class="ttl">Gols minuto a minuto</div>
    <div class="heat"><div class="who a">${esc(A.nome||'A')}</div>${mstrip(s.minutosA,cA)}</div>
    <div class="heat"><div class="who b">${esc(B.nome||'B')}</div>${mstrip(s.minutosB,cB)}</div></div>`;
}

async function abrir(id){if(!id)return;const g=JOGOS[id];
  document.getElementById('scr').innerHTML='<div class="state"><div class="spin"></div>Carregando análise...</div>';
  try{
    let data=null;
    let d=await db.collection('raiox-snapshots').doc(id).get(); if(d.exists)data=d.data();
    if(!data){const q=await db.collection('raiox-snapshots').where('apiFixtureId','==',id).limit(1).get();if(!q.empty)data=q.docs[0].data();}
    if(!data&&!isNaN(+id)){const q=await db.collection('raiox-snapshots').where('apiFixtureId','==',+id).limit(1).get();if(!q.empty)data=q.docs[0].data();}
    if(!data&&g?.timeCasa?.apiId&&g?.timeFora?.apiId){const ca=g.timeCasa.apiId,fa=g.timeFora.apiId;
      let q=await db.collection('raiox-snapshots').where('teamA.apiId','==',ca).get();
      let hit=q.docs.find(x=>String(x.data()?.teamB?.apiId)===String(fa));
      if(!hit){q=await db.collection('raiox-snapshots').where('teamA.apiId','==',fa).get();hit=q.docs.find(x=>String(x.data()?.teamB?.apiId)===String(ca));}
      if(hit)data=hit.data();}
    if(!data){document.getElementById('scr').innerHTML='<div class="state"><div class="ic">📭</div>Análise não encontrada<br><span style="font-size:11px;font-family:var(--fM)">id: '+esc(id)+'</span></div>';return;}
    render(data);
  }catch(e){document.getElementById('scr').innerHTML=`<div class="state"><div class="ic">⚠️</div>Erro: ${esc(e.message)}</div>`;}}

async function init(){
  try{
    let total=0; try{total=(await db.collection('raiox-snapshots').get()).size;}catch(e){}
    const cnt=document.getElementById('cnt'); if(cnt)cnt.textContent=total+' no banco';
    const snap=await db.collection('jogos-admin').get();const jogos=[];
    snap.forEach(d=>{const g=d.data();if(g.ativo===false)return;if(!g.timeCasa?.apiId||!g.timeFora?.apiId)return;const j={id:d.id,...g};jogos.push(j);JOGOS[d.id]=j;});
    jogos.sort((a,b)=>{const da=a.dataInicio?.toMillis?a.dataInicio.toMillis():0,dbb=b.dataInicio?.toMillis?b.dataInicio.toMillis():0;return da-dbb;});
    const sel=document.getElementById('sel');
    if(!jogos.length){sel.innerHTML='<option>Nenhum jogo</option>';document.getElementById('scr').innerHTML='<div class="state"><div class="ic">⚽</div>Cadastre jogos no admin.</div>';return;}
    sel.innerHTML=jogos.map(j=>`<option value="${j.id}">${esc(j.timeCasa?.nome||'A')} × ${esc(j.timeFora?.nome||'B')}</option>`).join('');
    const u=new URLSearchParams(location.search).get('jogoId');
    const first=(u&&JOGOS[u])?u:jogos[0].id;sel.value=first;abrir(first);
  }catch(e){document.getElementById('scr').innerHTML=`<div class="state"><div class="ic">⚠️</div>${esc(e.message)}</div>`;}
}
auth.onAuthStateChanged(u=>{if(!u||u.email!=='admin@yellup.com'){location.href='login.html';return;}init();});
</script>
</body>
</html>
