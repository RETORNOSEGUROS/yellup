<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raio-X · Preview do App — Yellup Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --A:#2dd4a7; --B:#f0883e; --win:#2dd4a7; --draw:#5a5f72; --loss:#e05260;
  --ph-bg:#0a0d14; --card:#141823; --card2:#1b2030; --line:#222838;
  --tx:#eef0f6; --tx2:#8a8fa3; --tx3:#5a5f72;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0c0e14;color:#e8e9ed;min-height:100vh}
.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:14px 22px;
  background:rgba(12,14,20,.92);backdrop-filter:blur(8px);border-bottom:1px solid #1e2030}
.bar .logo{width:32px;height:32px;background:#f0b429;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000}
.bar h1{font-size:15px;font-weight:700}.bar h1 span{color:#5c5e6e;font-weight:500;font-size:12px;margin-left:6px}
.bar select{margin-left:auto;background:#181a24;color:#e8e9ed;border:1px solid #282a3a;border-radius:9px;padding:8px 11px;font-size:13px;font-family:inherit;min-width:220px}
.bar a{color:#8b8d9a;text-decoration:none;font-size:13px;font-weight:600;border:1px solid #282a3a;padding:8px 12px;border-radius:9px}

.stage{display:flex;justify-content:center;padding:30px 16px 60px}
.phone{width:390px;max-width:100%;background:var(--ph-bg);border:10px solid #20242f;border-radius:38px;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.notch{height:26px;background:#20242f;border-radius:0 0 16px 16px;width:140px;margin:0 auto 0}
.scr{height:760px;overflow-y:auto}

.head{padding:22px 16px 18px;text-align:center}
.head .liga{font-size:12px;color:var(--tx2);font-weight:600;margin-bottom:14px}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.tm{display:flex;flex-direction:column;align-items:center;gap:8px}
.tm .crest{width:56px;height:56px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:800;color:#fff;overflow:hidden}
.tm .crest img{width:100%;height:100%;object-fit:contain}
.tm .nm{font-size:13.5px;font-weight:700;line-height:1.2;max-width:120px}
.tm .force{font-size:25px;font-weight:800;margin-top:2px}
.tm.a .force{color:var(--A)}.tm.b .force{color:var(--B)}
.tm .flbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.vs{font-size:13px;font-weight:700;color:var(--tx3)}
.legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--tx2);margin-bottom:4px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
.sec{margin:13px 12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px}
.sec h3{font-size:13px;font-weight:700;margin-bottom:13px}
.row{margin-bottom:12px}.row:last-child{margin-bottom:0}
.row .vals{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px}
.row .vals .va{color:var(--A)}.row .vals .vb{color:var(--B)}
.row .lbl{font-size:11px;color:var(--tx2);text-align:center;font-weight:600}
.cbar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:var(--card2);margin-top:5px}
.cbar .pa{background:var(--A)}.cbar .pb{background:var(--B)}
.forma{display:flex;align-items:center;gap:10px;margin-bottom:10px}.forma:last-child{margin-bottom:0}
.forma .who{font-size:12px;font-weight:700;width:84px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0a0d14}
.chip.v{background:var(--win)}.chip.e{background:var(--draw);color:#fff}.chip.d{background:var(--loss);color:#fff}
.heat{margin-bottom:14px}.heat .who{font-size:12px;font-weight:700;margin-bottom:6px}
.strip{display:flex;gap:2px;height:30px;align-items:flex-end}
.strip .cell{flex:1;border-radius:2px;min-height:3px}
.mstrip{display:flex;gap:1px;height:34px;align-items:flex-end}
.mstrip .mc{flex:1;border-radius:1px;min-height:2px}
.axis{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-top:4px}
.state{text-align:center;padding:70px 24px;color:var(--tx3)}.state .ic{font-size:36px;margin-bottom:12px}
.spin{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--A);border-radius:50%;margin:0 auto 14px;animation:r .8s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">Y</div>
  <h1>Raio-X<span>preview do app do usuário</span></h1>
  <span id="cnt" style="font-size:11px;color:#f0b429;font-weight:700">—</span>
  <select id="sel" onchange="abrir(this.value)"><option>Carregando...</option></select>
  <a href="dashboard.html">← Admin</a>
</div>
<div class="stage">
  <div class="phone"><div class="notch"></div><div class="scr" id="scr">
    <div class="state"><div class="spin"></div>Carregando...</div>
  </div></div>
</div>

<script>
firebase.initializeApp({apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",authDomain:"painel-yellup.firebaseapp.com",projectId:"painel-yellup",storageBucket:"painel-yellup.appspot.com",messagingSenderId:"608347210297",appId:"1:608347210297:web:75092713724e617c7203e8"});
const db=firebase.firestore(), auth=firebase.auth();
const esc=t=>{const d=document.createElement('div');d.textContent=(t==null?'':t);return d.innerHTML;};
const num=v=>(v===null||v===undefined||v==='—'||isNaN(parseFloat(v)))?null:parseFloat(v);
function crest(n,e,c){return e?`<div class="crest"><img src="${esc(e)}" onerror="this.parentNode.textContent='${esc((n||'?').charAt(0))}'"></div>`:`<div class="crest" style="background:${c}">${esc((n||'?').charAt(0).toUpperCase())}</div>`;}
function compRow(label,a,b,fmt){fmt=fmt||(x=>x);const va=num(a),vb=num(b);let pa=50,pb=50;if(va!==null&&vb!==null&&(va+vb)>0){pa=va/(va+vb)*100;pb=100-pa;}
  return `<div class="row"><div class="vals"><span class="va">${va!==null?fmt(va):'—'}</span><span class="vb">${vb!==null?fmt(vb):'—'}</span></div><div class="cbar"><div class="pa" style="width:${pa}%"></div><div class="pb" style="width:${pb}%"></div></div><div class="lbl">${label}</div></div>`;}
function formaChips(c){if(!Array.isArray(c))return '<span style="color:var(--tx3);font-size:12px">sem dados</span>';
  return c.slice(0,8).map(s=>{const r=(String(s).split('|')[9]||'').toLowerCase();const cl=r==='v'?'v':r==='d'?'d':'e';return `<div class="chip ${cl}">${r==='v'?'V':r==='d'?'D':'E'}</div>`;}).join('');}
function heatStrip(b,c){const sc=b?.sc;if(!Array.isArray(sc))return '<span style="color:var(--tx3);font-size:12px">sem dados</span>';
  const mx=Math.max(1,...sc);return `<div class="strip">${sc.map(v=>`<div class="cell" style="height:${3+(v/mx)*27}px;background:${c};opacity:${v===0?.12:.35+(v/mx)*.65}"></div>`).join('')}</div><div class="axis"><span>0'</span><span>45'</span><span>90'+</span></div>`;}
function minStrip(m,c){if(!Array.isArray(m))return '<span style="color:var(--tx3);font-size:12px">sem dados</span>';
  const mx=Math.max(1,...m);return `<div class="mstrip">${m.map(v=>`<div class="mc" style="height:${2+(v/mx)*32}px;background:${c};opacity:${v===0?.10:.4+(v/mx)*.6}"></div>`).join('')}</div><div class="axis"><span>0'</span><span>45'</span><span>90'</span></div>`;}

function render(s){
  const A=s.teamA||{},B=s.teamB||{},fA=s.forteFull?.A||{},fB=s.forteFull?.B||{},aA=s.agg?.A||{},aB=s.agg?.B||{};
  const cA='#2dd4a7',cB='#f0883e';
  document.getElementById('scr').innerHTML=`
  <div class="head"><div class="liga">${esc(s.liga||'Partida')}</div>
    <div class="teams">
      <div class="tm a">${crest(A.nome,A.escudo,cA)}<div class="nm">${esc(A.nome||'Time A')}</div><div class="force">${Math.round(num(s.forteScore?.A)||0)}</div><div class="flbl">força</div></div>
      <div class="vs">VS</div>
      <div class="tm b">${crest(B.nome,B.escudo,cB)}<div class="nm">${esc(B.nome||'Time B')}</div><div class="force">${Math.round(num(s.forteScore?.B)||0)}</div><div class="flbl">força</div></div>
    </div></div>
  <div class="legend"><span><i style="background:var(--A)"></i>${esc(A.nome||'A')}</span><span><i style="background:var(--B)"></i>${esc(B.nome||'B')}</span></div>
  <div class="sec"><h3>🧬 Como cada um chega</h3>
    ${compRow('Ataque',fA.io,fB.io,x=>x.toFixed(0))}${compRow('Defesa',fA.id,fB.id,x=>x.toFixed(0))}
    ${compRow('Domínio de jogo',fA.idom,fB.idom,x=>x.toFixed(0))}${compRow('Aproveitamento',fA.wrs,fB.wrs,x=>(x<=1?Math.round(x*100):Math.round(x))+'%')}</div>
  <div class="sec"><h3>📊 Médias por jogo</h3>
    ${compRow('Posse de bola',aA.poss,aB.poss,x=>x+'%')}${compRow('Gols esperados (xG)',aA.xg,aB.xg,x=>x.toFixed(2))}
    ${compRow('Finalizações',aA.shots,aB.shots,x=>x.toFixed(0))}${compRow('No gol',aA.shotsOG,aB.shotsOG,x=>x.toFixed(0))}
    ${compRow('Acerto de passe',aA.pass,aB.pass,x=>x+'%')}${compRow('Gols marcados',aA.gfJ,aB.gfJ,x=>x.toFixed(2))}${compRow('Gols sofridos',aA.gcJ,aB.gcJ,x=>x.toFixed(2))}</div>
  <div class="sec"><h3>📈 Forma recente</h3>
    <div class="forma"><span class="who" style="color:var(--A)">${esc(A.nome||'A')}</span><div class="chips">${formaChips(s.enrichedCompact?.A)}</div></div>
    <div class="forma"><span class="who" style="color:var(--B)">${esc(B.nome||'B')}</span><div class="chips">${formaChips(s.enrichedCompact?.B)}</div></div></div>
  <div class="sec"><h3>⏱️ Quando o gol sai (faixas de 5 min)</h3>
    <div class="heat"><div class="who" style="color:var(--A)">${esc(A.nome||'A')}</div>${heatStrip(s.bucketsA,cA)}</div>
    <div class="heat" style="margin-bottom:0"><div class="who" style="color:var(--B)">${esc(B.nome||'B')}</div>${heatStrip(s.bucketsB,cB)}</div></div>
  <div class="sec" style="margin-bottom:20px"><h3>🎯 Gols minuto a minuto</h3>
    <div class="heat"><div class="who" style="color:var(--A)">${esc(A.nome||'A')}</div>${minStrip(s.minutosA,cA)}</div>
    <div class="heat" style="margin-bottom:0"><div class="who" style="color:var(--B)">${esc(B.nome||'B')}</div>${minStrip(s.minutosB,cB)}</div></div>`;
}
let JOGOS={};
async function abrir(id){if(!id)return;const g=JOGOS[id];
  document.getElementById('scr').innerHTML='<div class="state"><div class="spin"></div>Carregando análise...</div>';
  try{
    let data=null;
    let d=await db.collection('raiox-snapshots').doc(id).get();
    if(d.exists) data=d.data();
    if(!data){const q=await db.collection('raiox-snapshots').where('apiFixtureId','==',id).limit(1).get();if(!q.empty)data=q.docs[0].data();}
    if(!data&&!isNaN(+id)){const q=await db.collection('raiox-snapshots').where('apiFixtureId','==',+id).limit(1).get();if(!q.empty)data=q.docs[0].data();}
    if(!data&&g?.timeCasa?.apiId&&g?.timeFora?.apiId){
      const ca=g.timeCasa.apiId,fa=g.timeFora.apiId;
      let q=await db.collection('raiox-snapshots').where('teamA.apiId','==',ca).get();
      let hit=q.docs.find(x=>String(x.data()?.teamB?.apiId)===String(fa));
      if(!hit){q=await db.collection('raiox-snapshots').where('teamA.apiId','==',fa).get();hit=q.docs.find(x=>String(x.data()?.teamB?.apiId)===String(ca));}
      if(hit)data=hit.data();
    }
    if(!data){document.getElementById('scr').innerHTML='<div class="state"><div class="ic">📭</div>Análise não encontrada para este jogo.<br><span style="font-size:11px">id: '+esc(id)+'</span></div>';return;}
    render(data);
  }catch(e){document.getElementById('scr').innerHTML=`<div class="state"><div class="ic">⚠️</div>Erro: ${esc(e.message)}</div>`;}}
async function init(){
  try{
    let total=0; try{ total=(await db.collection('raiox-snapshots').get()).size; }catch(e){}
    const cnt=document.getElementById('cnt'); if(cnt) cnt.textContent=total+' análise(s) no banco';
    const snap=await db.collection('jogos-admin').get();const jogos=[];
    snap.forEach(d=>{const g=d.data();if(g.ativo===false)return;if(!g.timeCasa?.apiId||!g.timeFora?.apiId)return;const j={id:d.id,...g};jogos.push(j);JOGOS[d.id]=j;});
    jogos.sort((a,b)=>{const da=a.dataInicio?.toMillis?a.dataInicio.toMillis():0,dbb=b.dataInicio?.toMillis?b.dataInicio.toMillis():0;return da-dbb;});
    const sel=document.getElementById('sel');
    if(!jogos.length){sel.innerHTML='<option>Nenhum jogo</option>';document.getElementById('scr').innerHTML='<div class="state"><div class="ic">⚽</div>Cadastre jogos no admin.</div>';return;}
    sel.innerHTML=jogos.map(j=>`<option value="${j.id}">${esc(j.timeCasa?.nome||'A')} x ${esc(j.timeFora?.nome||'B')}</option>`).join('');
    const u=new URLSearchParams(location.search).get('jogoId');
    const first=(u&&JOGOS[u])?u:jogos[0].id;sel.value=first;abrir(first);
  }catch(e){document.getElementById('scr').innerHTML=`<div class="state"><div class="ic">⚠️</div>${esc(e.message)}</div>`;}
}
auth.onAuthStateChanged(u=>{ if(!u||u.email!=='admin@yellup.com'){location.href='login.html';return;} init(); });
</script>
</body>
</html>
