<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yellup — Campeonatos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
:root{
  --bg:#07080d;--bg2:#0b0d15;--bg3:#0f1119;
  --c1:#131622;--c2:#181b28;--c3:#1d2133;
  --bd1:#191c2c;--bd2:#212540;--bd3:#2a2e4a;
  --t1:#eceef6;--t2:#858ba5;--t3:#41456a;
  --acc:#f5a524;--adim:rgba(245,165,36,.13);--adim2:rgba(245,165,36,.22);
  --grn:#27d49b;--gdim:rgba(39,212,155,.13);
  --red:#ef5f5f;--rdim:rgba(239,95,95,.13);
  --blu:#4f96f4;--bdim2:rgba(79,150,244,.13);
  --pur:#a78bfa;--pdim:rgba(167,139,250,.13);
  --sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);height:100vh;background:var(--bg2);border-right:1px solid var(--bd1);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.sb-logo .ball{width:28px;height:28px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#000;}
.sb-logo .tt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;}
.sb-logo .tt small{display:block;font-size:9px;font-weight:400;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{display:flex;flex-direction:column;gap:1px;padding:8px 6px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.nav-i{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;color:var(--t2);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s;}
.nav-i:hover{background:var(--c2);color:var(--t1);}
.nav-i.on{background:var(--adim);color:var(--acc);}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:20px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px;}
.liga-group{margin-bottom:4px;}
.lg-header{padding:10px 14px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);display:flex;align-items:center;gap:6px;}
.lg-header::after{content:'';flex:1;height:1px;background:var(--bd1);}
.liga-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 4px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:12px;color:var(--t2);border:1px solid transparent;}
.liga-item:hover{background:var(--c2);color:var(--t1);}
.liga-item.on{background:var(--adim);color:var(--acc);border-color:rgba(245,165,36,.2);}
.liga-item img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}
.liga-item .ln{flex:1;font-size:11px;font-weight:500;line-height:1.2;}
.liga-item .lc{font-size:9px;color:var(--t3);}
.tier-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.t1d{background:var(--acc);}
.t2d{background:var(--blu);}
.t3d{background:var(--grn);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-head{background:var(--bg2);border-bottom:1px solid var(--bd1);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.liga-info{display:flex;align-items:center;gap:10px;flex:1;}
.liga-logo-big{width:36px;height:36px;object-fit:contain;}
.liga-nome-big{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.liga-sub{font-size:10px;color:var(--t3);}
.season-sel{display:flex;align-items:center;gap:4px;background:var(--c3);border:1px solid var(--bd2);border-radius:8px;padding:4px 10px;}
.season-sel select{background:none;border:none;color:var(--t1);font-size:12px;font-family:'DM Mono',monospace;font-weight:500;outline:none;cursor:pointer;}
.season-sel select option{background:var(--c3);}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd1);padding:0 20px;flex-shrink:0;}
.tab{padding:10px 16px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--t2);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}

/* ── PANES ── */
.pane{display:none;flex:1;overflow:hidden;}
.pane.on{display:flex;flex-direction:column;}

/* ── CLASSIFICAÇÃO ── */
.class-wrap{flex:1;overflow-y:auto;padding:16px 20px;}
.class-wrap::-webkit-scrollbar{width:4px;}
.class-wrap::-webkit-scrollbar-thumb{background:var(--bd3);}
.class-table{width:100%;border-collapse:collapse;}
.class-table thead th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--bd1);position:sticky;top:0;background:var(--bg);}
.class-table thead th.r{text-align:right;}
.class-table tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;cursor:default;}
.class-table tbody tr:hover{background:rgba(255,255,255,.02);}
.class-table td{padding:7px 10px;font-size:12px;}
.class-table td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);}
.rank-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);width:24px;text-align:center;}
.team-cell{display:flex;align-items:center;gap:8px;}
.team-cell img{width:20px;height:20px;object-fit:contain;}
.team-nome{font-size:12px;font-weight:600;}
.pts-cell{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--t1);}
.sg-pos{color:var(--grn);}
.sg-neg{color:var(--red);}
.forma-wrap{display:flex;gap:2px;}
.f-b{width:12px;height:12px;border-radius:2px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.f-W{background:var(--gdim);color:var(--grn);}
.f-D{background:var(--c3);color:var(--t3);}
.f-L{background:var(--rdim);color:var(--red);}
.desc-badge{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:700;}
.desc-c{background:var(--gdim);color:var(--grn);}
.desc-r{background:var(--rdim);color:var(--red);}
.desc-el{background:rgba(79,150,244,.13);color:var(--blu);}
.class-grupo-titulo{font-size:10px;font-weight:700;color:var(--acc);padding:12px 10px 4px;text-transform:uppercase;letter-spacing:.5px;}

/* ── JOGOS ── */
.jogos-head{padding:10px 20px;display:flex;align-items:center;gap:8px;background:var(--bg2);border-bottom:1px solid var(--bd1);flex-shrink:0;flex-wrap:wrap;}
.rodada-select{background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;padding:5px 8px;border-radius:7px;outline:none;cursor:pointer;max-width:200px;}
.status-btns{display:flex;gap:4px;}
.st-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t3);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.st-btn:hover{border-color:var(--bd3);color:var(--t2);}
.st-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.jogo-list{flex:1;overflow-y:auto;padding:12px 20px;}
.jogo-list::-webkit-scrollbar{width:4px;}
.jogo-list::-webkit-scrollbar-thumb{background:var(--bd3);}
.rodada-header{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 6px;display:flex;align-items:center;gap:8px;}
.rodada-header::after{content:'';flex:1;height:1px;background:var(--bd1);}
.jogo-card{background:var(--c2);border:1px solid var(--bd1);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.jogo-card:hover{border-color:var(--bd3);}
.jogo-card.expandido{border-color:var(--bd3);}
.jogo-main{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;}
.time-lado{display:flex;align-items:center;gap:8px;}
.time-lado.fora{flex-direction:row-reverse;}
.time-lado img{width:24px;height:24px;object-fit:contain;}
.time-nome-j{font-size:12px;font-weight:600;}
.time-lado.fora .time-nome-j{text-align:right;}
.placar-center{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:72px;}
.placar-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:800;color:var(--t1);}
.placar-ht{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;}
.status-badge{font-size:8px;padding:1px 6px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.st-ft{background:var(--gdim);color:var(--grn);}
.st-ns{background:var(--bdim2);color:var(--blu);}
.st-live{background:var(--rdim);color:var(--red);animation:blink 1.2s infinite;}
.st-pso{background:var(--pdim);color:var(--pur);}
@keyframes blink{50%{opacity:.5;}}
.jogo-meta{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 8px;gap:8px;}
.jogo-meta-info{font-size:9px;color:var(--t3);}
.expand-btn{font-size:9px;color:var(--t3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s;}
.expand-btn:hover{color:var(--acc);}

/* ── DETALHE JOGO ── */
.jogo-detail{border-top:1px solid var(--bd1);padding:14px;background:var(--bg3);display:none;}
.jogo-card.expandido .jogo-detail{display:block;}
.detail-tabs{display:flex;gap:4px;margin-bottom:12px;}
.dt-tab{padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;}
.dt-tab.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.dt-pane{display:none;}
.dt-pane.on{display:block;}

/* Stats comparação */
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px;}
.stat-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.stat-val.casa{text-align:left;color:var(--acc);}
.stat-val.fora{text-align:right;color:var(--blu);}
.stat-label{font-size:9px;color:var(--t3);text-align:center;white-space:nowrap;}
.stat-bar-wrap{position:relative;height:4px;background:var(--c3);border-radius:2px;overflow:hidden;margin-bottom:2px;}
.stat-bar-casa{position:absolute;left:0;top:0;height:100%;background:var(--acc);border-radius:2px;transition:width .3s;}
.stat-bar-fora{position:absolute;right:0;top:0;height:100%;background:var(--blu);border-radius:2px;transition:width .3s;}

/* Eventos */
.evento-list{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto;}
.evento-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:var(--c3);}
.ev-min{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);width:28px;flex-shrink:0;}
.ev-icon{font-size:14px;width:20px;text-align:center;}
.ev-info{flex:1;font-size:11px;}
.ev-nome{font-weight:600;}
.ev-assist{font-size:9px;color:var(--t3);}
.ev-time-nome{font-size:9px;color:var(--t3);}

/* Escalações */
.esc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.esc-side{background:var(--c3);border-radius:8px;padding:10px;}
.esc-form{font-size:9px;color:var(--t3);margin-bottom:6px;}
.esc-nome-time{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.esc-nome-time img{width:16px;height:16px;object-fit:contain;}
.player-grid{display:flex;flex-direction:column;gap:3px;}
.player-row{display:flex;align-items:center;gap:6px;font-size:10px;padding:2px 0;}
.player-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);width:16px;}
.player-nome-e{flex:1;}
.player-pos{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--c2);color:var(--t3);}

/* ── STATS LIGA ── */
.stats-liga-wrap{flex:1;overflow-y:auto;padding:16px 20px;}
.stats-liga-wrap::-webkit-scrollbar{width:4px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--c2);border:1px solid var(--bd1);border-radius:10px;padding:14px;}
.stat-card .sv{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--acc);}
.stat-card .sl{font-size:10px;color:var(--t3);margin-top:2px;}
.artilheiros-table{width:100%;border-collapse:collapse;}
.artilheiros-table th{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);padding:6px 10px;text-align:left;border-bottom:1px solid var(--bd1);}
.artilheiros-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.art-foto{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--bd2);}
.art-rank{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);width:20px;}
.art-info{display:flex;flex-direction:column;}
.art-nome{font-size:11px;font-weight:600;}
.art-time{font-size:9px;color:var(--t3);}

/* ── EMPTY / LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--t3);}
.empty .ico{font-size:36px;opacity:.4;}
.empty p{font-size:13px;}
.ld{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-big{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:10px;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:13px;font-weight:500;z-index:999;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none;max-width:320px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}

/* ── ALGO BADGE ── */
.algo-wrap{padding:12px 14px;background:var(--adim);border-radius:8px;margin-bottom:12px;border:1px solid rgba(245,165,36,.2);}
.algo-titulo{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.algo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.algo-item{text-align:center;}
.algo-item .av{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--t1);}
.algo-item .al{font-size:8px;color:var(--t3);}

/* ── PAGINAÇÃO ── */
.paginacao{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0;}
.pg-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t2);cursor:pointer;font-size:11px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pg-btn:hover{border-color:var(--acc);color:var(--acc);}
.pg-btn.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.pg-info{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;padding:0 8px;}

@media(max-width:800px){
  .sb{display:none;}
  body{flex-direction:column;}
  .main{flex:1;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-head">
    <div class="sb-logo">
      <div class="ball">Y</div>
      <div class="tt">Yellup <small>Admin</small></div>
    </div>
    <nav class="sb-nav">
      <a href="jogos-admin.html" class="nav-i">⚽ Jogos Admin</a>
      <a href="campeonatos.html" class="nav-i on">🏆 Campeonatos</a>
      <a href="jogadores.html" class="nav-i">👤 Jogadores</a>
      <a href="acuracia.html" class="nav-i">🎯 Acurácia</a>
    </nav>
  </div>
  <div class="sb-scroll" id="ligaScroll">
    <div class="empty"><div class="ld"></div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="main-head" id="mainHead">
    <div class="liga-info">
      <img class="liga-logo-big" id="hLigaLogo" src="" onerror="this.style.display='none'" style="display:none">
      <div>
        <div class="liga-nome-big" id="hLigaNome">Selecione um campeonato</div>
        <div class="liga-sub" id="hLigaSub">← Use a barra lateral</div>
      </div>
    </div>
    <div class="season-sel" id="seasonWrap" style="display:none">
      <span style="font-size:10px;color:var(--t3);">Temporada</span>
      <select id="seasonSel" onchange="trocarTemporada()"></select>
    </div>
  </div>

  <div class="tabs" id="mainTabs" style="display:none">
    <button class="tab on" onclick="trocarAba('class',this)">📊 Classificação</button>
    <button class="tab" onclick="trocarAba('jogos',this)">📅 Jogos</button>
    <button class="tab" onclick="trocarAba('stats',this)">📈 Estatísticas</button>
  </div>

  <!-- PANE CLASSIFICAÇÃO -->
  <div class="pane on" id="pane-class">
    <div class="class-wrap" id="classBody">
      <div class="empty">
        <div class="ico">🏆</div>
        <p>Selecione um campeonato ao lado</p>
      </div>
    </div>
  </div>

  <!-- PANE JOGOS -->
  <div class="pane" id="pane-jogos">
    <div class="jogos-head">
      <select class="rodada-select" id="rodadaSel" onchange="filtrarRodada()">
        <option value="">Todas as rodadas</option>
      </select>
      <div class="status-btns">
        <button class="st-btn on" onclick="filtrarStatus('',this)">Todos</button>
        <button class="st-btn" onclick="filtrarStatus('NS',this)">Agendados</button>
        <button class="st-btn" onclick="filtrarStatus('FT',this)">Encerrados</button>
        <button class="st-btn" onclick="filtrarStatus('1H,2H,HT',this)" style="color:var(--red);border-color:rgba(239,95,95,.3)">Ao Vivo</button>
      </div>
      <span id="jogosCt" style="font-size:10px;color:var(--t3);margin-left:auto;font-family:'DM Mono',monospace;"></span>
    </div>
    <div class="jogo-list" id="jogosBody">
      <div class="empty"><div class="ico">📅</div><p>Selecione um campeonato</p></div>
    </div>
  </div>

  <!-- PANE STATS -->
  <div class="pane" id="pane-stats">
    <div class="stats-liga-wrap" id="statsBody">
      <div class="empty"><div class="ico">📈</div><p>Selecione um campeonato</p></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig={apiKey:'AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c',authDomain:'painel-yellup.firebaseapp.com',projectId:'painel-yellup',storageBucket:'painel-yellup.appspot.com',messagingSenderId:'598994266077',appId:'1:598994266077:web:yellup'};
firebase.initializeApp(firebaseConfig);
const fns = firebase.app().functions('us-central1');

const gc = id => document.getElementById(id);
function toast(msg,t='ok'){const el=gc('toast');el.textContent=msg;el.className='toast show'+(t==='err'?' err':'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── ESTADO ──
let LIGAS = null;
let LIGA_ATIVA = null;
let SEASON_ATIVA = null;
let ABA_ATIVA = 'class';
let JOGOS_TODOS = [];
let STATUS_FILTRO = '';
let RODADA_FILTRO = '';
let RODADAS_LIST = [];
let PAG_ATUAL = 1;
let TOTAL_PAGS = 1;

const SEASONS = ['2024','2023','2022','2021','2020'];

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fns.httpsCallable('buscarLigasYellup')({});
    LIGAS = r.data.ligas;
    renderSidebar();
    // Selecionar primeira liga automaticamente
    const primeira = LIGAS.brasil[0];
    selecionarLiga(primeira.id, primeira);
  } catch(e) {
    toast('Erro ao carregar ligas: ' + e.message, 'err');
    gc('ligaScroll').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>Erro: ${e.message}</p></div>`;
  }
});

function renderSidebar() {
  if (!LIGAS) return;
  const grupos = [
    { key: 'brasil',        label: '🇧🇷 Brasil',         cor: 'var(--grn)' },
    { key: 'internacional', label: '🌍 Internacional',   cor: 'var(--acc)' },
    { key: 'mundial',       label: '⚽ Ligas Mundiais',  cor: 'var(--blu)' },
  ];
  let html = '';
  grupos.forEach(g => {
    html += `<div class="liga-group">
      <div class="lg-header">${g.label}</div>`;
    (LIGAS[g.key] || []).forEach(l => {
      const logo = `https://media.api-sports.io/football/leagues/${l.id}.png`;
      html += `<div class="liga-item" id="li-${l.id}" onclick="selecionarLiga(${l.id}, ${JSON.stringify(l).replace(/"/g,'&quot;')})">
        <img src="${logo}" onerror="this.src=''" alt="">
        <div class="ln">${x(l.nome)}<div class="lc">${x(l.pais)}</div></div>
        <span class="tier-dot t${l.tier}d"></span>
      </div>`;
    });
    html += `</div>`;
  });
  gc('ligaScroll').innerHTML = html;
}

async function selecionarLiga(ligaId, info) {
  LIGA_ATIVA = { ...info, id: ligaId };
  PAG_ATUAL = 1;

  // UI header
  document.querySelectorAll('.liga-item').forEach(el => el.classList.remove('on'));
  const el = gc('li-' + ligaId); if (el) el.classList.add('on');

  const logo = `https://media.api-sports.io/football/leagues/${ligaId}.png`;
  gc('hLigaLogo').src = logo;
  gc('hLigaLogo').style.display = '';
  gc('hLigaNome').textContent = info.nome;
  gc('hLigaSub').textContent = info.pais;

  // Season selector
  gc('mainTabs').style.display = 'flex';
  gc('seasonWrap').style.display = 'flex';
  const sSel = gc('seasonSel');
  sSel.innerHTML = SEASONS.map(s => `<option value="${s}"${s==='2024'?' selected':''}>${s}</option>`).join('');
  SEASON_ATIVA = '2024';

  // Scroll para liga
  el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  carregarAbaAtual();
}

function trocarTemporada() {
  SEASON_ATIVA = gc('seasonSel').value;
  PAG_ATUAL = 1;
  JOGOS_TODOS = [];
  carregarAbaAtual();
}

function trocarAba(aba, btn) {
  ABA_ATIVA = aba;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  gc('pane-' + aba).classList.add('on');
  carregarAbaAtual();
}

function carregarAbaAtual() {
  if (!LIGA_ATIVA) return;
  if (ABA_ATIVA === 'class') carregarClassificacao();
  else if (ABA_ATIVA === 'jogos') carregarJogos(1);
  else if (ABA_ATIVA === 'stats') carregarStats();
}

// ── CLASSIFICAÇÃO ──
async function carregarClassificacao() {
  gc('classBody').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Carregando classificação...</p></div>';
  try {
    const r = await fns.httpsCallable('buscarClassificacao')({ leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA });
    renderClassificacao(r.data.dados);
  } catch(e) {
    gc('classBody').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderClassificacao(grupos) {
  if (!grupos || !grupos.length) {
    gc('classBody').innerHTML = '<div class="empty"><div class="ico">—</div><p>Sem dados de classificação para esta liga/temporada</p></div>';
    return;
  }
  let html = '';
  grupos.forEach((grupo, gi) => {
    if (grupos.length > 1) html += `<div class="class-grupo-titulo">Grupo ${gi + 1}</div>`;
    html += `<table class="class-table">
      <thead><tr>
        <th style="width:28px">#</th>
        <th>Time</th>
        <th class="r">J</th><th class="r">V</th><th class="r">E</th><th class="r">D</th>
        <th class="r">GP</th><th class="r">GC</th><th class="r">SG</th>
        <th class="r">Pts</th>
        <th>Forma</th>
        <th>Status</th>
      </tr></thead><tbody>`;
    grupo.forEach((t, i) => {
      const sg = t.sg > 0 ? `<span class="sg-pos">+${t.sg}</span>` : t.sg < 0 ? `<span class="sg-neg">${t.sg}</span>` : t.sg;
      const forma = (t.forma || '').split('').slice(-5).map(f =>
        `<span class="f-b f-${f}">${f}</span>`
      ).join('');
      const descClass = t.descricao?.toLowerCase().includes('champion') ? 'desc-c'
        : t.descricao?.toLowerCase().includes('relegat') ? 'desc-r'
        : 'desc-el';
      html += `<tr>
        <td><span class="rank-num">${t.rank}</span></td>
        <td><div class="team-cell">
          <img src="${x(t.time.logo)}" width="20" height="20" style="object-fit:contain" onerror="this.style.display='none'">
          <span class="team-nome">${x(t.time.nome)}</span>
        </div></td>
        <td class="r">${t.j}</td><td class="r">${t.v}</td><td class="r">${t.e}</td><td class="r">${t.d}</td>
        <td class="r">${t.gp}</td><td class="r">${t.gc}</td><td class="r">${sg}</td>
        <td class="r"><span class="pts-cell">${t.pts}</span></td>
        <td><div class="forma-wrap">${forma}</div></td>
        <td>${t.descricao ? `<span class="desc-badge ${descClass}">${x(t.descricao.split(' ').slice(0,2).join(' '))}</span>` : ''}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  });
  gc('classBody').innerHTML = html;
}

// ── JOGOS ──
async function carregarJogos(pagina) {
  PAG_ATUAL = pagina;
  gc('jogosBody').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Carregando jogos...</p></div>';
  try {
    const params = { leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA, pagina };
    if (RODADA_FILTRO) params.rodada = RODADA_FILTRO;
    if (STATUS_FILTRO) params.status = STATUS_FILTRO;

    const r = await fns.httpsCallable('buscarJogosCampeonato')(params);
    JOGOS_TODOS = r.data.jogos || [];
    TOTAL_PAGS = r.data.totalPags || 1;
    gc('jogosCt').textContent = `${r.data.total} jogos`;

    // Carregar rodadas se primeira vez
    if (!RODADAS_LIST.length || pagina === 1) await carregarRodadas();
    renderJogos();
  } catch(e) {
    gc('jogosBody').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function carregarRodadas() {
  try {
    const r = await fns.httpsCallable('buscarRodasLiga')({ leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA });
    RODADAS_LIST = r.data.rodadas || [];
    const sel = gc('rodadaSel');
    sel.innerHTML = '<option value="">Todas as rodadas</option>' +
      RODADAS_LIST.map(rd => `<option value="${x(rd)}">${x(rd)}</option>`).join('');
  } catch(e) {}
}

function filtrarRodada() {
  RODADA_FILTRO = gc('rodadaSel').value;
  carregarJogos(1);
}

function filtrarStatus(st, btn) {
  STATUS_FILTRO = st;
  document.querySelectorAll('.st-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  carregarJogos(1);
}

function renderJogos() {
  const jogos = JOGOS_TODOS;
  if (!jogos.length) {
    gc('jogosBody').innerHTML = '<div class="empty"><div class="ico">📅</div><p>Nenhum jogo encontrado</p></div>';
    return;
  }

  // Agrupar por rodada
  const grupos = {};
  jogos.forEach(j => {
    const rd = j.rodada || 'Sem rodada';
    if (!grupos[rd]) grupos[rd] = [];
    grupos[rd].push(j);
  });

  let html = '';
  Object.entries(grupos).forEach(([rodada, jgs]) => {
    html += `<div class="rodada-header">${x(rodada)}</div>`;
    jgs.forEach(j => { html += renderJogoCard(j); });
  });

  // Paginação
  if (TOTAL_PAGS > 1) {
    html += `<div class="paginacao">`;
    if (PAG_ATUAL > 1) html += `<button class="pg-btn" onclick="carregarJogos(${PAG_ATUAL-1})">‹</button>`;
    for (let p = Math.max(1, PAG_ATUAL-2); p <= Math.min(TOTAL_PAGS, PAG_ATUAL+2); p++) {
      html += `<button class="pg-btn${p===PAG_ATUAL?' on':''}" onclick="carregarJogos(${p})">${p}</button>`;
    }
    if (PAG_ATUAL < TOTAL_PAGS) html += `<button class="pg-btn" onclick="carregarJogos(${PAG_ATUAL+1})">›</button>`;
    html += `<span class="pg-info">Pág ${PAG_ATUAL}/${TOTAL_PAGS}</span></div>`;
  }

  gc('jogosBody').innerHTML = html;
}

function renderJogoCard(j) {
  const stShort = j.status.short;
  const isLive = ['1H','2H','HT','ET','BT','P'].includes(stShort);
  const isFt = ['FT','AET','PEN'].includes(stShort);
  const isNs = stShort === 'NS';
  const stClass = isLive ? 'st-live' : isFt ? 'st-ft' : isNs ? 'st-ns' : 'st-pso';
  const stLabel = isLive ? (j.status.elapsed + "'" || '●') : isFt ? 'FT' : isNs ? fmtHora(j.data) : stShort;
  const placar = isFt || isLive
    ? `<span class="placar-num">${j.placar.casa ?? '–'} – ${j.placar.fora ?? '–'}</span>${j.placarHT?.casa != null ? `<span class="placar-ht">(${j.placarHT.casa}:${j.placarHT.fora})</span>` : ''}`
    : `<span style="font-size:12px;color:var(--t3);font-family:'DM Mono',monospace">${fmtHora(j.data)}</span>`;

  const vC = j.casa.vencedor === true, vF = j.fora.vencedor === true;

  return `<div class="jogo-card" id="jc-${j.id}">
    <div class="jogo-main" onclick="toggleJogo(${j.id})">
      <div class="time-lado">
        <img src="${x(j.casa.logo)}" onerror="this.src=''" alt="">
        <span class="time-nome-j" style="${vC?'color:var(--t1);font-weight:700':''}">${x(j.casa.nome)}</span>
      </div>
      <div class="placar-center">
        <span class="status-badge ${stClass}">${stLabel}</span>
        ${placar}
      </div>
      <div class="time-lado fora">
        <img src="${x(j.fora.logo)}" onerror="this.src=''" alt="">
        <span class="time-nome-j" style="${vF?'color:var(--t1);font-weight:700':''}">${x(j.fora.nome)}</span>
      </div>
    </div>
    <div class="jogo-meta">
      <span class="jogo-meta-info">${j.local ? '🏟 '+x(j.local) : ''}</span>
      <span class="jogo-meta-info">${j.arbitro ? '🧑‍⚖️ '+x(j.arbitro.split(' ').slice(-1)[0]) : ''}</span>
      ${isFt ? `<span class="expand-btn" onclick="toggleJogo(${j.id})">▸ Detalhes</span>` : ''}
    </div>
    <div class="jogo-detail" id="jd-${j.id}">
      <div class="empty"><div class="ld"></div></div>
    </div>
  </div>`;
}

const JOGOS_ABERTOS = new Set();
async function toggleJogo(id) {
  const card = gc('jc-' + id);
  const detail = gc('jd-' + id);
  if (!card || !detail) return;

  if (JOGOS_ABERTOS.has(id)) {
    JOGOS_ABERTOS.delete(id);
    card.classList.remove('expandido');
    return;
  }
  JOGOS_ABERTOS.add(id);
  card.classList.add('expandido');
  detail.innerHTML = '<div class="empty"><div class="ld"></div></div>';

  try {
    const r = await fns.httpsCallable('buscarDetalheJogoCamp')({ fixtureId: id });
    renderDetalheJogo(detail, r.data, id);
  } catch(e) {
    detail.innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderDetalheJogo(el, data, id) {
  const { statsMap, eventos, escalacoes } = data;
  const teams = Object.keys(statsMap);
  const teamA = teams[0], teamB = teams[1];
  const jogo = JOGOS_TODOS.find(j => j.id === id) || {};

  // Calcular indicadores para motor de previsão
  const sA = statsMap[teamA] || {}, sB = statsMap[teamB] || {};
  const posse = [parseFloat(sA['Ball Possession'])||50, parseFloat(sB['Ball Possession'])||50];
  const chutesA = parseInt(sA['Total Shots'])||0, chutesB = parseInt(sB['Total Shots'])||0;
  const alvoA = parseInt(sA['Shots on Goal'])||0, alvoB = parseInt(sB['Shots on Goal'])||0;
  const eficA = chutesA > 0 ? Math.round(alvoA/chutesA*100) : 0;
  const eficB = chutesB > 0 ? Math.round(alvoB/chutesB*100) : 0;
  const passesA = parseInt(sA['Total Passes'])||0, passesB = parseInt(sB['Total Passes'])||0;
  const precA = sA['Passes %'] || '0%', precB = sB['Passes %'] || '0%';
  const cornersA = parseInt(sA['Corner Kicks'])||0, cornersB = parseInt(sB['Corner Kicks'])||0;

  const statsRows = [
    ['Posse de Bola', sA['Ball Possession']||'0%', sB['Ball Possession']||'0%', posse[0], posse[1]],
    ['Chutes Totais', chutesA, chutesB, chutesA, chutesB],
    ['Chutes a Gol', alvoA, alvoB, alvoA, alvoB],
    ['Eficiência Chute', eficA+'%', eficB+'%', eficA, eficB],
    ['Passes Totais', passesA, passesB, passesA, passesB],
    ['Precisão Passes', precA, precB, parseInt(precA), parseInt(precB)],
    ['Escanteios', cornersA, cornersB, cornersA, cornersB],
    ['Faltas', sA['Fouls']||0, sB['Fouls']||0, parseInt(sA['Fouls'])||0, parseInt(sB['Fouls'])||0],
    ['Cartões Amarelos', sA['Yellow Cards']||0, sB['Yellow Cards']||0, parseInt(sA['Yellow Cards'])||0, parseInt(sB['Yellow Cards'])||0],
    ['Defesas GK', sA['Goalkeeper Saves']||0, sB['Goalkeeper Saves']||0, parseInt(sA['Goalkeeper Saves'])||0, parseInt(sB['Goalkeeper Saves'])||0],
  ];

  // Algoritmo: Pressão Ofensiva, Controle, Perigo
  const algoPressao = [
    Math.round((alvoA * 3 + chutesA * 1 + cornersA * 0.5) / Math.max(alvoA + alvoB + chutesA + chutesB + 1, 1) * 100),
    Math.round((alvoB * 3 + chutesB * 1 + cornersB * 0.5) / Math.max(alvoA + alvoB + chutesA + chutesB + 1, 1) * 100),
  ];
  const algoControle = [posse[0], posse[1]];
  const algoEfic = [eficA, eficB];

  const statsHtml = `
    <div class="algo-wrap">
      <div class="algo-titulo">⚡ Índices YellupScore (Motor de Aprendizado)</div>
      <div class="algo-grid">
        <div class="algo-item">
          <div class="av" style="color:var(--acc)">${algoPressao[0]} vs ${algoPressao[1]}</div>
          <div class="al">Pressão Ofensiva</div>
        </div>
        <div class="algo-item">
          <div class="av" style="color:var(--blu)">${algoControle[0]}% vs ${algoControle[1]}%</div>
          <div class="al">Controle de Bola</div>
        </div>
        <div class="algo-item">
          <div class="av" style="color:var(--grn)">${algoEfic[0]}% vs ${algoEfic[1]}%</div>
          <div class="al">Eficiência de Chute</div>
        </div>
      </div>
    </div>
    ${statsRows.map(([label, va, vb, na, nb]) => {
      const total = na + nb || 1;
      const pctA = Math.round(na / total * 100);
      const pctB = Math.round(nb / total * 100);
      return `<div class="stat-row">
        <div style="flex:1">
          <span class="stat-val casa">${va}</span>
          <div class="stat-bar-wrap"><div class="stat-bar-casa" style="width:${pctA}%"></div></div>
        </div>
        <span class="stat-label">${label}</span>
        <div style="flex:1">
          <span class="stat-val fora">${vb}</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fora" style="width:${pctB}%"></div></div>
        </div>
      </div>`;
    }).join('')}`;

  const iconEv = (tipo, det) => {
    if (tipo === 'Goal') return det?.includes('Penalty') ? '⚽P' : det?.includes('Own') ? '⚽OG' : '⚽';
    if (tipo === 'Card') return det?.includes('Yellow') ? '🟨' : '🟥';
    if (tipo === 'subst') return '🔄';
    return '•';
  };

  const eventosHtml = eventos?.length ? `<div class="evento-list">
    ${eventos.map(e => `<div class="evento-item">
      <span class="ev-min">${e.minuto}'${e.extra?'+'+e.extra:''}</span>
      <span class="ev-icon">${iconEv(e.tipo, e.detalhe)}</span>
      <div class="ev-info">
        <div class="ev-nome">${x(e.jogador?.nome||'')}</div>
        ${e.assistente ? `<div class="ev-assist">assist: ${x(e.assistente)}</div>` : ''}
        ${e.tipo === 'subst' ? `<div class="ev-assist">entra por: ${x(e.assistente||'')}</div>` : ''}
      </div>
      <span class="ev-time-nome" style="color:${e.time?.id == (escalacoes?.[0]?.time?.id) ? 'var(--acc)':'var(--blu)'}">${x(e.time?.nome||'')}</span>
    </div>`).join('')}
  </div>` : '<div class="empty" style="padding:20px"><p>Sem eventos registrados</p></div>';

  const escalHtml = escalacoes?.length ? `<div class="esc-wrap">
    ${escalacoes.map(esc => `<div class="esc-side">
      <div class="esc-nome-time">
        <img src="${x(esc.time.logo)}" onerror="this.src=''" alt="">
        ${x(esc.time.nome)}
      </div>
      <div class="esc-form">Formação: <strong>${x(esc.formacao||'—')}</strong> · Técnico: ${x(esc.tecnico?.nome||'—')}</div>
      <div class="player-grid">
        ${esc.titulares.map(p => `<div class="player-row">
          <span class="player-num">${p.numero||'–'}</span>
          <span class="player-nome-e">${x(p.nome)}</span>
          <span class="player-pos">${p.pos||'–'}</span>
        </div>`).join('')}
      </div>
      <div style="font-size:9px;color:var(--t3);margin:6px 0 3px;text-transform:uppercase;letter-spacing:.5px;">Banco</div>
      <div class="player-grid">
        ${esc.reservas.map(p => `<div class="player-row" style="opacity:.5">
          <span class="player-num">${p.numero||'–'}</span>
          <span class="player-nome-e">${x(p.nome)}</span>
        </div>`).join('')}
      </div>
    </div>`).join('')}
  </div>` : '<div class="empty" style="padding:20px"><p>Escalação não disponível</p></div>';

  el.innerHTML = `
    <div class="detail-tabs">
      <button class="dt-tab on" onclick="dtAba('stats',${id},this)">📊 Estatísticas</button>
      <button class="dt-tab" onclick="dtAba('eventos',${id},this)">⚡ Eventos</button>
      <button class="dt-tab" onclick="dtAba('escalacao',${id},this)">👥 Escalações</button>
    </div>
    <div class="dt-pane on" id="dtp-stats-${id}">${statsHtml}</div>
    <div class="dt-pane" id="dtp-eventos-${id}">${eventosHtml}</div>
    <div class="dt-pane" id="dtp-escalacao-${id}">${escalHtml}</div>
  `;
}

function dtAba(aba, id, btn) {
  const card = gc('jc-' + id);
  card.querySelectorAll('.dt-tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  card.querySelectorAll('.dt-pane').forEach(p => p.classList.remove('on'));
  const pane = gc(`dtp-${aba}-${id}`);
  if (pane) pane.classList.add('on');
}

// ── STATS DA LIGA ──
async function carregarStats() {
  gc('statsBody').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Carregando estatísticas...</p></div>';
  try {
    const [artilheiros, assistencias, amarelos] = await Promise.all([
      fns.httpsCallable('buscarRankingJogadores')({ leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA, tipo: 'topscorers' }),
      fns.httpsCallable('buscarRankingJogadores')({ leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA, tipo: 'topassists' }),
      fns.httpsCallable('buscarRankingJogadores')({ leagueId: LIGA_ATIVA.id, season: SEASON_ATIVA, tipo: 'topyellowcards' }),
    ]);
    renderStats(artilheiros.data.jogadores, assistencias.data.jogadores, amarelos.data.jogadores);
  } catch(e) {
    gc('statsBody').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderStats(artilheiros, assistencias, amarelos) {
  const rankTabela = (lista, campo, rotulo, cor) => {
    if (!lista?.length) return `<p style="color:var(--t3);font-size:12px">Sem dados</p>`;
    return `<table class="artilheiros-table">
      <thead><tr><th>#</th><th>Jogador</th><th>Time</th><th>${rotulo}</th><th>Jogos</th></tr></thead>
      <tbody>${lista.slice(0,15).map((j,i) => `<tr>
        <td><span class="art-rank">${i+1}</span></td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <img class="art-foto" src="${x(j.foto)}" onerror="this.src=''">
          <div class="art-info">
            <div class="art-nome">${x(j.nome)}</div>
            <div class="art-time">${x(j.nacionalidade||'')}</div>
          </div>
        </div></td>
        <td><div style="display:flex;align-items:center;gap:5px">
          <img src="${x(j.time?.logo)}" width="14" height="14" style="object-fit:contain" onerror="this.style.display='none'">
          <span style="font-size:11px">${x(j.time?.nome||'—')}</span>
        </div></td>
        <td><span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${cor}">${j.stats[campo]||0}</span></td>
        <td style="font-size:10px;color:var(--t3)">${j.stats.jogos||0}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  };

  gc('statsBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">⚽ Artilheiros</div>
        ${rankTabela(artilheiros, 'gols', 'Gols', 'var(--acc)')}
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--blu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🎯 Assistências</div>
        ${rankTabela(assistencias, 'assistencias', 'Ast', 'var(--blu)')}
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🟨 Cartões</div>
        ${rankTabela(amarelos, 'amarelos', 'Amar.', '#f5a524')}
      </div>
    </div>
  `;
}

function fmtHora(iso) {
  if (!iso) return '–';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return '–'; }
}
</script>
</body>
</html>
