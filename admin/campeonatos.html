<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yellup — Campeonatos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
:root{
  --bg:#07080d;--bg2:#0b0d15;--bg3:#0f1119;
  --c2:#181b28;--c3:#1d2133;
  --bd1:#191c2c;--bd2:#212540;--bd3:#2a2e4a;
  --t1:#eceef6;--t2:#858ba5;--t3:#41456a;
  --acc:#f5a524;--adim:rgba(245,165,36,.13);
  --grn:#27d49b;--gdim:rgba(39,212,155,.13);
  --red:#ef5f5f;--rdim:rgba(239,95,95,.13);
  --blu:#4f96f4;--bdim2:rgba(79,150,244,.13);
  --pur:#a78bfa;--pdim:rgba(167,139,250,.13);
  --sw:230px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;}
.sb{width:var(--sw);min-width:var(--sw);height:100vh;background:var(--bg2);border-right:1px solid var(--bd1);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:13px 13px 9px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sb-logo .ball{width:27px;height:27px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000;}
.sb-logo .tt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;}
.sb-logo .tt small{display:block;font-size:9px;font-weight:400;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{display:flex;flex-direction:column;gap:1px;padding:6px 5px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.nav-i{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;color:var(--t2);text-decoration:none;font-size:11px;font-weight:500;transition:all .15s;}
.nav-i:hover{background:var(--c2);color:var(--t1);}
.nav-i.on{background:var(--adim);color:var(--acc);}
.sb-search{padding:7px 9px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.sb-si{width:100%;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:11px;padding:5px 8px 5px 22px;border-radius:7px;outline:none;}
.sb-si:focus{border-color:var(--acc);}
.sb-si::placeholder{color:var(--t3);}
.sb-sw{position:relative;}
.sb-sw::before{content:'🔍';position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:9px;pointer-events:none;}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:20px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd3);}
.lg-header{padding:9px 12px 3px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--t3);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.lg-header::after{content:'';flex:1;height:1px;background:var(--bd1);}
.lg-header .chv{font-size:9px;transition:transform .2s;}
.lg-header.collapsed .chv{transform:rotate(-90deg);}
.lg-body.collapsed{display:none;}
.liga-item{display:flex;align-items:center;gap:7px;padding:5px 9px;margin:1px 3px;border-radius:6px;cursor:pointer;transition:all .12s;border:1px solid transparent;}
.liga-item:hover{background:var(--c2);}
.liga-item.on{background:var(--adim);border-color:rgba(245,165,36,.18);}
.liga-item img{width:16px;height:16px;object-fit:contain;flex-shrink:0;}
.lnome{font-size:10px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lpais{font-size:8px;color:var(--t3);}
.liga-item.on .lnome{color:var(--acc);}
.tier-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.t1d{background:var(--acc);}.t2d{background:var(--blu);}.t3d{background:var(--grn);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.main-head{background:var(--bg2);border-bottom:1px solid var(--bd1);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.liga-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.liga-logo-big{width:32px;height:32px;object-fit:contain;flex-shrink:0;}
.liga-nome-big{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.liga-sub{font-size:9px;color:var(--t3);}
.season-sel{display:flex;align-items:center;gap:5px;background:var(--c3);border:1px solid var(--bd2);border-radius:7px;padding:4px 8px;flex-shrink:0;}
.season-sel label{font-size:9px;color:var(--t3);}
.season-sel select{background:none;border:none;color:var(--t1);font-size:11px;font-family:'DM Mono',monospace;outline:none;cursor:pointer;}
.season-sel select option{background:var(--c3);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd1);padding:0 18px;flex-shrink:0;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 14px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--t2);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.tab.hidden{display:none;}
.pane{display:none;flex:1;overflow:hidden;flex-direction:column;}
.pane.on{display:flex;}
/* Classificação */
.class-toolbar{display:flex;gap:6px;padding:10px 16px 0;flex-shrink:0;}
.cv-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--bd2);background:var(--c3);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.cv-btn:hover{border-color:var(--bd3);color:var(--t1);}
.cv-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.class-row{cursor:pointer;transition:background .1s;}
.class-row:hover{background:var(--c2);}
.team-link{transition:color .1s;}
.class-row:hover .team-link{color:var(--acc);}
.fw{font-weight:700 !important;}
.aprov-wrap{display:flex;align-items:center;gap:5px;min-width:60px;}
.aprov-bar{height:4px;border-radius:2px;transition:width .3s;}
.aprov-num{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap;}
.class-wrap{flex:1;overflow-y:auto;padding:10px 16px 16px;}
.class-wrap::-webkit-scrollbar{width:4px;}
.class-wrap::-webkit-scrollbar-thumb{background:var(--bd3);}
.class-table{width:100%;border-collapse:collapse;margin-bottom:18px;}
.class-table thead th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:5px 8px;border-bottom:1px solid var(--bd1);text-align:left;position:sticky;top:0;background:var(--bg);z-index:1;}
.class-table thead th.r{text-align:right;}
.class-table tbody tr{border-bottom:1px solid rgba(255,255,255,.025);transition:background .1s;}
.class-table tbody tr:hover{background:rgba(255,255,255,.025);}
.class-table td{padding:6px 8px;font-size:11px;}
.class-table td.r{text-align:right;font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);}
.rank-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);width:22px;text-align:center;display:inline-block;}
.team-cell{display:flex;align-items:center;gap:7px;}
.team-nome{font-size:11px;font-weight:600;}
.pts-cell{font-family:'DM Mono',monospace;font-size:12px;font-weight:800;}
.sg-pos{color:var(--grn);}.sg-neg{color:var(--red);}
.forma-wrap{display:flex;gap:2px;}
.f-b{width:11px;height:11px;border-radius:2px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.f-W{background:var(--gdim);color:var(--grn);}.f-D{background:var(--c3);color:var(--t3);}.f-L{background:var(--rdim);color:var(--red);}
.desc-badge{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap;}
.desc-c{background:var(--gdim);color:var(--grn);}.desc-r{background:var(--rdim);color:var(--red);}
.desc-el{background:var(--bdim2);color:var(--blu);}.desc-cl{background:var(--adim);color:var(--acc);}
.class-grupo-titulo{font-size:10px;font-weight:700;color:var(--acc);padding:10px 8px 4px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}
.class-grupo-titulo::after{content:'';flex:1;height:1px;background:var(--bd2);}
/* Jogos */
.jogos-head{padding:8px 18px;display:flex;align-items:center;gap:6px;background:var(--bg2);border-bottom:1px solid var(--bd1);flex-shrink:0;flex-wrap:wrap;}
.rodada-select{background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:10px;font-family:'DM Mono',monospace;padding:4px 7px;border-radius:6px;outline:none;cursor:pointer;max-width:200px;}
.status-btns{display:flex;gap:3px;}
.st-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--bd2);background:none;color:var(--t3);font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;}
.st-btn:hover{border-color:var(--bd3);color:var(--t2);}
.st-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.jogo-list{flex:1;overflow-y:auto;padding:10px 18px;}
.jogo-list::-webkit-scrollbar{width:4px;}
.jogo-list::-webkit-scrollbar-thumb{background:var(--bd3);}
.rd-hdr{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 5px;display:flex;align-items:center;gap:8px;}
.rd-hdr::after{content:'';flex:1;height:1px;background:var(--bd1);}
.jogo-card{background:var(--c2);border:1px solid var(--bd1);border-radius:9px;margin-bottom:5px;overflow:hidden;transition:border-color .15s;}
.jogo-card:hover{border-color:var(--bd3);}
.prox-header{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;}
.prox-title{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;}
.proximos-list{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.proximos-list::-webkit-scrollbar{display:none;}
.prox-card{flex-shrink:0;background:var(--c2);border:1px solid var(--bd2);border-radius:10px;padding:10px 12px;min-width:155px;cursor:pointer;transition:border-color .15s;}
.prox-card:hover{border-color:var(--acc);}
.prox-card.live{border-color:var(--red);background:rgba(239,68,68,.06);}
.prox-card.hoje{border-color:rgba(250,204,21,.3);}
.prox-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-bottom:5px;display:inline-block;}
.prox-badge.hoje{background:rgba(250,204,21,.15);color:#facc15;}
.prox-badge.amanha{background:rgba(100,116,139,.15);color:var(--t3);}
.prox-badge.live{background:rgba(239,68,68,.15);color:var(--red);animation:pulse 1.2s infinite;}
.prox-times{display:flex;flex-direction:column;gap:4px;margin:4px 0;}
.prox-time{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;}
.prox-hora{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:4px;}
.jogo-actions{display:flex;gap:6px;padding:6px 10px 8px;border-top:1px solid var(--bd1);}
.btn-live{padding:4px 10px;border-radius:5px;border:none;background:var(--red);color:#fff;font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-analise{padding:4px 10px;border-radius:5px;border:1px solid var(--bd2);background:var(--c3);color:var(--t2);font-size:9px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-analise:hover{border-color:var(--acc);color:var(--acc);}
.live-card{border-color:rgba(239,68,68,.4) !important;background:rgba(239,68,68,.03);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.jogo-card.expandido{border-color:var(--bd3);}
.jogo-main{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:9px 12px;cursor:pointer;}
.time-lado{display:flex;align-items:center;gap:7px;}
.time-lado.fora{flex-direction:row-reverse;}
.time-lado img{width:22px;height:22px;object-fit:contain;}
.time-nome-j{font-size:11px;font-weight:600;}
.time-lado.fora .time-nome-j{text-align:right;}
.placar-center{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:68px;}
.placar-num{font-family:'DM Mono',monospace;font-size:17px;font-weight:800;}
.placar-ht{font-size:8px;color:var(--t3);font-family:'DM Mono',monospace;}
.placar-pen{font-size:8px;color:var(--pur);font-family:'DM Mono',monospace;font-weight:700;}
.status-badge{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.st-ft{background:var(--gdim);color:var(--grn);}.st-ns{background:var(--bdim2);color:var(--blu);}
.st-live{background:var(--rdim);color:var(--red);animation:blink 1.2s infinite;}
.st-pso{background:var(--pdim);color:var(--pur);}
@keyframes blink{50%{opacity:.5;}}
.jogo-meta{display:flex;align-items:center;justify-content:space-between;padding:3px 12px 7px;gap:6px;}
.jogo-meta-info{font-size:8px;color:var(--t3);}
.expand-btn{font-size:8px;color:var(--t3);cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .15s;}
.expand-btn:hover{color:var(--acc);}
.jogo-detail{border-top:1px solid var(--bd1);padding:12px;background:var(--bg3);display:none;}
.jogo-card.expandido .jogo-detail{display:block;}
.detail-tabs{display:flex;gap:3px;margin-bottom:10px;}
.dt-tab{padding:3px 9px;border-radius:5px;border:1px solid var(--bd2);background:none;font-size:9px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;}
.dt-tab.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.dt-pane{display:none;}.dt-pane.on{display:block;}
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:6px;}
.stat-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;}
.stat-val.casa{color:var(--acc);}.stat-val.fora{text-align:right;color:var(--blu);}
.stat-label{font-size:8px;color:var(--t3);text-align:center;white-space:nowrap;min-width:100px;}
.stat-bw{height:3px;background:var(--c3);border-radius:2px;overflow:hidden;margin-top:2px;position:relative;}
.stat-bc{position:absolute;left:0;top:0;height:100%;background:var(--acc);}
.stat-bf{position:absolute;right:0;top:0;height:100%;background:var(--blu);}
.algo-wrap{padding:10px 12px;background:var(--adim);border-radius:7px;margin-bottom:10px;border:1px solid rgba(245,165,36,.18);}
.algo-titulo{font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.algo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.algo-item{text-align:center;}
.algo-item .av{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;}
.algo-item .al{font-size:7px;color:var(--t3);}
.ev-list{display:flex;flex-direction:column;gap:3px;max-height:280px;overflow-y:auto;}
.ev-item{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:5px;background:var(--c3);}
.ev-min{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);width:26px;flex-shrink:0;}
.ev-icon{font-size:12px;width:18px;text-align:center;}
.ev-info{flex:1;font-size:10px;}
.ev-nome{font-weight:600;}.ev-sub{font-size:8px;color:var(--t3);}
.ev-tnome{font-size:8px;color:var(--t3);}
.esc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.esc-side{background:var(--c3);border-radius:7px;padding:9px;}
.esc-form{font-size:8px;color:var(--t3);margin-bottom:5px;}
.esc-tname{font-size:10px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.esc-tname img{width:14px;height:14px;object-fit:contain;}
.pr{display:flex;align-items:center;gap:5px;font-size:9px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.pr-num{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);width:14px;}
.pr-pos{font-size:7px;padding:1px 4px;border-radius:2px;background:var(--c2);color:var(--t3);}
/* Chaveamento */
.chav-wrap{flex:1;overflow:auto;padding:14px 18px;}
.chav-wrap::-webkit-scrollbar{width:4px;height:4px;}
.chav-wrap::-webkit-scrollbar-thumb{background:var(--bd3);}
.fase-header{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fase-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t3);font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;}
.fase-btn:hover{border-color:var(--bd3);color:var(--t2);}
.fase-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.bracket-scroll{overflow-x:auto;padding-bottom:10px;}
.bracket-scroll::-webkit-scrollbar{height:4px;}
.bracket-scroll::-webkit-scrollbar-thumb{background:var(--bd3);}
.bracket{display:flex;gap:0;align-items:flex-start;min-width:max-content;}
.bracket-col{display:flex;flex-direction:column;min-width:205px;padding:0 10px;position:relative;}
.bracket-col::after{content:'';position:absolute;right:-1px;top:5%;bottom:5%;width:1px;background:var(--bd1);}
.bracket-col:last-child::after{display:none;}
.bc-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);text-align:center;margin-bottom:10px;padding:4px 8px;background:var(--bg2);border-radius:5px;border:1px solid var(--bd1);}
.bracket-col.final .bc-title{color:var(--acc);border-color:rgba(245,165,36,.3);}
.bracket-col.final .bm{border-color:rgba(245,165,36,.25);}
.bm{background:var(--c2);border:1px solid var(--bd1);border-radius:8px;overflow:hidden;margin:4px 0;cursor:pointer;transition:border-color .15s;}
.bm:hover{border-color:var(--bd3);}
.bm.ft{border-color:rgba(39,212,155,.18);}
.bm.live{border-color:rgba(239,95,95,.4);}
.bt{display:flex;align-items:center;gap:6px;padding:6px 9px;border-bottom:1px solid var(--bd1);}
.bt:last-of-type{border-bottom:none;}
.bt img{width:17px;height:17px;object-fit:contain;flex-shrink:0;}
.bt .bn{flex:1;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bt .bg{font-family:'DM Mono',monospace;font-size:13px;font-weight:800;width:18px;text-align:center;flex-shrink:0;}
.bt.won{background:rgba(39,212,155,.06);}
.bt.won .bn,.bt.won .bg{color:var(--grn);}
.bt.lost{opacity:.45;}
.bt.tbd .bn{color:var(--t3);font-style:italic;font-weight:400;}
.bm-info{padding:2px 9px 5px;background:rgba(0,0,0,.2);}
.bm-info span{font-size:7px;color:var(--t3);font-family:'DM Mono',monospace;}
.pen-b{font-size:7px;color:var(--pur);background:var(--pdim);padding:0 4px;border-radius:2px;margin-left:3px;}
.idv-wrap{background:var(--c2);border:1px solid var(--bd1);border-radius:8px;margin:4px 0;overflow:hidden;}
.idv-head{display:flex;align-items:center;gap:6px;padding:6px 9px;background:var(--bg3);cursor:pointer;}
.idv-head img{width:15px;height:15px;object-fit:contain;}
.idv-agg{font-family:'DM Mono',monospace;font-size:13px;font-weight:800;}
.idv-name{font-size:10px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idv-body{border-top:1px solid var(--bd1);}
.idv-jogo{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;padding:5px 9px;border-bottom:1px solid rgba(255,255,255,.025);}
.idv-jogo:last-child{border-bottom:none;}
.idv-pl{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;text-align:center;}
.idv-n{font-size:9px;font-weight:600;}
.idv-n.r{text-align:right;}
.idv-lbl{font-size:7px;color:var(--t3);text-align:center;}
/* Stats liga */
.stats-wrap{flex:1;overflow-y:auto;padding:14px 18px;}
.stats-wrap::-webkit-scrollbar{width:4px;}
.stats-wrap::-webkit-scrollbar-thumb{background:var(--bd3);}
.art-table{width:100%;border-collapse:collapse;}
.art-table th{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);padding:5px 8px;border-bottom:1px solid var(--bd1);text-align:left;}
.art-table td{padding:6px 8px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);}
.art-foto{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--bd2);}
.art-nome{font-size:10px;font-weight:600;}.art-sub{font-size:8px;color:var(--t3);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:8px;color:var(--t3);}
.empty .ico{font-size:32px;opacity:.4;}
.empty p{font-size:12px;text-align:center;}
.ld{width:18px;height:18px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
.ld-big{width:28px;height:28px;border:3px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.pg-wrap{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 0;}
.pg-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--bd2);background:none;color:var(--t2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pg-btn:hover{border-color:var(--acc);color:var(--acc);}
.pg-btn.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.pg-info{font-size:9px;color:var(--t3);font-family:'DM Mono',monospace;padding:0 6px;}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 14px;border-radius:9px;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:12px;z-index:999;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}
@media(max-width:800px){.sb{display:none;}}
</style>
</head>
<body>
<aside class="sb">
  <div class="sb-head">
    <div class="sb-logo"><div class="ball">Y</div><div class="tt">Yellup <small>Admin</small></div></div>
    <nav class="sb-nav">
      <a href="jogos-admin.html" class="nav-i">⚽ Jogos</a>
      <a href="campeonatos.html" class="nav-i on">🏆 Campeonatos</a>
      <a href="jogadores.html" class="nav-i">👤 Jogadores</a>
      <a href="acuracia.html" class="nav-i">🎯 Acurácia</a>
    </nav>
  </div>
  <div class="sb-search">
    <div class="sb-sw"><input class="sb-si" type="text" placeholder="Buscar liga..." oninput="filtrarSB(this.value)"></div>
  </div>
  <div class="sb-scroll" id="ligaScroll"><div class="empty"><div class="ld"></div></div></div>
</aside>

<main class="main">
  <div class="main-head">
    <div class="liga-info">
      <img class="liga-logo-big" id="hLogo" src="" onerror="this.style.display='none'" style="display:none">
      <div>
        <div class="liga-nome-big" id="hNome">Selecione um campeonato</div>
        <div class="liga-sub" id="hSub">← Use a barra lateral</div>
        <div id="hUpdate" style="font-size:8px;color:var(--t3);margin-top:2px;display:none">🔄 <span id="hUpdateTxt"></span></div>
      </div>
    </div>
    <div class="season-sel" id="seasonWrap" style="display:none">
      <label>Temporada</label>
      <select id="seasonSel" onchange="trocarTemporada()"></select>
    </div>
  </div>
  <div class="tabs" id="mainTabs" style="display:none">
    <button class="tab on" id="tabClass" onclick="trocarAba('class',this)">📊 Classificação</button>
    <button class="tab"    id="tabJogos" onclick="trocarAba('jogos',this)">📅 Jogos</button>
    <button class="tab"    id="tabChav"  onclick="trocarAba('chav',this)">🏅 Chaveamento</button>
    <button class="tab"    id="tabStats" onclick="trocarAba('stats',this)">📈 Estatísticas</button>
  </div>
  <div class="pane on" id="pane-class">
    <div class="class-toolbar">
      <button class="cv-btn on" onclick="setClassView('geral',this)">📊 Geral</button>
      <button class="cv-btn"    onclick="setClassView('casa',this)">🏠 Casa</button>
      <button class="cv-btn"    onclick="setClassView('fora',this)">✈️ Fora</button>
    </div>
    <div class="class-wrap" id="classBody"><div class="empty"><div class="ico">🏆</div><p>Selecione um campeonato</p></div></div>
  </div>
  <div class="pane" id="pane-jogos">
    <div id="proximosWrap" style="display:none">
      <div class="prox-header">
        <span class="prox-title">⚡ Próximos Jogos</span>
        <span id="proximosCt" style="font-size:9px;color:var(--t3);font-family:'DM Mono',monospace"></span>
      </div>
      <div id="proximosBody" class="proximos-list"></div>
      <div style="height:1px;background:var(--bd1);margin:0 16px 4px"></div>
    </div>
    <div class="jogos-head">
      <select class="rodada-select" id="rodadaSel" onchange="filtrarRodada()"><option value="">Todas as rodadas</option></select>
      <div class="status-btns">
        <button class="st-btn on" onclick="filtrarStatus('',this)">Todos</button>
        <button class="st-btn" onclick="filtrarStatus('NS',this)">Agend.</button>
        <button class="st-btn" onclick="filtrarStatus('FT',this)">FT</button>
        <button class="st-btn" onclick="filtrarStatus('1H,2H,HT',this)" style="color:var(--red)">● Vivo</button>
      </div>
      <span id="jogosCt" style="font-size:9px;color:var(--t3);margin-left:auto;font-family:'DM Mono',monospace"></span>
    </div>
    <div class="jogo-list" id="jogosBody"><div class="empty"><div class="ico">📅</div><p>Selecione um campeonato</p></div></div>
  </div>
  <div class="pane" id="pane-chav"><div class="chav-wrap" id="chavBody"><div class="empty"><div class="ico">🏅</div><p>Selecione um campeonato</p></div></div></div>
  <div class="pane" id="pane-stats"><div class="stats-wrap" id="statsBody"><div class="empty"><div class="ico">📈</div><p>Selecione um campeonato</p></div></div></div>
</main>
<div class="toast" id="toast"></div>

<script>
const firebaseConfig={apiKey:'AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c',authDomain:'painel-yellup.firebaseapp.com',projectId:'painel-yellup',storageBucket:'painel-yellup.appspot.com',messagingSenderId:'598994266077',appId:'1:598994266077:web:yellup'};
firebase.initializeApp(firebaseConfig);
const fns=firebase.app().functions('us-central1');
const gc=id=>document.getElementById(id);
function toast(msg,t='ok'){const el=gc('toast');el.textContent=msg;el.className='toast show'+(t==='err'?' err':'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtH(iso){try{return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch(e){return'–';}}
function fmtD(iso){try{return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}catch(e){return'–';}}

let LIGAS=null,LIGA=null,SEASON='2026',ABA='class';
let JOGOS=[],STATUS_F='',RODADA_F='',PAG=1,TOTAL_PAGS=1,RODADAS=[];
const ABERT=new Set(),DCACHE={};
const SEASONS=['2026','2025','2024','2023','2022','2021','2020'];

// Retorna a season real para enviar à API (ajusta para ligas europeia ago-maio)
function getApiSeason(){
  const ajuste = LIGA?.ajuste ?? 0;
  return String(parseInt(SEASON) + ajuste);
}

// Label exibido ao usuário: "2024-25" para ligas europeias, "2025" para brasileiras
function getSeasonLabel(){
  const ajuste = LIGA?.ajuste ?? 0;
  if(ajuste === -1){
    const y = parseInt(SEASON) + ajuste;
    return `${y}-${String(y+1).slice(2)}`;
  }
  return SEASON;
}

function atualizarSubtitulo(){
  if(!LIGA)return;
  const tipo={liga:'Liga',copa:'Copa',misto:'Liga/Copa'}[LIGA.tipo]||'';
  const lbl=getSeasonLabel();
  gc('hSub').textContent=`${LIGA.pais} · ${tipo} · Temporada ${lbl}`;
  // Atualizar selector: mostrar label correto no option selecionado
  const ajuste=LIGA.ajuste??0;
  if(ajuste===-1){
    gc('seasonSel').title=`Temporada ${lbl} (API: ${getApiSeason()})`;
  }
}
const GRUPOS=[
  {key:'brasil',label:'🇧🇷 Brasil'},
  {key:'internacional',label:'🌍 Internacional'},
  {key:'copas_nacionais',label:'🏆 Copas'},
  {key:'americas',label:'🌎 Américas'},
  {key:'europa_extra',label:'🇪🇺 Europa'},
  {key:'asia_oriente',label:'🌏 Ásia & Oriente'},
];

window.addEventListener('DOMContentLoaded',async()=>{
  try{
    const r=await fns.httpsCallable('buscarLigasYellup')({});
    LIGAS=r.data.ligas;
    renderSB();
    selecionarLiga(71,LIGAS.brasil[0]);
  }catch(e){toast('Erro: '+e.message,'err');gc('ligaScroll').innerHTML=`<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;}
});

function renderSB(filtro=''){
  if(!LIGAS)return;
  const f=filtro.toLowerCase().trim();
  let h='';
  GRUPOS.forEach(g=>{
    const lst=(LIGAS[g.key]||[]).filter(l=>!f||l.nome.toLowerCase().includes(f)||l.pais.toLowerCase().includes(f));
    if(!lst.length)return;
    const gid='lg-'+g.key;
    h+=`<div><div class="lg-header" onclick="toggleG('${gid}',this)">${g.label}<span class="chv">›</span></div>
    <div class="lg-body" id="${gid}">`;
    lst.forEach(l=>{
      h+=`<div class="liga-item" id="li-${l.id}" onclick='selecionarLiga(${l.id},${JSON.stringify(l).replace(/'/g,"&#39;")})'>
        <img src="https://media.api-sports.io/football/leagues/${l.id}.png" onerror="this.style.opacity='.2'">
        <div style="flex:1;min-width:0"><div class="lnome">${x(l.nome)}</div><div class="lpais">${x(l.pais)}</div></div>
        <span class="tier-dot t${l.tier}d"></span>
      </div>`;
    });
    h+=`</div></div>`;
  });
  gc('ligaScroll').innerHTML=h||'<div class="empty"><p>Nenhuma liga</p></div>';
}
function filtrarSB(v){renderSB(v);}
function toggleG(id,btn){const b=gc(id);b.classList.toggle('collapsed');btn.classList.toggle('collapsed');}

async function selecionarLiga(id,info){
  LIGA={...info,id};PAG=1;JOGOS=[];RODADAS=[];
  document.querySelectorAll('.liga-item').forEach(e=>e.classList.remove('on'));
  gc('li-'+id)?.classList.add('on');
  gc('li-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  gc('hLogo').src=`https://media.api-sports.io/football/leagues/${id}.png`;
  gc('hLogo').style.display='';
  gc('hNome').textContent=info.nome;
  atualizarSubtitulo();
  gc('mainTabs').style.display='flex';
  gc('seasonWrap').style.display='flex';
  gc('seasonSel').innerHTML=SEASONS.map(s=>{
    const ajuste=info.ajuste??0;
    const lbl=ajuste===-1?`${parseInt(s)+ajuste}-${String(parseInt(s)+ajuste+1).slice(2)}`:s;
    return `<option value="${s}"${s===SEASON?' selected':''}>${lbl}</option>`;
  }).join('');
  const temClass=info.tipo==='liga'||info.tipo==='misto';
  const temChav=info.tipo==='copa'||info.tipo==='misto';
  gc('tabClass').classList.toggle('hidden',!temClass);
  gc('tabChav').classList.toggle('hidden',!temChav);
  if(!temClass&&temChav)trocarAba('chav',gc('tabChav'));
  else trocarAba('class',gc('tabClass'));
  iniciarAutoRefresh();
}
function trocarTemporada(){SEASON=gc('seasonSel').value;PAG=1;JOGOS=[];RODADAS=[];atualizarSubtitulo();carregarAbaAtual();}

// Auto-refresh: a cada 5min se a temporada for ativa
let _autoRefreshTimer = null;
function iniciarAutoRefresh(){
  clearInterval(_autoRefreshTimer);
  const apiSeason = parseInt(getApiSeason());
  const anoAtual = new Date().getFullYear();
  const ativo = apiSeason >= anoAtual - 1;
  if(!ativo || !LIGA) return;
  _autoRefreshTimer = setInterval(() => {
    if(document.visibilityState === 'hidden') return; // não atualiza se aba em background
    carregarAbaAtual();
  }, 5 * 60 * 1000);
}
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && LIGA) {
    // Volta para aba: recarrega imediatamente
    carregarAbaAtual();
  }
});
function trocarAba(aba,btn){
  ABA=aba;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));gc('pane-'+aba).classList.add('on');
  carregarAbaAtual();
}
function carregarAbaAtual(){
  if(!LIGA)return;
  if(ABA==='class')carregarClass();
  else if(ABA==='jogos')carregarJogos(1);
  else if(ABA==='chav')carregarChav();
  else if(ABA==='stats')carregarStats();
  // Marca timestamp de atualização
  const agora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  gc('hUpdate').style.display='';
  gc('hUpdateTxt').textContent = `Atualizado às ${agora}`;
}

// ── CLASSIFICAÇÃO
async function carregarClass(){
  gc('classBody').innerHTML='<div class="empty"><div class="ld-big"></div><p>Carregando...</p></div>';
  try{
    const r=await fns.httpsCallable('buscarClassificacao')({leagueId:LIGA.id,season:getApiSeason()});
    renderClass(r.data.dados);
  }catch(e){gc('classBody').innerHTML=`<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;}
}
// ── CLASSIFICAÇÃO VIEW TOGGLE ──
let CLASS_VIEW = 'geral'; // 'geral' | 'casa' | 'fora'

function setClassView(v, btn) {
  CLASS_VIEW = v;
  document.querySelectorAll('.cv-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Re-render com dados já carregados
  const dados = gc('classBody')._dados;
  if (dados) renderClass(dados);
}

function renderClass(gs) {
  gc('classBody')._dados = gs; // guardar para re-render no toggle
  if (!gs?.length) {
    gc('classBody').innerHTML = '<div class="empty"><div class="ico">—</div><p>Sem classificação para esta temporada</p></div>';
    return;
  }

  // Calcular aproveitamento para a view ativa
  function aprov(v, e, j) {
    return j > 0 ? Math.round(((v * 3 + e) / (j * 3)) * 100) : 0;
  }

  let h = '';
  gs.forEach((g, gi) => {
    if (gs.length > 1) h += `<div class="class-grupo-titulo">Grupo ${gi + 1}</div>`;
    h += `<table class="class-table">
      <thead>
        <tr>
          <th style="width:22px">#</th>
          <th>Time</th>
          <th class="r" title="Jogos">J</th>
          <th class="r" title="Vitórias">V</th>
          <th class="r" title="Empates">E</th>
          <th class="r" title="Derrotas">D</th>
          <th class="r">GP</th>
          <th class="r">GC</th>
          <th class="r">SG</th>
          ${CLASS_VIEW === 'geral' ? '<th class="r">Pts</th>' : ''}
          <th class="r" title="Aproveitamento">Aprov</th>
          <th>Forma</th>
          <th>Status</th>
        </tr>
      </thead><tbody>`;

    g.forEach(t => {
      const src = CLASS_VIEW === 'casa' ? t.casa : CLASS_VIEW === 'fora' ? t.fora : null;
      const vv  = src ? src.v  : t.v;
      const ee  = src ? src.e  : t.e;
      const dd  = src ? src.d  : t.d;
      const jj  = src ? src.j  : t.j;
      const gp  = src ? src.gp : t.gp;
      const gc2 = src ? src.gc : t.gc;
      const sg  = gp - gc2;
      const ap  = aprov(vv, ee, jj);

      const sgHtml = sg > 0 ? `<span class="sg-pos">+${sg}</span>` : sg < 0 ? `<span class="sg-neg">${sg}</span>` : `<span style="color:var(--t3)">0</span>`;
      const forma  = (t.forma || '').split('').slice(-5).map(f => `<span class="f-b f-${f}">${f}</span>`).join('');
      const d   = t.descricao || '', dl = d.toLowerCase();
      const dc  = dl.includes('champion') || dl.includes('title') ? 'desc-c'
                : dl.includes('relegat') ? 'desc-r'
                : dl.includes('europa') || dl.includes('ucl') ? 'desc-el'
                : dl.includes('cup') || dl.includes('playoff') ? 'desc-cl' : '';

      // Barra de aproveitamento colorida
      const apColor = ap >= 70 ? 'var(--grn)' : ap >= 45 ? 'var(--acc)' : 'var(--red)';
      const apBar   = `<div class="aprov-wrap">
        <div class="aprov-bar" style="width:${ap}%;background:${apColor}"></div>
        <span class="aprov-num">${ap}%</span>
      </div>`;

      h += `<tr class="class-row" onclick="abrirTimePerfil(${t.time.id},'${x(t.time.nome)}')">
        <td><span class="rank-num">${t.rank}</span></td>
        <td><div class="team-cell">
          <img src="${x(t.time.logo)}" onerror="this.style.display='none'" width="18" height="18" style="object-fit:contain">
          <span class="team-nome team-link">${x(t.time.nome)}</span>
        </div></td>
        <td class="r">${jj}</td>
        <td class="r fw">${vv}</td>
        <td class="r">${ee}</td>
        <td class="r">${dd}</td>
        <td class="r">${gp}</td>
        <td class="r">${gc2}</td>
        <td class="r">${sgHtml}</td>
        ${CLASS_VIEW === 'geral' ? `<td class="r"><span class="pts-cell">${t.pts}</span></td>` : ''}
        <td class="r">${apBar}</td>
        <td><div class="forma-wrap">${forma}</div></td>
        <td>${d && dc ? `<span class="desc-badge ${dc}">${x(d.split(' ').slice(0, 2).join(' '))}</span>` : ''}</td>
      </tr>`;
    });
    h += `</tbody></table>`;
  });
  gc('classBody').innerHTML = h;
}

function abrirTimePerfil(teamId, teamNome) {
  window.open(`time-perfil.html?teamId=${teamId}&nome=${encodeURIComponent(teamNome)}`, '_blank');
}

// ── JOGOS
async function carregarJogos(pag){
  PAG=pag;
  gc('jogosBody').innerHTML='<div class="empty"><div class="ld-big"></div><p>Carregando jogos...</p></div>';
  // Carregar próximos jogos na primeira página
  if(pag===1) carregarProximos();
  try{
    const p={leagueId:LIGA.id,season:getApiSeason(),pagina:pag};
    if(RODADA_F)p.rodada=RODADA_F;
    if(STATUS_F)p.status=STATUS_F;
    const r=await fns.httpsCallable('buscarJogosCampeonato')(p);
    JOGOS=r.data.jogos||[];TOTAL_PAGS=r.data.totalPags||1;
    gc('jogosCt').textContent=`${r.data.total||0} jogos`;
    if(!RODADAS.length)await carregarRodadas();
    renderJogos();
  }catch(e){gc('jogosBody').innerHTML=`<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;}
}

async function carregarProximos(){
  const wrap=gc('proximosWrap'),body=gc('proximosBody'),ct=gc('proximosCt');
  wrap.style.display='none';
  try{
    const r=await fns.httpsCallable('buscarJogosCampeonato')({
      leagueId:LIGA.id, season:getApiSeason(), status:'NS', pagina:1
    });
    const todos=(r.data.jogos||[])
      .filter(j=>new Date(j.data)>new Date())
      .sort((a,b)=>new Date(a.data)-new Date(b.data))
      .slice(0,8);
    if(!todos.length){wrap.style.display='none';return;}
    const agora=new Date();
    const isHoje=d=>{const jd=new Date(d);return jd.toDateString()===agora.toDateString();};
    const isAmanha=d=>{const am=new Date(agora);am.setDate(am.getDate()+1);return new Date(d).toDateString()===am.toDateString();};
    ct.textContent=`${todos.length} agendados`;
    body.innerHTML=todos.map(j=>{
      const live=['1H','2H','HT','ET','BT','P'].includes(j.status?.short);
      const classCard=live?'live':isHoje(j.data)?'hoje':'';
      const badge=live?'<span class="prox-badge live">● AO VIVO</span>':isHoje(j.data)?'<span class="prox-badge hoje">HOJE</span>':isAmanha(j.data)?'<span class="prox-badge amanha">AMANHÃ</span>':'';
      return `<div class="prox-card ${classCard}" onclick="window.open('jogo-live.html?fixtureId=${j.id}','_blank')">
        ${badge}
        <div class="prox-times">
          <div class="prox-time"><img src="${x(j.casa.logo)}" width="14" height="14" style="object-fit:contain" onerror="this.style.display='none'">${x(j.casa.nome.split(' ').slice(0,2).join(' '))}</div>
          <div class="prox-time"><img src="${x(j.fora.logo)}" width="14" height="14" style="object-fit:contain" onerror="this.style.display='none'">${x(j.fora.nome.split(' ').slice(0,2).join(' '))}</div>
        </div>

async function toggleJ(id){

function buildDet(data,id){
  const {statsMap,eventos,escalacoes}=data;
  const teams=Object.keys(statsMap||{});
  const sA=statsMap[teams[0]]||{},sB=statsMap[teams[1]]||{};
  const pA=f=>parseInt(sA[f])||0,pB=f=>parseInt(sB[f])||0;
  const poA=parseFloat(sA['Ball Possession'])||50,poB=parseFloat(sB['Ball Possession'])||50;
  const efA=pA('Total Shots')>0?Math.round(pA('Shots on Goal')/pA('Total Shots')*100):0;
  const efB=pB('Total Shots')>0?Math.round(pB('Shots on Goal')/pB('Total Shots')*100):0;
  const pOf=pA('Shots on Goal')*3+pA('Total Shots')+pA('Corner Kicks')*.5;
  const pDf=pB('Shots on Goal')*3+pB('Total Shots')+pB('Corner Kicks')*.5;
  const tot=pOf+pDf||1;
  const rows=[
    ['Posse de Bola',sA['Ball Possession']||'0%',sB['Ball Possession']||'0%',poA,poB],
    ['Chutes Totais',pA('Total Shots'),pB('Total Shots'),pA('Total Shots'),pB('Total Shots')],
    ['Chutes a Gol',pA('Shots on Goal'),pB('Shots on Goal'),pA('Shots on Goal'),pB('Shots on Goal')],
    ['Escanteios',pA('Corner Kicks'),pB('Corner Kicks'),pA('Corner Kicks'),pB('Corner Kicks')],
    ['Passes',pA('Total Passes'),pB('Total Passes'),pA('Total Passes'),pB('Total Passes')],
    ['Prec. Passes',sA['Passes %']||'–',sB['Passes %']||'–',parseInt(sA['Passes %'])||0,parseInt(sB['Passes %'])||0],
    ['Faltas',pA('Fouls'),pB('Fouls'),pA('Fouls'),pB('Fouls')],
    ['Amarelos',pA('Yellow Cards'),pB('Yellow Cards'),pA('Yellow Cards'),pB('Yellow Cards')],
    ['Defesas GK',pA('Goalkeeper Saves'),pB('Goalkeeper Saves'),pA('Goalkeeper Saves'),pB('Goalkeeper Saves')],
  ];
  const statsH=`<div class="algo-wrap"><div class="algo-titulo">⚡ YellupScore</div>
    <div class="algo-grid">
      <div class="algo-item"><div class="av">${Math.round(pOf/tot*100)} – ${Math.round(pDf/tot*100)}</div><div class="al">Pressão Ofensiva</div></div>
      <div class="algo-item"><div class="av">${Math.round(poA)}% – ${Math.round(poB)}%</div><div class="al">Controle de Bola</div></div>
      <div class="algo-item"><div class="av">${efA}% – ${efB}%</div><div class="al">Efic. de Chute</div></div>
    </div></div>
    ${rows.map(([lbl,va,vb,na,nb])=>{const t=na+nb||1;const pa=Math.round(na/t*100),pb=Math.round(nb/t*100);
      return `<div class="stat-row">
        <div style="flex:1"><span class="stat-val casa">${va}</span><div class="stat-bw"><div class="stat-bc" style="width:${pa}%"></div></div></div>
        <span class="stat-label">${lbl}</span>
        <div style="flex:1"><span class="stat-val fora">${vb}</span><div class="stat-bw"><div class="stat-bf" style="width:${pb}%"></div></div></div>
      </div>`;}).join('')}`;
  const iconEv=(t,d)=>{if(t==='Goal')return d?.includes('Penalty')?'⚽P':d?.includes('Own')?'⚽OG':'⚽';if(t==='Card')return d?.includes('Yellow')?'🟨':'🟥';if(t==='subst')return '🔄';return '•';};
  const evH=eventos?.length?`<div class="ev-list">${eventos.map(e=>`<div class="ev-item">
    <span class="ev-min">${e.minuto}'${e.extra?'+'+e.extra:''}</span>
    <span class="ev-icon">${iconEv(e.tipo,e.detalhe)}</span>
    <div class="ev-info"><div class="ev-nome">${x(e.jogador?.nome||'')}</div>
    ${e.assistente?`<div class="ev-sub">→ ${x(e.assistente)}</div>`:''}</div>
    <span class="ev-tnome">${x(e.time?.nome||'')}</span></div>`).join('')}</div>`
    :'<div class="empty" style="padding:16px"><p>Sem eventos</p></div>';
  const escH=escalacoes?.length?`<div class="esc-wrap">${escalacoes.map(esc=>`<div class="esc-side">
    <div class="esc-tname"><img src="${x(esc.time.logo)}" onerror="this.src=''">${x(esc.time.nome)}</div>
    <div class="esc-form">${x(esc.formacao||'—')} · ${x(esc.tecnico?.nome||'—')}</div>
    ${esc.titulares.map(p=>`<div class="pr"><span class="pr-num">${p.numero||'–'}</span><span style="flex:1">${x(p.nome)}</span><span class="pr-pos">${p.pos||'–'}</span></div>`).join('')}
    <div style="font-size:7px;color:var(--t3);margin:4px 0 2px;text-transform:uppercase">Banco</div>
    <div style="opacity:.45">${esc.reservas.map(p=>`<div class="pr"><span class="pr-num">${p.numero||'–'}</span><span>${x(p.nome)}</span></div>`).join('')}</div>
  </div>`).join('')}</div>`:'<div class="empty" style="padding:16px"><p>Escalação indisponível</p></div>';
  const s=`s${id}`;
  return `<div class="detail-tabs">
    <button class="dt-tab on" onclick="dtAba('${s}',this,'dts')">📊 Stats</button>
    <button class="dt-tab" onclick="dtAba('${s}',this,'dte')">⚡ Eventos</button>
    <button class="dt-tab" onclick="dtAba('${s}',this,'dtesc')">👥 Escalações</button>
  </div>
  <div class="dt-pane on" id="dts-${s}">${statsH}</div>
  <div class="dt-pane" id="dte-${s}">${evH}</div>
  <div class="dt-pane" id="dtesc-${s}">${escH}</div>`;
}

function renderBracket(knockout){
  const rounds=Object.keys(knockout);
  // Agrupar ida/volta
  const base={};
  rounds.forEach(rd=>{
    const b=rd.replace(/ - (first|second) leg$/i,'').trim();
    if(!base[b])base[b]=[];
    base[b].push(rd);
  });
  let h='<div class="bracket-scroll"><div class="bracket">';
  Object.entries(base).forEach(([b,subs])=>{
    const jogos=subs.flatMap(r=>knockout[r]||[]);
    const isFin=/final$/i.test(b.trim())&&!/semi|quarter|third/i.test(b);
    h+=`<div class="bracket-col${isFin?' final':''}">
      <div class="bc-title">${isFin?'🏆 ':''}${x(b)}</div>`;
    if(subs.length===2){h+=renderIdaVolta(subs,knockout);}
    else{jogos.forEach(j=>{h+=renderBM(j);});}
    if(isFin&&jogos[0]?.casa?.vencedor!=null)h+=`<div style="text-align:center;font-size:22px;margin:8px 0">🏆</div>`;
    h+=`</div>`;
  });
  h+='</div></div>';
  return h;
}
function renderIdaVolta(subs,knockout){
  const ida=knockout[subs[0]]||[],volta=knockout[subs[1]]||[];
  return ida.map(jI=>{
    const jV=volta.find(j=>(j.casa.id===jI.fora.id&&j.fora.id===jI.casa.id)||(j.casa.id===jI.casa.id&&j.fora.id===jI.fora.id));
    const agg=calcAgg(jI,jV);
    const hasPen=agg.pen;
    const vA=agg.cC>agg.cF||(agg.cC===agg.cF&&hasPen);
    return `<div class="idv-wrap">
      <div class="idv-head">
        <img src="${x(jI.casa.logo)}" onerror="this.src=''" width="15" height="15" style="object-fit:contain">
        <span class="idv-name">${x(jI.casa.nome)}</span>
        <span class="idv-agg" style="color:${vA?'var(--grn)':'var(--t2)'}">${agg.cC}</span>
        <span style="font-size:8px;color:var(--t3);margin:0 3px">–</span>
        <span class="idv-agg" style="color:${!vA?'var(--grn)':'var(--t2)'}">${agg.cF}</span>
        <img src="${x(jI.fora.logo)}" onerror="this.src=''" width="15" height="15" style="object-fit:contain">
        <span class="idv-name" style="text-align:right">${x(jI.fora.nome)}</span>
        ${hasPen?`<span class="pen-b">Pen</span>`:''}
      </div>
      <div class="idv-body">
        ${mkIdvJogo(jI,'Ida')}
        ${jV?mkIdvJogo(jV,'Volta'):`<div style="padding:4px 9px;font-size:9px;color:var(--t3)">Volta: aguardando</div>`}
      </div>
    </div>`;
  }).join('');
}
function mkIdvJogo(j,lbl){
  const isFt=['FT','AET','PEN'].includes(j.status.short);
  return `<div class="idv-jogo">
    <div><div class="idv-n">${x(j.casa.nome)}</div><div style="font-size:7px;color:var(--t3)">${lbl} · ${fmtD(j.data)}</div></div>
    <div class="idv-pl">${isFt?`${j.placar.casa??'–'} – ${j.placar.fora??'–'}`:fmtH(j.data)}</div>
    <div class="idv-n r">${x(j.fora.nome)}</div>

function calcAgg(j1,j2){
  const g1C=j1?.placar?.casa??0,g1F=j1?.placar?.fora??0;
  const g2C=j2?.placar?.casa??0,g2F=j2?.placar?.fora??0;
  const cC=g1C+g2F,cF=g1F+g2C;

  return{cC,cF,pen};
}
function renderBM(j){

function renderRoundsGen(por){

function renderStats(art,ast,am){

      <td style="color:var(--t3);font-size:9px">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <img class="art-foto" src="${x(j.foto)}" onerror="this.src=''">
        <div><div class="art-nome">${x(j.nome)}</div><div class="art-sub">${x(j.nacionalidade||'')}</div></div>
      </div></td>
      <td><div style="display:flex;align-items:center;gap:4px">
        <img src="${x(j.time?.logo)}" width="12" height="12" style="object-fit:contain" onerror="this.style.display='none'">
        <span style="font-size:10px">${x(j.time?.nome||'—')}</span>
      </div></td>
      <td><span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:${cor}">${j.stats[campo]||0}</span></td>
      <td style="font-size:9px;color:var(--t3)">${j.stats.jogos||0}</td>
    </tr>`).join('')}</tbody></table>`;
  gc('statsBody').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;min-width:0">
    <div><div style="font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">⚽ Artilheiros</div>${tbl(art,'gols','Gols','var(--acc)')}</div>
    <div><div style="font-size:9px;font-weight:700;color:var(--blu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🎯 Assistências</div>${tbl(ast,'assistencias','Ast','var(--blu)')}</div>
    <div><div style="font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🟨 Cartões</div>${tbl(am,'amarelos','Amar.','#f5a524')}</div>
  </div>`;
}
</script>
</body>
</html>
