// Calcular variáveis derivadas das odds (mesmo padrão do odds-gols.html)
function calcOddsDerivadas(oc, oe, of) {
  if (!oc || !oe || !of) return null;
  const pC=1/oc, pE=1/oe, pF=1/of, tot=pC+pE+pF;
  const iPC = +((pC/tot)*100).toFixed(1);
  const iPE = +((pE/tot)*100).toFixed(1);
  const iPF = +((pF/tot)*100).toFixed(1);
  const diff = Math.abs(oc-of);
  const avg  = (oc+of)/2;
  const empateRelativo = +(oe/avg).toFixed(2);
  // Sinal tático: empate alto relativo ao favorito = jogo fechado esperado
  const jogoTatico = empateRelativo > 1.25; // empate mais caro que a média c/f
  const fatorOdds  = jogoTatico ? 0.80 : 1.0; // ajuste de gols se tático
  return { iPC, iPE, iPF, empateRelativo, jogoTatico, fatorOdds, oc, oe, of };
}

// ── YELLUP SCORE (mesma lógica do algoritmo.html) ─────────────────────────
function calcYS(jogos) {
  if (!jogos?.length) return null;
  const js = jogos.slice(0, 20), n = js.length || 1;
  const avg = k => js.map(jj => parseFloat(jj.stats?.time?.[k]) || 0).reduce((a,b)=>a+b,0)/n;
  const wins  = js.filter(jj => jj.resultado === 'V').length;
  const draws = js.filter(jj => jj.resultado === 'E').length;
  const aproveit = (wins*3 + draws) / (n*3);
  const golsM = js.reduce((a,jj) => a+(jj.gols||0),0) / n;
  const golsS = js.reduce((a,jj) => a+(jj.golsSofridos||0),0) / n;
  const xg    = avg('expected_goals') || golsM*0.8;
  const shots = avg('Shots on Goal') || 0;
  const poss  = avg('Ball Possession') || 50;
  const passAcc = avg('Passes %') || 75;
  let ys = 0;
  // Aproveitamento é o preditor mais forte — mantido
  ys += aproveit * 3.5;
  // Ataque: gols marcados + xG com leve boost
  ys += Math.min(1, golsM/2.5) * 1.8;
  // Defesa: aumentado — dados mostraram que não sofrer gols é mais preditivo que marcar
  ys += Math.max(0, 1 - golsS/2.0) * 1.8;
  // xG: mantido mas com threshold menor (mais sensitivo)
  ys += Math.min(1, xg/1.5) * 1.2;
  // Chutes: leve redução
  ys += Math.min(1, shots/7) * 0.6;
  // Posse: reduzida significativamente — dados mostraram posse ≠ resultado
  ys += Math.min(1, (poss-30)/40) * 0.15;
  // Passes: leve redução
  ys += Math.min(1, (passAcc-60)/35) * 0.15;
  // Reescalar para manter range ~0-10
  return Math.min(10, Math.max(0, ys * 1.05));
}

// Classificar força pelo YS (substitui classForça por odds)
function classForçaYS(ys) {
  if (ys === null) return 'medio';
  if (ys >= 7.5) return 'top';
  if (ys >= 5.5) return 'forte';
  if (ys >= 3.5) return 'equilibrado';
  return 'fraco';
}

// Sequência atual (quantas vitórias/derrotas consecutivas)
function calcSequencia(jogos) {
  if (!jogos?.length) return { tipo: null, count: 0 };
  const primResult = jogos[0].resultado;
  let count = 0;
  for (const jj of jogos) {
    if (jj.resultado === primResult) count++;
    else break;
  }
  return { tipo: primResult, count };
}

// Gols por período (1T vs 2T)
function calcGolsPorTempo(jogos) {
  if (!jogos?.length) return { primeiro: 0, segundo: 0 };
  let g1 = 0, g2 = 0, n = 0;
  for (const jj of jogos) {
    if (!jj.golsMinuto?.length) continue;
    g1 += jj.golsMinuto.filter(m => m <= 45).length;
    g2 += jj.golsMinuto.filter(m => m > 45).length;
    n++;
  }
  if (!n) return { primeiro: 0, segundo: 0 };
  return { primeiro: +(g1/n).toFixed(2), segundo: +(g2/n).toFixed(2) };
}

// ── CALCULAR PREVISÃO ─────────────────────────────────────────────────────
function calcularPrevisao(j, hC, hF, cC, cF, cG, perfilCasaDB, perfilForaDB) {
  const explicacoes = [];
  const fontes = [];
  let wTotal = 0;
  let probCasa = 0, probEmpate = 0;

  const jogosC = hC?.jogos || [];
  const jogosF = hF?.jogos || [];
  const nC = jogosC.length, nF = jogosF.length;

  // ── YELLUP SCORE de cada time ─────────────────────────────────────────
  const ysC = calcYS(jogosC);
  const ysF = calcYS(jogosF);
  const forcaC = classForçaYS(ysC);
  const forcaF = classForçaYS(ysF);

  // Sequência atual
  const seqC = calcSequencia(jogosC);
  const seqF = calcSequencia(jogosF);

  // Gols por período
  const periodoC = calcGolsPorTempo(jogosC);
  const periodoF = calcGolsPorTempo(jogosF);

  // ── FONTE 0: BASE ESTATÍSTICA REAL — Camada 1 ───────────────────────
  // Âncora: probabilidades históricas reais da liga (10.000 jogos)
  const ligaNomeP = j.liga?.nome || '';
  const ligaApiIdP = j.liga?.apiId || j.liga?.id || null;
  const dataJogoP = j.dataInicio?.toDate ? j.dataInicio.toDate().toISOString() : (j.dataInicio || '');
  const baseP = getBaseLiga(ligaNomeP, ligaApiIdP);
  const baseResultP = baseP.result;
  const wBase = 0.15; // reduzido para dar mais espaço às camadas com dados do time
  probCasa   += baseResultP.casa   * wBase;
  probEmpate += baseResultP.emp    * wBase;
  wTotal += wBase;
  fontes.push({ nome: `Base ${LIGA_API_ID_MAP[ligaApiIdP]||ligaNomeP||'Global'}`, amostras: 10000, ativa: true });

  // ── FONTE 0b: ELO + MOMENTUM do perfil real (fixtures-historico) ──────
  // Camada mais nova e mais direta: usa força real calculada do nosso banco
  if (perfilCasaDB && perfilForaDB && perfilCasaDB.forca5 != null && perfilForaDB.forca5 != null) {
    const eloCasa  = perfilCasaDB.forca5 + 0.15; // vantagem casa calibrada v2 (era +0.5)
    const eloFora  = perfilForaDB.forca5;
    const eloTotal = (eloCasa + eloFora) || 10;
    let probElo = (eloCasa / eloTotal) * 100;

    // Ajuste por momentum: time subindo vale mais, caindo vale menos
    if (perfilCasaDB.tendencia === 'subindo')  probElo += 3;
    if (perfilCasaDB.tendencia === 'caindo')   probElo -= 4;
    if (perfilForaDB.tendencia === 'subindo')  probElo -= 3;
    if (perfilForaDB.tendencia === 'caindo')   probElo += 4;

    // Empate mais provável quando forças são próximas
    const diffForca = Math.abs(perfilCasaDB.forca5 - perfilForaDB.forca5);
    const empElo = diffForca < 1.0 ? 32 : diffForca < 2.0 ? 28 : 24;

    const wElo = perfilCasaDB.n >= 15 && perfilForaDB.n >= 15 ? 0.22 : 0.14;
    probCasa   += Math.min(75, Math.max(10, probElo)) * wElo;
    probEmpate += empElo * wElo;
    wTotal += wElo;

    const momC = perfilCasaDB.mom5 != null ? (perfilCasaDB.mom5 > 0 ? '+' : '') + perfilCasaDB.mom5 : '?';
    const momF = perfilForaDB.mom5 != null ? (perfilForaDB.mom5 > 0 ? '+' : '') + perfilForaDB.mom5 : '?';
    fontes.push({ nome: `Elo ${perfilCasaDB.forca5}(${momC}) vs ${perfilForaDB.forca5}(${momF})`, amostras: perfilCasaDB.n + perfilForaDB.n, ativa: true });

    // Explicações baseadas no perfil real
    if (perfilCasaDB.tendencia === 'caindo')
      explicacoes.push('📉 ' + j.timeCasa?.nome + ' em queda — força ' + perfilCasaDB.forca5 + ' (Mom5 ' + momC + ')');
    if (perfilForaDB.tendencia === 'subindo')
      explicacoes.push('📈 ' + j.timeFora?.nome + ' em ascensão — força ' + perfilForaDB.forca5 + ' (Mom5 ' + momF + ')');
    if (perfilForaDB.tendencia === 'caindo')
      explicacoes.push('📉 ' + j.timeFora?.nome + ' em queda — força ' + perfilForaDB.forca5 + ' (Mom5 ' + momF + ')');
    if (perfilCasaDB.tendencia === 'subindo')
      explicacoes.push('📈 ' + j.timeCasa?.nome + ' em ascensão — força ' + perfilCasaDB.forca5 + ' (Mom5 ' + momC + ')');
  }

  // ── FONTE 1: Yellup Score relativo ───────────────────────────────────
  if (ysC !== null && ysF !== null) {
    const ysTotal = (ysC + ysF) || 10;
    const diffAbs = Math.abs(ysC - ysF);
    let probYS = (ysC / ysTotal) * 100 + 5; // +5 vantagem casa

    // Quando times são equilibrados (YS diff < 1.5) puxar para base 50/25/25
    // Dados mostraram que YS sozinho não quebra empates próximos
    if (diffAbs < 1.5) {
      probYS = probYS * 0.6 + 50 * 0.4; // regredir à média
    }

    // Empate mais provável quando times equilibrados
    const empYS = 24 + Math.max(0, 12 - diffAbs) * 0.9;

    // Peso do YS baseado em 1707 jogos reais:
    // diff < 2.0 → fraco preditor mas ainda melhor que fallback genérico
    // diff 2-3   → neutro (45%) → peso mínimo
    // diff 3-4   → 63% acerto → peso real
    // diff 4+    → predição forte → peso máximo
    const w = diffAbs >= 4.0 ? 0.35
            : diffAbs >= 3.0 ? 0.28
            : diffAbs >= 2.0 ? 0.10
            : diffAbs >= 1.0 ? 0.08  // contribui pouco — equilibrado
            : 0.06;                  // mínimo — não zerar para evitar fallback genérico

    probCasa   += probYS * w;
    probEmpate += empYS * w;
    wTotal += w;
    fontes.push({ nome: `YS ${ysC?.toFixed(1)} vs ${ysF?.toFixed(1)}`, amostras: nC + nF, ativa: true });
    const diff = ysC - ysF;
    if (diff >= 2.5)       explicacoes.push(`${j.timeCasa?.nome} muito superior em forma — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)}`);
    else if (diff <= -2.5) explicacoes.push(`${j.timeFora?.nome} chega em melhor momento — YS ${ysF.toFixed(1)} vs ${ysC.toFixed(1)}`);
    else if (diffAbs < 1.0) explicacoes.push(`Times praticamente iguais em forma — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)} (imprevisível)`);
    else                   explicacoes.push(`${diff > 0 ? j.timeCasa?.nome : j.timeFora?.nome} ligeiramente melhor — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)}`);
  }

  // ── FONTE 2: Histórico em casa ────────────────────────────────────────
  if (nC >= 3) {
    const emCasa = jogosC.filter(jj => jj.casa === true);
    const ref = emCasa.length >= 3 ? emCasa : jogosC;
    const n = ref.length;
    const vit = ref.filter(jj => jj.resultado === 'V').length / n * 100;
    const emp = ref.filter(jj => jj.resultado === 'E').length / n * 100;
    const w = n >= 15 ? 0.20 : n >= 7 ? 0.13 : 0.07;
    probCasa   += vit * w;
    probEmpate += emp * w;
    wTotal += w;
    fontes.push({ nome: 'Hist.Casa', amostras: n, ativa: true });
    // Forma recente
    const vit5 = jogosC.slice(0, 5).filter(jj => jj.resultado === 'V').length;
    if (vit5 >= 4) explicacoes.push(`${j.timeCasa?.nome} em excelente forma — ${vit5}V nos últimos 5`);
    else if (vit5 <= 1) explicacoes.push(`${j.timeCasa?.nome} em má fase — só ${vit5}V nos últimos 5`);
  } else {
    fontes.push({ nome: 'Hist.Casa', amostras: nC, ativa: false });
  }

  // ── FONTE 3: Histórico visitante ──────────────────────────────────────
  if (nF >= 3) {
    const emFora = jogosF.filter(jj => jj.casa === false);
    const ref = emFora.length >= 3 ? emFora : jogosF;
    const n = ref.length;
    const vitF = ref.filter(jj => jj.resultado === 'V').length / n * 100;
    const empF = ref.filter(jj => jj.resultado === 'E').length / n * 100;
    const w = n >= 15 ? 0.18 : n >= 7 ? 0.11 : 0.05;
    probCasa   += (100 - vitF - empF) * w;
    probEmpate += empF * w;
    wTotal += w;
    fontes.push({ nome: 'Hist.Fora', amostras: n, ativa: true });
    const vit5F = jogosF.slice(0, 5).filter(jj => jj.resultado === 'V').length;
    if (vit5F >= 4) explicacoes.push(`${j.timeFora?.nome} em grande fase fora — ${vit5F}V nos últimos 5`);
  } else {
    fontes.push({ nome: 'Hist.Fora', amostras: nF, ativa: false });
  }

  // ── FONTE 4: H2H ──────────────────────────────────────────────────────
  const h2h = hC?.h2h || [];
  if (h2h.length >= 3) {
    const foraId = j.timeFora?.apiId || j.timeFora?.id;
    const h2hFilt = h2h.filter(g =>
      String(g.timeForaId) === String(foraId) || String(g.timeCasaId) === String(foraId)
    );
    if (h2hFilt.length >= 3) {
      const casaId2 = j.timeCasa?.apiId || j.timeCasa?.id;
      const vitH2H = h2hFilt.filter(g => {
        const isCasa = String(g.timeCasaId) === String(casaId2);
        return (isCasa && g.resultado === '1') || (!isCasa && g.resultado === '2');
      }).length / h2hFilt.length * 100;
      const empH2H = h2hFilt.filter(g => g.resultado === 'X').length / h2hFilt.length * 100;
      const w = h2hFilt.length >= 8 ? 0.18 : 0.10;
      probCasa   += vitH2H * w;
      probEmpate += empH2H * w;
      wTotal += w;
      fontes.push({ nome: 'H2H', amostras: h2hFilt.length, ativa: true });
      if (vitH2H >= 65) explicacoes.push(`${j.timeCasa?.nome} domina o histórico direto — ${Math.round(vitH2H)}% de vitórias em ${h2hFilt.length} jogos`);
      else if (vitH2H <= 25) explicacoes.push(`${j.timeFora?.nome} vence mais os confrontos diretos — ${Math.round(100-vitH2H-empH2H)}% de vitórias`);
    }
  }

  // ── FONTE 5: Banco de contexto (com força dinâmica) ───────────────────
  if (cC?.totalAmostras >= 5) {
    const vitC = cC.resultados?.pctVitoria || 0;
    const empC = cC.resultados?.pctEmpate  || 25;
    const w = cC.totalAmostras >= 30 ? 0.22 : cC.totalAmostras >= 10 ? 0.14 : 0.07;
    probCasa   += vitC * w;
    probEmpate += empC * w;
    wTotal += w;
    fontes.push({ nome: 'Banco', amostras: cC.totalAmostras, ativa: true });
    if (vitC >= 70) explicacoes.push(`Banco próprio: ${j.timeCasa?.nome} vence ${Math.round(vitC)}% vs adversários ${forcaF}`);
  } else {
    fontes.push({ nome: 'Banco', amostras: cC?.totalAmostras || 0, ativa: false });
  }

  // ── FONTE 6: Banco Global ─────────────────────────────────────────────
  if (cG?.totalAmostras >= 30) {
    const vitG = cG.resultados?.pctVitoria || 46;
    const empG = cG.resultados?.pctEmpate  || 26;
    const w = cG.totalAmostras >= 100 ? 0.12 : 0.08;
    probCasa   += vitG * w;
    probEmpate += empG * w;
    wTotal += w;
    fontes.push({ nome: 'Global', amostras: cG.totalAmostras, ativa: true });
  }

  // ── SEQUÊNCIA — ajuste fino ───────────────────────────────────────────
  if (seqC.tipo === 'V' && seqC.count >= 3) {
    probCasa += 3;
    explicacoes.push(`${j.timeCasa?.nome} em série de ${seqC.count} vitórias consecutivas`);
  } else if (seqC.tipo === 'D' && seqC.count >= 3) {
    probCasa -= 3;
    explicacoes.push(`${j.timeCasa?.nome} vem de ${seqC.count} derrotas seguidas`);
  }
  if (seqF.tipo === 'V' && seqF.count >= 3) {
    probCasa -= 3;
    explicacoes.push(`${j.timeFora?.nome} em série de ${seqF.count} vitórias`);
  }

  // ── NORMALIZAR ────────────────────────────────────────────────────────
  if (wTotal < 0.1) {
    // wTotal muito baixo — usar base da liga como âncora mínima
    const ligaNomeFb = j.liga?.nome || '';
    const ligaApiFb  = j.liga?.apiId || j.liga?.id || null;
    const baseFb = getBaseLiga(ligaNomeFb, ligaApiFb).result;
    if (ysC !== null && ysF !== null) {
      const ysTotal = (ysC + ysF) || 10;
      // Combinar YS com base da liga (50/50)
      probCasa   = ((ysC/ysTotal)*100 + 3) * 0.5 + baseFb.casa * 0.5;
      probEmpate = 26 * 0.5 + baseFb.emp * 0.5;
      explicacoes.push('Poucos dados históricos — usando YS + base da liga');
    } else {
      probCasa = baseFb.casa; probEmpate = baseFb.emp;
      explicacoes.push('Sem histórico do time — usando base estatística da liga');
    }
  } else {
    probCasa   = probCasa   / wTotal;
    probEmpate = probEmpate / wTotal;
  }

  // Deflação de probabilidades extremas
  function deflacionar(prob) {
    if (prob >= 75) return 0.72 * prob + 8;
    if (prob >= 65) return 0.82 * prob + 5;
    if (prob >= 55) return 0.90 * prob + 3;
    return prob;
  }
  probCasa   = deflacionar(probCasa);
  probEmpate = deflacionar(probEmpate);

  // ── CORREÇÃO DE VIÉS DE EMPATE ────────────────────────────────────────
  // Análise de 41 jogos: quando a diferença entre casa e fora é < 12pp,
  // o sistema subestima empates. Corrigir puxando para a realidade.
  const diffCasaFora = Math.abs(probCasa - (100 - probCasa - probEmpate));
  if (diffCasaFora < 12) {
    // Times muito próximos → aumentar empate para ~30-35%
    const boostEmp = Math.max(0, 30 - probEmpate);
    probEmpate = Math.min(42, probEmpate + boostEmp * 0.5);
    probCasa = Math.max(25, probCasa - boostEmp * 0.3);
  }

  probCasa   = Math.min(80, Math.max(8,  Math.round(probCasa)));
  probEmpate = Math.min(42, Math.max(8,  Math.round(probEmpate)));
  let probFora = Math.max(4, 100 - probCasa - probEmpate);
  const tot = probCasa + probEmpate + probFora;
  probCasa   = Math.round(probCasa   / tot * 100);
  probEmpate = Math.round(probEmpate / tot * 100);
  probFora   = 100 - probCasa - probEmpate;

  const max = Math.max(probCasa, probEmpate, probFora);
  // Veredito: resultado com maior probabilidade
  // Nota: empates na zona 40-50% casa / 28-38% emp são praticamente aleatórios
  // Não há regra confiável para diferenciar — manter max() como critério
  const veredito = probCasa === max ? 'casa' : probEmpate === max ? 'empate' : 'fora';

  // Flag de alta incerteza — quando as 3 opções estão próximas
  const segundoMax = [probCasa, probEmpate, probFora].sort((a,b)=>b-a)[1];
  const altaIncerteza = (max - segundoMax) < 8; // menos de 8pp de margem

  // ── CONFIANÇA v3 — baseada em 251 jogos reais ───────────────────────────
  // Aprendizado: YS alto ≠ acerto. Média confiança (39.7%) pior que aleatório.
  // Nova lógica: sinais INDEPENDENTES precisam convergir. Sem convergência = insuficiente.
  // Alta só quando múltiplos sinais fortes apontam na mesma direção.
  const diffYS = ysC !== null && ysF !== null ? Math.abs(ysC - ysF) : 0;

  // ── SINAL 1: Volume de dados (qualidade da amostra) ──────────────────
  const volBom = nC >= 15 && nF >= 15;   // ambos com histórico decente
  const volOtimo = nC >= 25 && nF >= 25; // ambos com histórico sólido

  // ── SINAL 2: Domínio claro pelo YS (não só diferença, mas nível absoluto) ──
  // YS alto do favorito + YS baixo do adversário = dominância real
  const ysMax = Math.max(ysC || 0, ysF || 0);
  const ysMin = Math.min(ysC || 99, ysF || 99);
  const dominanciaClara = diffYS >= 4.0 && ysMax >= 7.0; // favorito forte E adversário fraco
  const dominanciaMedia = diffYS >= 2.5 && ysMax >= 5.5;

  // ── SINAL 3: Probabilidade com margem real ────────────────────────────
  // Max > 62% = modelo tem convicção. Max < 48% = equilíbrio real.
  const probForte   = max >= 62 && !altaIncerteza;
  const probModerada = max >= 54 && !altaIncerteza;

  // ── SINAL 4: Consistência de forma recente ────────────────────────────
  // Time favorecido pelo YS também está em boa forma? Sinais independentes convergem?
  const favoritoYS = (ysC || 0) > (ysF || 0) ? 'casa' : 'fora';
  const jogosDoFavorito = favoritoYS === 'casa' ? jogosC : jogosF;
  const formaFavorito = jogosDoFavorito.slice(0, 5);
  const vitoriasFavorito = formaFavorito.filter(jj => jj.resultado === 'V').length;
  const formaConverge = vitoriasFavorito >= 3; // ≥3V nos últimos 5

  // ── SINAL 5: H2H consistente ──────────────────────────────────────────
  const h2hBom = h2h.length >= 4;

  // ── CONVERGÊNCIA dos sinais → nível de confiança ────────────────────
  // Alta: 4+ sinais fortes convergindo — esperamos >62% de acerto
  const sinaisAlta = [
    volOtimo,
    dominanciaClara,
    probForte,
    formaConverge,
    h2hBom,
  ].filter(Boolean).length;

  const sinaisMedia = [
    volBom,
    dominanciaMedia,
    probModerada,
    formaConverge,
  ].filter(Boolean).length;

  // Confiança baseada em sinais universais — independente da liga
  const penalizar = (altaIncerteza && max < 48) || max < 40;

  const confianca = penalizar
    ? 'insuficiente'
    : sinaisAlta >= 3
      ? 'alta'
      : sinaisMedia >= 2
        ? 'baixa'
        : 'insuficiente';

  // Força comparativa (gols)
  if (nC >= 5 && nF >= 5) {
    const mgC = jogosC.reduce((a,jj)=>a+(jj.gols||0),0)/nC;
    const mgF = jogosF.reduce((a,jj)=>a+(jj.gols||0),0)/nF;
    if (mgC > mgF + 0.6) explicacoes.push(`${j.timeCasa?.nome} mais eficiente — ${mgC.toFixed(1)} gols/jogo vs ${mgF.toFixed(1)}`);
    else if (mgF > mgC + 0.6) explicacoes.push(`${j.timeFora?.nome} marca mais — ${mgF.toFixed(1)} gols/jogo fora`);
  }

  // Forma
  const formaC = jogosC.slice(0,5).map(jj => jj.resultado==='V'?'V':jj.resultado==='E'?'E':'D');
  const formaF = jogosF.slice(0,5).map(jj => jj.resultado==='V'?'V':jj.resultado==='E'?'E':'D');

  // altaIncerteza já está tratada dentro do scoreConf v3 (penalização direta)
  // Manter confiancaFinal como alias para compatibilidade
  const confiancaFinal = confianca;

  if (altaIncerteza && !explicacoes.find(e => e.includes('imprevisível'))) {
    explicacoes.push('Jogo imprevisível — margem pequena entre os resultados');
  }

  // ── ALERTAS DE RISCO — situações que historicamente causam erro ──────────
  const alertas = [];

  // Calcular estimativa de gols antecipadamente para usar nos alertas
  const _golsEstAntecipado = (() => {
    const ligaNome2 = j.liga?.nome || '';
    const ligaApiId2 = j.liga?.apiId || j.liga?.id || null;
    const tri2 = getTrimestre(j.dataInicio?.toDate ? j.dataInicio.toDate().toISOString() : '') || 2;
    const base2 = getBaseLiga(ligaNome2, ligaApiId2);
    return base2.gols[`T${tri2}`] || base2.gols['T2'] || 2.5;
  })();

  // 1. Mata-mata/Eliminatória → prorrogação possível, gols extras
  const ligaStr = (j.liga?.nome || '').toLowerCase();
  const ehMataMata = ligaStr.includes('champions') || ligaStr.includes('europa') ||
    ligaStr.includes('conference') || ligaStr.includes('copa') ||
    ligaStr.includes('eliminat') || ligaStr.includes('knockout') ||
    ligaStr.includes('round of') || ligaStr.includes('quarter') ||
    ligaStr.includes('semi') || ligaStr.includes('final');
  if (ehMataMata) {
    alertas.push({ tipo: 'mata_mata', nivel: 'medio',
      txt: '⚠️ Mata-mata: prorrogação possível — gols extras não computados na previsão' });
  }

  // 2. Posse favorito ≠ resultado favorito (armadilha clássica)
  if (perfilCasaDB && perfilForaDB) {
    const posseCasa = perfilCasaDB.statsCasa?.posseMedia || perfilCasaDB.s5?.posse || null;
    const posseFora = perfilForaDB.statsFora?.posseMedia || perfilForaDB.s5?.posse || null;
    if (posseCasa && posseFora) {
      // Casa tem mais posse mas está perdendo em forma
      if (posseCasa > posseFora + 10 && perfilCasaDB.tendencia === 'caindo' && probCasa < 45) {
        alertas.push({ tipo: 'posse_sem_resultado', nivel: 'medio',
          txt: `⚠️ ${j.timeCasa?.nome} tem mais posse mas está em queda — posse não está convertendo` });
      }
    }
  }

  // 3. Fadiga — muitos jogos recentes
  const fadCasa = perfilCasaDB?.fadiga15d || 0;
  const fadFora = perfilForaDB?.fadiga15d || 0;
  if (fadCasa >= 4 && fadFora >= 4) {
    alertas.push({ tipo: 'fadiga_dupla', nivel: 'baixo',
      txt: `⚠️ Ambos os times com alta carga (${fadCasa} e ${fadFora} jogos/15d) — risco de queda de ritmo` });
  } else if (fadCasa >= 5 || fadFora >= 5) {
    const timeFad = fadCasa >= 5 ? j.timeCasa?.nome : j.timeFora?.nome;
    const n = Math.max(fadCasa, fadFora);
    alertas.push({ tipo: 'fadiga', nivel: 'baixo',
      txt: `⚠️ ${timeFad} com alta carga (${n} jogos/15d) — possível queda de rendimento` });
  }

  // 4. Visitante em melhor forma que o favorito casa
  if (veredito === 'casa' && probCasa < 50) {
    const momF = perfilForaDB?.mom5 || 0;
    const momC = perfilCasaDB?.mom5 || 0;
    if (momF > momC + 1.5) {
      alertas.push({ tipo: 'visitante_momentum', nivel: 'alto',
        txt: `🚨 ${j.timeFora?.nome} em momentum superior (Mom5 +${momF}) apesar de jogar fora — risco real de surpresa` });
    }
  }

  // 5. Ambos atacam muito → jogo pode ser mais aberto que o previsto
  const golsTotC = perfilCasaDB?.s5?.tot || 0;
  const golsTotF = perfilForaDB?.s5?.tot || 0;
  const golsEst  = _golsEstAntecipado;
  if (golsTotC >= 3.5 && golsTotF >= 3.5 && golsEst < 3.0) {
    alertas.push({ tipo: 'subestimacao_gols', nivel: 'medio',
      txt: `⚠️ Ambos os times fazem 3.5+ gols/jogo nos últimos 5 — previsão de ${golsEst} pode estar subestimada` });
  }

  // 6. Confiança baixa mas gols estimados altos
  if (confiancaFinal === 'baixa' || confiancaFinal === 'insuficiente') {
    if (golsEst >= 3.0) {
      alertas.push({ tipo: 'alta_incerteza_gols', nivel: 'baixo',
        txt: `ℹ️ Confiança ${confiancaFinal} — previsão de ${golsEst} gols baseada principalmente na média da liga` });
    }
  }

  // v2: calcular gols e extrair metadados
  const _golsResult = calcularGols(j, jogosC, jogosF, hC?.h2h, periodoC, periodoF, perfilCasaDB, perfilForaDB, probCasa, probFora, null);

  return {
    resultado: { casa: probCasa, empate: probEmpate, fora: probFora, veredito },
    gols: _golsResult,
    _fatorZona: _golsResult._fatorZona,
    _geDisxon: _golsResult._geDisxon,
    confianca: confiancaFinal,
    altaIncerteza,
    alertas,
    explicacoes: explicacoes.slice(0, 4),
    fontes,
    formaC, formaF,
    ysC, ysF, forcaC, forcaF,
    // Snapshot de força no momento da análise — para consulta futura
    forca5C: perfilCasaDB?.forca5 ?? null,
    forca5F: perfilForaDB?.forca5 ?? null,
    eloC:    perfilCasaDB?.elo    ?? null,
    eloF:    perfilForaDB?.elo    ?? null,
    mom5C:   perfilCasaDB?.mom5   ?? null,
    mom5F:   perfilForaDB?.mom5   ?? null,
  };
}

// ── CALCULAR GOLS ─────────────────────────────────────────────────────────
function calcularGols(j, jogosC, jogosF, h2h, periodoC, periodoF, perfilCasaDB, perfilForaDB, probCasa=45, probFora=29, oddsDerivadas=null) {
  // ══════════════════════════════════════════════════════════════
  // CAMADA 1 — Base estatística real por liga + trimestre
  // Anchor: média histórica da liga no período do ano
  // ══════════════════════════════════════════════════════════════
  const ligaNome = j.liga?.nome || '';
  const ligaApiId = j.liga?.apiId || j.liga?.id || null;
  const dataJogo = j.dataInicio?.toDate ? j.dataInicio.toDate().toISOString() : (j.dataInicio || '');
  const tri = getTrimestre(dataJogo) || 2;
  const mes = getMesData(dataJogo);
  const triKey = `T${tri}`;

  const base = getBaseLiga(ligaNome, ligaApiId);
  const baseGols = base.gols[triKey] || base.gols['T2'] || 2.5;
  const ajusteMes = mes ? (BASE_AJUSTE_MES[mes] || 0) : 0;

  // ── v2: Dixon-Coles direto via gf_media/gs_media do banco ────────────
  // perfilCasaDB.s5.gf_media / gs_media já existe em fixtures-historico
  // Fórmula: λC = gf_casa × (gs_fora/media_liga), λF = gf_fora × (gs_casa/media_liga)
  let _geDisxon = null;
  const _gfC = perfilCasaDB?.s5?.gf_media ?? perfilCasaDB?.s5?.gf;
  const _gsC = perfilCasaDB?.s5?.gs_media ?? perfilCasaDB?.s5?.gs;
  const _gfF = perfilForaDB?.s5?.gf_media  ?? perfilForaDB?.s5?.gf;
  const _gsF = perfilForaDB?.s5?.gs_media  ?? perfilForaDB?.s5?.gs;
  if (_gfC != null && _gsC != null && _gfF != null && _gsF != null) {
    const _mediaRef = (baseGols + ajusteMes) / 2; // λ médio por time
    const _lambdaC  = _gfC * (_gsF / Math.max(_mediaRef, 0.5));
    const _lambdaF  = _gfF * (_gsC / Math.max(_mediaRef, 0.5));
    _geDisxon = Math.round((_lambdaC + _lambdaF) * 2) / 2;
    // Limitar a range razoável [0.5, 6.0]
    _geDisxon = Math.max(0.5, Math.min(6.0, _geDisxon));
  }

  // Se temos Dixon-Coles do banco real, ele entra como peso adicional na Camada 1
  // Ajuste: blendamos base da liga (60%) com Dixon-Coles (40%) quando disponível
  const estimativaBaseRaw = baseGols + ajusteMes;
  const estimativaBase2   = _geDisxon != null
    ? estimativaBaseRaw * 0.55 + _geDisxon * 0.45
    : estimativaBaseRaw;

  const estimativaBase = estimativaBase2;
  // Base Camada 1 = média da liga no trimestre + ajuste mensal fino
  // Peso alto: 50% — é o âncora mais confiável que temos (3.230 jogos reais)
  let estimativaBase2b = estimativaBase; // usa blend Dixon-Coles já calculado acima
  const fontesCamada1 = [`Liga:${baseGols.toFixed(2)}`, `Tri:T${tri}`];

  // ══════════════════════════════════════════════════════════════
  // CAMADA 2 — Perfil real dos times do banco fixtures-historico
  // Prioridade: perfilCasaDB/perfilForaDB (dados reais nossos)
  // Fallback: histórico do buscarHistoricoTime (API)
  // ══════════════════════════════════════════════════════════════
  let ajusteCamada2 = 0;
  let temCamada2 = false;
  let fonteCamada2 = '';

  const refAtaque = estimativaBase2b / 2;

  // PRIORIDADE 1: Perfil do nosso banco (fixtures-historico) — dados reais
  // Usa stats separados por casa/fora para maior precisão
  const casaTemPerfil = (perfilCasaDB?.nCasa ?? 0) >= 3;
  const foraTemPerfil = (perfilForaDB?.nFora ?? 0) >= 3;
  const casaTemGeral  = (perfilCasaDB?.n ?? 0) >= 5;
  const foraTemGeral  = (perfilForaDB?.n ?? 0) >= 5;

  if (casaTemPerfil && foraTemPerfil) {
    // Dixon-Coles com dados separados casa/fora — mais preciso
    const atqC = perfilCasaDB.ataqueCasa ?? refAtaque;
    const defF = perfilForaDB.defesaFora  ?? refAtaque;
    const atqF = perfilForaDB.ataqueFora  ?? refAtaque;
    const defC = perfilCasaDB.defesaCasa  ?? refAtaque;
    const xGC = refAtaque * (atqC/refAtaque) * (defF/refAtaque);
    const xGF = refAtaque * (atqF/refAtaque) * (defC/refAtaque);
    ajusteCamada2 = Math.max(-1.5, Math.min(1.5, (xGC+xGF) - estimativaBase2b));
    temCamada2 = true;
    fonteCamada2 = 'banco_casa_fora';

  } else if (casaTemGeral && foraTemGeral) {
    // Tem dados gerais (sem separação casa/fora) — usar médias gerais
    const atqC = perfilCasaDB.s5?.gf ?? refAtaque;
    const defF = perfilForaDB.s5?.gs ?? refAtaque;
    const atqF = perfilForaDB.s5?.gf ?? refAtaque;
    const defC = perfilCasaDB.s5?.gs ?? refAtaque;
    const xGC = refAtaque * (atqC/refAtaque) * (defF/refAtaque);
    const xGF = refAtaque * (atqF/refAtaque) * (defC/refAtaque);
    ajusteCamada2 = Math.max(-0.8, Math.min(0.8, (xGC+xGF) - estimativaBase2b));
    temCamada2 = true;
    fonteCamada2 = 'banco_geral';

  } else if (casaTemPerfil || foraTemPerfil || casaTemGeral || foraTemGeral) {
    const perfil = casaTemPerfil ? perfilCasaDB : (foraTemPerfil ? perfilForaDB : (casaTemGeral ? perfilCasaDB : perfilForaDB));
    const mediaGolsTime = perfil?.mediaGols5 ?? perfil?.s5?.tot ?? refAtaque * 2;
    ajusteCamada2 = (mediaGolsTime - estimativaBase2b) * 0.4;
    ajusteCamada2 = Math.max(-0.5, Math.min(0.5, ajusteCamada2));
    temCamada2 = true;
    fonteCamada2 = 'banco_parcial';

  } else {
    // FALLBACK: usar histórico da API (buscarHistoricoTime)
    const n = Math.min(jogosC.length, 15), m = Math.min(jogosF.length, 15);
    if (n >= 5 && m >= 5) {
      const atqC = jogosC.slice(0,n).reduce((a,jj)=>a+(jj.gols||0),0)/n;
      const defC = jogosC.slice(0,n).reduce((a,jj)=>a+(jj.golsSofridos||0),0)/n;
      const atqF = jogosF.slice(0,m).reduce((a,jj)=>a+(jj.gols||0),0)/m;
      const defF = jogosF.slice(0,m).reduce((a,jj)=>a+(jj.golsSofridos||0),0)/m;
      const xGC = refAtaque * (atqC/refAtaque) * (defF/refAtaque);
      const xGF = refAtaque * (atqF/refAtaque) * (defC/refAtaque);
      ajusteCamada2 = Math.max(-1.2, Math.min(1.2, (xGC+xGF) - estimativaBase2b));
      temCamada2 = true;
      fonteCamada2 = 'api_historico';
    } else if (n >= 3 || m >= 3) {
      const ref = n >= 3
        ? jogosC.slice(0,n).reduce((a,jj)=>a+(jj.gols||0)+(jj.golsSofridos||0),0)/n
        : jogosF.slice(0,m).reduce((a,jj)=>a+(jj.gols||0)+(jj.golsSofridos||0),0)/m;
      ajusteCamada2 = (ref - estimativaBase2b) * 0.2;
      fonteCamada2 = 'api_parcial';
    }
  }

  // Ajuste de tendência recente — se time está subindo/caindo em gols
  const tendC = perfilCasaDB?.tendencia;
  const tendF = perfilForaDB?.tendencia;
  if (tendC === 'subindo' && tendF === 'subindo') ajusteCamada2 += 0.15;
  else if (tendC === 'caindo' && tendF === 'caindo') ajusteCamada2 -= 0.15;

  // H2H como ajuste fino (quando disponível)
  let ajusteH2H = 0;
  if (h2h?.length >= 4) {
    const mgH2H = h2h.slice(0,8).reduce((a,g)=>a+(g.golsCasa||0)+(g.golsFora||0),0)/Math.min(h2h.length,8);
    ajusteH2H = (mgH2H - estimativaBase2b) * 0.15; // peso baixo, é complementar
    ajusteH2H = Math.max(-0.5, Math.min(0.5, ajusteH2H));
  }

  // ══════════════════════════════════════════════════════════════
  // COMBINAÇÃO FINAL com pesos calibrados
  // Camada 1 (base liga): 55% | Camada 2 (times): 35% | H2H: 10%
  // ══════════════════════════════════════════════════════════════
  // ── PESOS ADAPTATIVOS ────────────────────────────────────────────────
  // Quando temos dados reais do time (banco), eles valem mais que a base da liga
  // Quando os dados mostram times fracos (mg baixa), reduzir peso da base da liga
  const temBanco = fonteCamada2.startsWith('banco');

  // Média real de gols dos times (se disponível)
  const mgC5real = perfilCasaDB?.s5?.tot ?? perfilCasaDB?.mediaGols5 ?? null;
  const mgF5real = perfilForaDB?.s5?.tot  ?? perfilForaDB?.mediaGols5 ?? null;
  const mgPre    = (mgC5real != null && mgF5real != null) ? (mgC5real + mgF5real) / 2 : null;

  // Quando a média real dos times está muito abaixo da base da liga,
  // dar muito mais peso aos dados reais
  const desvioAbaixo = mgPre != null ? Math.max(0, estimativaBase2b - mgPre) : 0;
  const pesoBaseReducao = Math.min(0.35, desvioAbaixo * 0.15); // cada -1 gol real reduz 15% do peso base

  const pesoCamada1 = temBanco
    ? Math.max(0.20, 0.50 - pesoBaseReducao)
    : (temCamada2 ? 0.58 : (h2h?.length >= 4 ? 0.75 : 1.0));
  const pesoCamada2 = temBanco
    ? Math.min(0.70, 0.40 + pesoBaseReducao)
    : (temCamada2 ? 0.30 : 0);
  const pesoH2H = h2h?.length >= 4 ? (temBanco ? 0.10 : 0.12) : 0;

  // Ampliar limite do ajuste quando dados reais mostram time muito fraco
  const limAjuste = desvioAbaixo > 1.0 ? 1.5 : 1.0;
  const ajusteCamada2Amp = Math.max(-limAjuste, Math.min(limAjuste, ajusteCamada2));

  const estimativaFinal = (
    estimativaBase2b * pesoCamada1 +
    (estimativaBase2b + ajusteCamada2Amp) * pesoCamada2 +
    (estimativaBase2b + ajusteH2H) * pesoH2H
  );

  // ── CALIBRAÇÃO v2: fatorForca por zona ────────────────────────────────
  // Derivado de análise de 83 jogos reais (20-22/03/2026)
  // Objetivo: corrigir superestimação quando time fecha atrás
  let _fatorZona = 1.0;
  if (perfilCasaDB?.forca5 != null && perfilForaDB?.forca5 != null) {
    const _fc   = perfilCasaDB.forca5;
    const _ff   = perfilForaDB.forca5;
    const _avg  = (_fc + _ff) / 2;
    const _diff = Math.abs(_fc - _ff);
    const _min  = Math.min(_fc, _ff);
    if (_avg > 5.0 && _diff < 2.0) {
      _fatorZona = 0.70; // dois times fortes equilibrados → tático (100% acerto na amostra)
    } else if (_avg < 3.5 && _diff < 2.0) {
      _fatorZona = 0.80; // dois medianos fechados → menos gols
    } else if (_min < 2.0 && _diff > 2.0) {
      _fatorZona = 0.75; // time muito fraco + desequilíbrio → fecha atrás
    } else if (_diff > 3.0) {
      _fatorZona = 0.80; // grande desequilíbrio → fraco fecha
    } else {
      _fatorZona = 1.05; // zona normal → leve boost (dados mostraram subestimação leve)
    }
  }
  // Se odds indicam jogo tático (empate relativo alto), desconto adicional
  const _fatorOdds = oddsDerivadas?.jogoTatico ? oddsDerivadas.fatorOdds : 1.0;
  const estimativaFinalCal = estimativaFinal * _fatorZona * _fatorOdds;

  // Correção de subestimativa: +0.3 só quando média pré-jogo está ACIMA de 2.0
  const correcaoSub = mgPre != null
    ? (mgPre >= 2.5 ? 0.3 : mgPre >= 2.0 ? 0.15 : mgPre >= 1.5 ? 0 : -0.2)
    : 0.15;
  const estimativaCorrigida = estimativaFinalCal + correcaoSub;
  // Piso real: 0.5 (jogo pode terminar 0x0), sem forçar mínimo de 2.5
  const est = Math.round(Math.max(0.5, estimativaCorrigida) * 2) / 2;

  // Over 2.5 baseado na base da liga + ajuste
  const baseOver25 = base.gols.over25?.[triKey] || 44;

  // Range baseado em desvio histórico (±0.8 gols é o intervalo de confiança real)
  const baixo = Math.max(0, Math.round((est - 1.0) * 2) / 2);
  const alto   = Math.round((est + 1.0) * 2) / 2;

  // Tendência baseada no over 2.5 calibrado
  const over25Ajustado = baseOver25 + (ajusteCamada2 * 8); // cada +0.1 gol ≈ +0.8pp over25
  const tendencia = over25Ajustado >= 52 ? 'alto' : over25Ajustado <= 38 ? 'baixo' : 'medio';

  // Distribuição HT/ST — nossa base mostra HT=44.8% dos gols
  const gHT = Math.round(est * 0.448 * 2) / 2;
  const gST = Math.round((est - gHT) * 2) / 2;
  const periodo = `~${gHT.toFixed(1)} 1T · ~${gST.toFixed(1)} 2T`;

  // Fonte label para o card
  let fonteLabel = LIGA_API_ID_MAP[ligaApiId] || ligaNome || 'Global';
  if (fonteCamada2 === 'banco_casa_fora') fonteLabel = '⚡ Banco C/F';
  else if (fonteCamada2 === 'banco_geral') fonteLabel = '📊 Banco Geral';
  else if (fonteCamada2 === 'banco_parcial') fonteLabel = '📊 Banco Parcial';
  else if (fonteCamada2 === 'api_historico') fonteLabel = '🔗 API Hist.';

  return {
    estimado: est.toFixed(1),
    range: `${baixo}–${alto}`,
    tendencia,
    periodo,
    over25: Math.round(over25Ajustado),
    fontes: [fonteLabel],
    camada: fonteCamada2.startsWith('banco') ? 2 : 1,
    fonteCamada2,
    _lambdaCasa: Math.max(0.1, +(est * (probCasa / Math.max(1, probCasa + probFora))).toFixed(3)),
    _lambdaFora: Math.max(0.1, +(est * (probFora  / Math.max(1, probCasa + probFora))).toFixed(3)),
    // v2: metadados de calibração
    _fatorZona,
    _geDisxon,
    _usouDisxon: _geDisxon != null,
  };
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function base5050() { return { casa: 45, empate: 26, fora: 29, veredito: 'casa' }; }
function golsDefault() { return { estimado: '2.5', range: '1.5–3.5', tendencia: 'medio' }; }

// ── DISTRIBUIÇÃO DE POISSON ───────────────────────────────────────────────
function poisson(lambda, k) {
  if (lambda <= 0 || k < 0) return 0;
  let logP = -lambda + k * Math.log(lambda);
  for (let i = 1; i <= k; i++) logP -= Math.log(i);
  return Math.exp(logP);
}

function calcularPlacarPoisson(lambdaCasa, lambdaFora) {
  const MAX = 7;
  const placares = [];
  for (let i = 0; i <= MAX; i++) {
    for (let j = 0; j <= MAX; j++) {
      const prob = poisson(lambdaCasa, i) * poisson(lambdaFora, j);
      if (prob > 0.001) placares.push({ casa: i, fora: j, prob });
    }
  }
  placares.sort((a, b) => b.prob - a.prob);
  let goleada = 0, under15 = 0, btts = 0, over25 = 0;
  for (const p of placares) {
    const tot = p.casa + p.fora;
    if (tot >= 4) goleada += p.prob;
    if (tot <= 1) under15 += p.prob;
    if (p.casa >= 1 && p.fora >= 1) btts += p.prob;
    if (tot > 2.5) over25 += p.prob;
  }
  return {
    top5: placares.slice(0, 5).map(p => ({
      ...p, pct: Math.round(p.prob * 100), label: `${p.casa}-${p.fora}`,
    })),
    goleada: Math.round(goleada * 100),
    under15: Math.round(under15 * 100),
    btts:    Math.round(btts * 100),
    over25Poisson: Math.round(over25 * 100),
  };
}

function atualizarResumo() {
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;
  const prevs = jogos.map(j => PREVISOES[j.id]).filter(Boolean).filter(p => !p.loading);
  gc('rTotal').textContent = jogos.length;
  gc('rAnalisados').textContent = prevs.length;
  gc('rAlta').textContent  = prevs.filter(p => p.confianca === 'alta').length;
  gc('rMedia').textContent = prevs.filter(p => p.confianca === 'media').length;
  gc('rBaixa').textContent = prevs.filter(p => p.confianca === 'baixa' || p.confianca === 'insuficiente').length;
  gc('resumoBar').style.display = jogos.length ? 'flex' : 'none';
}

function setStatus(msg, err) {
  const el = gc('statusBar');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = msg.startsWith('✓') ? `<span style="color:var(--grn)">${msg}</span>`
    : err ? `<span style="color:var(--red)">${msg}</span>`
    : `<div class="dot-spin"></div><span>${msg}</span>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function setTab(tab) {
  const isPrevisoes   = tab === 'previsoes';
  const isAprendizado = tab === 'aprendizado';
  const isSimulador   = tab === 'simulador';
  gc('jogosGrid').style.display           = isPrevisoes ? 'flex' : 'none';
  gc('resumoBar').style.display           = isPrevisoes && JOGOS.length ? 'flex' : 'none';
  gc('painelAprendizado').style.display   = isAprendizado ? 'block' : 'none';
  gc('painelSimulador').style.display     = isSimulador   ? 'block' : 'none';

  const tabs = ['btnTabPrevisoes','btnTabAprendizado','btnTabSimulador'];
  const ativo = isPrevisoes ? 0 : isAprendizado ? 1 : 2;
  tabs.forEach((id, i) => {
    const el = gc(id);
    if (!el) return;
    el.style.color       = i === ativo ? 'var(--acc)' : '';
    el.style.borderColor = i === ativo ? 'var(--acc)' : '';
  });

  if (isAprendizado) carregarAprendizado();
  if (isSimulador)   iniciarSimulador();
}

// ── SALVAR PREVISÃO PRÉ-JOGO ──────────────────────────────────────────────
async function salvarPrevisao(j, prev) {
  try {
    const dt = j.dataInicio?.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio||0);
    const poi = (prev.gols?._lambdaCasa && prev.gols?._lambdaFora)
      ? calcularPlacarPoisson(prev.gols._lambdaCasa, prev.gols._lambdaFora)
      : null;
    await fns.httpsCallable('salvarPrevisao')({
      fixtureId:     j.apiFootballId || j.apiFixtureId || j.id,
      timeCasaId:    j.timeCasa?.apiId || j.timeCasa?.id,
      timeForaId:    j.timeFora?.apiId || j.timeFora?.id,
      timeCasaNome:  j.timeCasa?.nome,
      timeForaNome:  j.timeFora?.nome,
      liga:          j.liga?.nome,
      dataJogo:      dt.toISOString(),
      previsao: {
        probCasa:     prev.resultado.casa,
        probEmpate:   prev.resultado.empate,
        probFora:     prev.resultado.fora,
        veredito:     prev.resultado.veredito,
        golsEstimado: prev.gols?.estimado,
        golsRange:    prev.gols?.range,
        confianca:    prev.confianca,
        ysC:          prev.ysC,
        ysF:          prev.ysF,
        forcaC:       prev.forcaC,
        forcaF:       prev.forcaF,
        // Snapshot de força no momento da análise
        forca5C:      prev.forca5C,
        forca5F:      prev.forca5F,
        eloC:         prev.eloC,
        eloF:         prev.eloF,
        mom5C:        prev.mom5C,
        mom5F:        prev.mom5F,
        fontes:       (prev.fontes||[]).map(f => f.nome),
        apostaPlacar: poi ? `${poi.top5[0]?.casa}-${poi.top5[0]?.fora}` : null,
        apostaPct:    poi?.top5[0]?.pct || null,
        top5Placares: poi?.top5?.map(p => ({ l: p.label, p: p.pct })) || [],
        probGoleada:  poi?.goleada || null,
        probBTTS:     poi?.btts || null,
        probUnder15:  poi?.under15 || null,
        alertas:      (prev.alertas||[]).map(a => ({ tipo: a.tipo, nivel: a.nivel })),
        // v2: odds Bet365 e metadados de calibração
        oddCasa:      prev._odds?.oddCasa    || null,
        oddEmp:       prev._odds?.oddEmp     || null,
        oddFora:      prev._odds?.oddFora    || null,
        jogoTatico:   prev._oddsDerivadas?.jogoTatico || false,
        empateRelativo: prev._oddsDerivadas?.empateRelativo || null,
        fatorZona:    prev._fatorZona        || null,
        geDisxon:     prev._geDisxon         || null,
        versao:       'v2',
      }
    });
  } catch(e) {
    console.warn('Erro ao salvar previsão:', e.message);
  }
}

// Sobrescrever analisarTodos para salvar previsões
async function reanalisarTodos() {
  // Limpa TODO o sessionStorage de previsões e re-analisa
  JOGOS.forEach(j => {
    try { sessionStorage.removeItem('prev_' + j.id); } catch(e) {}
  });
  PREVISOES = {};
  _perfilCache && Object.keys(_perfilCache).forEach(k => delete _perfilCache[k]);
  renderCards();
  await analisarTodos();
}

async function analisarUm(jogoId) {
  const j = JOGOS.find(x => x.id === jogoId);
  if (!j) return;
  // Limpar cache deste jogo
  try { sessionStorage.removeItem('prev_' + jogoId); } catch(e) {}
  delete PREVISOES[jogoId];
  // Mostrar loading
  PREVISOES[jogoId] = { loading: true, step: 'buscando perfis...' };
  renderCards();
  try {
    const prev = await analisarJogo(j);
    PREVISOES[jogoId] = prev;
    try { sessionStorage.setItem('prev_' + jogoId, JSON.stringify(prev)); } catch(e) {}
  } catch(e) {
    PREVISOES[jogoId] = { resultado: base5050(), gols: golsDefault(), confianca: 'insuficiente', explicacoes: ['Erro: ' + e.message], fontes: [] };
  }
  renderCards();
  atualizarResumo();
}

async function analisarTodos() {
  if (ANALISANDO) return;
  // Limpar cache antigo — força re-análise com algoritmo atual
  JOGOS.forEach(j => {
    try { sessionStorage.removeItem('prev_' + j.id); } catch(e) {}
  });
  PREVISOES = {};
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;
  if (!jogos.length) return;

  ANALISANDO = true;
  const btn = gc('btnAnalisar');
  btn.disabled = true;
  btn.textContent = '⏳ Analisando...';

  jogos.forEach(j => { PREVISOES[j.id] = { loading: true, step: 'buscando dados' }; });
  renderCards();

  let analisados = 0;
  for (const j of jogos) {
    try {
      PREVISOES[j.id] = { loading: true, step: j.timeCasa?.nome };
      const cardEl = document.getElementById('card-' + j.id);
      if (cardEl) cardEl.outerHTML = renderCard(j, PREVISOES[j.id]);

      const prev = await analisarJogo(j);
      PREVISOES[j.id] = prev;
      analisados++;
      setStatus(`${analisados}/${jogos.length} analisados`);

      const cardEl2 = document.getElementById('card-' + j.id);
      if (cardEl2) cardEl2.outerHTML = renderCard(j, prev);

      // Salvar previsão no banco (só jogos não encerrados)
      if (j.apiFootballId) { // v2: salva sempre, incluindo jogos encerrados
        salvarPrevisao(j, prev); // assíncrono, não bloqueia
      }
      // Cache local no sessionStorage
      try { sessionStorage.setItem('prev_' + j.id, JSON.stringify(prev)); } catch(e) {}
    } catch(e) {
      PREVISOES[j.id] = { resultado: null, gols: null, confianca: 'insuficiente', explicacoes: ['Erro: ' + e.message], fontes: [] };
    }
  }

  atualizarResumo();
  ANALISANDO = false;
  btn.disabled = false;
  btn.textContent = '🔄 Reanalisar';
  setStatus('✓ Análise completa — previsões salvas');
  // Atualizar cache
  JOGOS.forEach(j => {
    if (PREVISOES[j.id] && !PREVISOES[j.id].loading) {
      try { sessionStorage.setItem('prev_' + j.id, JSON.stringify(PREVISOES[j.id])); } catch(e) {}
    }
  });
}

// ── CARREGAR APRENDIZADO ──────────────────────────────────────────────────
async function carregarAprendizado() {
  const el = gc('aprendizadoContent');
  el.innerHTML = '<div style="color:var(--t2);text-align:center;padding:40px">Carregando...</div>';
  try {
    const r = await fns.httpsCallable('buscarAprendizado')({});
    const { ligas, ultimas, fatorGlobal } = r.data;
    renderAprendizado(ligas, ultimas, fatorGlobal);
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red);padding:20px">Erro: ${e.message}</div>`;
  }
}

function renderAprendizado(ligas, ultimas, fatorGlobal) {
  const el = gc('aprendizadoContent');

  // Totais globais
  const totalJogos  = ligas.reduce((a,l) => a + (l.totalJogos||0), 0);
  const totalAcertos = ligas.reduce((a,l) => a + (l.acertosResultado||0), 0);
  const totalGols   = ligas.reduce((a,l) => a + (l.acertosGols||0), 0);
  const pctResultado = totalJogos ? Math.round(totalAcertos/totalJogos*100) : 0;
  const pctGols      = totalJogos ? Math.round(totalGols/totalJogos*100) : 0;
  const desvioMedio  = totalJogos ? ligas.reduce((a,l) => a + (l.desvioGolsAcum||0), 0) / totalJogos : 0;

  // Fator labels
  const fatorLabel = {
    yellup_score:        'YS favorecia mas perdeu',
    xg_contra_resultado: 'Venceu com xG inferior',
    gols_acima:          'Mais gols que o previsto',
    gols_abaixo:         'Menos gols que o previsto',
    posse_sem_eficiencia:'Posse sem eficiência',
    baixa_confianca_correta: 'Resultado de baixa probabilidade',
  };

  const fatoresOrdenados = Object.entries(fatorGlobal)
    .sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxFator = fatoresOrdenados[0]?.[1] || 1;

  // Ligas ordenadas por acurácia
  const ligasOrdenadas = ligas
    .filter(l => l.totalJogos >= 2)
    .sort((a,b) => (b.acertosResultado/b.totalJogos) - (a.acertosResultado/a.totalJogos));

  // Por confiança (global)
  const confGlobal = { alta:{total:0,acertos:0}, media:{total:0,acertos:0}, baixa:{total:0,acertos:0}, insuficiente:{total:0,acertos:0} };
  ligas.forEach(l => {
    Object.entries(l.porConfianca||{}).forEach(([k,v]) => {
      if (!confGlobal[k]) confGlobal[k] = {total:0,acertos:0};
      confGlobal[k].total   += v.total||0;
      confGlobal[k].acertos += v.acertos||0;
    });
  });

  el.innerHTML = `
  <div style="margin-bottom:16px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">🧠 O que a Yellup aprendeu</div>
    <div style="font-size:12px;color:var(--t2)">${totalJogos} jogos analisados até agora</div>
  </div>

  ${totalJogos === 0 ? `<div style="text-align:center;padding:40px;color:var(--t2)">
    <div style="font-size:32px;margin-bottom:12px">📊</div>
    <div style="font-size:14px">Nenhum jogo analisado ainda.</div>
    <div style="font-size:12px;margin-top:8px">Use o painel abaixo para importar o histórico de jogos já encerrados.</div>
  </div>` : `

  <div class="apr-grid">
    <div class="apr-card">
      <div class="apr-card-title">🎯 Acurácia de resultado</div>
      <div class="apr-big" style="color:${pctResultado>=60?'var(--grn)':pctResultado>=45?'var(--acc)':'var(--red)'}">${pctResultado}%</div>
      <div class="apr-sub">${totalAcertos} de ${totalJogos} acertos</div>
    </div>
    <div class="apr-card">
      <div class="apr-card-title">⚽ Acurácia de gols (±1)</div>
      <div class="apr-big" style="color:${pctGols>=60?'var(--grn)':pctGols>=45?'var(--acc)':'var(--red)'}">${pctGols}%</div>
      <div class="apr-sub">Dentro de 1 gol da estimativa</div>
    </div>
    <div class="apr-card">
      <div class="apr-card-title">📐 Desvio médio de gols</div>
      <div class="apr-big" style="color:var(--acc)">${desvioMedio >= 0 ? '+' : ''}${desvioMedio.toFixed(1)}</div>
      <div class="apr-sub">${desvioMedio > 0 ? 'Subestimamos gols' : desvioMedio < 0 ? 'Superestimamos gols' : 'Calibrado'}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="apr-card">
      <div class="apr-card-title">⚠️ Principais causas de erro</div>
      ${fatoresOrdenados.length === 0 ? '<div style="color:var(--t3);font-size:12px">Sem dados suficientes ainda</div>' :
        fatoresOrdenados.map(([tipo, count]) => `
        <div class="fator-item">
          <div class="fator-nome">${fatorLabel[tipo] || tipo}</div>
          <div style="flex:1;height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin:0 8px">
            <div style="height:100%;width:${Math.round(count/maxFator*100)}%;background:var(--red);border-radius:2px"></div>

    <div class="apr-card">

      ${['alta','media','baixa','insuficiente'].map(k => {

        if (!d || !d.total) return '';
        const pct = Math.round(d.acertos/d.total*100);

        const label = k === 'alta' ? 'Alta' : k === 'media' ? 'Média' : k === 'baixa' ? 'Baixa' : 'Insuficiente';
        return `<div class="liga-row">
          <div class="liga-nome">${label} confiança</div>
          <div class="liga-bar-wrap"><div class="liga-bar-fill" style="width:${pct}%;background:${cor}"></div></div>
          <div class="liga-pct" style="color:${cor}">${pct}%</div>
          <div style="font-size:10px;color:var(--t3);min-width:50px;text-align:right">${d.total} jogos</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${ligasOrdenadas.length > 0 ? `<div class="apr-card" style="margin-bottom:16px">
    <div class="apr-card-title">🏆 Acurácia por liga</div>
    ${ligasOrdenadas.slice(0,10).map(l => {
      const pct = Math.round(l.acertosResultado/l.totalJogos*100);
      const cor = pct>=65?'var(--grn)':pct>=45?'var(--acc)':'var(--red)';
      return `<div class="liga-row">
        <div class="liga-nome">${l.liga}</div>
        <div class="liga-bar-wrap"><div class="liga-bar-fill" style="width:${pct}%;background:${cor}"></div></div>
        <div class="liga-pct" style="color:${cor}">${pct}%</div>
        <div style="font-size:10px;color:var(--t3);min-width:50px;text-align:right">${l.totalJogos} jogos</div>
      </div>`;
    }).join('')}
  </div>` : ''}

  ${ultimas.length > 0 ? `<div class="apr-card">
    <div class="apr-card-title">🕐 Últimas análises</div>
    ${ultimas.slice(0,15).map(p => {
      const acertouR = p.acertouResultado;
      const acertouG = p.acertouGols;
      const ver = p.veredito === 'casa' ? p.timeCasaNome : p.veredito === 'fora' ? p.timeForaNome : 'Empate';
      const real = p.resultadoReal === 'casa' ? p.timeCasaNome : p.resultadoReal === 'fora' ? p.timeForaNome : 'Empate';
      const placarReal  = (p.golsCasaReal != null && p.golsForaReal != null) ? `${p.golsCasaReal}-${p.golsForaReal}` : null;
      const apostaPlacar = p.apostaPlacar || null;
      const acertouP = apostaPlacar && placarReal && apostaPlacar === placarReal;
      return `<div class="prev-hist-row" style="flex-wrap:wrap;gap:6px">
        <div class="prev-hist-times" style="flex:1;min-width:160px">${p.timeCasaNome} × ${p.timeForaNome}</div>
        <div style="font-size:10px;color:var(--t2)">${p.liga||''}</div>
        <div class="prev-hist-result ${acertouR?'acertou':'errou'}">
          ${acertouR?'✓':'✗'} ${real} (${p.golsCasaReal ?? '?'}-${p.golsForaReal ?? '?'})
        </div>
        <div style="font-size:10px;color:var(--t3)">Prev: ${ver}</div>
        <div style="font-size:10px;color:${acertouG?'var(--grn)':'var(--red)'}">⚽${acertouG?'✓':'✗'} est.${p.golsEstimado}</div>
        ${apostaPlacar ? `<div style="font-size:10px;color:${acertouP?'var(--grn)':'var(--t3)'}">
          🎯${acertouP?'✓':'✗'} ${apostaPlacar}${p.top5Placares?.length>1?' (2°:'+p.top5Placares[1]?.l+')':''}</div>` : ''}
        ${(p.alertas||[]).length ? `<div style="font-size:9px;color:var(--yel)">${p.alertas.map(a=>a.tipo).join(', ')}</div>` : ''}
      </div>`;
    }).join('')}
    ${(() => {
      const comPlacar = ultimas.filter(p => p.apostaPlacar && p.golsCasaReal != null);
      if (!comPlacar.length) return '';
      const acertou = comPlacar.filter(p => p.apostaPlacar === `${p.golsCasaReal}-${p.golsForaReal}`).length;
      const pct = Math.round(acertou/comPlacar.length*100);
      return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--brd);display:flex;gap:16px;align-items:center">
        <div>
          <div style="font-size:18px;font-weight:800;color:${pct>=12?'var(--grn)':pct>=7?'var(--acc)':'var(--t2)'}">${pct}%</div>
          <div style="font-size:9px;color:var(--t3)">acurácia placar exato</div>
        </div>
        <div style="font-size:11px;color:var(--t2)">${acertou} de ${comPlacar.length} placares corretos · referência: ~10% esperado por probabilidade</div>
      </div>`;
    })()}
  </div>` : ''}
  `}

  <div class="apr-card" style="margin-top:16px;border-color:rgba(245,165,36,.3)">
    <div class="apr-card-title" style="color:var(--acc)">⚡ Importar histórico de jogos encerrados</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px">
      Reconstrói previsões para jogos já finalizados usando dados disponíveis antes de cada jogo e analisa os desvios. Quanto mais jogos importados, mais o sistema aprende.
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="backfillLiga" class="filtro-liga" style="flex:1;min-width:160px">
        <option value="">Todas as ligas</option>
        ${ligas.map(l => `<option value="${l.liga}">${l.liga}</option>`).join('')}

        <option value="10">10 jogos/lote</option>

      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);cursor:pointer">

        Forçar reprocessamento (v3)

  const el = gc('backfillStatus');
  el.textContent = 'Resetando...';
  try {
    const r = await fns.httpsCallable('resetarAprendizado')({});
    const d = r.data;
    el.innerHTML = `<span style="color:var(--grn)">✓ Reset concluído — ${d.aprendizadoDeletado} ligas apagadas · ${d.previsoresResetados} previsões resetadas<br>

  } catch(e) {
    el.innerHTML = `<span style="color:var(--red)">Erro: ${e.message}</span>`;
  }
}

  const el = gc('backfillStatus');

    const r = await fns.httpsCallable('corrigirJogosPresos')({});

      <div style="background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:12px;font-size:11px;line-height:1.9">

// Carrega análise rápida de confiança ao abrir a aba
async function _carregarAnaliseConfianca() {
  const el = gc('simConfiancaRapida');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--t2);font-size:12px">Carregando análise de confiança...</div>';
  try {
    const r = await fns.httpsCallable('simularEstrategias')({ liga: null, confianca: null });
    const d = r.data;
    if (!d.sucesso) { el.innerHTML = ''; return; }

    const confs = [
      { key: 'alta',         label: 'Alta',         cor: '#27d49b' },
      { key: 'media',        label: 'Média',        cor: '#f5a524' },
      { key: 'baixa',        label: 'Baixa',        cor: '#ef5f5f' },
      { key: 'insuficiente', label: 'Insuficiente', cor: '#858ba5' },
    ].filter(c => d.porConf[c.key]);

    const melhorConf = confs.reduce((best, c) =>
      (d.porConf[c.key]?.pct || 0) > (d.porConf[best.key]?.pct || 0) ? c : best
    , confs[0]);

    el.innerHTML = `
    <div class="sim-card" style="margin-bottom:16px">
      <div class="sim-title">🔬 Análise de confiança — ${d.total} jogos históricos</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        ${confs.map(cf => {
          const m = d.porConf[cf.key];
          const isEdge = m.pct >= 55;
          const isBad  = m.pct < 45;
          return `<div style="background:var(--bg3);border:1px solid ${isBad?'rgba(239,95,95,.3)':isEdge?'rgba(39,212,155,.3)':'var(--brd)'};border-radius:10px;padding:12px;text-align:center">
            <div style="font-size:10px;color:var(--t2);margin-bottom:4px">${cf.label}</div>
            <div style="font-size:24px;font-weight:800;color:${isBad?'var(--red)':isEdge?'var(--grn)':'var(--acc)'}">${m.pct}%</div>
            <div style="font-size:10px;color:var(--t3)">${m.total} jogos</div>
            <div style="font-size:10px;margin-top:4px;color:${m.golsDesvioMedio>0?'var(--red)':'var(--grn)'}">
              gols: ${m.golsDesvioMedio > 0 ? '+' : ''}${m.golsDesvioMedio}
            </div>
            ${isBad ? '<div style="font-size:9px;color:var(--red);margin-top:3px">⚠️ Pior que aleatório</div>' : ''}
            ${isEdge ? '<div style="font-size:9px;color:var(--grn);margin-top:3px">✓ Edge positivo</div>' : ''}
          </div>`;
        }).join('')}
      </div>

      <div style="background:rgba(245,165,36,.06);border:1px solid rgba(245,165,36,.2);border-radius:8px;padding:12px;font-size:12px;line-height:1.7">
        <b style="color:var(--acc)">💡 O que os dados estão dizendo:</b><br>
        ${(() => {
          const alta  = d.porConf['alta'];
          const media = d.porConf['media'];
          const baixa = d.porConf['baixa'];
          const insuf = d.porConf['insuficiente'];
          const msgs = [];

          if (media && media.pct < 45)
            msgs.push(`<b>Média confiança (${media.pct}%)</b> está abaixo do aleatório — evitar apostar nesses jogos.`);

          if (insuf && baixa && insuf.pct > (media?.pct || 0))
            msgs.push(`<b>Inversão detectada:</b> "Insuficiente" (${insuf.pct}%) acerta mais que "Média" (${media?.pct || 0}%) — os limiares de confiança precisam de recalibração.`);

          if (alta && alta.total < 10)
            msgs.push(`<b>Alta confiança</b> tem apenas ${alta.total} amostras — estatisticamente frágil ainda.`);
          else if (alta && alta.pct >= 60)
            msgs.push(`<b>Alta confiança (${alta.pct}%)</b> está com edge real — apostar apenas nesses jogos seria mais rentável.`);

          // Gols
          const devMedio = d.desvioMedio;
          if (devMedio > 0.05)
            msgs.push(`<b>Gols:</b> sistema subestima consistentemente (+${devMedio} de desvio) — apostar Under(est.+0) tem vantagem histórica.`);
          else if (devMedio < -0.05)
            msgs.push(`<b>Gols:</b> sistema superestima (-${Math.abs(devMedio)} de desvio) — apostar Under tem vantagem histórica.`);

          const melhorOver = d.estrategiasGols?.reduce((best, e) => e.over.pct > best.over.pct ? e : best, d.estrategiasGols[0]);
          if (melhorOver && melhorOver.over.pct > 58)
            msgs.push(`<b>Melhor estratégia de gols:</b> Over ${melhorOver.margem >= 0 ? 'Est.+'+melhorOver.margem : 'Est.'+melhorOver.margem} acerta ${melhorOver.over.pct}% historicamente.`);

          return msgs.length ? msgs.map(m => '• ' + m).join('<br>') : 'Dados insuficientes para conclusões sólidas ainda.';
        })()}
      </div>
    </div>`;
  } catch(e) {
    if (gc('simConfiancaRapida')) gc('simConfiancaRapida').innerHTML = '';
  }
}

async function rodarSimulacao() {
  const el = gc('simResultado');
  const liga   = gc('simLiga')?.value || null;
  const conf   = gc('simConf')?.value || null;
  const odd    = parseFloat(gc('simOdd')?.value || '1.90');
  const stake  = parseFloat(gc('simStake')?.value || '10');

  el.innerHTML = '<div style="color:var(--t2);padding:20px">Calculando...</div>';

  try {
    const r = await fns.httpsCallable('simularEstrategias')({
      liga: liga || null, confianca: conf || null
    });
    const d = r.data;
    if (!d.sucesso) { el.innerHTML = `<div style="color:var(--red)">${d.msg}</div>`; return; }

    // Recalcular ROI com odd/stake da UI
    const n = d.total;
    const simFin = d.estrategiasGols.map(e => {
      const ganhoOver  = e.over.acertos  * (stake * odd) - n * stake;
      const ganhoUnder = e.under.acertos * (stake * odd) - n * stake;
      return {
        label:      e.label,
        margem:     e.margem,
        overPct:    e.over.pct,
        underPct:   e.under.pct,
        roiOver:    +((ganhoOver  / (n * stake)) * 100).toFixed(1),
        roiUnder:   +((ganhoUnder / (n * stake)) * 100).toFixed(1),
        lucroOver:  +ganhoOver.toFixed(2),
        lucroUnder: +ganhoUnder.toFixed(2),
      };
    });

    const melhorOverIdx  = simFin.reduce((bi, e, i) => e.roiOver  > simFin[bi].roiOver  ? i : bi, 0);
    const melhorUnderIdx = simFin.reduce((bi, e, i) => e.roiUnder > simFin[bi].roiUnder ? i : bi, 0);

    // Distribuição de desvios
    const buckets = Object.entries(d.histDesvios).sort((a,b) => parseFloat(a[0])-parseFloat(b[0]));
    const maxBucket = Math.max(...buckets.map(([,v]) => v));

    el.innerHTML = `
    <div class="sim-grid">

      <!-- Card: Distribuição de erros -->
      <div class="sim-card">
        <div class="sim-title">📐 Distribuição dos desvios de gols</div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:12px">
          Desvio médio: <b style="color:${d.desvioMedio>=0?'var(--grn)':'var(--red)'}">${d.desvioMedio>=0?'+':''}${d.desvioMedio}</b> &nbsp;·&nbsp;
          Subestimou: <b>${d.desviosPositivos}</b> &nbsp;·&nbsp;
          Superestimou: <b>${d.desviosNegativos}</b> &nbsp;·&nbsp;
          Exato: <b>${d.desviosExatos}</b>
        </div>
        ${buckets.map(([k, v]) => {
          const pctBar = Math.round(v / maxBucket * 100);
          const cor = k.startsWith('+') ? '#ef4444' : k === '0' ? 'var(--grn)' : '#378ADD';
          return `<div class="desvio-bar">
            <div style="min-width:28px;text-align:right;color:var(--t2)">${k}</div>
            <div class="desvio-bar-fill" style="width:${pctBar}%;background:${cor}"></div>
            <div style="color:var(--t2)">${v}×</div>
            <div style="color:var(--t3);font-size:10px">(${(v/n*100).toFixed(0)}%)</div>
          </div>`;
        }).join('')}
      </div>

      <!-- Card: Resultado por margem de probabilidade -->
      <div class="sim-card">
        <div class="sim-title">🎯 Acurácia de resultado por confiança do modelo</div>
        <table class="sim-table">
          <tr><th>Faixa de prob.</th><th>Jogos</th><th>Acertos</th><th>%</th></tr>
          ${d.porMargem.filter(m => m.total > 0).map(m => {
            const cor = m.pct>=60?'var(--grn)':m.pct>=48?'var(--acc)':'var(--red)';
            return `<tr>
              <td>${m.label}</td>
              <td style="color:var(--t2)">${m.total}</td>
              <td>${m.acertos}</td>
              <td class="sim-pct" style="color:${cor}">${m.pct}%</td>
            </tr>`;
          }).join('')}
        </table>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)">
          <div class="sim-title">Por nível de confiança</div>
          <table class="sim-table">
            <tr><th>Confiança</th><th>Jogos</th><th>%</th><th>Desvio gols</th></tr>
            ${['alta','media','baixa','insuficiente'].filter(k => d.porConf[k]).map(k => {
              const m = d.porConf[k];
              const cor = m.pct>=60?'var(--grn)':m.pct>=48?'var(--acc)':'var(--red)';
              const label = k==='alta'?'Alta':k==='media'?'Média':k==='baixa'?'Baixa':'Insuf.';
              return `<tr>
                <td>${label}</td>
                <td style="color:var(--t2)">${m.total}</td>
                <td class="sim-pct" style="color:${cor}">${m.pct}%</td>
                <td style="color:${m.golsDesvioMedio>=0?'var(--red)':'var(--grn)'}">${m.golsDesvioMedio>=0?'+':''}${m.golsDesvioMedio}</td>
              </tr>`;
            }).join('')}
          </table>
        </div>
      </div>
    </div>

    <!-- Tabela principal: estratégias de gols -->
    <div class="sim-card" style="margin-bottom:16px">
      <div class="sim-title">⚽ Estratégias de gols — ${n} jogos · odd ${odd} · R$${stake}/aposta</div>
      <table class="sim-table">
        <tr>
          <th>Estratégia</th>
          <th>Over %</th><th>ROI Over</th><th>Lucro Over</th>
          <th>Under %</th><th>ROI Under</th><th>Lucro Under</th>
        </tr>
        ${simFin.map((e, i) => {
          const bestO = i === melhorOverIdx;
          const bestU = i === melhorUnderIdx;
          return `<tr class="${bestO||bestU ? 'sim-best' : ''}">
            <td style="font-weight:${bestO||bestU?'700':'400'}">${e.label} ${bestO&&bestU?'🏆 ★':bestO?'🏆':bestU?'★':''}</td>
            <td class="sim-pct" style="color:${e.overPct>=55?'var(--grn)':e.overPct>=45?'var(--t1)':'var(--red)'}">${e.overPct}%</td>
            <td class="${e.roiOver>=0?'sim-roi-pos':'sim-roi-neg'}">${e.roiOver>=0?'+':''}${e.roiOver}%</td>
            <td style="color:${e.lucroOver>=0?'var(--grn)':'var(--red)'}">R$${e.lucroOver>=0?'+':''}${e.lucroOver}</td>
            <td class="sim-pct" style="color:${e.underPct>=55?'var(--grn)':e.underPct>=45?'var(--t1)':'var(--red)'}">${e.underPct}%</td>
            <td class="${e.roiUnder>=0?'sim-roi-pos':'sim-roi-neg'}">${e.roiUnder>=0?'+':''}${e.roiUnder}%</td>
            <td style="color:${e.lucroUnder>=0?'var(--grn)':'var(--red)'}">R$${e.lucroUnder>=0?'+':''}${e.lucroUnder}</td>
          </tr>`;
        }).join('')}
      </table>
      <div style="font-size:11px;color:var(--t3);margin-top:10px">
        🏆 = melhor ROI Over &nbsp;·&nbsp; ★ = melhor ROI Under &nbsp;·&nbsp;
        Over: aposta que o jogo terá MAIS gols que o threshold &nbsp;·&nbsp;
        Under: aposta que o jogo terá MENOS gols que o threshold
      </div>
    </div>

    <div style="background:rgba(99,195,34,.06);border:1px solid rgba(99,195,34,.2);border-radius:10px;padding:14px;font-size:12px">
      <b style="color:var(--grn)">💡 Melhor estratégia encontrada:</b><br>
      <b>Over:</b> Apostando Over nos jogos onde estimamos ${simFin[melhorOverIdx].margem >= 0 ? 'mais de ' + (simFin[melhorOverIdx].margem > 0 ? 'est.+'+simFin[melhorOverIdx].margem : 'exato estimado') : 'est.'+simFin[melhorOverIdx].margem} gols →
        acerto de <b>${simFin[melhorOverIdx].overPct}%</b>, ROI <b>${simFin[melhorOverIdx].roiOver >= 0 ? '+' : ''}${simFin[melhorOverIdx].roiOver}%</b>
        (R$${simFin[melhorOverIdx].lucroOver >= 0 ? '+' : ''}${simFin[melhorOverIdx].lucroOver} em ${n} apostas)<br>
      <b>Under:</b> Apostando Under no threshold <b>${simFin[melhorUnderIdx].label}</b> →
        acerto de <b>${simFin[melhorUnderIdx].underPct}%</b>, ROI <b>${simFin[melhorUnderIdx].roiUnder >= 0 ? '+' : ''}${simFin[melhorUnderIdx].roiUnder}%</b>
        (R$${simFin[melhorUnderIdx].lucroUnder >= 0 ? '+' : ''}${simFin[melhorUnderIdx].lucroUnder} em ${n} apostas)
    </div>`;

    // Popular select de ligas com dados reais
    if (d.ligasDisponiveis) {
      const sel = gc('simLiga');
      if (sel) {
        const current = sel.value;
        sel.innerHTML = '<option value="">Todas as ligas</option>';
        d.ligasDisponiveis.forEach(l => sel.innerHTML += `<option value="${l}" ${l===current?'selected':''}>${l}</option>`);
      }
    }

  } catch(e) {
    el.innerHTML = `<div style="color:var(--red)">Erro: ${e.message}</div>`;
  }
}

// Popular select de ligas do simulador quando aba é aberta
async function _carregarLigasSimulador() {
  try {
    const snap = await db.collection('yellup-aprendizado').get();
    const sel = gc('simLiga');
    if (!sel) return;
    const ligas = snap.docs.map(d => d.data().liga).filter(Boolean).sort();
    sel.innerHTML = '<option value="">Todas as ligas</option>';
    ligas.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);
  } catch(e) {}
}



// ── BACKFILL HISTÓRICO MASSIVO ────────────────────────────────────────────
let _massivoRodando = false;
let _massivoParar   = false;

async function iniciarBackfillMassivo() {
  if (_massivoRodando) return;
  _massivoRodando = true;
  _massivoParar   = false;

  const ligaId = gc('massLiga').value;
  const season = gc('massSeason').value;
  const lote   = parseInt(gc('massLote').value || '10');
  const ligaNome = gc('massLiga').options[gc('massLiga').selectedIndex].text;

  gc('btnMassivo').disabled = true;
  gc('btnPararMassivo').style.display = 'inline-flex';
  gc('massivoProgress').style.display = 'block';
  gc('massivoStatus').textContent = `Iniciando importação de ${ligaNome} ${season}...`;

  let pagina = 1;
  let totalProcessados = 0;
  let totalPaginas = null;
  let totalJogos = null;

  while (true) {
    if (_massivoParar) {
      gc('massivoStatus').innerHTML = `<span style="color:var(--acc)">⏹ Parado em ${totalProcessados} jogos processados</span>`;
      break;
    }

    try {
      gc('massivoStatus').textContent = `Processando página ${pagina}/${totalPaginas || '?'}...`;

      const r = await fns.httpsCallable('backfillHistoricoMassivo')({
        ligaId: parseInt(ligaId),
        season: parseInt(season),
        lote,
        pagina,
      });
      const d = r.data;

      if (!d.sucesso) {
        gc('massivoStatus').innerHTML = `<span style="color:var(--red)">Erro: ${d.msg}</span>`;
        break;
      }

      totalProcessados += d.processados || 0;
      if (totalPaginas === null) totalPaginas = d.paginas || 1;
      if (totalJogos === null)   totalJogos   = d.total || 0;

      // Progresso
      const pct = Math.round((pagina / totalPaginas) * 100);
      gc('massivoBar').style.width = pct + '%';
      gc('massivoLabel').textContent = `Página ${pagina}/${totalPaginas} · ${totalProcessados} novos · ${d.pulados || 0} pulados · acurácia ${d.acuracia !== null ? d.acuracia+'%' : '—'}`;

      if (pagina >= totalPaginas || d.processados + (d.pulados||0) === 0) {
        gc('massivoStatus').innerHTML = `<span style="color:var(--grn)">✓ Concluído — ${totalProcessados} jogos importados de ${ligaNome} ${season}</span>`;
        break;
      }

      pagina++;
      // Aguardar entre páginas para não estourar rate limit da API
      await new Promise(res => setTimeout(res, 2000));

    } catch(e) {
      gc('massivoStatus').innerHTML = `<span style="color:var(--red)">Erro na página ${pagina}: ${e.message}</span>`;
      break;
    }
  }

  _massivoRodando = false;
  gc('btnMassivo').disabled = false;
  gc('btnPararMassivo').style.display = 'none';
}

function pararBackfillMassivo() {
  _massivoParar = true;
}

async function iniciarBackfill() {
  if (backfillRodando) return;
  const btn = gc('btnBackfill');
  const liga = gc('backfillLiga')?.value || null;
  const lote = parseInt(gc('backfillLote')?.value || '20');

  backfillRodando = true;
  btn.disabled = true;
  btn.textContent = '⏳ Importando...';
  gc('backfillProgress').style.display = 'block';
  gc('backfillStatus').textContent = 'Iniciando importação...';

  let offset = 0, totalProcessados = 0, totalErros = 0, total = null;

  try {
    while (true) {
      gc('backfillStatus').textContent = `Processando lote a partir do jogo ${offset+1}...`;

      const forcar = gc('chkForcar')?.checked || false;
      const r = await fns.httpsCallable('backfillPrevisoes')({
        lote, offset, liga: liga || null, forcar
      });
      const d = r.data;

      totalProcessados += d.processados || 0;
      totalErros       += d.erros || 0;
      if (total === null) total = d.total || 0;

      // Atualizar barra
      const pct = total > 0 ? Math.min(100, Math.round((offset + lote) / total * 100)) : 0;
      gc('backfillBar').style.width = pct + '%';
      gc('backfillStats').textContent =
        `${totalProcessados} processados · ${totalErros} erros · ${d.totalRestante || 0} restantes`;

      // Sem mais para processar
      if (!d.processados || d.totalRestante <= 0) {
        gc('backfillStatus').innerHTML =
          `<span style="color:var(--grn)">✓ Importação concluída — ${totalProcessados} jogos analisados</span>`;
        gc('backfillBar').style.width = '100%';
        break;
      }

      offset = d.proximoOffset;

      // Pausa entre lotes para não sobrecarregar
      await new Promise(res => setTimeout(res, 2000));
    }
  } catch(e) {
    gc('backfillStatus').innerHTML =
      `<span style="color:var(--red)">Erro: ${e.message}</span>`;
  }

  backfillRodando = false;
  btn.disabled = false;
  btn.textContent = '🔄 Continuar importação';

  // Recarregar dados de aprendizado
  setTimeout(() => carregarAprendizado(), 1000);
}
