<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yellup · Previsões</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D15;--bg2:#131622;--bg3:#1A1D2E;--brd:#252840;
  --acc:#F5A524;--grn:#27D49B;--blu:#4F96F4;--red:#EF5F5F;--pur:#A78BFA;
  --t1:#F0F2FF;--t2:#858BA5;--t3:#4A4F6A;
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--brd);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header-logo{font-size:20px;font-weight:800;color:var(--acc);letter-spacing:-0.5px}
.header-title{font-size:14px;color:var(--t2)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn-back{background:var(--bg3);border:1px solid var(--brd);color:var(--t2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.btn-back:hover{color:var(--t1);border-color:var(--acc)}

/* ── TOOLBAR ── */
.toolbar{padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--brd)}
.date-nav{display:flex;align-items:center;gap:8px}
.date-btn{background:var(--bg3);border:1px solid var(--brd);color:var(--t2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.date-btn:hover{border-color:var(--acc);color:var(--acc)}
.date-display{background:var(--bg3);border:1px solid var(--brd);padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--t1);min-width:130px;text-align:center}
.btn-analisar{background:var(--acc);color:#000;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-analisar:hover{opacity:.9}
.btn-analisar:disabled{opacity:.5;cursor:not-allowed}
.filtro-liga{background:var(--bg3);border:1px solid var(--brd);color:var(--t1);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.status-bar{margin-left:auto;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px}
.dot-spin{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:spin .8s linear infinite}
@keyframes spin{0%{opacity:1}50%{opacity:.2}100%{opacity:1}}

/* ── RESUMO TOPO ── */
.resumo-bar{padding:12px 24px;display:flex;gap:24px;border-bottom:1px solid var(--brd);background:var(--bg2)}
.resumo-item{text-align:center}
.resumo-num{font-size:20px;font-weight:700}
.resumo-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}

/* ── GRID DE JOGOS ── */
.jogos-grid{padding:20px 24px;display:flex;flex-direction:column;gap:12px;max-width:1100px;margin:0 auto}

/* ── CARD DE JOGO ── */
.jogo-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;transition:border-color .2s}
.jogo-card:hover{border-color:var(--acc)}
.jogo-card.loading{opacity:.7}
.jogo-card.analisado{border-color:var(--brd)}

.card-header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.card-liga{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.card-hora{font-size:12px;color:var(--t3);margin-left:auto}
.card-status-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-agendado{background:rgba(79,150,244,.15);color:var(--blu)}
.badge-ao_vivo{background:rgba(239,95,95,.2);color:var(--red);animation:pulse 1.5s infinite}
.badge-encerrado{background:rgba(133,139,165,.1);color:var(--t2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.card-body{padding:16px}
.times-row{display:flex;align-items:center;gap:12px}
.time-info{flex:1;display:flex;flex-direction:column;gap:4px}
.time-info.fora{align-items:flex-end}
.time-escudo{width:36px;height:36px;object-fit:contain}
.time-nome{font-size:14px;font-weight:600}
.time-forma{display:flex;gap:3px}
.forma-dot{width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.forma-V{background:rgba(39,212,155,.2);color:var(--grn)}
.forma-E{background:rgba(79,150,244,.2);color:var(--blu)}
.forma-D{background:rgba(239,95,95,.2);color:var(--red)}

.vs-area{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
.vs-placar{font-size:22px;font-weight:800;letter-spacing:2px}
.vs-label{font-size:10px;color:var(--t3)}

/* ── PREVISÃO ── */
.previsao-area{margin-top:14px;padding-top:14px;border-top:1px solid var(--brd);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prev-bloco{background:var(--bg3);border-radius:10px;padding:12px 14px}
.prev-titulo{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* Resultado */
.resultado-bars{display:flex;flex-direction:column;gap:6px}
.res-item{display:flex;align-items:center;gap:8px}
.res-label{font-size:11px;color:var(--t2);width:80px}
.res-bar-wrap{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.res-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right}
.res-item.destaque .res-label{color:var(--t1);font-weight:600}
.res-item.destaque .res-pct{color:var(--acc)}

/* Gols */
.gols-display{display:flex;align-items:center;gap:12px}
.gols-num{font-size:32px;font-weight:800;color:var(--acc)}
.gols-info{display:flex;flex-direction:column;gap:2px}
.gols-range{font-size:11px;color:var(--t2)}
.gols-tendencia{font-size:11px;font-weight:600}
.tend-alto{color:var(--red)}
.tend-medio{color:var(--acc)}
.tend-baixo{color:var(--grn)}

/* Previsão veredito */
.veredito{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px}
.veredito-home{background:rgba(39,212,155,.1);border-left:3px solid var(--grn)}
.veredito-draw{background:rgba(79,150,244,.1);border-left:3px solid var(--blu)}
.veredito-away{background:rgba(239,95,95,.1);border-left:3px solid var(--red)}
.veredito-icon{font-size:16px}
.veredito-text{color:var(--t1);font-weight:600}
.veredito-conf{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.conf-alta{background:rgba(39,212,155,.2);color:var(--grn)}
.conf-media{background:rgba(245,165,36,.2);color:var(--acc)}
.conf-baixa{background:rgba(133,139,165,.2);color:var(--t2)}
.conf-insuficiente{background:rgba(133,139,165,.1);color:var(--t3)}

/* Explicação */
.explicacao{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.exp-item{font-size:11px;color:var(--t2);display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.exp-item::before{content:"•";color:var(--acc);flex-shrink:0;margin-top:1px}

/* Fontes mini */
.fontes-mini{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.fonte-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--t3);border:1px solid var(--brd)}
.fonte-tag.ativa{color:var(--grn);border-color:rgba(39,212,155,.3)}

/* Loading state */
.prev-loading{display:flex;align-items:center;gap:8px;color:var(--t2);font-size:12px;padding:8px 0}
.prev-loading::before{content:"";width:12px;height:12px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:rotate .8s linear infinite;flex-shrink:0}
@keyframes rotate{to{transform:rotate(360deg)}}

/* Sem dados */
.sem-dados{color:var(--t3);font-size:12px;padding:8px 0;display:flex;align-items:center;gap:6px}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--t2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* Acurácia rodapé */
.acuracia-footer{margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.ac-label{font-size:10px;color:var(--t3)}
.ac-valor{font-size:12px;font-weight:700}

@media(max-width:640px){
  .previsao-area{grid-template-columns:1fr}
  .toolbar{gap:8px}
}

/* ── SIMULADOR ── */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.sim-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:16px}
.sim-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sim-table{width:100%;border-collapse:collapse;font-size:12px}
.sim-table th{color:var(--t2);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--brd);text-align:left}
.sim-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.sim-table tr:last-child td{border-bottom:none}
.sim-table tr:hover td{background:rgba(255,255,255,.03)}
.sim-best{background:rgba(99,195,34,.08)!important;font-weight:600}
.sim-pct{font-weight:700}
.sim-roi-pos{color:var(--grn);font-weight:700}
.sim-roi-neg{color:var(--red);font-weight:700}
.desvio-bar{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px}
.desvio-bar-fill{height:7px;border-radius:4px;min-width:2px}
.filtro-sim{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;color:var(--t1);font-size:12px}
@media(max-width:700px){.sim-grid{grid-template-columns:1fr}}
/* ── APRENDIZADO ── */
.apr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.apr-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:16px}
.apr-card-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.apr-big{font-size:32px;font-weight:800}
.apr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.liga-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.liga-row:last-child{border-bottom:none}
.liga-nome{font-size:13px;font-weight:600;min-width:160px}
.liga-bar-wrap{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.liga-bar-fill{height:100%;border-radius:3px;background:var(--grn)}
.liga-pct{font-size:12px;font-weight:700;min-width:40px;text-align:right}
.fator-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.fator-item:last-child{border-bottom:none}
.fator-nome{font-size:12px;color:var(--t1);flex:1}
.fator-count{font-size:11px;background:rgba(239,95,95,.15);color:var(--red);padding:2px 8px;border-radius:20px}
.prev-hist-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--brd);font-size:12px}
.prev-hist-row:last-child{border-bottom:none}
.prev-hist-times{flex:1;color:var(--t1)}
.prev-hist-result{font-weight:700}
.acertou{color:var(--grn)}
.errou{color:var(--red)}
@media(max-width:700px){.apr-grid{grid-template-columns:1fr}}

/* ══════════════════════════════════════════════════════════
   YELLUP V3 — SEMÁFORO DE GOLS
   ══════════════════════════════════════════════════════════ */

/* Semáforo principal */
.v3-semaforo{
  margin-top:12px;border-radius:10px;overflow:hidden;
  border:1px solid var(--brd);
}
.v3-header{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;font-size:11px;font-weight:700;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.v3-header:hover{filter:brightness(1.08)}
.v3-header.over{background:rgba(239,95,95,.15);border-bottom:1px solid rgba(239,95,95,.25)}
.v3-header.under{background:rgba(39,212,155,.12);border-bottom:1px solid rgba(39,212,155,.2)}
.v3-header.neutro{background:rgba(255,255,255,.03);border-bottom:1px solid var(--brd)}
.v3-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.v3-dot.over{background:var(--red);box-shadow:0 0 6px var(--red)}
.v3-dot.under{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.v3-dot.neutro{background:var(--t3)}
.v3-label{flex:1;font-size:11px}
.v3-badge{font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.v3-badge.over{background:rgba(239,95,95,.2);color:var(--red)}
.v3-badge.under{background:rgba(39,212,155,.15);color:var(--grn)}
.v3-badge.neutro{background:rgba(133,139,165,.1);color:var(--t3)}
.v3-prec{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;margin-left:auto}

/* Detalhe V3 (colapsável) */
.v3-detail{padding:10px 14px;background:rgba(0,0,0,.15);display:none}
.v3-detail.open{display:block}
.v3-scores{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.v3-score-box{background:var(--bg2);border:1px solid var(--brd);border-radius:7px;
  padding:6px 10px;text-align:center;flex:1;min-width:60px}
.v3-score-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:700}
.v3-score-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.v3-signals{display:flex;flex-direction:column;gap:3px}
.v3-sig{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2);padding:2px 0}
.v3-sig-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.v3-sig-dot.on-over{background:var(--red)}
.v3-sig-dot.on-under{background:var(--grn)}
.v3-sig-dot.off{background:var(--brd);opacity:.5}

/* SINAL AO VIVO */
.sinal-vivo{
  margin-top:10px;border-radius:10px;overflow:hidden;
  border:1px solid rgba(239,95,95,.3);
  animation:vivoBorder 2s ease-in-out infinite;
}
@keyframes vivoBorder{0%,100%{border-color:rgba(239,95,95,.3)}50%{border-color:rgba(239,95,95,.7)}}
.sinal-vivo-header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:rgba(239,95,95,.08);font-size:11px;font-weight:700;
}
.vivo-indicator{width:8px;height:8px;border-radius:50%;background:var(--red);
  animation:pulse 1s infinite}
.sinal-vivo-body{padding:10px 14px;background:rgba(0,0,0,.2)}
.vivo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.vivo-box{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;
  padding:7px 10px;text-align:center}
.vivo-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700}
.vivo-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.vivo-projecao{
  padding:8px 12px;border-radius:8px;font-size:11px;
  display:flex;align-items:center;gap:8px;margin-top:6px;
  border-left:3px solid;
}
.vivo-projecao.alto{background:rgba(239,95,95,.08);border-color:var(--red);color:var(--red)}
.vivo-projecao.medio{background:rgba(245,165,36,.08);border-color:var(--acc);color:var(--acc)}
.vivo-projecao.baixo{background:rgba(39,212,155,.08);border-color:var(--grn);color:var(--grn)}
.vivo-pace-bar{height:4px;border-radius:2px;background:var(--brd);flex:1;overflow:hidden;margin:0 6px}
.vivo-pace-fill{height:100%;border-radius:2px;transition:width 1s}

</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚽ Yellup</div>
  <div class="header-title">Previsões do Dia</div>
  <div class="header-right">
    <button class="btn-back" id="btnTabPrevisoes" onclick="setTab('previsoes')" style="color:var(--acc);border-color:var(--acc)">📊 Previsões</button>
    <button class="btn-back" id="btnTabAprendizado" onclick="setTab('aprendizado')">🧠 O que aprendemos</button>
    <button class="btn-back" id="btnTabSimulador" onclick="setTab('simulador')">🎰 Simulador</button>
    <a href="jogos-admin.html" class="btn-back">← Admin</a>
  </div>
</div>

<div class="toolbar">
  <div class="date-nav">
    <button class="date-btn" onclick="mudarData(-1)">‹</button>
    <div class="date-display" id="dateDisplay">—</div>
    <button class="date-btn" onclick="mudarData(1)">›</button>
  </div>
  <button class="btn-analisar" id="btnAnalisar" onclick="analisarTodos()">
    🔍 Analisar Todos
  </button>
  <button class="btn-analisar" style="background:var(--bg3);color:var(--t2);border:1px solid var(--brd)" id="btnReanalisar" onclick="reanalisarTodos()" title="Força re-análise limpando cache antigo">
    🔄 Forçar Re-análise
  </button>
  <select class="filtro-liga" id="filtroLiga" onchange="renderCards()">
    <option value="">Todas as ligas</option>
  </select>
  <div class="status-bar" id="statusBar"></div>
</div>

<div class="resumo-bar" id="resumoBar" style="display:none">
  <div class="resumo-item"><div class="resumo-num" id="rTotal" style="color:var(--acc)">0</div><div class="resumo-label">Jogos</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rAnalisados" style="color:var(--grn)">0</div><div class="resumo-label">Analisados</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rAlta" style="color:var(--grn)">0</div><div class="resumo-label">Alta Conf.</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rMedia" style="color:var(--acc)">0</div><div class="resumo-label">Média Conf.</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rBaixa" style="color:var(--t2)">0</div><div class="resumo-label">Baixa/Insuf.</div></div>
</div>

<div id="painelSimulador" style="display:none;max-width:1100px;margin:0 auto;padding:20px 24px"><div id="simuladorContent"><div style="color:var(--t2);text-align:center;padding:40px">Configure os filtros e clique em Simular.</div></div></div>
<div id="painelAprendizado" style="display:none;max-width:1100px;margin:0 auto;padding:20px 24px">
  <div id="aprendizadoContent"><div style="color:var(--t2);text-align:center;padding:40px">Carregando dados de aprendizado...</div></div>
</div>
<div class="jogos-grid" id="jogosGrid">
  <div class="empty-state"><div class="icon">📅</div><p>Selecione uma data e clique em Analisar Todos</p></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
});
const auth=firebase.auth(), db=firebase.firestore(), fns=firebase.functions();

// ── ESTADO ────────────────────────────────────────────────────────────────
let JOGOS = [];        // jogos do dia carregados
let PREVISOES = {};    // { fixtureId: { resultado, gols, confianca, ... } }
// Helper timezone Brasília
// ── IMPREVISIBILIDADE POR LIGA ───────────────────────────────────────────
const LIGA_IMPREV = {
  'Brasileirão Série A': 0.85, 'Brasileirão Série B': 0.80,

// Derivada de 1.902 jogos reais (previsoes-historico × fixtures-historico)
// V3 = 0.40×DC_ctx + 0.35×tot_media + 0.25×o25_hist×4.5 × fator_liga
// ══════════════════════════════════════════════════════════════
const FATOR_LIGA_V3 = {
  'Serie A':1.005,'CONMEBOL Libertadores':0.912,'Brasileirão A':1.005,
  'Brasileirão Série A':1.005,'La Liga':0.965,'UEFA Champions League':1.008,

function calcOver25RateFromPerfil(perfil) {
  if (!perfil) return null;

  // Prioridade 1: porForca (preenchido pela Cloud Function no perfis-times)
  if (perfil.porForca) {
    let totalN = 0, totalO25 = 0;
    for (const f of ['fraco','medio','bom','forte']) {
      const g = perfil.porForca[f]?.geral;
      if (g?.n) { totalN += g.n; totalO25 += (g.over25 / 100) * g.n; }
    }
    if (totalN >= 3) return totalO25 / totalN;
  }

  // Prioridade 2: over25 direto nas stats (calculado pelo calcStats local)
  if (perfil.s10?.over25 != null) return perfil.s10.over25;
  if (perfil.s5?.over25  != null) return perfil.s5.over25;

  // Prioridade 3: calcular a partir da média de gols (estimativa)
  const tot = perfil.s10?.tot ?? perfil.s5?.tot ?? perfil.s10?.tot_media ?? 2.5;
  // Aproximação: over25 ≈ Poisson(λ>2.5) com λ=tot
  // Simplificado: se tot>=3.0 → ~60%, se tot>=2.5 → ~48%, se tot>=2.0 → ~35%, etc.
  if (tot >= 3.5) return 0.65;
  if (tot >= 3.0) return 0.55;
  if (tot >= 2.5) return 0.46;
  if (tot >= 2.0) return 0.35;
  return 0.25;
}

function calcularGolsV3(perfilCasa, perfilFora, liga, estAtual = 2.5, ysC = 5, ysF = 5) {
  if (!perfilCasa || !perfilFora) return null;
  const REF = 1.35;

  // Helper: aceita tanto .gf_media (perfis-times) quanto .gf (buscarPerfilTime local)
  const getGf  = (s) => s?.gf_media ?? s?.gf  ?? null;
  const getGs  = (s) => s?.gs_media ?? s?.gs  ?? null;
  const getTot = (s) => s?.tot_media ?? s?.tot ?? null;

  // Stats contextuais: casa em casa, fora em fora
  const gf_c  = getGf(perfilCasa?.statsCasa)  ?? getGf(perfilCasa?.s5)  ?? REF;
  const gs_c  = getGs(perfilCasa?.statsCasa)  ?? getGs(perfilCasa?.s5)  ?? REF;
  const tot_c = getTot(perfilCasa?.statsCasa) ?? getTot(perfilCasa?.s5) ?? 2.5;
  const gf_f  = getGf(perfilFora?.statsFora)  ?? getGf(perfilFora?.s5)  ?? REF;
  const gs_f  = getGs(perfilFora?.statsFora)  ?? getGs(perfilFora?.s5)  ?? REF;
  const tot_f = getTot(perfilFora?.statsFora) ?? getTot(perfilFora?.s5) ?? 2.5;

  // Validar: se ainda são todos REF, os dados são insuficientes mas continua com estimativa
  const temDadosCasa = gf_c !== REF || gs_c !== REF;
  const temDadosFora = gf_f !== REF || gs_f !== REF;

  // Over25 rate histórico (com múltiplos fallbacks)
  const o25_c = calcOver25RateFromPerfil(perfilCasa) ?? 0.48;
  const o25_f = calcOver25RateFromPerfil(perfilFora)  ?? 0.48;

  // Dixon-Coles contextual
  const DC  = gf_c * (gs_f / REF) + gf_f * (gs_c / REF);
  const TOT = (tot_c + tot_f) / 2;
  const O25 = (o25_c + o25_f) / 2;
  const base = 0.40 * DC + 0.35 * TOT + 0.25 * O25 * 4.5;
  const fl = FATOR_LIGA_V3[liga] ?? 1.0;
  const V3 = base * fl;
  const ys_sum = ysC + ysF;

  // Debug log
  console.log(`[V3] ${liga} gf_c=${gf_c} gs_c=${gs_c} gf_f=${gf_f} gs_f=${gs_f} tot=${TOT.toFixed(2)} o25=${O25.toFixed(2)} DC=${DC.toFixed(2)} V3=${V3.toFixed(2)}`);

  // Over Score — 7 sinais
  const sig_over = [
    DC >= 3.0,
    gf_c >= 1.5 && gf_f >= 1.2,
    gs_c >= 1.3 || gs_f >= 1.3,
    o25_c >= 0.55 && o25_f >= 0.55,
    TOT >= 2.8,
    ys_sum >= 12,
    parseFloat(estAtual) >= 3.0,
  ];
  const OS = sig_over.filter(Boolean).length;

  // Under Score — 6 sinais
  const sig_under = [
    DC <= 1.8,
    gf_c <= 1.1 && gf_f <= 1.0,
    gs_c <= 0.9 && gs_f <= 0.9,
    o25_c <= 0.40 && o25_f <= 0.40,
    TOT <= 1.8,
    parseFloat(estAtual) <= 2.0,
  ];
  const US = sig_under.filter(Boolean).length;

  // Veredito e precisão histórica
  let veredito, cor, prec, label;
  if (V3 >= 3.2 && OS >= 6) {
    veredito='over_alto'; cor='var(--red)'; prec=77;
    label='🔥 OVER 2.5 — Alta confiança';
  } else if (V3 >= 3.0 && OS >= 5) {
    veredito='over'; cor='var(--red)'; prec=72;
    label='🔥 OVER 2.5';
  } else if (V3 >= 2.5 && OS >= 4) {
    veredito='over_leve'; cor='#f97316'; prec=66;
    label='⚡ OVER 2.5 — Sinal';
  } else if (V3 <= 1.0 && US >= 4) {
    veredito='under'; cor='var(--grn)'; prec=57;
    label='🔒 UNDER 1.5';
  } else if (V3 <= 1.5 && US >= 5) {
    veredito='under'; cor='var(--grn)'; prec=54;
    label='🔒 UNDER 1.5';
  } else if (V3 >= 2.5 && OS >= 3) {
    // Sinal leve — mostrar em laranja ao invés de indefinido
    veredito='over_fraco'; cor='#f59e0b'; prec=null;
    label='⚠️ Leve tendência Over 2.5';
  } else if (V3 <= 2.0 && US >= 3) {
    veredito='under_fraco'; cor='#10b981'; prec=null;
    label='⚠️ Leve tendência Under 2.5';
  } else {
    veredito='neutro'; cor='var(--t3)'; prec=null;
    label='⚪ Sem sinal claro — V3 ' + V3.toFixed(2);
  }

  const isOver  = veredito.startsWith('over');
  const isUnder = veredito.startsWith('under');
  const o25_prob = V3 >= 5.0 ? 87 : V3 >= 4.0 ? 77 : V3 >= 3.5 ? 65
    : V3 >= 3.0 ? 54 : V3 >= 2.5 ? 46 : 44;

  return {
    V3: Math.round(V3*100)/100, DC: Math.round(DC*100)/100,
    TOT: Math.round(TOT*100)/100, O25: Math.round(O25*100)/100,
    OS, US, veredito, cor, prec, label, isOver, isUnder,
    sig_over, sig_under, o25_prob,
    estimativa: Math.round(V3*2)/2,
    gf_c, gs_c, gf_f, gs_f, tot_c, tot_f,
    temDados: temDadosCasa && temDadosFora,
  };
}

// ── SINAL AO VIVO — calcula projeção de gols com dados do jogo ────────────
// j = jogo com placarCasa, placarFora, minuto
// statsVivo = { xgCasa, xgFora, chutesAlvoCasa, chutesAlvoFora } do monitor-minutos
function calcSinalVivo(j, statsVivo, v3Pre) {
  const min = parseInt(j.minuto) || 1;
  const golsAtuais = (j.placarCasa || 0) + (j.placarFora || 0);
  const minRestante = Math.max(0, 90 - min);

  // Ritmo atual: gols/minuto
  const ritmoAtual = golsAtuais / Math.max(min, 1);
  // Projeção linear: gols atuais + ritmo × minutos restantes
  const projecaoLinear = golsAtuais + ritmoAtual * minRestante;

  // xG se disponível — mais preciso
  const xgC = statsVivo?.xgCasa ?? 0;
  const xgF = statsVivo?.xgFora ?? 0;
  const xgTotal = xgC + xgF;
  let projecaoXg = null;
  if (xgTotal > 0) {
    // xG por minuto → projetar até 90'
    const xgPorMin = xgTotal / Math.max(min, 1);
    projecaoXg = xgTotal + xgPorMin * minRestante;
    // Blend conservador: 50% xG projetado + 50% gols reais projetados
    // (xG superestima frequentemente no 2T)
    projecaoXg = projecaoXg * 0.50 + projecaoLinear * 0.50;
  }

  // Projeção final
  const projecaoFinal = projecaoXg ?? projecaoLinear;

  // HT predictor (já existe no código original)
  const htData = BASE_HT_PREDICTOR[Math.min(golsAtuais, 4)] || BASE_HT_PREDICTOR[0];

  // Blende: 60% HT predictor (mais calibrado) + 40% projeção por ritmo
  const projecaoBlend = htData.mediaFT * 0.60 + projecaoFinal * 0.40;

  // Sinal de intensidade do jogo
  const alvosTotal = (statsVivo?.chutesAlvoCasa || 0) + (statsVivo?.chutesAlvoFora || 0);
  const alvosEsperados = min * (4.5 / 90); // ~4.5 alvos por jogo
  const intensidade = alvosTotal > alvosEsperados * 1.4 ? 'alta'
    : alvosTotal < alvosEsperados * 0.6 ? 'baixa' : 'normal';

  // Veredito ao vivo
  let vivoLabel, vivoCor, vivoClasse;
  if (projecaoBlend >= 3.0) {
    vivoLabel = `Ritmo projeta ${projecaoBlend.toFixed(1)} gols — OVER 2.5`;
    vivoCor = 'var(--red)'; vivoClasse = 'alto';
  } else if (projecaoBlend <= 1.5 && min >= 20) {
    vivoLabel = `Ritmo muito baixo — projeta ${projecaoBlend.toFixed(1)} gols`;
    vivoCor = 'var(--grn)'; vivoClasse = 'baixo';
  } else {
    vivoLabel = `Projeção: ${projecaoBlend.toFixed(1)} gols no FT`;
    vivoCor = 'var(--acc)'; vivoClasse = 'medio';
  }

  // Pace bar: % do ritmo esperado (referência = 2.6 gols/90 → 0.029/min)
  const ritmoPct = Math.min(100, (ritmoAtual / 0.029) * 100);

  return {
    golsAtuais, min, minRestante, ritmoAtual,
    projecaoFinal: Math.round(projecaoFinal*10)/10,
    projecaoBlend: Math.round(projecaoBlend*10)/10,
    xgTotal: Math.round(xgTotal*100)/100,
    htOver25: htData.over25,
    htMediaFT: htData.mediaFT,
    intensidade, vivoLabel, vivoCor, vivoClasse, ritmoPct,
    alvosTotal,
  };
}

const _vivoStatsCache = {}; // { fixtureId: statsVivo }

async function buscarStatsVivo(fixtureId) {
  if (_vivoStatsCache[fixtureId]) return _vivoStatsCache[fixtureId];
  try {
    // Buscar último registro do monitor-minutos para esse jogo
    const snap = await db.collection('monitor-minutos')
      .where('fixtureId', '==', Number(fixtureId))
      .orderBy('minuto', 'desc')
      .limit(1).get();
    if (snap.empty) return null;
    const d = snap.docs[0].data();
    const stats = {
      xgCasa: d.xgCasa ?? 0, xgFora: d.xgFora ?? 0,
      chutesAlvoCasa: d.alvoCasa ?? 0, chutesAlvoFora: d.alvoFora ?? 0,
      chutesCasa: d.chutesCasa ?? 0, chutesFora: d.chutesFora ?? 0,
      posseCasa: d.posseCasa ?? 50,
    };
    _vivoStatsCache[fixtureId] = stats;
    return stats;
  } catch(e) {
    console.warn('[StatsVivo]', e.message);
    return null;
  }
}

function getBaseLiga(ligaNome, ligaApiId) {
  // Prioridade 1: API ID (inequívoco — "Serie A" vira o certo)
  if (ligaApiId && LIGA_API_ID_MAP[ligaApiId]) {
    const nome = LIGA_API_ID_MAP[ligaApiId];
    return { gols: BASE_GOLS_LIGA[nome] || BASE_GOLS_LIGA['DEFAULT'],
             result: BASE_RESULT_LIGA[nome] || BASE_RESULT_LIGA['DEFAULT'] };
  }
  if (!ligaNome) return { gols: BASE_GOLS_LIGA['DEFAULT'], result: BASE_RESULT_LIGA['DEFAULT'] };
  // Prioridade 2: Match exato
  if (BASE_GOLS_LIGA[ligaNome]) return { gols: BASE_GOLS_LIGA[ligaNome], result: BASE_RESULT_LIGA[ligaNome] || BASE_RESULT_LIGA['DEFAULT'] };
  // Prioridade 3: Match parcial (evitar Serie A italiana matchando Brasileirão)
  const chaves = Object.keys(BASE_GOLS_LIGA).filter(k => k !== 'DEFAULT');
  for (const k of chaves) {
    if (k !== 'Serie A' && (ligaNome.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(ligaNome.toLowerCase()))) {
      return { gols: BASE_GOLS_LIGA[k], result: BASE_RESULT_LIGA[k] || BASE_RESULT_LIGA['DEFAULT'] };
    }
  }
  return { gols: BASE_GOLS_LIGA['DEFAULT'], result: BASE_RESULT_LIGA['DEFAULT'] };
}

// Helper: retorna trimestre (1-4) de uma data ISO
function getTrimestre(dataISO) {
  if (!dataISO) return null;
  try { const m = new Date(dataISO).getMonth() + 1; return Math.ceil(m / 3); }
  catch(e) { return null; }
}

// Helper: retorna mês de uma data ISO
function getMesData(dataISO) {
  if (!dataISO) return null;
  try { return new Date(dataISO).getMonth() + 1; }

}

// ── AUTH ──────────────────────────────────────────────────────────────────

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  gc('dateDisplay').textContent = formatarData(DATA_ATUAL);
  await carregarJogos();
}

function gc(id) { return document.getElementById(id); }

function formatarData(iso) {
  const d = new Date(iso + 'T12:00:00');
  const hoje  = toBRTDate(new Date());
  const amanha = toBRTDate(new Date(Date.now() + 86400000));
  const ontem  = toBRTDate(new Date(Date.now() - 86400000));
  const label = iso === hoje ? ' (Hoje)' : iso === amanha ? ' (Amanhã)' : iso === ontem ? ' (Ontem)' : '';
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'}) + label;
}

function mudarData(d) {
  const dt = new Date(DATA_ATUAL + 'T12:00:00');
  dt.setDate(dt.getDate() + d);
  DATA_ATUAL = toBRTDate(dt);
  gc('dateDisplay').textContent = formatarData(DATA_ATUAL);
  JOGOS = []; PREVISOES = {};
  carregarJogos();
}

// ── CARREGAR JOGOS DO DIA ─────────────────────────────────────────────────
let _livePollingInterval = null;
let _snapshotUnsub = null;

async function carregarJogos() {
  setStatus('Carregando jogos...');

  // Cancelar snapshot anterior se existir
  if (_snapshotUnsub) { _snapshotUnsub(); _snapshotUnsub = null; }
  if (_livePollingInterval) { clearInterval(_livePollingInterval); _livePollingInterval = null; }

  try {
    // Buscar só no intervalo ±3 dias da data selecionada
    // Evita que limit(300) corte jogos futuros quando há muitos históricos
    const dtAlvo   = new Date(DATA_ATUAL + 'T12:00:00');
    const dtInicio = new Date(dtAlvo); dtInicio.setDate(dtInicio.getDate() - 3);
    const dtFim    = new Date(dtAlvo); dtFim.setDate(dtFim.getDate() + 3);

    const snap = await db.collection('jogos-admin')
      .orderBy('dataInicio', 'asc')
      .startAt(firebase.firestore.Timestamp.fromDate(dtInicio))
      .endAt(firebase.firestore.Timestamp.fromDate(dtFim))
      .limit(200)
      .get();

    const todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    JOGOS = todos.filter(j => {
      if (!j.dataInicio) return false;
      const dt = j.dataInicio.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio);
      // Sempre usar horário de Brasília — sem fallbacks
      return toBRTDate(dt) === DATA_ATUAL;
    });

    // Popular filtro de ligas
    const ligas = [...new Set(JOGOS.map(j => j.liga?.nome).filter(Boolean))].sort();
    const sel = gc('filtroLiga');
    sel.innerHTML = '<option value="">Todas as ligas (' + JOGOS.length + ')</option>';
    ligas.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);

    setStatus('');
    gc('resumoBar').style.display = JOGOS.length ? 'flex' : 'none';
    const restored = restaurarPrevisoes();
    renderCards();
    if (restored > 0) setStatus(`✓ ${restored} previsões restauradas`, false);

    if (JOGOS.length === 0) {
      gc('jogosGrid').innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>Nenhum jogo encontrado para esta data</p></div>';
    }

    // Iniciar polling de placar para jogos ao vivo ou de hoje
    _iniciarLivePolling();

  } catch(e) {
    setStatus('Erro: ' + e.message, true);
  }
}

function _iniciarLivePolling() {
  // Polling a cada 45 segundos — atualiza só placar/minuto/status dos cards
  _livePollingInterval = setInterval(async () => {
    const temAoVivo = JOGOS.some(j => j.status === 'ao_vivo');
    const temHoje   = DATA_ATUAL === toBRTDate(new Date());
    if (!temAoVivo && !temHoje) return; // nada ao vivo e não é hoje — parar

    try {
      const ids = JOGOS.map(j => j.id);
      if (!ids.length) return;

      // Buscar em lotes de 10 (limite do Firestore)
      const lotes = [];
      for (let i = 0; i < ids.length; i += 10) lotes.push(ids.slice(i, i+10));

      let atualizado = false;
      for (const lote of lotes) {
        const snap = await db.collection('jogos-admin')
          .where(firebase.firestore.FieldPath.documentId(), 'in', lote)
          .get();

        snap.docs.forEach(d => {
          const novo = d.data();
          const idx = JOGOS.findIndex(j => j.id === d.id);
          if (idx === -1) return;
          const atual = JOGOS[idx];

          // Só atualizar se mudou algo relevante
          const mudou = novo.placarCasa !== atual.placarCasa
            || novo.placarFora !== atual.placarFora
            || novo.minuto !== atual.minuto
            || novo.status !== atual.status;

          if (mudou) {
            JOGOS[idx] = { ...atual, ...novo };
            atualizado = true;

            // Limpar cache de stats vivo para forçar re-busca
            const fid = d.id;
            delete _vivoStatsCache[fid];

            // Re-render só o card deste jogo preservando a previsão
            const cardEl = document.getElementById('card-' + d.id);
            if (cardEl) cardEl.outerHTML = renderCard(JOGOS[idx], PREVISOES[d.id]);
          }
        });
      }

      if (atualizado) atualizarResumo();

    } catch(e) {
      console.warn('Live polling erro:', e.message);
    }
  }, 30000); // 30 segundos (era 45, reduzido para jogos ao vivo)
}

// ── RESTAURAR PREVISÕES DO SESSION STORAGE ───────────────────────────────
function restaurarPrevisoes() {
  let restaurados = 0;
  JOGOS.forEach(j => {
    if (PREVISOES[j.id]) return; // já tem
    try {
      const cached = sessionStorage.getItem('prev_' + j.id);
      if (cached) {
        PREVISOES[j.id] = JSON.parse(cached);
        restaurados++;
      }
    } catch(e) {}
  });
  if (restaurados > 0) {
    console.log(`✓ ${restaurados} previsões restauradas do cache`);
    atualizarResumo();
  }
  return restaurados;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────
function renderCards() {
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;

  if (!jogos.length) {
    gc('jogosGrid').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum jogo para este filtro</p></div>';
    return;
  }

  // Agrupar por liga
  const grupos = {};
  jogos.forEach(j => {
    const liga = j.liga?.nome || 'Sem liga';
    if (!grupos[liga]) grupos[liga] = [];
    grupos[liga].push(j);
  });

  let html = '';
  Object.entries(grupos).forEach(([liga, gs]) => {
    gs.forEach(j => {
      const prev = PREVISOES[j.id] || null;
      html += renderCard(j, prev);
    });
  });

  gc('jogosGrid').innerHTML = html;
  atualizarResumo();
}

function renderCard(j, prev) {
  const dt = j.dataInicio?.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio || 0);
  const hora = dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', timeZone:'America/Sao_Paulo'});
  const dataBRT = toBRTDate(dt);
  const statusLabel = j.status === 'ao_vivo' ? 'AO VIVO' : j.status === 'encerrado' ? `FT · ${dataBRT}` : hora;
  const statusBadge = j.status === 'ao_vivo' ? 'ao_vivo' : j.status === 'encerrado' ? 'encerrado' : 'agendado';

  const formaC = renderForma(prev?.formaC || j.formaCasa || j.timeCasa?.forma);
  const formaF = renderForma(prev?.formaF || j.formaFora  || j.timeFora?.forma);
  const escC = j.timeCasa?.escudo || '';
  const escF = j.timeFora?.escudo || '';

  let placar = 'vs';
  if (j.placarCasa !== null && j.placarCasa !== undefined &&
      j.placarFora !== null && j.placarFora !== undefined) {
    placar = j.placarCasa + ' - ' + j.placarFora;
  }

  return `<div class="jogo-card ${prev ? 'analisado' : ''}" id="card-${j.id}">
    <div class="card-header">
      <span style="font-size:14px">${j.liga?.escudo || '🏆'}</span>
      <span class="card-liga">${j.liga?.nome || 'Liga'}</span>
      <span class="card-status-badge badge-${statusBadge}">${statusLabel}</span>
      <span class="card-hora">${j.rodada || ''}</span>
    </div>
    <div class="card-body">
      <div class="times-row">
        <div class="time-info">
          <img src="${escC}" class="time-escudo" onerror="this.style.display='none'">
          <div class="time-nome">${j.timeCasa?.nome || '—'}</div>
          <div class="time-forma">${formaC}</div>
        </div>
        <div class="vs-area">
          <div class="vs-placar">${placar}</div>
          <div class="vs-label">${j.status === 'ao_vivo' 
            ? `<span style="color:#ef4444">${j.minuto || ''}' 🔴</span>` 
            : ''}</div>
        </div>
        <div class="time-info fora">
          <img src="${escF}" class="time-escudo" onerror="this.style.display='none'">
          <div class="time-nome">${j.timeFora?.nome || '—'}</div>
          <div class="time-forma">${formaF}</div>
        </div>
      </div>
      ${renderPrevisaoArea(j, prev)}
    </div>
  </div>`;
}

function renderForma(forma) {
  if (!forma || !Array.isArray(forma)) return '';
  return forma.slice(-5).map(r => `<div class="forma-dot forma-${r}">${r}</div>`).join('');
}

// ── RENDER V3 SEMÁFORO PRÉ-JOGO ──────────────────────────────────────────
function renderV3Semaforo(v3, jId) {
  if (!v3) return '';
  const isNeutro = v3.veredito === 'neutro';
  // Não mostrar se realmente sem dados (todos fallback)
  if (isNeutro && !v3.temDados) return '';

  const cls  = v3.isOver ? 'over' : v3.isUnder ? 'under' : 'neutro';
  const dotCls = cls;
  const precTxt = v3.prec ? `${v3.prec}% histórico` : (v3.temDados ? `V3 ${v3.V3}` : '');
  const sigLabels = [
    'DC ≥ 3.0','Ataque duplo','Defesa fraca','Over25 hist ≥ 55%','Tot ≥ 2.8','YS ≥ 12','Est ≥ 3.0'
  ];
  const sigLabelsU = [
    'DC ≤ 1.8','Ataque fraco','Defesas sólidas','Over25 ≤ 40%','Tot ≤ 1.8','Est ≤ 2.0'
  ];
  const useSigs   = v3.isUnder ? v3.sig_under : v3.sig_over;
  const useLabels = v3.isUnder ? sigLabelsU : sigLabels;
  const scoreStr  = v3.isOver ? `OS ${v3.OS}/7` : v3.isUnder ? `US ${v3.US}/6` : `OS ${v3.OS} · US ${v3.US}`;

  return `
  <div class="v3-semaforo" id="v3sem-${jId}" style="margin-top:10px">
    <div class="v3-header ${cls}" onclick="toggleV3Detail('${jId}')">
      <div class="v3-dot ${dotCls}"></div>
      <span class="v3-label">${v3.label}</span>

// ── CACHE LOCAL de perfis (evita re-buscar o mesmo time) ─────────────────
const _perfilCache = {};

// Busca perfil real do time no fixtures-historico
// Retorna: { elo, eloNota, mom5, mom10, s5, s10, s70, porForca, statsCasa, statsFora }
async function buscarPerfilTime(apiId) {
  if (!apiId) return null;
  if (_perfilCache[apiId]) return _perfilCache[apiId];

  try {
    console.log('[PerfilTime] buscando apiId:', apiId, '(type:', typeof apiId, ')');
    // Busca todos os jogos do time (casa ou fora)
    // Tenta com number (como está salvo no fixtures-historico)
    // Se não achar, tenta com string (compatibilidade)
    const idNum = Number(apiId);
    const [snapCasa, snapFora] = await Promise.all([
      db.collection('fixtures-historico')
        .where('casaId', '==', idNum).limit(80).get(),
      db.collection('fixtures-historico')
        .where('foraId', '==', idNum).limit(80).get(),
    ]);
    // Fallback string se vazio
    let jogosCasaRaw = snapCasa.docs;
    let jogosForaRaw = snapFora.docs;
    if (!jogosCasaRaw.length && !jogosForaRaw.length) {
      const [s2, s3] = await Promise.all([
        db.collection('fixtures-historico').where('casaId','==',String(apiId)).limit(80).get(),
        db.collection('fixtures-historico').where('foraId','==',String(apiId)).limit(80).get(),
      ]);
      jogosCasaRaw = s2.docs;
      jogosForaRaw = s3.docs;
    }

    const jogosCasa = jogosCasaRaw.map(d => ({ ...d.data(), _local: 'casa' }));
    const jogosFora = jogosForaRaw.map(d => ({ ...d.data(), _local: 'fora' }));

    // Mesclar e ordenar por data desc
    const todos = [...jogosCasa, ...jogosFora]
      .sort((a, b) => (b.data||'').localeCompare(a.data||''));

    if (!todos.length) return null;

    // Calcular métricas por janela
    const calcStats = (jogos) => {
      const n = jogos.length;
      if (!n) return null;
      const vit = jogos.filter(j => j.resultado === (j._local==='casa'?'casa':'fora')).length;
      const emp = jogos.filter(j => j.resultado === 'empate').length;
      const gf  = jogos.reduce((a,j) => a + (j._local==='casa' ? (j.golsCasa||0) : (j.golsFora||0)), 0) / n;
      const gs  = jogos.reduce((a,j) => a + (j._local==='casa' ? (j.golsFora||0) : (j.golsCasa||0)), 0) / n;
      const tot = jogos.reduce((a,j) => a + (j.totalGols||0), 0) / n;
      const pts = (vit*3 + emp) / n;
      const over25Rate = jogos.filter(j => (j.totalGols||0) > 2.5).length / n;
      return { n, gf:+gf.toFixed(2), gs:+gs.toFixed(2), tot:+tot.toFixed(2),
               gf_media:+gf.toFixed(2), gs_media:+gs.toFixed(2), tot_media:+tot.toFixed(2),
               pts:+pts.toFixed(2), vit, emp, der:n-vit-emp,
               over25: +over25Rate.toFixed(3) };
    };

    const s5  = calcStats(todos.slice(0, 5));
    const s10 = calcStats(todos.slice(0, 10));
    const s20 = calcStats(todos.slice(0, 20));
    const s70 = calcStats(todos);

    // Força simples (0-10) por janela
    const forca = (s) => {
      if (!s) return 0;
      return Math.round(Math.min(10, (s.pts/3)*5 + Math.min(s.gf/2,2) + Math.max(0,1.5-s.gs/2)) * 10) / 10;
    };
    const forca5  = forca(s5);
    const forca10 = forca(s10);
    const mom5    = s5 && s10 ? +(forca5 - forca10).toFixed(1) : 0;
    const mom10   = s10 && forca(s20) ? +(forca10 - forca(s20)).toFixed(1) : 0;

    // Stats separados: casa e fora
    const jCasa = todos.filter(j => j._local === 'casa').slice(0, 20);
    const jFora = todos.filter(j => j._local === 'fora').slice(0, 20);
    const statsCasa = calcStats(jCasa);
    const statsFora = calcStats(jFora);

    // Padrão por força do adversário
    // (usa forca5 do adversário como proxy — simplificado)
    const porForca = { fraco:null, medio:null, similar:null, forte:null };

    const perfil = {
      apiId, n: todos.length,
      s5, s10, s20, s70,
      forca5, forca10, mom5, mom10,
      statsCasa, statsFora,
      tendencia: mom5 >= 0.8 ? 'subindo' : mom5 <= -0.8 ? 'caindo' : 'estavel',
      tendGolsTag: s5?.tot >= 3 ? 'alta' : s5?.tot <= 1.8 ? 'baixa' : 'media',
      // Para calcularGols
      ataqueCasa: statsCasa?.gf ?? s5?.gf ?? 1.3,
      defesaCasa: statsCasa?.gs ?? s5?.gs ?? 1.3,
      ataqueFora: statsFora?.gf ?? s5?.gf ?? 1.3,
      defesaFora: statsFora?.gs ?? s5?.gs ?? 1.3,
      mediaGols5: s5?.tot ?? 2.5,
      nCasa: jCasa.length,
      nFora: jFora.length,
    };

    _perfilCache[apiId] = perfil;
    console.log('[PerfilTime] OK:', apiId, '→', perfil.n, 'jogos, forca5:', perfil.forca5, 'mom5:', perfil.mom5);
    return perfil;
  } catch(e) {
    console.warn('[PerfilTime] ERRO apiId:', apiId, e.message);
    return null;
  }
}

// Wrapper com timeout — garante que nenhuma fonte trava a análise
function comTimeout(promise, ms, fallback = null) {
  return Promise.race([
    promise.catch(() => fallback),
    new Promise(res => setTimeout(() => res(fallback), ms))
  ]);
}

async function analisarJogo(j) {
  const casaId = j.timeCasa?.apiId || j.timeCasa?.id;
  const foraId = j.timeFora?.apiId || j.timeFora?.id;
  if (!casaId || !foraId) {
    return { resultado: base5050(), gols: golsDefault(), confianca: 'insuficiente', explicacoes: ['IDs de time não encontrados'], fontes: [] };
  }

  const fixtureId = j.apiFootballId || j.apiFixtureId || j.id;

  // Tudo em paralelo com timeout individual — análise nunca trava
  const [histCasa, histFora, ctxCasa, ctxFora, ctxGlobal, perfilCasaRes, perfilForaRes, oddsRes] = await Promise.allSettled([
    comTimeout(fns.httpsCallable('buscarHistoricoTime')({ teamId: casaId, limit: 30 }).then(r => r.data), 6000),
    comTimeout(fns.httpsCallable('buscarHistoricoTime')({ teamId: foraId, limit: 30 }).then(r => r.data), 6000),
    comTimeout(fns.httpsCallable('buscarContextoGol')({ timeId: String(casaId), situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'casa', forcaAdversario: 'medio' }).then(r => r.data), 5000),
    comTimeout(fns.httpsCallable('buscarContextoGol')({ timeId: String(foraId), situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'fora', forcaAdversario: 'medio' }).then(r => r.data), 5000),
    comTimeout(fns.httpsCallable('buscarContextoGlobal')({ situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'casa', forcaAdversario: 'medio' }).then(r => r.data), 5000),
    comTimeout(buscarPerfilTime(casaId), 4000),
    comTimeout(buscarPerfilTime(foraId), 4000),
    comTimeout(buscarOddsPreJogo(fixtureId), 4000),
  ]);

  const hC = histCasa.status === 'fulfilled' ? histCasa.value : null;
  const hF = histFora.status === 'fulfilled'  ? histFora.value  : null;
  const cC = ctxCasa.status === 'fulfilled'   ? ctxCasa.value   : null;
  const cF = ctxFora.status === 'fulfilled'   ? ctxFora.value   : null;
  const cG = ctxGlobal.status === 'fulfilled' ? ctxGlobal.value : null;
  const perfilCasa = perfilCasaRes.status === 'fulfilled' ? perfilCasaRes.value : null;
  const perfilFora = perfilForaRes.status === 'fulfilled' ? perfilForaRes.value : null;
  const oddsData   = oddsRes.status === 'fulfilled' ? oddsRes.value : null;
  // Calcular variáveis derivadas das odds (sinal tático)
  const oddsDerivadas = oddsData ? calcOddsDerivadas(oddsData.oddCasa, oddsData.oddEmp, oddsData.oddFora) : null;

  const prev = calcularPrevisao(j, hC, hF, cC, cF, cG, perfilCasa, perfilFora);
  // v2: injetar dados de odds no resultado para uso no card e no salvarPrevisao
  if (oddsData)   prev._odds = oddsData;
  if (oddsDerivadas) prev._oddsDerivadas = oddsDerivadas;

  // ── V3: calcular sinal de gols pré-jogo ──────────────────────────────────
  if (perfilCasa && perfilFora) {
    const v3 = calcularGolsV3(
      perfilCasa, perfilFora,
      j.liga?.nome || '',
      parseFloat(prev.gols?.estimado || 2.5),
      prev.ysC ?? 5, prev.ysF ?? 5
    );
    if (v3) prev._v3 = v3;
  }

  // ── V3 AO VIVO: buscar stats do monitor-minutos se jogo em andamento ──────
  if (j.status === 'ao_vivo') {
    const fid = j.apiFootballId || j.apiFixtureId || j.id;
    const statsVivo = await comTimeout(buscarStatsVivo(fid), 3000, null);
    if (statsVivo) prev._statsVivo = statsVivo;
  }

  return prev;
}

// ── BUSCAR ODDS PRÉ-JOGO (API-Football) ──────────────────────────────────
// Endpoint correto: GET /odds?fixture={id}  (sem filtro de bookmaker)
// Retorna todas as casas — prioriza Bet365 (id=8), fallback para qualquer uma
async function buscarOddsPreJogo(fixtureId) {
  if (!fixtureId || !API_FOOTBALL_KEY) return null;
  const fid = Number(fixtureId);
  if (!fid) return null;
  if (ODDS_CACHE[fid]) return ODDS_CACHE[fid];

  try {
    // Sem &bookmaker= para maximizar cobertura de ligas
    const res = await fetch(`https://v3.football.api-sports.io/odds?fixture=${fid}`, {
      headers: { 'x-apisports-key': API_FOOTBALL_KEY }
    });
    if (!res.ok) { console.warn('[Odds] HTTP', res.status, 'fixture', fid); return null; }
    const data = await res.json();

    if (!data?.response?.length) {
      console.log('[Odds] Sem odds fixture', fid, '— encerrado ou fora do mapeamento');
      return null;
    }

    const bookmakers = data.response[0]?.bookmakers || [];
    if (!bookmakers.length) return null;

    // Preferência: Bet365=8, Unibet=6, Bwin=4, 1xBet=3, Primeira disponível
    const BK_PREF = [8, 6, 4, 3];
    const bk = BK_PREF.reduce((found, id) => found || bookmakers.find(b => b.id === id), null)
             || bookmakers[0];

    const bets = bk?.bets || [];
    // Nomes possíveis do mercado 1x2
    const h2h = bets.find(b =>
      b.name === 'Match Winner' || b.name === '3Way Result' ||
      b.name === 'Home/Draw/Away' || b.name === '1X2'
    );
    if (!h2h?.values?.length) return null;

    const home = parseFloat(h2h.values.find(v => v.value === 'Home')?.odd);
    const draw = parseFloat(h2h.values.find(v => v.value === 'Draw')?.odd);
    const away = parseFloat(h2h.values.find(v => v.value === 'Away')?.odd);
    if (!home || !draw || !away || home < 1 || draw < 1 || away < 1) return null;

    const result = { oddCasa: home, oddEmp: draw, oddFora: away,
      bookmaker: bk.name, bookmakerId: bk.id, fixtureId: fid, fonte: 'api-football' };
    ODDS_CACHE[fid] = result;
    console.log('[Odds] OK fixture', fid, bk.name, '→', home, draw, away);
    return result;

  } catch(e) {
    console.warn('[Odds] Erro fixture', fid, ':', e.message);
    return null;
  }
}
