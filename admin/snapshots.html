<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapshots Raio-X — Yellup</title>
<style>
:root {
  --bg: #0d1117;
  --s1: #161b22; --s2: #1c2128; --s3: #21262d;
  --b1: #30363d; --b2: #444c56;
  --tx1: #f0f6fc; --tx2: #c9d1d9; --tx3: #8b949e;
  --cy: #00d4ff; --gn: #3fb950; --rd: #f85149; --yl: #d29922; --or: #ff8a4c;
  --fM: 'SF Mono', Menlo, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--tx1); padding: 16px; font-size: 13px; }
h1 { font-size: 18px; color: var(--cy); margin-bottom: 4px; }
.sub { color: var(--tx3); font-size: 11px; margin-bottom: 16px; font-family: var(--fM); }

.toolbar {
  background: var(--s1); border: 1px solid var(--b1); border-radius: 6px;
  padding: 12px; margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center;
}
button {
  background: var(--s3); color: var(--tx1); border: 1px solid var(--b1);
  padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 11px;
  font-family: var(--fM); font-weight: 600;
}
button:hover { background: var(--b2); }
button.primary { background: var(--cy); color: #000; border-color: var(--cy); }
button.danger { background: transparent; color: var(--rd); border-color: var(--rd); }
button.success { background: var(--gn); color: #000; border-color: var(--gn); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.stat-pill {
  background: var(--s3); border-radius: 4px; padding: 4px 10px; font-family: var(--fM);
  font-size: 11px; color: var(--tx2);
}
.stat-pill strong { color: var(--cy); }

.snap-list { display: flex; flex-direction: column; gap: 8px; }
.snap-card {
  background: var(--s1); border: 1px solid var(--b1); border-radius: 6px;
  padding: 12px; transition: border-color 0.15s;
}
.snap-card.completo { border-left: 3px solid var(--gn); }
.snap-card.pendente { border-left: 3px solid var(--yl); }
.snap-card.expirado { border-left: 3px solid var(--rd); }
.snap-card:hover { border-color: var(--cy); }
.snap-hd { display: flex; justify-content: space-between; align-items: flex-start; }
.snap-titulo { font-size: 13px; font-weight: 700; color: var(--tx1); }
.snap-meta { font-size: 10px; color: var(--tx3); font-family: var(--fM); margin-top: 3px; }
.snap-status {
  font-size: 9px; padding: 3px 8px; border-radius: 3px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; font-family: var(--fM);
}
.snap-status.completo { background: rgba(63,185,80,.15); color: var(--gn); }
.snap-status.pendente { background: rgba(210,153,34,.15); color: var(--yl); }
.snap-status.expirado { background: rgba(248,81,73,.15); color: var(--rd); }
.snap-body {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--b1); font-size: 11px;
}
.snap-col-titulo { font-size: 9px; color: var(--tx3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.snap-num { font-family: var(--fM); color: var(--tx2); }
.snap-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--s1); border: 1px solid var(--b1); border-radius: 8px;
  padding: 20px; max-width: 600px; width: 92%; max-height: 90vh; overflow-y: auto;
}
.modal h2 { color: var(--cy); margin-bottom: 12px; font-size: 16px; }
.modal label { display: block; font-size: 11px; color: var(--tx3); margin-top: 10px; font-family: var(--fM); text-transform: uppercase; letter-spacing: .5px; }
.modal input, .modal textarea {
  width: 100%; background: var(--s3); border: 1px solid var(--b1); color: var(--tx1);
  padding: 8px; border-radius: 4px; font-family: var(--fM); font-size: 12px;
  margin-top: 4px;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }

.help {
  background: rgba(0,212,255,.05); border-left: 3px solid var(--cy);
  padding: 10px 14px; font-size: 11px; color: var(--tx2); margin-bottom: 16px;
  border-radius: 0 4px 4px 0; line-height: 1.5;
}

.empty {
  text-align: center; padding: 40px; color: var(--tx3); font-size: 12px;
  background: var(--s1); border-radius: 6px; border: 1px dashed var(--b1);
}

#statusBadge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--tx3); font-family: var(--fM);
  margin-left: auto;
}
#statusDot { width: 8px; height: 8px; border-radius: 50%; background: var(--yl); }

input[type="text"].minutos-input { letter-spacing: 1px; }
</style>
</head>
<body>

<h1>📋 Snapshots Raio-X</h1>
<div class="sub">Registre o estado pré-jogo, adicione o resultado depois, exporte pro Claude analisar.</div>

<div class="help">
  <strong>Fluxo:</strong> 1) No raio-x v13 você clica em "📌 REGISTRAR" antes do jogo. 2) Aqui você adiciona o placar + minutos dos gols depois. 3) Exporta tudo num JSON pra eu analisar e calibrar.
</div>

<div class="toolbar">
  <button class="primary" onclick="carregar()">🔄 Recarregar</button>
  <button class="primary" onclick="analiseLote()" style="background:var(--cy);color:#000">📊 Análise em lote (método João)</button>
  <button onclick="exportarTodos()" id="btnExp">📤 Exportar TODOS p/ Claude</button>
  <button onclick="exportarCompletos()" id="btnExpC">📤 Só completos</button>
  <button class="danger" onclick="limparExpirados()">🗑 Limpar expirados (&gt;7d sem resultado)</button>
  <div id="statusBadge"><span id="statusDot"></span><span id="statusTxt">aguardando</span></div>
</div>

<div id="stats" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"></div>
<div id="snapList" class="snap-list"></div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script>
const FB_CFG = {
  apiKey: "AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain: "painel-yellup.firebaseapp.com",
  projectId: "painel-yellup",
  storageBucket: "painel-yellup.appspot.com",
  messagingSenderId: "608347210297",
  appId: "1:608347210297:web:75092713724e617c7203e8"
};

let db, auth, fns;
let SNAPS = [];

function setStatus(txt, cor) {
  document.getElementById('statusTxt').textContent = txt;
  document.getElementById('statusDot').style.background = cor || 'var(--yl)';
}

async function init() {
  if (firebase.apps && firebase.apps.length > 0) {
    // já inicializado
  } else {
    firebase.initializeApp(FB_CFG);
  }
  db = firebase.firestore();
  auth = firebase.auth();
  fns = firebase.functions();
  setStatus('verificando login...', 'var(--yl)');
  let user = auth.currentUser;
  if (!user) {
    user = await new Promise((resolve) => {
      const unsub = auth.onAuthStateChanged(u => { unsub(); resolve(u); });
      setTimeout(() => resolve(auth.currentUser), 3000);
    });
  }
  if (!user) {
    setStatus('faça login no /admin/', 'var(--rd)');
    document.getElementById('snapList').innerHTML = '<div class="empty">⚠ Você precisa estar logado. Acesse /admin/ primeiro.</div>';
    return;
  }
  setStatus(`logado: ${user.email}`, 'var(--gn)');
  await carregar();
}

async function carregar() {
  setStatus('lendo snapshots...', 'var(--yl)');
  try {
    const snap = await db.collection('raiox-snapshots').orderBy('dataJogoTimestamp', 'desc').limit(200).get();
    SNAPS = [];
    snap.forEach(doc => SNAPS.push({ _id: doc.id, ...doc.data() }));

    // Complementar com localStorage (caso firestore tenha falhado em algum registro)
    const lsKeys = Object.keys(localStorage).filter(k => k.startsWith('yellup_snap_'));
    for (const k of lsKeys) {
      try {
        const lsSnap = JSON.parse(localStorage.getItem(k));
        if (!SNAPS.find(s => s._docId === lsSnap._docId)) {
          SNAPS.push({ _id: lsSnap._docId, ...lsSnap, _fromLS: true });
        }
      } catch(e) {}
    }

    SNAPS.sort((a,b) => (b.dataJogoTimestamp || 0) - (a.dataJogoTimestamp || 0));

    renderStats();
    renderLista();
    setStatus(`${SNAPS.length} snapshots`, 'var(--gn)');
  } catch (e) {
    console.error(e);
    setStatus('erro: ' + e.message, 'var(--rd)');
  }
}

function renderStats() {
  const total = SNAPS.length;
  const completos = SNAPS.filter(s => s.resultado).length;
  const pendentes = SNAPS.filter(s => !s.resultado && (Date.now() - (s.dataJogoTimestamp || 0)) < 7*86400000).length;
  const expirados = SNAPS.filter(s => !s.resultado && (Date.now() - (s.dataJogoTimestamp || 0)) >= 7*86400000).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-pill">Total: <strong>${total}</strong></div>
    <div class="stat-pill" style="color:var(--gn)">✓ Completos: <strong>${completos}</strong></div>
    <div class="stat-pill" style="color:var(--yl)">⏳ Pendentes: <strong>${pendentes}</strong></div>
    <div class="stat-pill" style="color:var(--rd)">⚠ Expirados: <strong>${expirados}</strong></div>
  `;
}

function fmtData(ts) {
  if (!ts) return '?';
  const d = new Date(ts);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function renderLista() {
  if (!SNAPS.length) {
    document.getElementById('snapList').innerHTML = '<div class="empty">Nenhum snapshot ainda. Vá no raio-x v13 e clique em "📌 REGISTRAR" durante um comparativo.</div>';
    return;
  }
  const html = SNAPS.map(s => {
    const completo = !!s.resultado;
    const idade = Date.now() - (s.dataJogoTimestamp || 0);
    const expirado = !completo && idade >= 7*86400000;
    const cls = completo ? 'completo' : (expirado ? 'expirado' : 'pendente');
    const tagTxt = completo ? '✓ COMPLETO' : (expirado ? 'EXPIRADO' : '⏳ AGUARDANDO RESULTADO');

    const fA = s.forteScore?.A, fB = s.forteScore?.B;
    const fA_origem = s.forteScore?.origemA;
    const fB_origem = s.forteScore?.origemB;
    const xgA = s.agg?.A?.xg, xgB = s.agg?.B?.xg;
    const gfA = s.agg?.A?.gfJ, gfB = s.agg?.B?.gfJ;
    const gcA = s.agg?.A?.gcJ, gcB = s.agg?.B?.gcJ;

    // v16 indicators
    const hasV16 = s.versaoRaiox?.includes('v16');
    const hasForteFull = s.forteFull?.A && s.forteFull?.B;
    const hasRefMin = s.referenciaMin?.A;
    const hasJanelas15 = Array.isArray(s.janelas15min);
    const hasTiers = s.forteTiers?.A;
    const nFixturesA = s.enrichedCompact?.A?.length || 0;
    const nFixturesB = s.enrichedCompact?.B?.length || 0;
    const removidosA = s.expurgo?.fixturesRemovidosA || 0;
    const removidosB = s.expurgo?.fixturesRemovidosB || 0;

    let resultadoHtml = '';
    if (completo) {
      const r = s.resultado;
      const minStr = (r.minutosGols || []).join(', ');
      resultadoHtml = `
        <div style="margin-top:10px;padding:8px;background:var(--s2);border-radius:4px">
          <div style="display:flex;gap:12px;align-items:baseline;flex-wrap:wrap">
            <div style="font-size:18px;font-weight:700;color:var(--gn);font-family:var(--fM)">${r.placarA}–${r.placarB}</div>
            <div style="font-size:11px;color:var(--tx2)">total <strong>${(r.placarA||0)+(r.placarB||0)}</strong> gols</div>
            ${r.minutosGols && r.minutosGols.length ? `<div style="font-size:10px;color:var(--tx3);font-family:var(--fM)">minutos: ${minStr}</div>` : ''}
          </div>
          ${r.observacoes ? `<div style="font-size:10px;color:var(--tx3);margin-top:4px;font-style:italic">"${r.observacoes}"</div>` : ''}
        </div>`;
    }

    return `
      <div class="snap-card ${cls}">
        <div class="snap-hd">
          <div>
            <div class="snap-titulo">${s.teamA?.nome || '?'} × ${s.teamB?.nome || '?'}</div>
            <div class="snap-meta">${fmtData(s.dataJogoTimestamp)} · ${s._fromLS ? 'localStorage' : 'firestore'} · ${s._docId}</div>
          </div>
          <span class="snap-status ${cls}">${tagTxt}</span>
        </div>
        <div class="snap-body">
          <div>
            <div class="snap-col-titulo">${s.teamA?.nome}</div>
            <div class="snap-num">Forte: <strong style="color:var(--cy)">${fA?.toFixed?.(2) ?? '?'}</strong>${fA_origem === 'nao_calculado' ? ' <span style="color:var(--rd);font-size:9px">⚠ não calc</span>' : ''}</div>
            <div class="snap-num">xG: ${xgA ?? '—'} · GF/j: ${gfA ?? '—'} · GC/j: ${gcA ?? '—'}</div>
          </div>
          <div>
            <div class="snap-col-titulo">${s.teamB?.nome}</div>
            <div class="snap-num">Forte: <strong style="color:var(--cy)">${fB?.toFixed?.(2) ?? '?'}</strong>${fB_origem === 'nao_calculado' ? ' <span style="color:var(--rd);font-size:9px">⚠ não calc</span>' : ''}</div>
            <div class="snap-num">xG: ${xgB ?? '—'} · GF/j: ${gfB ?? '—'} · GC/j: ${gcB ?? '—'}</div>
          </div>
        </div>
        <div style="margin-top:8px;padding:6px 8px;background:var(--s2);border-radius:4px;font-size:10px;color:var(--tx3);font-family:var(--fM);display:flex;gap:10px;flex-wrap:wrap">
          <span>📊 ${s.versaoRaiox || '?'}</span>
          <span>📁 ${nFixturesA}j A · ${nFixturesB}j B</span>
          ${(removidosA||removidosB)?`<span style="color:var(--yl)">✂ expurgou ${removidosA}A/${removidosB}B</span>`:''}
          <span style="color:${hasForteFull?'var(--gn)':'var(--rd)'}">${hasForteFull?'✓':'✗'} forteFull</span>
          <span style="color:${hasRefMin?'var(--gn)':'var(--rd)'}">${hasRefMin?'✓':'✗'} ref/min</span>
          <span style="color:${hasJanelas15?'var(--gn)':'var(--rd)'}">${hasJanelas15?'✓':'✗'} janelas15</span>
          <span style="color:${hasTiers?'var(--gn)':'var(--rd)'}">${hasTiers?'✓':'✗'} tiers</span>
        </div>
        ${resultadoHtml}
        ${completo ? renderAnalisePosJogo(s) : ''}
        <div class="snap-actions">
          <button class="primary" onclick="abrirRelatorio('${s._id}')" style="background:var(--cy);color:#000;font-weight:700">📄 Ver / Salvar PDF do raio-x</button>
          ${!completo
            ? `<button class="success" onclick="buscarResultadoAutomatico('${s._id}')">🔄 Buscar resultado automaticamente</button>`
            : ''}
          ${completo
            ? `<button onclick="abrirModal('${s._id}')">✎ Editar resultado</button>`
            : `<button onclick="abrirModal('${s._id}')">📝 Inserir resultado manual</button>`}
          <button onclick="inspecionar('${s._id}')">🔍 Inspecionar dados</button>
          <button onclick="exportarUm('${s._id}')">📤 Exportar este</button>
          <button class="danger" onclick="excluir('${s._id}')">🗑 Excluir</button>
        </div>
      </div>`;
  }).join('');
  document.getElementById('snapList').innerHTML = html;
}

function abrirModal(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return;
  const r = s.resultado || {};
  const html = `
    <div class="modal-bg" id="modalBg" onclick="if(event.target===this)fechar()">
      <div class="modal">
        <h2>${s.teamA?.nome} × ${s.teamB?.nome}</h2>
        <div style="color:var(--tx3);font-size:11px;font-family:var(--fM)">${fmtData(s.dataJogoTimestamp)}</div>

        <div class="row" style="margin-top:14px">
          <div>
            <label>Placar ${s.teamA?.nome}</label>
            <input type="number" id="placarA" value="${r.placarA ?? ''}" min="0" max="20">
          </div>
          <div>
            <label>Placar ${s.teamB?.nome}</label>
            <input type="number" id="placarB" value="${r.placarB ?? ''}" min="0" max="20">
          </div>
        </div>

        <label>Minutos dos gols (separados por vírgula — ex: 12, 34, 67, 89)</label>
        <input type="text" id="minutos" class="minutos-input" value="${(r.minutosGols||[]).join(', ')}" placeholder="12, 34, 67, 89">
        <div style="font-size:9px;color:var(--tx3);margin-top:3px;font-family:var(--fM)">use o número total: ex 45+2 = 47, 90+3 = 93</div>

        <label>Quem fez (opcional, mesma ordem dos minutos: A ou B, separados por vírgula)</label>
        <input type="text" id="autores" value="${(r.autores||[]).join(', ')}" placeholder="A, B, A, A">

        <label>Observações livres (lance bizarro? vermelho? gol no fim?)</label>
        <textarea id="obs" placeholder="ex: PSG estava com time misto, expulsão aos 23min, gol no 90+3...">${r.observacoes || ''}</textarea>

        <div class="modal-actions">
          <button onclick="fechar()">Cancelar</button>
          <button class="primary" onclick="salvar('${id}')">💾 Salvar resultado</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function fechar() {
  document.getElementById('modalBg')?.remove();
}

async function salvar(id) {
  const placarA = parseInt(document.getElementById('placarA').value);
  const placarB = parseInt(document.getElementById('placarB').value);
  const minStr = document.getElementById('minutos').value;
  const autStr = document.getElementById('autores').value;
  const obs = document.getElementById('obs').value;

  if (isNaN(placarA) || isNaN(placarB)) {
    alert('Informe placar válido');
    return;
  }

  const minutosGols = minStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n>=0 && n<=130);
  const autores = autStr.split(',').map(s => s.trim().toUpperCase()).filter(s => s === 'A' || s === 'B');

  const resultado = {
    placarA, placarB,
    totalGols: placarA + placarB,
    minutosGols,
    autores,
    observacoes: obs.trim(),
    registradoEm: Date.now()
  };

  const s = SNAPS.find(x => x._id === id);
  if (!s) return;

  try {
    await db.collection('raiox-snapshots').doc(s._docId || id).set({ resultado }, { merge: true });
    // Atualiza localStorage também
    const lsKey = `yellup_snap_${s._docId || id}`;
    const lsCopy = localStorage.getItem(lsKey);
    if (lsCopy) {
      try {
        const obj = JSON.parse(lsCopy);
        obj.resultado = resultado;
        localStorage.setItem(lsKey, JSON.stringify(obj));
      } catch(e) {}
    }
    fechar();
    await carregar();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

async function excluir(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return;
  if (!confirm(`Excluir snapshot ${s.teamA?.nome} × ${s.teamB?.nome}?`)) return;
  try {
    await db.collection('raiox-snapshots').doc(s._docId || id).delete();
    localStorage.removeItem(`yellup_snap_${s._docId || id}`);
    await carregar();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

function downloadJSON(name, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ───────────────────────────────────────────────────────────────────────
// v18: BUSCA AUTOMÁTICA DE RESULTADO via cloud function buscarDadosJogo
// ───────────────────────────────────────────────────────────────────────

async function buscarResultadoAutomatico(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return alert('Snapshot não encontrado');

  const idA = s.teamA?.apiId, idB = s.teamB?.apiId;
  if (!idA || !idB) return alert('Times do snapshot não têm apiId — não consigo buscar');

  setStatus(`Procurando jogo de ${s.teamA?.nome} × ${s.teamB?.nome} no banco...`, 'var(--cy)');

  try {
    // 1. ACHAR fixtureId via jogos-admin (matching times + data)
    // Janela: 7 dias pra trás e 3 dias pra frente a partir do snapshot
    const tsSnap = s.dataJogoTimestamp || s.capturedAt || Date.now();
    const tsMin = new Date(tsSnap - 7*86400000);
    const tsMax = new Date(tsSnap + 3*86400000);

    // Buscar jogos com mando A
    const q1 = db.collection('jogos-admin')
      .where('timeCasa.apiId', '==', idA)
      .where('timeFora.apiId', '==', idB)
      .where('dataInicio', '>=', tsMin)
      .where('dataInicio', '<=', tsMax);
    // E também inverso (caso A esteja como visitante na API)
    const q2 = db.collection('jogos-admin')
      .where('timeCasa.apiId', '==', idB)
      .where('timeFora.apiId', '==', idA)
      .where('dataInicio', '>=', tsMin)
      .where('dataInicio', '<=', tsMax);

    const [r1, r2] = await Promise.all([
      q1.get().catch(e => { console.warn('q1 falhou', e); return {docs:[]}; }),
      q2.get().catch(e => { console.warn('q2 falhou', e); return {docs:[]}; })
    ]);

    let docs = [...r1.docs, ...r2.docs];
    // Ordenar por proximidade ao timestamp do snapshot
    docs.sort((a,b) => {
      const ta = a.data().dataInicio?.toMillis?.() || 0;
      const tb = b.data().dataInicio?.toMillis?.() || 0;
      return Math.abs(ta - tsSnap) - Math.abs(tb - tsSnap);
    });

    let fixtureId = null, jogoAdmin = null, invertido = false;
    if (docs.length) {
      jogoAdmin = docs[0].data();
      fixtureId = jogoAdmin.apiFixtureId;
      invertido = String(jogoAdmin.timeCasa?.apiId) === String(idB);
    }

    if (!fixtureId) {
      // Fallback: pedir manualmente
      const f = prompt(`Jogo não encontrado em jogos-admin.\n\nCole o fixtureId manualmente (você pega na URL do jogo-live):`);
      if (!f) { setStatus('Cancelado', 'var(--rd)'); return; }
      fixtureId = parseInt(f);
      if (!fixtureId) { setStatus('FixtureId inválido', 'var(--rd)'); return; }
    }

    setStatus(`Buscando dados do fixture #${fixtureId}...`, 'var(--cy)');

    // 2. CHAMAR buscarDadosJogo
    const fn = fns.httpsCallable('buscarDadosJogo', { timeout: 30000 });
    const r = await Promise.race([
      fn({ fixtureId }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout 30s')), 30000))
    ]);
    if (!r?.data?.fixture) throw new Error('Dados inválidos da API');

    const fx = r.data.fixture;
    const evs = r.data.eventosJogo || r.data.eventos || [];
    const statusShort = fx.status?.short || fx.status;
    const finalizado = ['FT', 'AET', 'PEN'].includes(statusShort);
    if (!finalizado) {
      if (!confirm(`Jogo ainda não terminou (status: ${statusShort || '?'}). Salvar mesmo assim?`)) {
        setStatus('Cancelado', 'var(--rd)');
        return;
      }
    }

    const placarCasaApi = fx.placarFinal?.casa ?? fx.placar?.casa ?? 0;
    const placarForaApi = fx.placarFinal?.fora ?? fx.placar?.fora ?? 0;
    const idCasa = fx.timeCasa?.id, idFora = fx.timeFora?.id;

    let pA, pB, mapTime;
    if (String(idA) === String(idCasa)) {
      pA = placarCasaApi; pB = placarForaApi;
      mapTime = { [String(idCasa)]: 'A', [String(idFora)]: 'B' };
    } else if (String(idA) === String(idFora)) {
      pA = placarForaApi; pB = placarCasaApi;
      mapTime = { [String(idFora)]: 'A', [String(idCasa)]: 'B' };
    } else {
      if (!confirm(`Times não batem (snap A=${idA}, casa=${idCasa}). Aceitar ${placarCasaApi}-${placarForaApi}?`)) {
        setStatus('Cancelado', 'var(--rd)');
        return;
      }
      pA = placarCasaApi; pB = placarForaApi;
      mapTime = { [String(idCasa)]: 'A', [String(idFora)]: 'B' };
    }

    const golsDetalhe = [];
    evs.forEach(e => {
      const tipo = (e.tipo || e.type || '').toLowerCase();
      const detalhe = (e.detalhe || e.detail || '').toLowerCase();
      if (tipo === 'goal' || tipo === 'gol') {
        if (detalhe.includes('missed')) return;
        const tempo = String(e.tempo || e.time?.elapsed || 0);
        const parts = tempo.split('+');
        const min = parseInt(parts[0]) + (parts[1] ? parseInt(parts[1])||0 : 0);
        const idTime = String(e.time?.id || e.timeId || e.team?.id || '');
        let lado = mapTime[idTime];
        if (detalhe.includes('own')) lado = lado === 'A' ? 'B' : 'A';
        if (lado) golsDetalhe.push({ min, lado, jogador: e.jogador || e.player?.name || '?', tipo: detalhe || 'normal' });
      }
    });

    const pares = golsDetalhe.sort((a,b) => a.min - b.min);
    const minutosOrd = pares.map(p => p.min);
    const autoresOrd = pares.map(p => p.lado);

    const msg = `✓ Resultado encontrado (fixture #${fixtureId}):\n\n${s.teamA?.nome} ${pA}-${pB} ${s.teamB?.nome}\n\nGols:\n${pares.map(p => `  ${p.min}' (${p.lado === 'A' ? s.teamA?.nome : s.teamB?.nome}) — ${p.jogador}${p.tipo!=='normal' && p.tipo ? ` [${p.tipo}]` : ''}`).join('\n') || '  (nenhum gol detectado)'}\n\nSalvar?`;
    if (!confirm(msg)) { setStatus('Cancelado', 'var(--rd)'); return; }

    const resultado = {
      placarA: pA, placarB: pB,
      totalGols: pA + pB,
      minutosGols: minutosOrd,
      autores: autoresOrd,
      golsDetalhe: pares,
      fixtureId,
      observacoes: `Buscado automaticamente via API. Status: ${statusShort}`,
      registradoEm: Date.now(),
      fonteAutomatica: true
    };

    await db.collection('raiox-snapshots').doc(s._docId || id).set({ resultado }, { merge: true });
    setStatus('✓ Resultado salvo', 'var(--gn)');
    await carregar();
  } catch (e) {
    console.error(e);
    alert('Erro: ' + (e.message || e));
    setStatus('Erro: ' + e.message, 'var(--rd)');
  }
}

// ───────────────────────────────────────────────────────────────────────
// v18: ANÁLISE PÓS-JOGO — leitura automática do método João
// ───────────────────────────────────────────────────────────────────────

function metodoJoao(bA, bB) {
  if (!bA?.sc || !bB?.sc) return [];
  const LBL = ['0-5','6-10','11-15','16-20','21-25','26-30','31-35','36-40','41-45','AC1T',
               '46-50','51-55','56-60','61-65','66-70','71-75','76-80','81-85','86-90','AC2T'];
  const out = [];
  for (let i = 0; i < 20; i++) {
    if (i === 9 || i === 19) continue;
    const af = bA.sc[i]||0, at = bA.cn[i]||0, bf = bB.sc[i]||0, bt = bB.cn[i]||0;
    if (af < 1 || at < 1 || bf < 1 || bt < 1) continue;
    const acima = [af, at, bf, bt].filter(v => v >= 2).length;
    if (acima >= 3 || (af >= 3 && bt >= 3) || (bf >= 3 && at >= 3)) {
      out.push({ bucket: LBL[i], idx: i, af, at, bf, bt, razao: acima >= 3 ? 'principal' : 'casamento' });
    }
  }
  return out;
}

function getBucketIdx(m) {
  if (m <= 5) return 0; if (m <= 10) return 1; if (m <= 15) return 2; if (m <= 20) return 3;
  if (m <= 25) return 4; if (m <= 30) return 5; if (m <= 35) return 6; if (m <= 40) return 7;
  if (m <= 45) return 8; if (m <= 50) return 10; if (m <= 55) return 11; if (m <= 60) return 12;
  if (m <= 65) return 13; if (m <= 70) return 14; if (m <= 75) return 15; if (m <= 80) return 16;
  if (m <= 85) return 17; return 18;
}

function renderAnalisePosJogo(s) {
  if (!s.resultado || !s.bucketsA || !s.bucketsB) return '';
  const r = s.resultado;
  const total = (r.placarA || 0) + (r.placarB || 0);
  const qual = metodoJoao(s.bucketsA, s.bucketsB);
  const n = qual.length;
  const diff = n - total;
  let cor = 'var(--rd)', txt = '✗ errou';
  if (diff === 0) { cor = 'var(--gn)'; txt = '✓✓ exato'; }
  else if (Math.abs(diff) === 1) { cor = 'var(--yl)'; txt = '✓ ±1'; }

  const idxsQual = new Set(qual.map(q => q.idx));
  const golsBuckets = (r.minutosGols || []).map(m => ({ m, idx: getBucketIdx(m) }));
  const acertosJanela = golsBuckets.filter(g => idxsQual.has(g.idx)).length;
  const direcaoOk = (n >= 3) === (total >= 3);

  const LBL = ['0-5','6-10','11-15','16-20','21-25','26-30','31-35','36-40','41-45','AC1T',
               '46-50','51-55','56-60','61-65','66-70','71-75','76-80','81-85','86-90','AC2T'];

  return `
    <div style="margin-top:10px;padding:10px;background:rgba(0,212,255,.06);border-left:3px solid var(--cy);border-radius:4px">
      <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:700">📊 Análise pós-jogo · Método João</div>
      <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px;font-family:var(--fM)">
        <div>Previu: <strong style="color:var(--cy);font-size:14px">${n}</strong></div>
        <div>Real: <strong style="font-size:14px">${total}</strong></div>
        <div style="color:${cor};font-weight:700">${txt}</div>
        <div>Direção O/U 2.5: <span style="color:${direcaoOk?'var(--gn)':'var(--rd)'}">${direcaoOk ? '✓' : '✗'}</span></div>
        <div>Gols em janelas previstas: <strong>${acertosJanela}/${total}</strong></div>
      </div>
      ${qual.length ? `
      <div style="margin-top:8px;font-size:10px;color:var(--tx3);font-family:var(--fM)">
        Janelas previstas: ${qual.map(q => {
          const teveGol = golsBuckets.some(g => g.idx === q.idx);
          return `<span style="color:${teveGol?'var(--gn)':'var(--tx3)'};margin-right:8px">${teveGol?'✓':'○'} ${q.bucket}</span>`;
        }).join('')}
      </div>` : ''}
      ${golsBuckets.length ? `
      <div style="margin-top:6px;font-size:10px;color:var(--tx3);font-family:var(--fM)">
        Buckets dos gols: ${golsBuckets.map(g => {
          const previsto = idxsQual.has(g.idx);
          return `<span style="color:${previsto?'var(--gn)':'var(--yl)'};margin-right:8px">${g.m}' → ${LBL[g.idx]}${previsto?' ✓':''}</span>`;
        }).join('')}
      </div>` : ''}
    </div>`;
}

// ───────────────────────────────────────────────────────────────────────

function abrirRelatorio(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return alert('Snapshot não encontrado');

  const win = window.open('', '_blank');
  if (!win) return alert('Permita popup para abrir o relatório');

  const key = '_yellup_rel_' + Date.now();
  try {
    sessionStorage.setItem(key, JSON.stringify(s));
  } catch (e) {
    alert('Snapshot grande demais para renderizar.');
    win.close();
    return;
  }

  const html = buildRelatorioHTML(key);
  win.document.write(html);
  win.document.close();
}

  </div>

</div>
<script>
const SNAP_KEY = ${JSON.stringify(snapKey)};
const s = JSON.parse(sessionStorage.getItem(SNAP_KEY) || '{}');
sessionStorage.removeItem(SNAP_KEY);

const LBL = ['0-5','6-10','11-15','16-20','21-25','26-30','31-35','36-40','41-45','AC1T',
             '46-50','51-55','56-60','61-65','66-70','71-75','76-80','81-85','86-90','AC2T'];

function safe(v, def='—'){ return v==null||v===''||(typeof v==='number'&&isNaN(v))?def:v; }
function getBucketIdx(m){if(m<=5)return 0;if(m<=10)return 1;if(m<=15)return 2;if(m<=20)return 3;if(m<=25)return 4;if(m<=30)return 5;if(m<=35)return 6;if(m<=40)return 7;if(m<=45)return 8;if(m<=50)return 10;if(m<=55)return 11;if(m<=60)return 12;if(m<=65)return 13;if(m<=70)return 14;if(m<=75)return 15;if(m<=80)return 16;if(m<=85)return 17;return 18;}

function metodoJoao(bA, bB) {
  if (!bA?.sc || !bB?.sc) return [];
  const out = [];
  for (let i = 0; i < 20; i++) {
    if (i === 9 || i === 19) continue;
    const af = bA.sc[i]||0, at = bA.cn[i]||0, bf = bB.sc[i]||0, bt = bB.cn[i]||0;
    if (af < 1 || at < 1 || bf < 1 || bt < 1) continue;
    const acima = [af, at, bf, bt].filter(v => v >= 2).length;
    if (acima >= 3 || (af >= 3 && bt >= 3) || (bf >= 3 && at >= 3)) {
      out.push({ bucket: LBL[i], idx: i, af, at, bf, bt });
    }
  }
  return out;
}

const aggA = s.agg?.A || {}, aggB = s.agg?.B || {};
const bA = s.bucketsA || {sc:[],cn:[]}, bB = s.bucketsB || {sc:[],cn:[]};
const qual = metodoJoao(bA, bB);
const r = s.resultado;
const golsBuckets = r ? (r.minutosGols||[]).map(m => ({ m, idx: getBucketIdx(m), lado: (r.autores||[])[((r.minutosGols||[]).indexOf(m))] })) : [];
const idxsQual = new Set(qual.map(q => q.idx));

function bucketCell(i, isA) {
  const sc = isA ? (bA.sc[i]||0) : (bB.sc[i]||0);
  const cn = isA ? (bA.cn[i]||0) : (bB.cn[i]||0);
  let cls = 'bk';
  if (golsBuckets.some(g => g.idx === i)) cls += ' bk-goal';
  else if (idxsQual.has(i)) cls += ' bk-hot';
  return '<div class="'+cls+'"><div class="bk-lbl">'+LBL[i]+'</div><div class="bk-val">'+sc+'/'+cn+'</div></div>';
}

let html = '';
html += '<div class="hd"><div><div class="times">'+(s.teamA?.nome||'?')+' × '+(s.teamB?.nome||'?')+'</div>';
html += '<div class="meta">'+new Date(s.dataJogoTimestamp||s.capturedAt||0).toLocaleString('pt-BR')+' · '+(s.versaoRaiox||'v?')+'</div></div>';
html += '<div style="text-align:right;font-family:var(--fM);font-size:12px;">';
html += '<div>FS A: <strong style="color:var(--cy)">'+safe(s.forteScore?.A?.toFixed?.(2))+'</strong></div>';
html += '<div>FS B: <strong style="color:var(--cy)">'+safe(s.forteScore?.B?.toFixed?.(2))+'</strong></div>';
html += '<div style="color:var(--tx3)">Δ '+safe(Math.abs((s.forteScore?.A||0)-(s.forteScore?.B||0)).toFixed(2))+'</div>';
html += '</div></div>';

if (r) {
  const total = (r.placarA||0)+(r.placarB||0);
  const n = qual.length;
  const acertou = n===total?'✓✓ EXATO':Math.abs(n-total)===1?'✓ ±1':'✗ errou';
  const cor = n===total?'var(--gn)':Math.abs(n-total)===1?'var(--yl)':'var(--rd)';
  const minStr = (r.minutosGols||[]).map((m,i) => {
    const lado = (r.autores||[])[i];
    const nome = lado === 'A' ? s.teamA?.nome : lado === 'B' ? s.teamB?.nome : '?';
    return m+"' "+(nome||'').slice(0,12);
  }).join(' · ');
  html += '<div class="resultado-box"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;">';
  html += '<div><div style="font-size:28px;font-weight:800;font-family:var(--fM);color:var(--gn)">'+r.placarA+'–'+r.placarB+'</div>';
  html += '<div style="font-size:10px;color:var(--tx3);font-family:var(--fM);margin-top:4px">'+(minStr||'—')+'</div></div>';
  html += '<div style="text-align:right;font-family:var(--fM);">';
  html += '<div style="font-size:10px;color:var(--tx3);text-transform:uppercase">MÉTODO JOÃO</div>';
  html += '<div style="margin:4px 0">Previu: <strong style="color:var(--cy);font-size:15px">'+n+'</strong> · Real: <strong style="font-size:15px">'+total+'</strong></div>';
  html += '<div style="color:'+cor+';font-weight:700;font-size:14px">'+acertou+'</div></div></div></div>';
} else {
  html += '<div class="no-result">⏳ Resultado não preenchido ainda</div>';
}

// Stats
html += '<div class="sec"><div class="sec-t">Comparativo de stats · últimos 20 jogos</div>';
const rows = [['xG',aggA.xg,aggB.xg],['Finalizações',aggA.shots,aggB.shots],['Chutes no alvo',aggA.shotsOG,aggB.shotsOG],['Posse %',aggA.poss,aggB.poss],['Passes %',aggA.pass,aggB.pass],['Passes totais',aggA.passTotal,aggB.passTotal],['GF/jogo',aggA.gfJ,aggB.gfJ],['GC/jogo',aggA.gcJ,aggB.gcJ]];
rows.forEach(([lbl,a,b])=>{
  const winA = a != null && b != null && Number(a) > Number(b);
  const winB = a != null && b != null && Number(b) > Number(a);
  // Para GC, menor é melhor
  const invertido = lbl === 'GC/jogo';
  const verdeA = invertido ? winB : winA;
  const verdeB = invertido ? winA : winB;
  html += '<div class="stat-row"><div class="stat-a" style="color:'+(verdeA?'var(--gn)':'var(--tx1)')+';font-weight:'+(verdeA?700:400)+'">'+safe(a)+'</div>';
  html += '<div class="stat-lbl">'+lbl+'</div>';
  html += '<div class="stat-b" style="color:'+(verdeB?'var(--gn)':'var(--tx1)')+';font-weight:'+(verdeB?700:400)+'">'+safe(b)+'</div></div>';
});
html += '</div>';

// Buckets
html += '<div class="sec"><div class="sec-t">Distribuição por bucket 5min · últimos 20 jogos</div>';
html += '<div style="font-size:10px;color:var(--tx3);margin-bottom:6px;font-family:var(--fM)">'+(s.teamA?.nome||'A')+' (feitos / sofridos)</div>';
html += '<div class="bucket-grid">';
for (let i = 0; i < 20; i++) html += bucketCell(i, true);
html += '</div>';
html += '<div style="font-size:10px;color:var(--tx3);margin-top:14px;margin-bottom:6px;font-family:var(--fM)">'+(s.teamB?.nome||'B')+' (feitos / sofridos)</div>';
html += '<div class="bucket-grid">';
for (let i = 0; i < 20; i++) html += bucketCell(i, false);
html += '</div>';
html += '<div class="legend"><span style="color:var(--cy)">▣ azul</span> = janela qualificada (método João) · <span style="color:var(--gn)">▣ verde</span> = bucket onde gol caiu</div></div>';

if (qual.length) {
  html += '<div class="sec"><div class="sec-t">⭐ Janelas qualificadas pelo método João</div>';
  qual.forEach(q => {
    const teveGol = golsBuckets.some(g => g.idx === q.idx);
    html += '<div style="padding:6px 0;border-bottom:1px solid var(--b1);font-family:var(--fM);font-size:11px;">';
    html += '<span style="color:'+(teveGol?'var(--gn)':'var(--cy)')+';font-weight:700">'+q.bucket+'</span> — ';
    html += (s.teamA?.nome||'A')+' faz '+q.af+'/sofre '+q.at+' · '+(s.teamB?.nome||'B')+' faz '+q.bf+'/sofre '+q.bt;
    if (teveGol) html += '<span style="float:right;color:var(--gn);font-weight:700">✓ gol caiu aqui</span>';
    html += '</div>';
  });
  html += '</div>';
}

if (s.h2h?.length) {
  html += '<div class="sec"><div class="sec-t">Confrontos diretos · últimos '+s.h2h.length+'</div>';
  s.h2h.forEach(h => {
    html += '<div class="h2h-item"><span>'+(h.hN||h.h)+' <strong>'+h.hG+'–'+h.aG+'</strong> '+(h.aN||h.a)+'</span>';
    html += '<span class="h2h-time">'+h.date+' · '+(h.lg||'')+'</span></div>';
  });
  html += '</div>';
}

if (s.referenciaMin?.A) {
  html += '<div class="sec"><div class="sec-t">Referência por minuto · análise ao vivo</div><div class="grid">';
  ['A','B'].forEach(lado => {
    const ref = s.referenciaMin[lado] || {};
    const nome = lado === 'A' ? s.teamA?.nome : s.teamB?.nome;
    html += '<div style="background:var(--s3);padding:10px;border-radius:4px;">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--cy);margin-bottom:6px;">'+nome+'</div>';
    html += '<div style="font-size:10px;font-family:var(--fM);line-height:1.7;color:var(--tx2);">';
    html += 'xG/min: '+safe(ref.xgPorMin?.toFixed?.(4))+'<br>';
    html += 'GF/min: '+safe(ref.gfPorMin?.toFixed?.(4))+'<br>';
    html += 'GC/min: '+safe(ref.gcPorMin?.toFixed?.(4))+'<br>';
    html += 'Fin./min: '+safe(ref.finPorMin?.toFixed?.(3))+'<br>';
    html += "xG esperado 45': "+safe(ref.xgEsperado45?.toFixed?.(2))+'<br>';
    html += "xG esperado 90': "+safe(ref.xgEsperado90?.toFixed?.(2));
    html += '</div></div>';
  });
  html += '</div></div>';
}

document.getElementById('content').innerHTML = html;
document.title = 'Raio-X · ' + (s.teamA?.nome||'?') + ' × ' + (s.teamB?.nome||'?');
<\/script>
</body></html>`;
}

// ───────────────────────────────────────────────────────────────────────
// v18: ANÁLISE EM LOTE
// ───────────────────────────────────────────────────────────────────────

function analiseLote() {
  const completos = SNAPS.filter(s => s.resultado);
  if (!completos.length) return alert('Nenhum snapshot completo ainda');

  let exato = 0, prox = 0, dir = 0, golsAcertos = 0, golsReais = 0;
  const linhas = completos.map(s => {
    const r = s.resultado;
    const total = (r.placarA||0)+(r.placarB||0);
    const qual = metodoJoao(s.bucketsA, s.bucketsB);
    const n = qual.length, diff = n - total;
    if (diff === 0) exato++;
    if (Math.abs(diff) <= 1) prox++;
    if ((n >= 3) === (total >= 3)) dir++;
    const idxs = new Set(qual.map(q => q.idx));
    const ga = (r.minutosGols||[]).filter(m => idxs.has(getBucketIdx(m))).length;
    golsAcertos += ga;
    golsReais += total;
    return { nome: `${s.teamA?.nome} × ${s.teamB?.nome}`, n, total, diff, ga };
  });

  const N = completos.length;
  const txAvg = golsReais ? Math.round(golsAcertos/golsReais*100) : 0;

  const html = `<div class="modal-bg" id="modalBg" onclick="if(event.target===this)fechar()">
    <div class="modal" style="max-width:900px;">
      <h2>📊 Análise em lote · método João</h2>
      <div style="color:var(--tx3);font-size:11px;margin-bottom:14px;">${N} snapshots completos analisados</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
        <div style="background:var(--s2);padding:10px;border-radius:4px;text-align:center">
          <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;">Acerto EXATO</div>
          <div style="font-size:22px;color:var(--gn);font-weight:700;font-family:var(--fM)">${exato}/${N}</div>
          <div style="font-size:10px;color:var(--tx2)">${Math.round(exato/N*100)}%</div>
        </div>
        <div style="background:var(--s2);padding:10px;border-radius:4px;text-align:center">
          <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;">Acerto ±1</div>
          <div style="font-size:22px;color:var(--yl);font-weight:700;font-family:var(--fM)">${prox}/${N}</div>
          <div style="font-size:10px;color:var(--tx2)">${Math.round(prox/N*100)}%</div>
        </div>
        <div style="background:var(--s2);padding:10px;border-radius:4px;text-align:center">
          <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;">Direção O/U 2.5</div>
          <div style="font-size:22px;color:var(--cy);font-weight:700;font-family:var(--fM)">${dir}/${N}</div>
          <div style="font-size:10px;color:var(--tx2)">${Math.round(dir/N*100)}%</div>
        </div>
        <div style="background:var(--s2);padding:10px;border-radius:4px;text-align:center">
          <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;">Gols em janelas</div>
          <div style="font-size:22px;color:var(--cy);font-weight:700;font-family:var(--fM)">${txAvg}%</div>
          <div style="font-size:10px;color:var(--tx2)">previu o bucket</div>
        </div>
      </div>
      <div style="max-height:500px;overflow:auto;font-size:11px;font-family:var(--fM);">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="color:var(--tx3);border-bottom:1px solid var(--b1);">
            <th style="padding:6px;text-align:left">Jogo</th>
            <th style="padding:6px;text-align:right">Previ</th>
            <th style="padding:6px;text-align:right">Real</th>
            <th style="padding:6px;text-align:right">Diff</th>
            <th style="padding:6px;text-align:right">Gols em janelas</th>
          </tr></thead>
          <tbody>${linhas.map(l => `<tr style="border-bottom:1px solid var(--b1);">
            <td style="padding:5px;">${l.nome}</td>
            <td style="padding:5px;text-align:right">${l.n}</td>
            <td style="padding:5px;text-align:right">${l.total}</td>
            <td style="padding:5px;text-align:right;color:${l.diff===0?'var(--gn)':Math.abs(l.diff)===1?'var(--yl)':'var(--rd)'}">${l.diff>=0?'+':''}${l.diff}</td>
            <td style="padding:5px;text-align:right">${l.ga}/${l.total}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button class="primary" onclick="fechar()">Fechar</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function exportarTodos() {
  if (!SNAPS.length) { alert('Sem snapshots'); return; }
  downloadJSON(`yellup-snapshots-${new Date().toISOString().slice(0,10)}.json`, {
    exportadoEm: new Date().toISOString(),
    total: SNAPS.length,
    completos: SNAPS.filter(s => s.resultado).length,
    snapshots: SNAPS
  });
}

function exportarCompletos() {
  const comp = SNAPS.filter(s => s.resultado);
  if (!comp.length) { alert('Nenhum snapshot completo ainda'); return; }
  downloadJSON(`yellup-snapshots-completos-${new Date().toISOString().slice(0,10)}.json`, {
    exportadoEm: new Date().toISOString(),
    total: comp.length,
    snapshots: comp
  });
}

function exportarUm(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return;
  downloadJSON(`yellup-snap-${(s.teamA?.nome||'').replace(/\s+/g,'')}-vs-${(s.teamB?.nome||'').replace(/\s+/g,'')}.json`, s);
}

function inspecionar(id) {
  const s = SNAPS.find(x => x._id === id);
  if (!s) return;

  // Lista todos os campos top-level e o tipo/preview
  function preview(v) {
    if (v == null) return '<span style="color:var(--rd)">null</span>';
    if (Array.isArray(v)) return `<span style="color:var(--tx3)">array[${v.length}]</span>`;
    if (typeof v === 'object') {
      const keys = Object.keys(v);
      return `<span style="color:var(--cy)">{${keys.slice(0,5).join(', ')}${keys.length>5?', …':''}}</span>`;
    }
    if (typeof v === 'number') return `<span style="color:var(--yl)">${v}</span>`;
    if (typeof v === 'string') return `<span style="color:var(--tx2)">"${String(v).slice(0,60)}${v.length>60?'…':''}"</span>`;
    return String(v);
  }

  const sortedKeys = Object.keys(s).sort();
  const linhas = sortedKeys.map(k => `
    <tr>
      <td style="color:var(--cy);font-family:var(--fM);font-size:11px;padding:4px 8px;vertical-align:top;white-space:nowrap">${k}</td>
      <td style="font-family:var(--fM);font-size:11px;padding:4px 8px">${preview(s[k])}</td>
    </tr>
  `).join('');

  // JSON completo formatado
  const jsonCompleto = JSON.stringify(s, null, 2);

  const html = `
    <div class="modal-bg" id="modalBg" onclick="if(event.target===this)fechar()">
      <div class="modal" style="max-width: 900px; width: 95%;">
        <h2>🔍 ${s.teamA?.nome} × ${s.teamB?.nome}</h2>
        <div style="color:var(--tx3);font-size:11px;font-family:var(--fM);margin-bottom:12px">
          Versão: <strong style="color:var(--cy)">${s.versaoRaiox || '?'}</strong> · ID: ${s._docId}
        </div>

        <div style="margin-bottom:14px">
          <div style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Campos disponíveis (${sortedKeys.length})</div>
          <div style="max-height:300px;overflow-y:auto;background:var(--s3);border-radius:4px">
            <table style="width:100%;border-collapse:collapse">
              ${linhas}
            </table>
          </div>
        </div>

        <details style="margin-top:14px">
          <summary style="cursor:pointer;color:var(--cy);font-family:var(--fM);font-size:11px;padding:8px;background:var(--s3);border-radius:4px">📄 Ver JSON completo</summary>
          <pre style="background:#000;color:#7fa8c9;padding:12px;border-radius:4px;font-size:10px;max-height:400px;overflow:auto;margin-top:6px;line-height:1.4">${jsonCompleto.replace(/</g,'&lt;')}</pre>
        </details>

        <div class="modal-actions">
          <button onclick="fechar()">Fechar</button>
          <button class="primary" onclick="navigator.clipboard.writeText(${JSON.stringify(JSON.stringify(s))}); this.textContent='✓ Copiado'">📋 Copiar JSON</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

async function limparExpirados() {
  const exp = SNAPS.filter(s => !s.resultado && (Date.now() - (s.dataJogoTimestamp || 0)) >= 7*86400000);
  if (!exp.length) { alert('Nenhum expirado'); return; }
  if (!confirm(`Excluir ${exp.length} snapshot(s) sem resultado há mais de 7 dias?`)) return;
  for (const s of exp) {
    try {
      await db.collection('raiox-snapshots').doc(s._docId || s._id).delete();
      localStorage.removeItem(`yellup_snap_${s._docId || s._id}`);
    } catch(e) { console.warn(e); }
  }
  await carregar();
}

init();
</script>
