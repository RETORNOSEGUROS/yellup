<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,orientation=landscape">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1a0a">
<title>Yellup Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00e664;--g2:rgba(0,230,100,.15);--g3:rgba(0,230,100,.4);
  --r:#ff3b3b;--b:#3399ff;--y:#ffd600;--o:#ff8800;
  --bg:#060e06;--bg2:#0c180c;--bg3:#111e11;--br:#1a2e1a;
  --txt:#b8d8b8;--dim:#3a5a3a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;}

/* ══ SETUP ══════════════════════════════════════════════════ */
#tela-setup{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#0d2a0d,var(--bg) 70%);
  flex-direction:column;gap:14px;padding:16px;
}
.setup-logo{font-size:36px;font-weight:900;color:var(--g);letter-spacing:-1px;line-height:1;}
.setup-logo small{font-size:11px;font-weight:400;letter-spacing:4px;color:var(--dim);display:block;text-transform:uppercase;}
.setup-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:18px 20px;width:100%;max-width:460px;}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.setup-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.flabel{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:4px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--br);border-radius:7px;padding:9px 11px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--g);}
.fi::placeholder{font-weight:400;font-size:14px;text-transform:none;color:var(--dim);}
.fi.sm{font-size:13px;font-weight:400;text-transform:none;}
.btn-start{width:100%;background:var(--g);color:#000;border:none;border-radius:8px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:4px;}
.btn-start:active{opacity:.8;}

/* ══ APP LANDSCAPE ════════════════════════════════════════════ */
#tela-app{
  position:fixed;inset:0;display:none;
  /* Layout: [campo] [painel direito] */
  flex-direction:row;
}

/* ── CAMPO (esquerda, ocupa ~70%) ─────────────────────────── */
.field-col{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg2);border-right:1px solid var(--br);
  min-width:0;position:relative;overflow:hidden;
}

/* Header fino do campo */
.field-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;background:rgba(0,0,0,.5);flex-shrink:0;
  border-bottom:1px solid var(--br);
}
.fh-logo{font-size:14px;font-weight:900;color:var(--g);}
.fh-placar{display:flex;align-items:baseline;gap:6px;}
.fh-placar .score{font-size:22px;font-weight:800;color:#fff;letter-spacing:3px;}
.fh-placar .teams{font-size:9px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;}
.fh-crono{display:flex;align-items:center;gap:5px;}
.crono-txt{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--g);}
.crono-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1s infinite;flex-shrink:0;}
.crono-dot.off{background:var(--dim);animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.periodo-pill{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:2px 7px;color:var(--dim);}
.periodo-pill.on{border-color:var(--g3);color:var(--g);}
.periodo-pill.int{border-color:#ffd60055;color:var(--y);}
.periodo-pill.enc{border-color:#ff3b3b55;color:var(--r);}

/* Wrapper campo SVG + grid */
.field-pitch-wrap{
  flex:1;position:relative;overflow:hidden;
}

/* SVG campo — horizontal (landscape) */
.campo-svg{
  position:absolute;inset:0;width:100%;height:100%;
}

/* Grid overlay — 4 linhas × 8 colunas (campo horizontal) */
.campo-grid{
  position:absolute;inset:0;
  display:grid;
  grid-template-rows:repeat(4,1fr);   /* 4 corredores: Cima, Ctr-C, Ctr-B, Baixo */
  grid-template-columns:repeat(8,1fr); /* 8 zonas: Defesa→Ataque */
  z-index:10;
}
.zona{
  cursor:pointer;position:relative;
  border:1px solid rgba(255,255,255,.05);
  background:transparent;
  transition:background .08s;
}
.zona:active{background:rgba(255,255,255,.1);}
.zona.sel{background:rgba(0,230,100,.18)!important;border:1.5px solid var(--g);}
/* Zonas de ataque (colunas 6,7 = índice 5,6,7) */
.zona[data-c="5"]::before,.zona[data-c="6"]::before,.zona[data-c="7"]::before{
  content:'';position:absolute;inset:0;pointer-events:none;background:rgba(255,80,0,.07);}
/* Heat */
.zh{position:absolute;inset:0;opacity:0;transition:opacity .5s;pointer-events:none;}
.zh.c{background:radial-gradient(ellipse,rgba(30,140,255,.75),rgba(0,80,200,.2) 60%,transparent 85%);}
.zh.f{background:radial-gradient(ellipse,rgba(255,60,60,.75),rgba(200,0,0,.2) 60%,transparent 85%);}
.zn{position:absolute;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;pointer-events:none;text-shadow:0 1px 4px #000,0 0 6px #000;}
.zn.c{color:#55aaff;left:3px;top:2px;}
.zn.f{color:#ff7766;right:3px;bottom:2px;}
@keyframes flashC{from{background:rgba(0,120,255,.5)}to{background:transparent}}
@keyframes flashF{from{background:rgba(255,40,40,.5)}to{background:transparent}}
.zona.fC{animation:flashC .35s ease-out;}
.zona.fF{animation:flashF .35s ease-out;}

/* Labels corredores (esquerda vertical) */
.corredor-labels{
  position:absolute;left:0;top:0;bottom:0;width:22px;
  display:flex;flex-direction:column;pointer-events:none;z-index:20;
}
.cl-item{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:7px;letter-spacing:.5px;text-transform:uppercase;
  color:rgba(255,255,255,.4);text-shadow:0 1px 3px #000;
  writing-mode:vertical-lr;transform:rotate(180deg);
}

/* Labels zonas (topo horizontal) */
.zona-labels{
  position:absolute;top:0;left:22px;right:0;height:16px;
  display:flex;pointer-events:none;z-index:20;
}
.zl-item{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:7px;letter-spacing:.3px;text-transform:uppercase;
  color:rgba(255,255,255,.35);text-shadow:0 1px 3px #000;
}
.zl-item.atq{color:rgba(255,140,0,.7);font-weight:700;}

/* Bola Parada bar (em cima do campo) */
.bp-active-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(26,8,0,.92);border-top:1px solid #ff880044;
  padding:5px 12px;display:none;align-items:center;gap:8px;z-index:30;
}
.bp-active-bar.on{display:flex;}
.bp-tipo-txt{font-size:13px;font-weight:800;color:var(--o);letter-spacing:1px;text-transform:uppercase;flex:1;}
.bp-timer-txt{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--o);}
.bp-ok-btn{background:none;border:1px solid var(--o);border-radius:6px;color:var(--o);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;cursor:pointer;}
.bp-ok-btn:active{opacity:.6;}

/* ── PAINEL DIREITO ────────────────────────────────────────── */
.right-col{
  width:210px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}

/* Time selector */
.time-sel{
  display:flex;gap:5px;padding:7px 8px;
  background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
}
.btn-time{
  flex:1;padding:8px 4px;border-radius:7px;
  border:2px solid var(--br);background:transparent;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--dim);transition:all .12s;
}
.btn-time:active{opacity:.7;}
.btn-time.casa.on{background:#001533;border-color:var(--b);color:var(--b);}
.btn-time.fora.on{background:#330000;border-color:var(--r);color:var(--r);}

/* Zona info */
.zona-info{
  padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--g3);
  display:none;align-items:center;gap:6px;flex-shrink:0;
}
.zona-info.on{display:flex;}
.zi-txt{flex:1;font-size:11px;font-weight:700;color:var(--g);letter-spacing:.3px;text-transform:uppercase;line-height:1.2;}
.zi-x{color:var(--dim);font-size:18px;cursor:pointer;}

/* Controles jogo */
.ctrl-bar{
  display:flex;flex-direction:column;gap:4px;padding:7px 8px;
  background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
}
.ctrl-row{display:flex;gap:4px;}
.btn-ctrl{
  flex:1;padding:7px 3px;border-radius:6px;border:1px solid var(--br);
  background:transparent;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;color:var(--dim);transition:all .12s;
}
.btn-ctrl:active{opacity:.6;}
.btn-ctrl.verde{border-color:rgba(0,230,100,.35);color:var(--g);}
.btn-ctrl.verde.on{background:#001a0a;}
.btn-ctrl.amarelo{border-color:rgba(255,214,0,.3);color:var(--y);}
.btn-ctrl.amarelo.on{background:#1a1000;}
.btn-ctrl.vermelho{border-color:rgba(255,59,59,.3);color:var(--r);}

/* Bola parada botões */
.bp-btns{
  display:grid;grid-template-columns:repeat(5,1fr);gap:3px;
  padding:5px 8px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
}
.btn-bp{
  background:var(--bg3);border:1px solid var(--br);border-radius:6px;
  padding:5px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.btn-bp:active{opacity:.6;}
.btn-bp .e{font-size:14px;line-height:1;}
.btn-bp .l{font-size:7px;font-weight:700;text-transform:uppercase;color:var(--dim);text-align:center;line-height:1.1;}

/* Eventos grid */
.evs-wrap{
  padding:5px 8px 6px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
}
.evs-titulo{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}
.evs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.btn-ev{
  background:var(--bg3);border:1px solid var(--br);border-radius:6px;
  padding:7px 3px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.btn-ev:active{transform:scale(.88);}
.btn-ev .e{font-size:18px;line-height:1;}
.btn-ev .l{font-size:7px;font-weight:700;text-transform:uppercase;color:var(--dim);text-align:center;line-height:1.1;}
.btn-ev.gol{border-color:rgba(0,230,100,.25);}
.btn-ev.ap{border-color:rgba(255,68,0,.25);}

/* Stats mini */
.stats-mini{
  padding:5px 8px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;
}
.stats-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.stats-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;flex:1;}
.stats-c{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--b);min-width:18px;text-align:right;}
.stats-f{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--r);min-width:18px;text-align:left;}
.stats-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative;margin:0 4px;}
.stats-bar-c{position:absolute;right:50%;top:0;bottom:0;background:var(--b);transform-origin:right;border-radius:2px 0 0 2px;}
.stats-bar-f{position:absolute;left:50%;top:0;bottom:0;background:var(--r);transform-origin:left;border-radius:0 2px 2px 0;}

/* Feed */
.feed-scroll{flex:1;overflow-y:auto;padding:4px 8px;}
.feed-item{display:flex;align-items:flex-start;gap:5px;padding:5px 0;border-bottom:1px solid var(--bg3);font-size:10px;}
.fi-min{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);min-width:22px;padding-top:1px;}
.fi-em{font-size:14px;min-width:16px;line-height:1;}
.fi-info{flex:1;}
.fi-nome{font-weight:700;font-size:11px;}
.fi-nome.c{color:var(--b);}
.fi-nome.f{color:var(--r);}
.fi-zona{font-size:8px;color:var(--dim);margin-top:1px;}
.fi-undo{background:none;border:1px solid var(--br);border-radius:3px;color:var(--dim);font-size:8px;padding:1px 4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}

/* Desfazer */
.btn-und{
  margin:4px 8px;background:var(--bg3);border:1px solid var(--br);
  border-radius:6px;padding:5px 8px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);cursor:pointer;display:none;align-items:center;gap:5px;
  flex-shrink:0;
}
.btn-und.on{display:flex;}
.btn-und:active{border-color:var(--r);color:var(--r);}

/* Toast */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);
  background:var(--g);color:#000;font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:2px;padding:9px 20px;
  border-radius:10px;z-index:999;opacity:0;transition:all .15s;
  pointer-events:none;text-transform:uppercase;white-space:nowrap;
}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast.err{background:var(--r);color:#fff;}
.toast.neu{background:var(--bg3);color:var(--txt);border:1px solid var(--br);}
.toast.lar{background:var(--o);color:#000;}

/* Forçar landscape */
@media(orientation:portrait){
  #rotate-hint{display:flex!important;}
}
#rotate-hint{
  display:none;position:fixed;inset:0;background:#060e06;z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#rotate-hint .rh-icon{font-size:60px;animation:rot 2s infinite;}
@keyframes rot{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
#rotate-hint .rh-txt{font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt);}
#rotate-hint .rh-sub{font-size:12px;color:var(--dim);letter-spacing:1px;}
</style>
</head>
<body>

<!-- Aviso rotação portrait -->
<div id="rotate-hint">
  <div class="rh-icon">📱</div>
  <div class="rh-txt">Gire o celular</div>
  <div class="rh-sub">Scout funciona em paisagem (horizontal)</div>
</div>

<!-- ══ SETUP ══════════════════════════════════════════════ -->
<div id="tela-setup">
  <div class="setup-logo">Yellup Scout<small>Engine</small></div>
  <div class="setup-card">
    <div class="setup-row">
      <div>
        <label class="flabel">Time Casa</label>
        <input class="fi" type="text" id="inp-casa" placeholder="Casa" maxlength="14">
      </div>
      <div>
        <label class="flabel">Time Fora</label>
        <input class="fi" type="text" id="inp-fora" placeholder="Fora" maxlength="14">
      </div>
    </div>
    <div class="setup-row3">
      <div>
        <label class="flabel">Liga</label>
        <input class="fi sm" type="text" id="inp-liga" placeholder="Brasileirão..." maxlength="30">
      </div>
      <div>
        <label class="flabel">Fixture ID</label>
        <input class="fi sm" type="text" id="inp-fxid" placeholder="auto" inputmode="numeric" maxlength="12">
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="btn-start" onclick="iniciarJogo()">Iniciar →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="tela-app">

  <!-- COLUNA CAMPO (esquerda) -->
  <div class="field-col">

    <!-- Header campo -->
    <div class="field-header">
      <div class="fh-logo">YS</div>
      <div class="fh-placar">
        <span class="score" id="placar">0 — 0</span>
        <span class="teams" id="nomes-display">Casa × Fora</span>
      </div>
      <div class="fh-crono">
        <span class="crono-dot off" id="dot"></span>
        <span class="crono-txt" id="crono-txt">00:00</span>
        <span class="periodo-pill" id="periodo-pill">PRÉ</span>
      </div>
    </div>

    <!-- Campo pitch -->
    <div class="field-pitch-wrap" id="pitch-wrap">

      <!-- SVG CAMPO HORIZONTAL REALISTA -->
      <svg class="campo-svg" viewBox="0 0 320 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Grama listrada vertical (listras paralelas ao comprimento) -->
          <pattern id="grass" x="0" y="0" width="40" height="160" patternUnits="userSpaceOnUse">
            <rect width="20" height="160" fill="#1a4e1a"/>
            <rect x="20" width="20" height="160" fill="#1e5820"/>
          </pattern>
        </defs>
        <!-- Fundo grama -->
        <rect width="320" height="160" fill="url(#grass)"/>

        <!-- Borda campo -->
        <rect x="3" y="3" width="314" height="154" fill="none" stroke="rgba(255,255,255,.85)" stroke-width=".9"/>

        <!-- Linha do meio (vertical no SVG horizontal) -->
        <line x1="160" y1="3" x2="160" y2="157" stroke="rgba(255,255,255,.85)" stroke-width=".8"/>

        <!-- Círculo central -->
        <circle cx="160" cy="80" r="28" fill="none" stroke="rgba(255,255,255,.8)" stroke-width=".8"/>
        <!-- Ponto central -->
        <circle cx="160" cy="80" r="1.2" fill="rgba(255,255,255,.9)"/>

        <!-- ÁREA GRANDE ESQUERDA (nossa defesa) -->
        <rect x="3" y="38" width="42" height="84" fill="none" stroke="rgba(255,255,255,.8)" stroke-width=".8"/>
        <!-- ÁREA PEQUENA ESQUERDA -->
        <rect x="3" y="57" width="15" height="46" fill="none" stroke="rgba(255,255,255,.7)" stroke-width=".7"/>
        <!-- GOL ESQUERDA -->
        <rect x="0" y="68" width="3" height="24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1"/>
        <!-- Ponto pênalti esquerda -->
        <circle cx="25" cy="80" r="1.2" fill="rgba(255,255,255,.9)"/>
        <!-- Arco pênalti esquerda -->
        <path d="M 45 62 A 22 22 0 0 0 45 98" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>

        <!-- ÁREA GRANDE DIREITA (ataque) -->
        <rect x="275" y="38" width="42" height="84" fill="none" stroke="rgba(255,255,255,.8)" stroke-width=".8"/>
        <!-- ÁREA PEQUENA DIREITA -->
        <rect x="302" y="57" width="15" height="46" fill="none" stroke="rgba(255,255,255,.7)" stroke-width=".7"/>
        <!-- GOL DIREITA -->
        <rect x="317" y="68" width="3" height="24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1"/>
        <!-- Ponto pênalti direita -->
        <circle cx="295" cy="80" r="1.2" fill="rgba(255,255,255,.9)"/>
        <!-- Arco pênalti direita -->
        <path d="M 275 62 A 22 22 0 0 1 275 98" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>

        <!-- Cantos arredondados -->
        <path d="M 3 8 A 5 5 0 0 1 8 3" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>
        <path d="M 312 3 A 5 5 0 0 1 317 8" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>
        <path d="M 3 152 A 5 5 0 0 0 8 157" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>
        <path d="M 317 152 A 5 5 0 0 1 312 157" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".7"/>

        <!-- Labels orientação -->
        <text x="10" y="8" font-size="5" fill="rgba(255,255,255,.35)" font-family="sans-serif">◀ DEFESA</text>
        <text x="290" y="8" font-size="5" fill="rgba(255,140,0,.75)" font-family="sans-serif" font-weight="bold">ATAQUE ▶</text>
      </svg>

      <!-- Grid zonas (4 corredores × 8 zonas) -->
      <div class="campo-grid" id="campo-grid"></div>

      <!-- Labels corredores (esquerda) -->
      <div class="corredor-labels" id="corredor-labels"></div>

      <!-- Labels zonas (topo) -->
      <div class="zona-labels" id="zona-labels"></div>

      <!-- Bola parada ativa (rodapé do campo) -->
      <div class="bp-active-bar" id="bp-bar">
        <div class="bp-tipo-txt" id="bp-tipo-txt">—</div>
        <div class="bp-timer-txt" id="bp-timer-txt">0s</div>
        <button class="bp-ok-btn" onclick="encerrarBP()">✓ OK</button>
      </div>
    </div>
  </div>

  <!-- COLUNA DIREITA (controles) -->
  <div class="right-col">

    <!-- Time selector -->
    <div class="time-sel">
      <button class="btn-time casa" id="btn-casa" onclick="selTime('c')"><span id="lbl-casa">CASA</span></button>
      <button class="btn-time fora" id="btn-fora" onclick="selTime('f')"><span id="lbl-fora">FORA</span></button>
    </div>

    <!-- Zona selecionada -->
    <div class="zona-info" id="zona-info">
      <div class="zi-txt" id="zi-txt">—</div>
      <div class="zi-x" onclick="limparZona()">×</div>
    </div>

    <!-- Controles jogo -->
    <div class="ctrl-bar">
      <div class="ctrl-row">
        <button class="btn-ctrl verde" id="btn-ini" onclick="ctrlIniciar()">▶ Iniciar</button>
        <button class="btn-ctrl amarelo" id="btn-int" onclick="ctrlIntervalo()">⏸ Intervalo</button>
      </div>
      <div class="ctrl-row">
        <button class="btn-ctrl vermelho" onclick="ctrlEncerrar()">■ Encerrar</button>
      </div>
    </div>

    <!-- Bola parada -->
    <div class="bp-btns">
      <button class="btn-bp" onclick="iniciarBP('Escanteio')"><span class="e">🚩</span><span class="l">Escant</span></button>
      <button class="btn-bp" onclick="iniciarBP('Falta')"><span class="e">👊</span><span class="l">Falta</span></button>
      <button class="btn-bp" onclick="iniciarBP('Pênalti')"><span class="e">🎯</span><span class="l">Pênalti</span></button>
      <button class="btn-bp" onclick="iniciarBP('Lateral')"><span class="e">🤾</span><span class="l">Lateral</span></button>
      <button class="btn-bp" onclick="iniciarBP('Tiro Meta')"><span class="e">🧤</span><span class="l">T.Meta</span></button>
    </div>

    <!-- Eventos -->
    <div class="evs-wrap">
      <div class="evs-titulo">Selecione time + zona → evento</div>
      <div class="evs-grid">
        <button class="btn-ev gol" onclick="regEvento('gol')"><span class="e">⚽</span><span class="l">Gol</span></button>
        <button class="btn-ev ap"  onclick="regEvento('ap')"><span class="e">🔥</span><span class="l">At.Per</span></button>
        <button class="btn-ev"     onclick="regEvento('chute')"><span class="e">🎯</span><span class="l">Chute</span></button>
        <button class="btn-ev"     onclick="regEvento('pressao')"><span class="e">💥</span><span class="l">Pressão</span></button>
        <button class="btn-ev"     onclick="regEvento('cartao')"><span class="e">🟨</span><span class="l">Cartão</span></button>
        <button class="btn-ev"     onclick="regEvento('sub')"><span class="e">↕️</span><span class="l">Sub</span></button>
        <button class="btn-ev"     onclick="regEvento('defesa')"><span class="e">🛡️</span><span class="l">Defesa</span></button>
        <button class="btn-ev"     onclick="regEvento('posse')"><span class="e">🤚</span><span class="l">Posse</span></button>
      </div>
    </div>

    <!-- Stats mini -->
    <div class="stats-mini" id="stats-mini"></div>

    <!-- Desfazer -->
    <button class="btn-und" id="btn-und" onclick="desfazer()">↩ Desfazer último</button>

    <!-- Feed -->
    <div class="feed-scroll" id="feed-scroll">
      <div style="text-align:center;color:var(--dim);font-size:10px;padding:14px 0;letter-spacing:1px;text-transform:uppercase;">Sem eventos</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
};

// Campo horizontal: 8 colunas (Defesa→Ataque) × 4 corredores (Cima→Baixo)
const ZONAS_H  = ['Saída','Defesa','Rec.Def','Meio-D','Meio-O','Ataque','Chute','Área'];
const CORR_H   = ['Cima','Ctr-C','Ctr-B','Baixo'];
const EMOJIS   = {ap:'🔥',gol:'⚽',chute:'🎯',pressao:'💥',cartao:'🟨',sub:'↕️',defesa:'🛡️',posse:'🤚'};
const NOMES    = {ap:'At. Perigoso',gol:'Gol',chute:'Chute',pressao:'Pressão',cartao:'Cartão',sub:'Sub',defesa:'Defesa',posse:'Posse'};
const BP_E     = {Escanteio:'🚩',Falta:'👊','Pênalti':'🎯',Lateral:'🤾','Tiro Meta':'🧤'};
const ATAQUE_C = [5,6,7]; // colunas de ataque

const G = {
  db:null, casa:'CASA', fora:'FORA', liga:'', fxId:'',
  timeSel:null, zonaSel:null,
  golsC:0, golsF:0,
  stats:{c:{ap:0,gol:0,ch:0}, f:{ap:0,gol:0,ch:0}},
  heat:{}, corrC:[0,0,0,0], corrF:[0,0,0,0],
  eventos:[],
  ms:0, ini:null, rodando:false, tmr:null, periodo:0,
  bpTipo:null, bpIni:null, bpTmr:null, bpHist:[],
};

// ── INIT ──────────────────────────────────────────────────────
try{
  const app = initializeApp(FB,'ys');
  G.db = getFirestore(app);
}catch(e){ console.warn('FB:',e); }

// ── SETUP ─────────────────────────────────────────────────────
window.iniciarJogo = function(){
  const casa = (document.getElementById('inp-casa').value.trim()||'CASA').toUpperCase();
  const fora = (document.getElementById('inp-fora').value.trim()||'FORA').toUpperCase();
  if(!document.getElementById('inp-casa').value.trim()||!document.getElementById('inp-fora').value.trim()){
    toast('Informe os dois times','err'); return;
  }
  G.casa=casa; G.fora=fora;
  G.liga=document.getElementById('inp-liga').value.trim();
  G.fxId=document.getElementById('inp-fxid').value.trim()||'scout-'+Date.now();

  document.getElementById('lbl-casa').textContent=casa.substring(0,9);
  document.getElementById('lbl-fora').textContent=fora.substring(0,9);
  document.getElementById('nomes-display').textContent=`${casa.substring(0,8)} × ${fora.substring(0,8)}`;

  document.getElementById('tela-setup').style.display='none';
  const app=document.getElementById('tela-app');
  app.style.display='flex';

  construirCampo();
  renderStats();
};

// ── CAMPO ─────────────────────────────────────────────────────
function construirCampo(){
  const grid=document.getElementById('campo-grid');
  const clEl=document.getElementById('corredor-labels');
  const zlEl=document.getElementById('zona-labels');
  grid.innerHTML=''; clEl.innerHTML=''; zlEl.innerHTML='';

  // Grid: 4 linhas (corredores) × 8 colunas (zonas)
  for(let r=0;r<4;r++){
    for(let c=0;c<8;c++){
      const z=document.createElement('div');
      z.className='zona'; z.dataset.r=r; z.dataset.c=c;
      const hc=document.createElement('div'); hc.className='zh c'; hc.id=`h-c-${r}-${c}`;
      const hf=document.createElement('div'); hf.className='zh f'; hf.id=`h-f-${r}-${c}`;
      const nc=document.createElement('div'); nc.className='zn c'; nc.id=`n-c-${r}-${c}`;
      const nf=document.createElement('div'); nf.className='zn f'; nf.id=`n-f-${r}-${c}`;
      z.append(hc,hf,nc,nf);
      z.addEventListener('click',()=>selZona(r,c));
      grid.appendChild(z);
    }
  }

  // Labels corredores (esquerda)
  CORR_H.forEach(n=>{
    const l=document.createElement('div');
    l.className='cl-item'; l.textContent=n;
    clEl.appendChild(l);
  });

  // Labels zonas (topo)
  // Spacer para a coluna de labels
  const sp=document.createElement('div'); sp.style.width='22px'; sp.style.flexShrink='0';
  zlEl.appendChild(sp);
  ZONAS_H.forEach((n,i)=>{
    const l=document.createElement('div');
    l.className='zl-item'+(ATAQUE_C.includes(i)?' atq':'');
    l.textContent=n;
    zlEl.appendChild(l);
  });
}

// ── CRONÔMETRO ────────────────────────────────────────────────
const fmt=ms=>{const t=Math.floor(ms/1000);return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');};
const getMin=()=>Math.floor(G.ms/60000);

window.ctrlIniciar=function(){
  if(G.periodo===4){toast('Encerrado','neu');return;}
  if(!G.rodando){
    if(G.periodo===0){G.periodo=1;setPeriodo();}
    G.ini=Date.now()-G.ms; G.rodando=true;
    G.tmr=setInterval(()=>{G.ms=Date.now()-G.ini;document.getElementById('crono-txt').textContent=fmt(G.ms);},500);
    document.getElementById('dot').classList.remove('off');
    document.getElementById('btn-ini').textContent='⏸ Pausar';
    document.getElementById('btn-ini').classList.add('on');
  } else {
    G.ms=Date.now()-G.ini; G.rodando=false; clearInterval(G.tmr);
    document.getElementById('dot').classList.add('off');
    document.getElementById('btn-ini').textContent='▶ Retomar';
    document.getElementById('btn-ini').classList.remove('on');
  }
};

window.ctrlIntervalo=function(){
  if(G.periodo===1){
    if(G.rodando)ctrlIniciar();
    G.periodo=2;G.ms=0;setPeriodo();
    document.getElementById('crono-txt').textContent='00:00';
    document.getElementById('btn-ini').textContent='▶ Iniciar';
    document.getElementById('btn-ini').classList.remove('on');
    document.getElementById('btn-int').textContent='▶ 2º Tempo';
    document.getElementById('btn-int').classList.add('on');
    toast('⏸ Intervalo','neu');
  } else if(G.periodo===2){
    G.periodo=3;G.ms=0;setPeriodo();
    document.getElementById('btn-int').textContent='⏸ Fim 2T';
    document.getElementById('btn-int').classList.remove('on');
    ctrlIniciar(); toast('▶ 2º Tempo','neu');
  } else if(G.periodo===3){
    if(G.rodando)ctrlIniciar();
    G.periodo=2;G.ms=0;setPeriodo();
    document.getElementById('btn-int').textContent='▶ Prorrogação';
    document.getElementById('btn-int').classList.add('on');
    toast('⏸ Fim 2T','neu');
  }
};

window.ctrlEncerrar=function(){
  if(!confirm('Encerrar?'))return;
  if(G.rodando)ctrlIniciar();
  if(G.bpTipo)encerrarBP();
  G.periodo=4; setPeriodo();
  document.getElementById('dot').classList.add('off');
  toast('■ Encerrado','neu');
};

function setPeriodo(){
  const el=document.getElementById('periodo-pill');
  const t=['PRÉ','1º T','INT','2º T','ENC'][G.periodo];
  el.textContent=t||'';
  el.className='periodo-pill';
  if(G.periodo===1||G.periodo===3)el.classList.add('on');
  else if(G.periodo===2)el.classList.add('int');
  else if(G.periodo===4)el.classList.add('enc');
}

// ── BOLA PARADA ───────────────────────────────────────────────
window.iniciarBP=function(tipo){
  if(G.bpTipo)encerrarBP();
  if(!G.timeSel){toast('Selecione o time','neu');return;}
  G.bpTipo=tipo; G.bpIni=Date.now();
  const nm=G.timeSel==='c'?G.casa:G.fora;
  document.getElementById('bp-tipo-txt').textContent=`${BP_E[tipo]||''} ${tipo} — ${nm}`;
  document.getElementById('bp-bar').classList.add('on');
  G.bpTmr=setInterval(()=>{
    document.getElementById('bp-timer-txt').textContent=Math.floor((Date.now()-G.bpIni)/1000)+'s';
  },500);
  toast(`${BP_E[tipo]||''} ${tipo}`,'lar');
};

window.encerrarBP=function(){
  if(!G.bpTipo)return;
  clearInterval(G.bpTmr);
  const dur=Math.floor((Date.now()-G.bpIni)/1000);
  G.bpHist.unshift({tipo:G.bpTipo,time:G.timeSel,min:getMin(),dur});
  document.getElementById('bp-bar').classList.remove('on');
  if(G.db)addDoc(collection(G.db,'scout-bola-parada'),{
    fixtureId:G.fxId,timeCasa:G.casa,timeFora:G.fora,liga:G.liga,
    tipo:G.bpTipo,time:G.timeSel,minuto:getMin(),duracao:dur,periodo:G.periodo,
    timestamp:serverTimestamp()
  }).catch(()=>{});
  const tipo=G.bpTipo; G.bpTipo=null; G.bpIni=null;
  toast(`✓ ${tipo}: ${dur}s`,'neu');
};

// ── SELEÇÃO ───────────────────────────────────────────────────
window.selTime=function(t){
  G.timeSel=t;
  document.getElementById('btn-casa').className=`btn-time casa${t==='c'?' on':''}`;
  document.getElementById('btn-fora').className=`btn-time fora${t==='f'?' on':''}`;
};

window.selZona=function(r,c){
  document.querySelectorAll('.zona.sel').forEach(z=>z.classList.remove('sel'));
  G.zonaSel={r,c};
  document.querySelector(`.zona[data-r="${r}"][data-c="${c}"]`)?.classList.add('sel');
  document.getElementById('zi-txt').textContent=`${ZONAS_H[c]} · ${CORR_H[r]}`;
  document.getElementById('zona-info').classList.add('on');
};

window.limparZona=function(){
  G.zonaSel=null;
  document.querySelectorAll('.zona.sel').forEach(z=>z.classList.remove('sel'));
  document.getElementById('zona-info').classList.remove('on');
};

// ── EVENTO ────────────────────────────────────────────────────
window.regEvento=async function(tipo){
  if(!G.timeSel){
    toast('Selecione o time!','neu');
    ['btn-casa','btn-fora'].forEach(id=>{
      const el=document.getElementById(id);
      el.style.borderColor='var(--y)';
      setTimeout(()=>el.style.borderColor='',700);
    });
    return;
  }
  const t=G.timeSel, z=G.zonaSel, min=getMin();

  if(tipo==='gol'){
    if(t==='c')G.golsC++;else G.golsF++;
    document.getElementById('placar').textContent=`${G.golsC} — ${G.golsF}`;
  }
  if(tipo==='ap')G.stats[t].ap++;
  else if(tipo==='gol')G.stats[t].gol++;
  else if(tipo==='chute')G.stats[t].ch++;
  renderStats();

  if(z){
    const k=`${z.r}-${z.c}`;
    if(!G.heat[k])G.heat[k]={c:0,f:0};
    G.heat[k][t]++;
    const cnt=G.heat[k][t];
    const hEl=document.getElementById(`h-${t}-${z.r}-${z.c}`);
    if(hEl)hEl.style.opacity=Math.min(cnt/5,1)*0.8;
    const nEl=document.getElementById(`n-${t}-${z.r}-${z.c}`);
    if(nEl&&cnt>0)nEl.textContent=cnt;
    // corredor heat
    if(t==='c')G.corrC[z.r]++;else G.corrF[z.r]++;
    // flash
    const zEl=document.querySelector(`.zona[data-r="${z.r}"][data-c="${z.c}"]`);
    if(zEl){zEl.classList.remove('fC','fF');void zEl.offsetWidth;zEl.classList.add(t==='c'?'fC':'fF');}
  }

  const ev={tipo,t,z,min,periodo:G.periodo,_id:Date.now().toString()};
  G.eventos.unshift(ev);
  renderFeed(); renderStats();
  document.getElementById('btn-und').classList.add('on');
  const zt=z?` · ${CORR_H[z.r]}·${ZONAS_H[z.c]}`:'';
  toast(`${EMOJIS[tipo]} ${t==='c'?G.casa:G.fora}${zt}`);

  if(G.db){
    try{
      const ref=await addDoc(collection(G.db,'scout-eventos'),{
        fixtureId:G.fxId,timeCasa:G.casa,timeFora:G.fora,liga:G.liga,
        tipo,time:t,minuto:min,periodo:G.periodo,
        zona:z?{row:z.r,col:z.c,corredor:CORR_H[z.r],zona:ZONAS_H[z.c],ehAtaque:ATAQUE_C.includes(z.c)}:null,
        timestamp:serverTimestamp(),criadoLocal:new Date().toISOString()
      });
      ev._docId=ref.id;
    }catch(e){console.warn(e);}
  }
};

window.desfazer=async function(){
  if(!G.eventos.length)return;
  const ev=G.eventos.shift();
  if(ev.tipo==='gol'){
    if(ev.t==='c')G.golsC=Math.max(0,G.golsC-1);else G.golsF=Math.max(0,G.golsF-1);
    document.getElementById('placar').textContent=`${G.golsC} — ${G.golsF}`;
  }
  if(ev.tipo==='ap')G.stats[ev.t].ap=Math.max(0,G.stats[ev.t].ap-1);
  else if(ev.tipo==='gol')G.stats[ev.t].gol=Math.max(0,G.stats[ev.t].gol-1);
  else if(ev.tipo==='chute')G.stats[ev.t].ch=Math.max(0,G.stats[ev.t].ch-1);
  if(ev.z){
    const k=`${ev.z.r}-${ev.z.c}`;
    if(G.heat[k]?.[ev.t]>0){
      G.heat[k][ev.t]--;
      const cnt=G.heat[k][ev.t];
      const hEl=document.getElementById(`h-${ev.t}-${ev.z.r}-${ev.z.c}`);
      if(hEl)hEl.style.opacity=Math.min(cnt/5,1)*0.8;
      const nEl=document.getElementById(`n-${ev.t}-${ev.z.r}-${ev.z.c}`);
      if(nEl)nEl.textContent=cnt>0?cnt:'';
    }
    if(ev.t==='c')G.corrC[ev.z.r]=Math.max(0,G.corrC[ev.z.r]-1);
    else G.corrF[ev.z.r]=Math.max(0,G.corrF[ev.z.r]-1);
  }
  renderStats(); renderFeed();
  if(!G.eventos.length)document.getElementById('btn-und').classList.remove('on');
  if(ev._docId&&G.db)deleteDoc(doc(G.db,'scout-eventos',ev._docId)).catch(()=>{});
  toast('↩ Desfeito','neu');
};

// ── RENDER ────────────────────────────────────────────────────
function renderStats(){
  const mc=Math.max(G.stats.c.ap,G.stats.f.ap,1);
  const stats=[
    {l:'AP',c:G.stats.c.ap,f:G.stats.f.ap,max:Math.max(G.stats.c.ap,G.stats.f.ap,1)},
    {l:'Gols',c:G.stats.c.gol,f:G.stats.f.gol,max:Math.max(G.stats.c.gol,G.stats.f.gol,1)},
    {l:'Chutes',c:G.stats.c.ch,f:G.stats.f.ch,max:Math.max(G.stats.c.ch,G.stats.f.ch,1)},
  ];
  document.getElementById('stats-mini').innerHTML=stats.map(s=>`
    <div class="stats-row">
      <span class="stats-c">${s.c}</span>
      <div class="stats-bar">
        <div class="stats-bar-c" style="width:${(s.c/s.max)*45}%"></div>
        <div class="stats-bar-f" style="width:${(s.f/s.max)*45}%"></div>
      </div>
      <span class="stats-f">${s.f}</span>
      <span class="stats-label">${s.l}</span>
    </div>
  `).join('');
}

function renderFeed(){
  const el=document.getElementById('feed-scroll');
  if(!G.eventos.length){
    el.innerHTML='<div style="text-align:center;color:var(--dim);font-size:10px;padding:14px 0;letter-spacing:1px;text-transform:uppercase;">Sem eventos</div>';
    return;
  }
  el.innerHTML=G.eventos.slice(0,60).map((ev,i)=>`
    <div class="feed-item">
      <div class="fi-min">${ev.min}'</div>
      <div class="fi-em">${EMOJIS[ev.tipo]||'•'}</div>
      <div class="fi-info">
        <div class="fi-nome ${ev.t}">${NOMES[ev.tipo]||ev.tipo}</div>
        <div class="fi-zona">${ev.t==='c'?G.casa:G.fora}${ev.z?` · ${ZONAS_H[ev.z.c]}·${CORR_H[ev.z.r]}`:''}</div>
      </div>
      ${i===0?`<button class="fi-undo" onclick="desfazer()">↩</button>`:''}
    </div>
  `).join('');
}

function toast(msg,tipo=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${tipo} on`;
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('on'),1100);
}
</script>
</body>
</html>
