<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060e06">
<title>Yellup Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00e664;--g2:#00994422;--g3:#00cc5566;
  --r:#ff3b3b;--b:#00aaff;--y:#ffd600;--o:#ff8800;
  --bg:#060e06;--bg2:#0d160d;--bg3:#111a11;
  --br:#1a2c1a;--txt:#c0dcc0;--dim:#3a5a3a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;height:100dvh;overflow:hidden;}

/* ── LOGIN ── */
#tela-login{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:radial-gradient(ellipse at 50% 0%,#0a2a0a 0%,var(--bg) 65%);}
.logo{font-size:48px;font-weight:900;color:var(--g);letter-spacing:-1px;}
.logo small{display:block;font-size:11px;font-weight:400;letter-spacing:5px;color:var(--dim);text-transform:uppercase;margin-top:2px;}
.card{width:100%;max-width:320px;background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:22px;margin-top:24px;}
.flabel{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:block;margin:12px 0 5px;}
.flabel:first-child{margin-top:0;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--br);border-radius:7px;padding:11px 12px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--g);}
.btn-p{width:100%;margin-top:18px;background:var(--g);color:#000;border:none;border-radius:8px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.btn-p:active{opacity:.8;}
.err{color:var(--r);font-size:11px;letter-spacing:1px;text-align:center;margin-top:8px;min-height:16px;}
.cred-hint{margin-top:10px;font-size:10px;color:var(--dim);letter-spacing:.5px;line-height:1.5;}

/* ── SETUP ── */
#tela-setup{height:100dvh;display:none;flex-direction:column;padding:20px 16px;overflow-y:auto;background:var(--bg);}
.stitle{font-size:11px;letter-spacing:3px;color:var(--g);text-transform:uppercase;margin-bottom:18px;text-align:center;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fi.big{font-size:22px;font-weight:800;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;padding:10px 12px;}
.fi.big::placeholder{font-weight:400;font-size:16px;text-transform:none;}

/* ── APP ── */
#tela-app{height:100dvh;display:none;flex-direction:column;}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--br);padding:7px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-logo{font-size:16px;font-weight:900;color:var(--g);letter-spacing:-0.5px;}
.hdr-centro{flex:1;display:flex;flex-direction:column;align-items:center;}
.placar{font-size:24px;font-weight:800;color:#fff;letter-spacing:4px;line-height:1;}
.placar-nomes{font-size:9px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.crono{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--g);line-height:1;}
.crono-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g);margin-right:3px;vertical-align:middle;animation:blink 1s infinite;}
.crono-dot.off{background:var(--dim);animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.periodo-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);}
.periodo-badge.ativo{color:var(--g);}
.periodo-badge.int{color:var(--y);}
.periodo-badge.enc{color:var(--r);}

/* CONTROLES JOGO */
.ctrl-bar{display:flex;gap:5px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;}
.btn-ctrl{flex:1;padding:8px 3px;border-radius:7px;border:1px solid var(--br);background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--dim);transition:all .12s;}
.btn-ctrl:active{opacity:.65;}
.btn-ctrl.verde{border-color:var(--g3);color:var(--g);}
.btn-ctrl.verde.on{background:#001a0a;border-color:var(--g);}
.btn-ctrl.amarelo{border-color:#ffd60033;color:var(--y);}
.btn-ctrl.amarelo.on{background:#1a1000;border-color:var(--y);}
.btn-ctrl.vermelho{border-color:#ff3b3b33;color:var(--r);}

/* BOLA PARADA ATIVA */
.bp-bar{flex-shrink:0;background:#1a0800;border-bottom:1px solid #ff880033;padding:6px 12px;display:none;align-items:center;gap:8px;}
.bp-bar.on{display:flex;}
.bp-tipo{font-size:14px;font-weight:800;color:var(--o);letter-spacing:1px;text-transform:uppercase;flex:1;}
.bp-timer{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--o);min-width:44px;}
.bp-ok{background:none;border:1px solid var(--o);border-radius:6px;color:var(--o);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;cursor:pointer;}
.bp-ok:active{opacity:.65;}

/* TIME SELECTOR */
.time-sel{display:flex;gap:6px;padding:5px 10px;background:var(--bg2);border-bottom:1px solid var(--br);flex-shrink:0;}
.btn-time{flex:1;padding:9px 4px;border-radius:7px;border:2px solid var(--br);background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--dim);transition:all .12s;}
.btn-time:active{opacity:.7;}
.btn-time.casa.on{background:#001833;border-color:var(--b);color:var(--b);}
.btn-time.fora.on{background:#330000;border-color:var(--r);color:var(--r);}
.vs-sep{display:flex;align-items:center;color:var(--br);font-size:16px;padding:0 2px;}

/* ZONA INFO */
.zona-info{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--g3);padding:4px 12px;display:none;align-items:center;gap:8px;}
.zona-info.on{display:flex;}
.zi-txt{flex:1;font-size:12px;font-weight:700;color:var(--g);letter-spacing:.5px;text-transform:uppercase;}
.zi-x{color:var(--dim);font-size:20px;cursor:pointer;line-height:1;}

/* CAMPO */
.campo-wrap{flex:1;display:flex;overflow:hidden;min-height:0;}
.campo{flex:1;display:grid;grid-template-rows:repeat(8,1fr);grid-template-columns:repeat(4,1fr);gap:1px;background:#0a160a;position:relative;}
.campo::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;
  background:linear-gradient(transparent calc(50% - .5px),#1a4a1a 50%,transparent calc(50% + .5px));}
.zona{background:#0d1a0d;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:background .08s;}
.zona:active{filter:brightness(1.5);}
.zona.sel{outline:2px solid var(--g);outline-offset:-2px;z-index:5;}
.zh{position:absolute;inset:0;opacity:0;transition:opacity .4s;border-radius:2px;pointer-events:none;}
.zh.c{background:radial-gradient(ellipse,#0055ff55,transparent 70%);}
.zh.f{background:radial-gradient(ellipse,#ff222255,transparent 70%);}
.zn{position:absolute;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;pointer-events:none;z-index:5;}
.zn.c{color:var(--b);left:3px;top:3px;}
.zn.f{color:var(--r);right:3px;top:3px;}
@keyframes flashC{from{background:#003388;}to{background:#0d1a0d;}}
@keyframes flashF{from{background:#330011;}to{background:#0d1a0d;}}
.zona.flashC{animation:flashC .3s ease-out;}
.zona.flashF{animation:flashF .3s ease-out;}
/* zona perigo (0,1,2) */
.zona[data-r="0"],.zona[data-r="1"],.zona[data-r="2"]{background:#0e1a0a;}
.zona[data-r="0"]::before,.zona[data-r="1"]::before,.zona[data-r="2"]::before{
  content:'';position:absolute;inset:0;pointer-events:none;border:1px solid #ff440011;}
.lz{position:absolute;right:0;top:0;bottom:0;width:24px;display:flex;flex-direction:column;pointer-events:none;z-index:20;}
.lz-item{flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-size:7px;color:var(--dim);}
.lz-item.d{color:#ff6600;opacity:.8;}
.lbl-corr{display:flex;flex-shrink:0;padding:3px 10px;background:var(--bg);border-top:1px solid var(--br);}
.lbl-corr span{flex:1;text-align:center;font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;}

/* BOLA PARADA BOTÕES */
.bp-botoes{flex-shrink:0;display:flex;gap:5px;padding:5px 10px;background:var(--bg2);border-top:1px solid var(--br);}
.btn-bp{flex:1;background:var(--bg3);border:1px solid var(--br);border-radius:7px;padding:6px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.btn-bp:active{opacity:.6;}
.btn-bp .e{font-size:15px;line-height:1;}
.btn-bp .l{font-size:7px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--dim);text-align:center;}

/* EVENTOS */
.evs-wrap{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--br);padding:5px 9px 7px;}
.evs-titulo{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}
.evs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.btn-ev{background:var(--bg3);border:1px solid var(--br);border-radius:7px;padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.btn-ev:active{transform:scale(.9);}
.btn-ev .e{font-size:18px;line-height:1;}
.btn-ev .l{font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--dim);text-align:center;line-height:1.2;}
.btn-ev.gol{border-color:#00e66422;}
.btn-ev.ap{border-color:#ff440022;}

/* DESFAZER */
.btn-und{position:fixed;left:10px;bottom:230px;background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:7px 10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;z-index:50;display:none;align-items:center;gap:5px;}
.btn-und.on{display:flex;}
.btn-und:active{border-color:var(--r);color:var(--r);}

/* FEED BTN */
.feed-btn{position:fixed;right:0;bottom:230px;background:var(--bg2);border:1px solid var(--br);border-right:none;border-radius:8px 0 0 8px;padding:8px 7px;font-size:18px;cursor:pointer;z-index:50;}
.feed-badge{position:absolute;top:-5px;right:-5px;background:var(--g);color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}

/* PAINEL */
.overlay{position:fixed;inset:0;background:#00000077;z-index:199;display:none;}
.overlay.on{display:block;}
.painel{position:fixed;top:0;right:-100%;width:88%;max-width:340px;height:100dvh;background:var(--bg2);border-left:1px solid var(--br);z-index:200;transition:right .22s;display:flex;flex-direction:column;}
.painel.on{right:0;}
.painel-hdr{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.painel-titulo{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--g);}
.painel-x{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;}
/* stats */
.stats-blk{display:grid;grid-template-columns:1fr auto 1fr;padding:10px 14px;border-bottom:1px solid var(--br);flex-shrink:0;}
.sc{display:flex;flex-direction:column;gap:5px;}
.sc.f{align-items:flex-end;}
.sr{display:flex;align-items:center;gap:6px;}
.sr.f{flex-direction:row-reverse;}
.sv{font-family:'JetBrains Mono',monospace;font-size:15px;}
.sv.c{color:var(--b);}
.sv.f{color:var(--r);}
.sl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.sc-mid{display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;text-align:center;line-height:1.5;}
/* corredor bars */
.cb-blk{padding:8px 14px;border-bottom:1px solid var(--br);flex-shrink:0;}
.cb-titulo{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.cb-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.cb-nome{font-size:8px;color:var(--dim);text-transform:uppercase;width:44px;flex-shrink:0;}
.cb-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative;}
.cb-c{position:absolute;left:50%;top:0;bottom:0;background:var(--b);transform-origin:left;border-radius:0 3px 3px 0;}
.cb-f{position:absolute;right:50%;top:0;bottom:0;background:var(--r);transform-origin:right;border-radius:3px 0 0 3px;}
/* bola parada histórico */
.bp-blk{padding:8px 14px;border-bottom:1px solid var(--br);flex-shrink:0;}
.bp-blk-t{font-size:8px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
.bp-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--bg3);font-size:11px;}
.bp-item:last-child{border:none;}
.bp-item-min{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);min-width:26px;}
.bp-item-tipo{font-weight:700;color:var(--o);font-size:12px;flex:1;}
.bp-item-dur{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
/* feed lista */
.feed-lista{flex:1;overflow-y:auto;padding:6px 12px;}
.feed-item{display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid var(--br);font-size:11px;}
.fi-min{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);min-width:28px;padding-top:1px;}
.fi-em{font-size:16px;min-width:18px;}
.fi-info{flex:1;}
.fi-nome{font-weight:700;font-size:12px;letter-spacing:.3px;}
.fi-nome.c{color:var(--b);}
.fi-nome.f{color:var(--r);}
.fi-zona{font-size:9px;color:var(--dim);margin-top:1px;}
.fi-undo{background:none;border:1px solid var(--br);border-radius:4px;color:var(--dim);font-size:9px;padding:2px 5px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}

/* TOAST */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--g);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;padding:10px 22px;border-radius:10px;z-index:400;opacity:0;transition:all .15s;pointer-events:none;text-transform:uppercase;white-space:nowrap;}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast.err{background:var(--r);color:#fff;}
.toast.neu{background:var(--bg3);color:var(--txt);border:1px solid var(--br);}
.toast.lar{background:var(--o);color:#000;}

@media(max-height:660px){
  .zona{min-height:36px;}
  .btn-ev{padding:6px 3px 5px;}
  .btn-ev .e{font-size:16px;}
  .btn-bp .e{font-size:13px;}
  .btn-bp{padding:5px 3px;}
  .evs-wrap{padding:4px 8px 5px;}
  .bp-botoes{padding:4px 8px;}
}
</style>
</head>
<body>

<!-- LOGIN REMOVIDO: Firebase config hardcoded, mesmo do admin -->
<div id="tela-login" style="display:none!important;"></div>

<!-- ══════════════════ SETUP ══════════════════ -->
<div id="tela-setup">
  <div class="stitle">⚽ Configurar Jogo</div>

  <label class="flabel">Times</label>
  <div class="row2">
    <input class="fi big" type="text" id="inp-casa" placeholder="Casa" maxlength="16" style="text-align:center;">
    <input class="fi big" type="text" id="inp-fora" placeholder="Fora" maxlength="16" style="text-align:center;">
  </div>

  <label class="flabel" style="margin-top:14px;">Liga / Competição</label>
  <input class="fi" type="text" id="inp-liga" placeholder="Brasileirão Série A..." maxlength="40">

  <label class="flabel" style="margin-top:14px;">Fixture ID (opcional)</label>
  <input class="fi" type="text" id="inp-fxid" placeholder="1234567 — deixe vazio para gerar automático" inputmode="numeric" maxlength="12">

  <button class="btn-p" onclick="iniciarJogo()" style="margin-top:22px;">Iniciar Scout →</button>


</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="tela-app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">YS</div>
    <div class="hdr-centro">
      <div class="placar" id="placar">0 — 0</div>
      <div class="placar-nomes" id="nomes-display">Casa × Fora</div>
    </div>
    <div class="hdr-right">
      <div class="crono"><span class="crono-dot off" id="dot"></span><span id="crono-txt">00:00</span></div>
      <div class="periodo-badge" id="periodo-badge">PRÉ-JOGO</div>
    </div>
  </div>

  <!-- CONTROLES JOGO -->
  <div class="ctrl-bar">
    <button class="btn-ctrl verde" id="btn-iniciar" onclick="ctrlIniciar()">▶ Iniciar</button>
    <button class="btn-ctrl amarelo" id="btn-intervalo" onclick="ctrlIntervalo()">⏸ Intervalo</button>
    <button class="btn-ctrl vermelho" onclick="ctrlEncerrar()">■ Encerrar</button>
  </div>

  <!-- BOLA PARADA ATIVA -->
  <div class="bp-bar" id="bp-bar">
    <div class="bp-tipo" id="bp-tipo-ativo">—</div>
    <div class="bp-timer" id="bp-timer">0s</div>
    <button class="bp-ok" onclick="encerrarBP()">✓ OK</button>
  </div>

  <!-- TIME SELECTOR -->
  <div class="time-sel">
    <button class="btn-time casa" id="btn-casa" onclick="selTime('casa')"><span id="lbl-casa">CASA</span></button>
    <div class="vs-sep">·</div>
    <button class="btn-time fora" id="btn-fora" onclick="selTime('fora')"><span id="lbl-fora">FORA</span></button>
  </div>

  <!-- ZONA INFO -->
  <div class="zona-info" id="zona-info">
    <div class="zi-txt" id="zi-txt">—</div>
    <div class="zi-x" onclick="limparZona()">×</div>
  </div>

  <!-- CAMPO -->
  <div class="campo-wrap">
    <div class="campo" id="campo"></div>
    <div class="lz" id="lz"></div>
  </div>
  <div class="lbl-corr">
    <span>◀ Esq</span><span>Ctr-E</span><span>Ctr-D</span><span>Dir ▶</span>
  </div>

  <!-- BOLA PARADA BOTÕES -->
  <div class="bp-botoes">
    <button class="btn-bp" onclick="iniciarBP('Escanteio')"><span class="e">🚩</span><span class="l">Escanteio</span></button>
    <button class="btn-bp" onclick="iniciarBP('Falta')"><span class="e">👊</span><span class="l">Falta</span></button>
    <button class="btn-bp" onclick="iniciarBP('Pênalti')"><span class="e">🎯</span><span class="l">Pênalti</span></button>
    <button class="btn-bp" onclick="iniciarBP('Lateral')"><span class="e">🤾</span><span class="l">Lateral</span></button>
    <button class="btn-bp" onclick="iniciarBP('Tiro de Meta')"><span class="e">🧤</span><span class="l">Tiro Meta</span></button>
  </div>

  <!-- EVENTOS -->
  <div class="evs-wrap">
    <div class="evs-titulo">Evento — selecione time + zona e toque</div>
    <div class="evs-grid">
      <button class="btn-ev gol" onclick="regEvento('gol')"><span class="e">⚽</span><span class="l">Gol</span></button>
      <button class="btn-ev ap" onclick="regEvento('ap')"><span class="e">🔥</span><span class="l">At.Perig</span></button>
      <button class="btn-ev" onclick="regEvento('chute')"><span class="e">🎯</span><span class="l">Chute</span></button>
      <button class="btn-ev" onclick="regEvento('pressao')"><span class="e">💥</span><span class="l">Pressão</span></button>
      <button class="btn-ev" onclick="regEvento('cartao')"><span class="e">🟨</span><span class="l">Cartão</span></button>
      <button class="btn-ev" onclick="regEvento('sub')"><span class="e">↕️</span><span class="l">Sub</span></button>
      <button class="btn-ev" onclick="regEvento('defesa')"><span class="e">🛡️</span><span class="l">Defesa</span></button>
      <button class="btn-ev" onclick="regEvento('posse')"><span class="e">🤚</span><span class="l">Posse</span></button>
    </div>
  </div>
</div>

<!-- FLUTUANTES -->
<button class="btn-und" id="btn-und" onclick="desfazer()">↩ Desfazer</button>
<button class="feed-btn" onclick="abrirPainel()">📋<div class="feed-badge" id="feed-badge">0</div></button>

<!-- PAINEL -->
<div class="overlay" id="overlay" onclick="fecharPainel()"></div>
<div class="painel" id="painel">
  <div class="painel-hdr">
    <div class="painel-titulo">Stats & Feed</div>
    <button class="painel-x" onclick="fecharPainel()">×</button>
  </div>
  <div class="stats-blk">
    <div class="sc">
      <div class="sr"><span class="sv c" id="s-ap-c">0</span><span class="sl">AP</span></div>
      <div class="sr"><span class="sv c" id="s-gol-c">0</span><span class="sl">Gols</span></div>
      <div class="sr"><span class="sv c" id="s-ch-c">0</span><span class="sl">Chutes</span></div>
      <div class="sr"><span class="sv c" id="s-esc-c">0</span><span class="sl">Escanteios</span></div>
    </div>
    <div class="sc-mid">
      <div id="stat-nc" style="color:var(--b);font-weight:700;">CASA</div>
      <div style="color:var(--br);margin:3px 0;">×</div>
      <div id="stat-nf" style="color:var(--r);font-weight:700;">FORA</div>
    </div>
    <div class="sc f">
      <div class="sr f"><span class="sv f" id="s-ap-f">0</span><span class="sl">AP</span></div>
      <div class="sr f"><span class="sv f" id="s-gol-f">0</span><span class="sl">Gols</span></div>
      <div class="sr f"><span class="sv f" id="s-ch-f">0</span><span class="sl">Chutes</span></div>
      <div class="sr f"><span class="sv f" id="s-esc-f">0</span><span class="sl">Escanteios</span></div>
    </div>
  </div>
  <div class="cb-blk">
    <div class="cb-titulo">Pressão por corredor</div>
    <div id="cb-container"></div>
  </div>
  <div class="bp-blk">
    <div class="bp-blk-t">Bolas paradas</div>
    <div id="bp-hist"><div style="font-size:10px;color:var(--dim);padding:4px 0;">Nenhuma registrada</div></div>
  </div>
  <div class="feed-lista" id="feed-lista">
    <div style="text-align:center;color:var(--dim);font-size:11px;padding:20px 0;letter-spacing:1px;text-transform:uppercase;">Sem eventos</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";



const ZONAS     = ['Área Adversária','Zona Chute','Ataque','Meio Ofensivo','Meio Defensivo','Defesa','Recuado','Saída de Bola'];
const CORREDORES= ['esq','ctr-e','ctr-d','dir'];
const CORR_LBL  = ['Esq','Ctr-E','Ctr-D','Dir'];
const DANGER    = [0,1,2];
const EMOJIS    = {ap:'🔥',gol:'⚽',chute:'🎯',pressao:'💥',cartao:'🟨',sub:'↕️',defesa:'🛡️',posse:'🤚'};
const NOMES     = {ap:'Ataque Perigoso',gol:'Gol',chute:'Chute',pressao:'Pressão Alta',cartao:'Cartão',sub:'Substituição',defesa:'Defesa',posse:'Posse'};
const BP_EMOJIS = {Escanteio:'🚩',Falta:'👊','Pênalti':'🎯',Lateral:'🤾','Tiro de Meta':'🧤'};

// Estado global
const G = {
  db:null,
  casa:'CASA', fora:'FORA', liga:'', fxId:'scout-0',
  timeSel:null, zonaSel:null,
  golsCasa:0, golsFora:0,
  stats:{c:{ap:0,gol:0,ch:0,esc:0}, f:{ap:0,gol:0,ch:0,esc:0}},
  heat:{}, corr:{c:[0,0,0,0],f:[0,0,0,0]},
  eventos:[],
  // cronômetro
  ms:0, ini:null, rodando:false, tmr:null,
  periodo:0, // 0=pre 1=1T 2=inter 3=2T 4=enc
  // bola parada
  bpTipo:null, bpIni:null, bpTmr:null, bpHist:[],
};

// ─── FIREBASE CONFIG (mesma do admin) ────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain: "painel-yellup.firebaseapp.com",
  projectId: "painel-yellup",
  storageBucket: "painel-yellup.appspot.com",
  messagingSenderId: "608347210297",
  appId: "1:608347210297:web:75092713724e617c7203e8"
};

function mostrarSetup(){
  document.getElementById('tela-login').style.display='none';
  const s = document.getElementById('tela-setup');
  s.style.display='flex'; s.style.flexDirection='column';
}

window.voltarSetup = function(){
  document.getElementById('tela-app').style.display='none';
  mostrarSetup();
};

// ─── SETUP / INICIAR JOGO ────────────────────────────────────
window.iniciarJogo = function(){
  const casa = (document.getElementById('inp-casa').value.trim()||'CASA').toUpperCase();
  const fora = (document.getElementById('inp-fora').value.trim()||'FORA').toUpperCase();
  const liga = document.getElementById('inp-liga').value.trim();
  const fxId = document.getElementById('inp-fxid').value.trim() || 'scout-'+Date.now();

  if(!document.getElementById('inp-casa').value.trim() || !document.getElementById('inp-fora').value.trim()){
    toast('Informe os dois times','err'); return;
  }

  G.casa=casa; G.fora=fora; G.liga=liga; G.fxId=fxId;
  document.getElementById('lbl-casa').textContent = casa.substring(0,10);
  document.getElementById('lbl-fora').textContent = fora.substring(0,10);
  document.getElementById('nomes-display').textContent = `${casa} × ${fora}`;
  document.getElementById('stat-nc').textContent = casa.substring(0,8);
  document.getElementById('stat-nf').textContent = fora.substring(0,8);

  document.getElementById('tela-setup').style.display='none';
  const app = document.getElementById('tela-app');
  app.style.display='flex'; app.style.flexDirection='column';

  construirCampo();
  construirCorrBars();
};

// ─── CAMPO ───────────────────────────────────────────────────
function construirCampo(){
  const campo = document.getElementById('campo');
  const lzEl  = document.getElementById('lz');
  campo.innerHTML=''; lzEl.innerHTML='';

  for(let r=0;r<8;r++){
    for(let c=0;c<4;c++){
      const z=document.createElement('div');
      z.className='zona'; z.dataset.r=r; z.dataset.c=c;

      const hc=document.createElement('div'); hc.className='zh c'; hc.id=`h-c-${r}-${c}`;
      const hf=document.createElement('div'); hf.className='zh f'; hf.id=`h-f-${r}-${c}`;
      const nc=document.createElement('div'); nc.className='zn c'; nc.id=`n-c-${r}-${c}`;
      const nf=document.createElement('div'); nf.className='zn f'; nf.id=`n-f-${r}-${c}`;
      z.append(hc,hf,nc,nf);
      z.addEventListener('click',()=>selZona(r,c));
      campo.appendChild(z);
    }
    const l=document.createElement('div');
    l.className='lz-item'+(DANGER.includes(r)?' d':'');
    l.textContent=ZONAS[r].split(' ')[0].substring(0,4);
    lzEl.appendChild(l);
  }
}

// ─── CRONÔMETRO ──────────────────────────────────────────────
function getMin(){ return Math.floor(G.ms/60000); }
function fmtCrono(ms){
  const t=Math.floor(ms/1000);
  return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}

window.ctrlIniciar = function(){
  if(G.periodo===4){ toast('Jogo encerrado','neu'); return; }

  if(!G.rodando){
    // Iniciar/retomar
    if(G.periodo===0){ G.periodo=1; setPeriodoBadge(); }
    G.ini = Date.now()-G.ms;
    G.rodando=true;
    G.tmr = setInterval(()=>{
      G.ms = Date.now()-G.ini;
      document.getElementById('crono-txt').textContent = fmtCrono(G.ms);
    },500);
    document.getElementById('dot').classList.remove('off');
    document.getElementById('btn-iniciar').textContent='⏸ Pausar';
    document.getElementById('btn-iniciar').classList.add('on');
  } else {
    // Pausar
    G.ms = Date.now()-G.ini;
    G.rodando=false;
    clearInterval(G.tmr);
    document.getElementById('dot').classList.add('off');
    document.getElementById('btn-iniciar').textContent='▶ Retomar';
    document.getElementById('btn-iniciar').classList.remove('on');
  }
};

window.ctrlIntervalo = function(){
  if(G.periodo===1){
    // Fim 1T → Intervalo
    if(G.rodando) ctrlIniciar(); // pausar
    G.periodo=2; setPeriodoBadge();
    G.ms=0; G.ini=null;
    document.getElementById('crono-txt').textContent='00:00';
    document.getElementById('btn-iniciar').textContent='▶ Iniciar';
    document.getElementById('btn-iniciar').classList.remove('on');
    document.getElementById('btn-intervalo').textContent='▶ 2º Tempo';
    document.getElementById('btn-intervalo').classList.add('on');
    toast('⏸ Intervalo','neu');
  } else if(G.periodo===2){
    // Inicio 2T
    G.periodo=3; setPeriodoBadge();
    G.ms=0; G.ini=null;
    document.getElementById('btn-intervalo').textContent='⏸ Intervalo';
    document.getElementById('btn-intervalo').classList.remove('on');
    ctrlIniciar();
    toast('▶ 2º Tempo','neu');
  } else if(G.periodo===3){
    // Fim 2T → Intervalo (prorrogação ou encerrar)
    if(G.rodando) ctrlIniciar();
    G.periodo=2; setPeriodoBadge();
    document.getElementById('btn-intervalo').textContent='▶ Prorrogação';
    document.getElementById('btn-intervalo').classList.add('on');
    toast('⏸ Fim 2T','neu');
  }
};

window.ctrlEncerrar = function(){
  if(!confirm('Encerrar o jogo agora?')) return;
  if(G.rodando) ctrlIniciar();
  if(G.bpTipo) encerrarBP();
  G.periodo=4; setPeriodoBadge();
  document.getElementById('dot').classList.add('off');
  toast('■ Jogo encerrado','neu');
};

function setPeriodoBadge(){
  const el=document.getElementById('periodo-badge');
  const t=['PRÉ-JOGO','1º TEMPO','INTERVALO','2º TEMPO','ENCERRADO'];
  el.textContent=t[G.periodo]||'';
  el.className='periodo-badge';
  if(G.periodo===1||G.periodo===3) el.classList.add('ativo');
  else if(G.periodo===2) el.classList.add('int');
  else if(G.periodo===4) el.classList.add('enc');
}

// ─── BOLA PARADA ─────────────────────────────────────────────
window.iniciarBP = function(tipo){
  if(G.bpTipo) encerrarBP();
  const time = G.timeSel||(()=>{toast('Selecione o time','neu');return null;})();
  if(!time) return;

  G.bpTipo=tipo; G.bpIni=Date.now();
  const nomeTime = time==='c'?G.casa:G.fora;
  document.getElementById('bp-tipo-ativo').textContent = `${BP_EMOJIS[tipo]||''} ${tipo} — ${nomeTime}`;
  document.getElementById('bp-bar').classList.add('on');
  G.bpTmr=setInterval(()=>{
    const s=Math.floor((Date.now()-G.bpIni)/1000);
    document.getElementById('bp-timer').textContent=`${s}s`;
  },500);
  toast(`${BP_EMOJIS[tipo]||''} ${tipo}`,'lar');
};

window.encerrarBP = function(){
  if(!G.bpTipo) return;
  clearInterval(G.bpTmr);
  const dur=Math.floor((Date.now()-G.bpIni)/1000);
  const item={tipo:G.bpTipo, time:G.timeSel, min:getMin(), dur, periodo:G.periodo};
  G.bpHist.unshift(item);
  renderBpHist();
  document.getElementById('bp-bar').classList.remove('on');

  // Salvar Firestore
  if(G.db) addDoc(collection(G.db,'scout-bola-parada'),{
    fixtureId:G.fxId, timeCasa:G.casa, timeFora:G.fora, liga:G.liga,
    tipo:item.tipo, time:item.time, minuto:item.min, duracao:dur,
    periodo:G.periodo, timestamp:serverTimestamp()
  }).catch(e=>console.warn('BP:',e));

  G.bpTipo=null; G.bpIni=null;
  toast(`✓ ${item.tipo}: ${dur}s`,'neu');
};

function renderBpHist(){
  const el=document.getElementById('bp-hist');
  if(!G.bpHist.length){ el.innerHTML='<div style="font-size:10px;color:var(--dim);padding:4px 0;">Nenhuma registrada</div>'; return; }
  el.innerHTML=G.bpHist.slice(0,12).map(b=>`
    <div class="bp-item">
      <div class="bp-item-min">${b.min}'</div>
      <div class="bp-item-tipo">${BP_EMOJIS[b.tipo]||''} ${b.tipo} · ${b.time==='c'?G.casa:G.fora}</div>
      <div class="bp-item-dur">${b.dur}s</div>
    </div>
  `).join('');
}

// ─── SELEÇÃO TIME/ZONA ────────────────────────────────────────
window.selTime = function(t){
  G.timeSel=t;
  document.getElementById('btn-casa').className=`btn-time casa${t==='c'?' on':''}`;
  document.getElementById('btn-fora').className=`btn-time fora${t==='f'?' on':''}`;
};
window.selZona = function(r,c){
  document.querySelectorAll('.zona.sel').forEach(z=>z.classList.remove('sel'));
  G.zonaSel={r,c};
  document.querySelector(`.zona[data-r="${r}"][data-c="${c}"]`)?.classList.add('sel');
  document.getElementById('zi-txt').textContent=`${ZONAS[r]} · ${CORR_LBL[c]}`;
  document.getElementById('zona-info').classList.add('on');
};
window.limparZona = function(){
  G.zonaSel=null;
  document.querySelectorAll('.zona.sel').forEach(z=>z.classList.remove('sel'));
  document.getElementById('zona-info').classList.remove('on');
};

// ─── REGISTRAR EVENTO ─────────────────────────────────────────
window.regEvento = async function(tipo){
  if(!G.timeSel){
    toast('Selecione o time!','neu');
    ['btn-casa','btn-fora'].forEach(id=>{
      const el=document.getElementById(id);
      el.style.borderColor='var(--y)';
      setTimeout(()=>el.style.borderColor='',700);
    });
    return;
  }
  const t=G.timeSel, z=G.zonaSel, min=getMin();

  // Placar
  if(tipo==='gol'){
    if(t==='c') G.golsCasa++;
    else G.golsFora++;
    document.getElementById('placar').textContent=`${G.golsCasa} — ${G.golsFora}`;
  }

  // Stats
  const sk={ap:'ap',gol:'gol',chute:'ch',pressao:'ch',defesa:'ch',posse:'ch',cartao:'ch',sub:'ch'};
  if(tipo==='ap') G.stats[t].ap++;
  else if(tipo==='gol') G.stats[t].gol++;
  else if(tipo==='chute') G.stats[t].ch++;
  // escanteio vem via BP agora, mas conta se pressionado direto
  renderStats();

  // Zona heat
  if(z){
    const k=`${z.r}-${z.c}`;
    if(!G.heat[k]) G.heat[k]={c:0,f:0};
    G.heat[k][t]++;
    const cnt=G.heat[k][t];
    const hEl=document.getElementById(`h-${t}-${z.r}-${z.c}`);
    if(hEl) hEl.style.opacity=Math.min(cnt/6,1)*0.75;
    const nEl=document.getElementById(`n-${t}-${z.r}-${z.c}`);
    if(nEl && cnt>0) nEl.textContent=cnt;
    G.corr[t][z.c]++;
    renderCorrBars();

    // Flash
    const zEl=document.querySelector(`.zona[data-r="${z.r}"][data-c="${z.c}"]`);
    if(zEl){ zEl.classList.remove('flashC','flashF'); void zEl.offsetWidth; zEl.classList.add(t==='c'?'flashC':'flashF'); }
  }

  // Evento
  const ev={tipo,t,z,min,periodo:G.periodo,_id:Date.now().toString()};
  G.eventos.unshift(ev);
  renderFeed();
  document.getElementById('btn-und').classList.add('on');

  // Toast
  const zt=z?` · ${CORR_LBL[z.c]}`:'';
  toast(`${EMOJIS[tipo]} ${t==='c'?G.casa:G.fora}${zt}`);

  // Firestore
  if(G.db){
    try{
      const ref = await addDoc(collection(G.db,'scout-eventos'),{
        fixtureId:G.fxId, timeCasa:G.casa, timeFora:G.fora, liga:G.liga,
        tipo, time:t, minuto:min, periodo:G.periodo,
        zona:z?{row:z.r,col:z.c,nome:ZONAS[z.r],corredor:CORREDORES[z.c],corredorLabel:CORR_LBL[z.c],ehPerigosa:DANGER.includes(z.r)}:null,
        timestamp:serverTimestamp(), criadoLocal:new Date().toISOString()
      });
      ev._docId=ref.id;
    }catch(e){console.warn('save:',e);}
  }
};

// ─── DESFAZER ────────────────────────────────────────────────
window.desfazer = async function(){
  if(!G.eventos.length) return;
  const ev=G.eventos.shift();
  if(ev.tipo==='gol'){
    if(ev.t==='c') G.golsCasa=Math.max(0,G.golsCasa-1);
    else G.golsFora=Math.max(0,G.golsFora-1);
    document.getElementById('placar').textContent=`${G.golsCasa} — ${G.golsFora}`;
  }
  if(ev.tipo==='ap') G.stats[ev.t].ap=Math.max(0,G.stats[ev.t].ap-1);
  else if(ev.tipo==='gol') G.stats[ev.t].gol=Math.max(0,G.stats[ev.t].gol-1);
  else if(ev.tipo==='chute') G.stats[ev.t].ch=Math.max(0,G.stats[ev.t].ch-1);

  if(ev.z){
    const k=`${ev.z.r}-${ev.z.c}`;
    if(G.heat[k]?.[ev.t]>0){
      G.heat[k][ev.t]--;
      const cnt=G.heat[k][ev.t];
      const hEl=document.getElementById(`h-${ev.t}-${ev.z.r}-${ev.z.c}`);
      if(hEl) hEl.style.opacity=Math.min(cnt/6,1)*0.75;
      const nEl=document.getElementById(`n-${ev.t}-${ev.z.r}-${ev.z.c}`);
      if(nEl) nEl.textContent=cnt>0?cnt:'';
    }
    G.corr[ev.t][ev.z.c]=Math.max(0,G.corr[ev.t][ev.z.c]-1);
    renderCorrBars();
  }
  renderStats(); renderFeed();
  if(!G.eventos.length) document.getElementById('btn-und').classList.remove('on');
  if(ev._docId && G.db) deleteDoc(doc(G.db,'scout-eventos',ev._docId)).catch(()=>{});
  toast('↩ Desfeito','neu');
};

// ─── RENDER ───────────────────────────────────────────────────
function renderStats(){
  document.getElementById('s-ap-c').textContent=G.stats.c.ap;
  document.getElementById('s-ap-f').textContent=G.stats.f.ap;
  document.getElementById('s-gol-c').textContent=G.stats.c.gol;
  document.getElementById('s-gol-f').textContent=G.stats.f.gol;
  document.getElementById('s-ch-c').textContent=G.stats.c.ch;
  document.getElementById('s-ch-f').textContent=G.stats.f.ch;
  document.getElementById('s-esc-c').textContent=G.bpHist.filter(b=>b.tipo==='Escanteio'&&b.time==='c').length;
  document.getElementById('s-esc-f').textContent=G.bpHist.filter(b=>b.tipo==='Escanteio'&&b.time==='f').length;
}
function renderFeed(){
  document.getElementById('feed-badge').textContent=G.eventos.length;
  const el=document.getElementById('feed-lista');
  if(!G.eventos.length){ el.innerHTML='<div style="text-align:center;color:var(--dim);font-size:11px;padding:20px 0;letter-spacing:1px;text-transform:uppercase;">Sem eventos</div>'; return; }
  el.innerHTML=G.eventos.slice(0,80).map((ev,i)=>`
    <div class="feed-item">
      <div class="fi-min">${ev.min}'</div>
      <div class="fi-em">${EMOJIS[ev.tipo]||'•'}</div>
      <div class="fi-info">
        <div class="fi-nome ${ev.t}">${NOMES[ev.tipo]||ev.tipo}</div>
        <div class="fi-zona">${ev.t==='c'?G.casa:G.fora}${ev.z?` · ${ZONAS[ev.z.r]} · ${CORR_LBL[ev.z.c]}`:''}</div>
      </div>
      ${i===0?`<button class="fi-undo" onclick="desfazer()">↩</button>`:''}
    </div>
  `).join('');
}

function construirCorrBars(){
  document.getElementById('cb-container').innerHTML=CORR_LBL.map((n,i)=>`
    <div class="cb-row">
      <div class="cb-nome">${n}</div>
      <div class="cb-wrap">
        <div class="cb-f" id="cbb-f-${i}" style="width:0"></div>
        <div class="cb-c" id="cbb-c-${i}" style="width:0"></div>
      </div>
    </div>
  `).join('');
}
function renderCorrBars(){
  const mc=Math.max(...G.corr.c,1), mf=Math.max(...G.corr.f,1);
  for(let i=0;i<4;i++){
    const ec=document.getElementById(`cbb-c-${i}`);
    const ef=document.getElementById(`cbb-f-${i}`);
    if(ec) ec.style.width=`${(G.corr.c[i]/mc)*45}%`;
    if(ef) ef.style.width=`${(G.corr.f[i]/mf)*45}%`;
  }
}

// ─── PAINEL ───────────────────────────────────────────────────
window.abrirPainel  = function(){ document.getElementById('painel').classList.add('on'); document.getElementById('overlay').classList.add('on'); };
window.fecharPainel = function(){ document.getElementById('painel').classList.remove('on'); document.getElementById('overlay').classList.remove('on'); };

// ─── TOAST ───────────────────────────────────────────────────
function toast(msg,tipo=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${tipo} on`;
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('on'),1200);
}

// ─── INIT AUTOMÁTICO ─────────────────────────────────────────
// Mesmo Firebase do admin — sem login necessário
try{
  const app = initializeApp(FIREBASE_CONFIG, 'yellup-scout');
  G.db = getFirestore(app);
}catch(e){ console.warn('Firebase:', e.message); }
// Vai direto pro setup
mostrarSetup();
</script>
