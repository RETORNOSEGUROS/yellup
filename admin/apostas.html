<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yellup · Previsões</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D15;--bg2:#131622;--bg3:#1A1D2E;--brd:#252840;
  --acc:#F5A524;--grn:#27D49B;--blu:#4F96F4;--red:#EF5F5F;--pur:#A78BFA;
  --t1:#F0F2FF;--t2:#858BA5;--t3:#4A4F6A;
}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--brd);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header-logo{font-size:20px;font-weight:800;color:var(--acc);letter-spacing:-0.5px}
.header-title{font-size:14px;color:var(--t2)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn-back{background:var(--bg3);border:1px solid var(--brd);color:var(--t2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.btn-back:hover{color:var(--t1);border-color:var(--acc)}

/* ── TOOLBAR ── */
.toolbar{padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--brd)}
.date-nav{display:flex;align-items:center;gap:8px}
.date-btn{background:var(--bg3);border:1px solid var(--brd);color:var(--t2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.date-btn:hover{border-color:var(--acc);color:var(--acc)}
.date-display{background:var(--bg3);border:1px solid var(--brd);padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--t1);min-width:130px;text-align:center}
.btn-analisar{background:var(--acc);color:#000;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-analisar:hover{opacity:.9}
.btn-analisar:disabled{opacity:.5;cursor:not-allowed}
.filtro-liga{background:var(--bg3);border:1px solid var(--brd);color:var(--t1);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.status-bar{margin-left:auto;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px}
.dot-spin{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:spin .8s linear infinite}
@keyframes spin{0%{opacity:1}50%{opacity:.2}100%{opacity:1}}

/* ── RESUMO TOPO ── */
.resumo-bar{padding:12px 24px;display:flex;gap:24px;border-bottom:1px solid var(--brd);background:var(--bg2)}
.resumo-item{text-align:center}
.resumo-num{font-size:20px;font-weight:700}
.resumo-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}

/* ── GRID DE JOGOS ── */
.jogos-grid{padding:20px 24px;display:flex;flex-direction:column;gap:12px;max-width:1100px;margin:0 auto}

/* ── CARD DE JOGO ── */
.jogo-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;transition:border-color .2s}
.jogo-card:hover{border-color:var(--acc)}
.jogo-card.loading{opacity:.7}
.jogo-card.analisado{border-color:var(--brd)}

.card-header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.card-liga{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.card-hora{font-size:12px;color:var(--t3);margin-left:auto}
.card-status-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-agendado{background:rgba(79,150,244,.15);color:var(--blu)}
.badge-ao_vivo{background:rgba(239,95,95,.2);color:var(--red);animation:pulse 1.5s infinite}
.badge-encerrado{background:rgba(133,139,165,.1);color:var(--t2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.card-body{padding:16px}
.times-row{display:flex;align-items:center;gap:12px}
.time-info{flex:1;display:flex;flex-direction:column;gap:4px}
.time-info.fora{align-items:flex-end}
.time-escudo{width:36px;height:36px;object-fit:contain}
.time-nome{font-size:14px;font-weight:600}
.time-forma{display:flex;gap:3px}
.forma-dot{width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.forma-V{background:rgba(39,212,155,.2);color:var(--grn)}
.forma-E{background:rgba(79,150,244,.2);color:var(--blu)}
.forma-D{background:rgba(239,95,95,.2);color:var(--red)}

.vs-area{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px}
.vs-placar{font-size:22px;font-weight:800;letter-spacing:2px}
.vs-label{font-size:10px;color:var(--t3)}

/* ── PREVISÃO ── */
.previsao-area{margin-top:14px;padding-top:14px;border-top:1px solid var(--brd);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prev-bloco{background:var(--bg3);border-radius:10px;padding:12px 14px}
.prev-titulo{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* Resultado */
.resultado-bars{display:flex;flex-direction:column;gap:6px}
.res-item{display:flex;align-items:center;gap:8px}
.res-label{font-size:11px;color:var(--t2);width:80px}
.res-bar-wrap{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.res-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right}
.res-item.destaque .res-label{color:var(--t1);font-weight:600}
.res-item.destaque .res-pct{color:var(--acc)}

/* Gols */
.gols-display{display:flex;align-items:center;gap:12px}
.gols-num{font-size:32px;font-weight:800;color:var(--acc)}
.gols-info{display:flex;flex-direction:column;gap:2px}
.gols-range{font-size:11px;color:var(--t2)}
.gols-tendencia{font-size:11px;font-weight:600}
.tend-alto{color:var(--red)}
.tend-medio{color:var(--acc)}
.tend-baixo{color:var(--grn)}

/* Previsão veredito */
.veredito{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px}
.veredito-home{background:rgba(39,212,155,.1);border-left:3px solid var(--grn)}
.veredito-draw{background:rgba(79,150,244,.1);border-left:3px solid var(--blu)}
.veredito-away{background:rgba(239,95,95,.1);border-left:3px solid var(--red)}
.veredito-icon{font-size:16px}
.veredito-text{color:var(--t1);font-weight:600}
.veredito-conf{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.conf-alta{background:rgba(39,212,155,.2);color:var(--grn)}
.conf-media{background:rgba(245,165,36,.2);color:var(--acc)}
.conf-baixa{background:rgba(133,139,165,.2);color:var(--t2)}
.conf-insuficiente{background:rgba(133,139,165,.1);color:var(--t3)}

/* Explicação */
.explicacao{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.exp-item{font-size:11px;color:var(--t2);display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.exp-item::before{content:"•";color:var(--acc);flex-shrink:0;margin-top:1px}

/* Fontes mini */
.fontes-mini{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.fonte-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--t3);border:1px solid var(--brd)}
.fonte-tag.ativa{color:var(--grn);border-color:rgba(39,212,155,.3)}

/* Loading state */
.prev-loading{display:flex;align-items:center;gap:8px;color:var(--t2);font-size:12px;padding:8px 0}
.prev-loading::before{content:"";width:12px;height:12px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:rotate .8s linear infinite;flex-shrink:0}
@keyframes rotate{to{transform:rotate(360deg)}}

/* Sem dados */
.sem-dados{color:var(--t3);font-size:12px;padding:8px 0;display:flex;align-items:center;gap:6px}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--t2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* Acurácia rodapé */
.acuracia-footer{margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.ac-label{font-size:10px;color:var(--t3)}
.ac-valor{font-size:12px;font-weight:700}

@media(max-width:640px){
  .previsao-area{grid-template-columns:1fr}
  .toolbar{gap:8px}
}

/* ── SIMULADOR ── */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.sim-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:16px}
.sim-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sim-table{width:100%;border-collapse:collapse;font-size:12px}
.sim-table th{color:var(--t2);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--brd);text-align:left}
.sim-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.sim-table tr:last-child td{border-bottom:none}
.sim-table tr:hover td{background:rgba(255,255,255,.03)}
.sim-best{background:rgba(99,195,34,.08)!important;font-weight:600}
.sim-pct{font-weight:700}
.sim-roi-pos{color:var(--grn);font-weight:700}
.sim-roi-neg{color:var(--red);font-weight:700}
.desvio-bar{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px}
.desvio-bar-fill{height:7px;border-radius:4px;min-width:2px}
.filtro-sim{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;color:var(--t1);font-size:12px}
@media(max-width:700px){.sim-grid{grid-template-columns:1fr}}
/* ── APRENDIZADO ── */
.apr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.apr-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:16px}
.apr-card-title{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.apr-big{font-size:32px;font-weight:800}
.apr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.liga-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.liga-row:last-child{border-bottom:none}
.liga-nome{font-size:13px;font-weight:600;min-width:160px}
.liga-bar-wrap{flex:1;height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.liga-bar-fill{height:100%;border-radius:3px;background:var(--grn)}
.liga-pct{font-size:12px;font-weight:700;min-width:40px;text-align:right}
.fator-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.fator-item:last-child{border-bottom:none}
.fator-nome{font-size:12px;color:var(--t1);flex:1}
.fator-count{font-size:11px;background:rgba(239,95,95,.15);color:var(--red);padding:2px 8px;border-radius:20px}
.prev-hist-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--brd);font-size:12px}
.prev-hist-row:last-child{border-bottom:none}
.prev-hist-times{flex:1;color:var(--t1)}
.prev-hist-result{font-weight:700}
.acertou{color:var(--grn)}
.errou{color:var(--red)}
@media(max-width:700px){.apr-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚽ Yellup</div>
  <div class="header-title">Previsões do Dia</div>
  <div class="header-right">
    <button class="btn-back" id="btnTabPrevisoes" onclick="setTab('previsoes')" style="color:var(--acc);border-color:var(--acc)">📊 Previsões</button>
    <button class="btn-back" id="btnTabAprendizado" onclick="setTab('aprendizado')">🧠 O que aprendemos</button>
    <button class="btn-back" id="btnTabSimulador" onclick="setTab('simulador')">🎰 Simulador</button>
    <a href="jogos-admin.html" class="btn-back">← Admin</a>
  </div>
</div>

<div class="toolbar">
  <div class="date-nav">
    <button class="date-btn" onclick="mudarData(-1)">‹</button>
    <div class="date-display" id="dateDisplay">—</div>
    <button class="date-btn" onclick="mudarData(1)">›</button>
  </div>
  <button class="btn-analisar" id="btnAnalisar" onclick="analisarTodos()">
    🔍 Analisar Todos
  </button>
  <select class="filtro-liga" id="filtroLiga" onchange="renderCards()">
    <option value="">Todas as ligas</option>
  </select>
  <div class="status-bar" id="statusBar"></div>
</div>

<div class="resumo-bar" id="resumoBar" style="display:none">
  <div class="resumo-item"><div class="resumo-num" id="rTotal" style="color:var(--acc)">0</div><div class="resumo-label">Jogos</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rAnalisados" style="color:var(--grn)">0</div><div class="resumo-label">Analisados</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rAlta" style="color:var(--grn)">0</div><div class="resumo-label">Alta Conf.</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rMedia" style="color:var(--acc)">0</div><div class="resumo-label">Média Conf.</div></div>
  <div class="resumo-item"><div class="resumo-num" id="rBaixa" style="color:var(--t2)">0</div><div class="resumo-label">Baixa/Insuf.</div></div>
</div>

<div id="painelSimulador" style="display:none;max-width:1100px;margin:0 auto;padding:20px 24px"><div id="simuladorContent"><div style="color:var(--t2);text-align:center;padding:40px">Configure os filtros e clique em Simular.</div></div></div>
<div id="painelAprendizado" style="display:none;max-width:1100px;margin:0 auto;padding:20px 24px">
  <div id="aprendizadoContent"><div style="color:var(--t2);text-align:center;padding:40px">Carregando dados de aprendizado...</div></div>
</div>
<div class="jogos-grid" id="jogosGrid">
  <div class="empty-state"><div class="icon">📅</div><p>Selecione uma data e clique em Analisar Todos</p></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
  authDomain:"painel-yellup.firebaseapp.com",
  projectId:"painel-yellup",
  storageBucket:"painel-yellup.appspot.com",
  messagingSenderId:"608347210297",
  appId:"1:608347210297:web:75092713724e617c7203e8"
});
const auth=firebase.auth(), db=firebase.firestore(), fns=firebase.functions();

// ── ESTADO ────────────────────────────────────────────────────────────────
let JOGOS = [];        // jogos do dia carregados
let PREVISOES = {};    // { fixtureId: { resultado, gols, confianca, ... } }
// Helper timezone Brasília
// ── IMPREVISIBILIDADE POR LIGA ───────────────────────────────────────────
const LIGA_IMPREV = {
  'Brasileirão Série A': 0.85, 'Brasileirão Série B': 0.80,
  'Brasileirão Série C': 0.75, 'Copa do Brasil': 0.80,
  'Paulista A1': 0.80, 'Carioca': 0.80, 'Gaúcho': 0.80,
  'Mineiro': 0.80, 'Baiano': 0.82, 'Paranaense': 0.80,
  'Premier League': 0.55, 'La Liga': 0.48, 'Bundesliga': 0.45,
  'Serie A': 0.52, 'Ligue 1': 0.50, 'Primeira Liga': 0.55,
  'Eredivisie': 0.50, 'Champions League': 0.40,
  'Europa League': 0.48, 'Copa Libertadores': 0.65,
  'Copa Sudamericana': 0.68, 'World Cup': 0.52,
  'DEFAULT': 0.65,
};
function getFatorImprev(ligaNome) {
  if (!ligaNome) return 0.65;
  if (LIGA_IMPREV[ligaNome] !== undefined) return LIGA_IMPREV[ligaNome];
  for (const [k, v] of Object.entries(LIGA_IMPREV)) {
    if (k !== 'DEFAULT' && ligaNome.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return 0.65;
}

function toBRTDate(d) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Sao_Paulo' }).format(d);
}

let DATA_ATUAL = toBRTDate(new Date());
let ANALISANDO = false;

// ── AUTH ──────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(u => {
  if (!u || u.email !== 'admin@yellup.com') { window.location.href = 'login.html'; return; }
  init();
});

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  gc('dateDisplay').textContent = formatarData(DATA_ATUAL);
  await carregarJogos();
}

function gc(id) { return document.getElementById(id); }

function formatarData(iso) {
  const d = new Date(iso + 'T12:00:00');
  const hoje  = toBRTDate(new Date());
  const amanha = toBRTDate(new Date(Date.now() + 86400000));
  const ontem  = toBRTDate(new Date(Date.now() - 86400000));
  const label = iso === hoje ? ' (Hoje)' : iso === amanha ? ' (Amanhã)' : iso === ontem ? ' (Ontem)' : '';
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'}) + label;
}

function mudarData(d) {
  const dt = new Date(DATA_ATUAL + 'T12:00:00');
  dt.setDate(dt.getDate() + d);
  DATA_ATUAL = toBRTDate(dt);
  gc('dateDisplay').textContent = formatarData(DATA_ATUAL);
  JOGOS = []; PREVISOES = {};
  carregarJogos();
}

// ── CARREGAR JOGOS DO DIA ─────────────────────────────────────────────────
let _livePollingInterval = null;
let _snapshotUnsub = null;

async function carregarJogos() {
  setStatus('Carregando jogos...');

  // Cancelar snapshot anterior se existir
  if (_snapshotUnsub) { _snapshotUnsub(); _snapshotUnsub = null; }
  if (_livePollingInterval) { clearInterval(_livePollingInterval); _livePollingInterval = null; }

  try {
    // Buscar só no intervalo ±3 dias da data selecionada
    // Evita que limit(300) corte jogos futuros quando há muitos históricos
    const dtAlvo   = new Date(DATA_ATUAL + 'T12:00:00');
    const dtInicio = new Date(dtAlvo); dtInicio.setDate(dtInicio.getDate() - 3);
    const dtFim    = new Date(dtAlvo); dtFim.setDate(dtFim.getDate() + 3);

    const snap = await db.collection('jogos-admin')
      .orderBy('dataInicio', 'asc')
      .startAt(firebase.firestore.Timestamp.fromDate(dtInicio))
      .endAt(firebase.firestore.Timestamp.fromDate(dtFim))
      .limit(200)
      .get();

    const todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    JOGOS = todos.filter(j => {
      if (!j.dataInicio) return false;
      const dt = j.dataInicio.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio);
      // Sempre usar horário de Brasília — sem fallbacks
      return toBRTDate(dt) === DATA_ATUAL;
    });

    // Popular filtro de ligas
    const ligas = [...new Set(JOGOS.map(j => j.liga?.nome).filter(Boolean))].sort();
    const sel = gc('filtroLiga');
    sel.innerHTML = '<option value="">Todas as ligas (' + JOGOS.length + ')</option>';
    ligas.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);

    setStatus('');
    gc('resumoBar').style.display = JOGOS.length ? 'flex' : 'none';
    const restored = restaurarPrevisoes();
    renderCards();
    if (restored > 0) setStatus(`✓ ${restored} previsões restauradas`, false);

    if (JOGOS.length === 0) {
      gc('jogosGrid').innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>Nenhum jogo encontrado para esta data</p></div>';
    }

    // Iniciar polling de placar para jogos ao vivo ou de hoje
    _iniciarLivePolling();

  } catch(e) {
    setStatus('Erro: ' + e.message, true);
  }
}

function _iniciarLivePolling() {
  // Polling a cada 45 segundos — atualiza só placar/minuto/status dos cards
  _livePollingInterval = setInterval(async () => {
    const temAoVivo = JOGOS.some(j => j.status === 'ao_vivo');
    const temHoje   = DATA_ATUAL === toBRTDate(new Date());
    if (!temAoVivo && !temHoje) return; // nada ao vivo e não é hoje — parar

    try {
      const ids = JOGOS.map(j => j.id);
      if (!ids.length) return;

      // Buscar em lotes de 10 (limite do Firestore)
      const lotes = [];
      for (let i = 0; i < ids.length; i += 10) lotes.push(ids.slice(i, i+10));

      let atualizado = false;
      for (const lote of lotes) {
        const snap = await db.collection('jogos-admin')
          .where(firebase.firestore.FieldPath.documentId(), 'in', lote)
          .get();

        snap.docs.forEach(d => {
          const novo = d.data();
          const idx = JOGOS.findIndex(j => j.id === d.id);
          if (idx === -1) return;
          const atual = JOGOS[idx];

          // Só atualizar se mudou algo relevante
          const mudou = novo.placarCasa !== atual.placarCasa
            || novo.placarFora !== atual.placarFora
            || novo.minuto !== atual.minuto
            || novo.status !== atual.status;

          if (mudou) {
            JOGOS[idx] = { ...atual, ...novo };
            atualizado = true;

            // Re-render só o card deste jogo preservando a previsão
            const cardEl = document.getElementById('card-' + d.id);
            if (cardEl) cardEl.outerHTML = renderCard(JOGOS[idx], PREVISOES[d.id]);
          }
        });
      }

      if (atualizado) atualizarResumo();

    } catch(e) {
      console.warn('Live polling erro:', e.message);
    }
  }, 30000); // 30 segundos (era 45, reduzido para jogos ao vivo)
}

// ── RESTAURAR PREVISÕES DO SESSION STORAGE ───────────────────────────────
function restaurarPrevisoes() {
  let restaurados = 0;
  JOGOS.forEach(j => {
    if (PREVISOES[j.id]) return; // já tem
    try {
      const cached = sessionStorage.getItem('prev_' + j.id);
      if (cached) {
        PREVISOES[j.id] = JSON.parse(cached);
        restaurados++;
      }
    } catch(e) {}
  });
  if (restaurados > 0) {
    console.log(`✓ ${restaurados} previsões restauradas do cache`);
    atualizarResumo();
  }
  return restaurados;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────
function renderCards() {
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;

  if (!jogos.length) {
    gc('jogosGrid').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum jogo para este filtro</p></div>';
    return;
  }

  // Agrupar por liga
  const grupos = {};
  jogos.forEach(j => {
    const liga = j.liga?.nome || 'Sem liga';
    if (!grupos[liga]) grupos[liga] = [];
    grupos[liga].push(j);
  });

  let html = '';
  Object.entries(grupos).forEach(([liga, gs]) => {
    gs.forEach(j => {
      const prev = PREVISOES[j.id] || null;
      html += renderCard(j, prev);
    });
  });

  gc('jogosGrid').innerHTML = html;
  atualizarResumo();
}

function renderCard(j, prev) {
  const dt = j.dataInicio?.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio || 0);
  const hora = dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', timeZone:'America/Sao_Paulo'});
  const dataBRT = toBRTDate(dt);
  const statusLabel = j.status === 'ao_vivo' ? 'AO VIVO' : j.status === 'encerrado' ? `FT · ${dataBRT}` : hora;
  const statusBadge = j.status === 'ao_vivo' ? 'ao_vivo' : j.status === 'encerrado' ? 'encerrado' : 'agendado';

  const formaC = renderForma(prev?.formaC || j.formaCasa || j.timeCasa?.forma);
  const formaF = renderForma(prev?.formaF || j.formaFora  || j.timeFora?.forma);
  const escC = j.timeCasa?.escudo || '';
  const escF = j.timeFora?.escudo || '';

  let placar = 'vs';
  if (j.placarCasa !== null && j.placarCasa !== undefined &&
      j.placarFora !== null && j.placarFora !== undefined) {
    placar = j.placarCasa + ' - ' + j.placarFora;
  }

  return `<div class="jogo-card ${prev ? 'analisado' : ''}" id="card-${j.id}">
    <div class="card-header">
      <span style="font-size:14px">${j.liga?.escudo || '🏆'}</span>
      <span class="card-liga">${j.liga?.nome || 'Liga'}</span>
      <span class="card-status-badge badge-${statusBadge}">${statusLabel}</span>
      <span class="card-hora">${j.rodada || ''}</span>
    </div>
    <div class="card-body">
      <div class="times-row">
        <div class="time-info">
          <img src="${escC}" class="time-escudo" onerror="this.style.display='none'">
          <div class="time-nome">${j.timeCasa?.nome || '—'}</div>
          <div class="time-forma">${formaC}</div>
        </div>
        <div class="vs-area">
          <div class="vs-placar">${placar}</div>
          <div class="vs-label">${j.status === 'ao_vivo' 
            ? `<span style="color:#ef4444">${j.minuto || ''}' 🔴</span>` 
            : ''}</div>
        </div>
        <div class="time-info fora">
          <img src="${escF}" class="time-escudo" onerror="this.style.display='none'">
          <div class="time-nome">${j.timeFora?.nome || '—'}</div>
          <div class="time-forma">${formaF}</div>
        </div>
      </div>
      ${renderPrevisaoArea(j, prev)}
    </div>
  </div>`;
}

function renderForma(forma) {
  if (!forma || !Array.isArray(forma)) return '';
  return forma.slice(-5).map(r => `<div class="forma-dot forma-${r}">${r}</div>`).join('');
}

  return `<div class="previsao-area">

      <div class="veredito ${verdClass}">

        <span class="veredito-text">${verdLabel}</span>
        ${prev.ysC != null ? `<span style="font-size:10px;color:var(--t3);margin-left:4px">YS ${prev.ysC.toFixed(1)} vs ${prev.ysF.toFixed(1)}</span>` : ''}
        <span class="veredito-conf ${confClass}">${confLabel}</span>

    </div>
    <div class="prev-bloco">

          <div class="gols-range">Faixa: ${golsRange}</div>

          ${gols?.periodo ? `<div class="gols-range" style="margin-top:2px">⏱ ${gols.periodo}</div>` : ''}
        </div>

      <div class="explicacao">${exps}</div>

}


// ── ANALISAR UM JOGO ──────────────────────────────────────────────────────
async function analisarJogo(j) {
  const casaId = j.timeCasa?.apiId || j.timeCasa?.id;
  const foraId = j.timeFora?.apiId || j.timeFora?.id;
  if (!casaId || !foraId) {
    return { resultado: base5050(), gols: golsDefault(), confianca: 'insuficiente', explicacoes: ['IDs de time não encontrados'], fontes: [] };
  }

  // Buscar histórico dos dois times e contexto em paralelo
  const [histCasa, histFora, ctxCasa, ctxFora, ctxGlobal] = await Promise.allSettled([
    fns.httpsCallable('buscarHistoricoTime')({ teamId: casaId, limit: 30 }).then(r => r.data),
    fns.httpsCallable('buscarHistoricoTime')({ teamId: foraId, limit: 30 }).then(r => r.data),
    fns.httpsCallable('buscarContextoGol')({ timeId: String(casaId), situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'casa', forcaAdversario: 'medio' }).then(r => r.data).catch(() => null),
    fns.httpsCallable('buscarContextoGol')({ timeId: String(foraId), situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'fora', forcaAdversario: 'medio' }).then(r => r.data).catch(() => null),
    fns.httpsCallable('buscarContextoGlobal')({ situacaoPlacar: '0-0', faseJogo: 'inicio', localJogo: 'casa', forcaAdversario: 'medio' }).then(r => r.data).catch(() => null),
  ]);

  const hC = histCasa.status === 'fulfilled' ? histCasa.value : null;
  const hF = histFora.status === 'fulfilled'  ? histFora.value  : null;
  const cC = ctxCasa.status === 'fulfilled'   ? ctxCasa.value   : null;
  const cF = ctxFora.status === 'fulfilled'   ? ctxFora.value   : null;
  const cG = ctxGlobal.status === 'fulfilled' ? ctxGlobal.value : null;

  return calcularPrevisao(j, hC, hF, cC, cF, cG);
}

// ── YELLUP SCORE (mesma lógica do algoritmo.html) ─────────────────────────
function calcYS(jogos) {
  if (!jogos?.length) return null;
  const js = jogos.slice(0, 20), n = js.length || 1;
  const avg = k => js.map(jj => parseFloat(jj.stats?.time?.[k]) || 0).reduce((a,b)=>a+b,0)/n;
  const wins  = js.filter(jj => jj.resultado === 'V').length;
  const draws = js.filter(jj => jj.resultado === 'E').length;
  const aproveit = (wins*3 + draws) / (n*3);
  const golsM = js.reduce((a,jj) => a+(jj.gols||0),0) / n;
  const golsS = js.reduce((a,jj) => a+(jj.golsSofridos||0),0) / n;
  const xg    = avg('expected_goals') || golsM*0.8;
  const shots = avg('Shots on Goal') || 0;
  const poss  = avg('Ball Possession') || 50;
  const passAcc = avg('Passes %') || 75;
  let ys = 0;
  // Aproveitamento é o preditor mais forte — mantido
  ys += aproveit * 3.5;
  // Ataque: gols marcados + xG com leve boost
  ys += Math.min(1, golsM/2.5) * 1.8;
  // Defesa: aumentado — dados mostraram que não sofrer gols é mais preditivo que marcar
  ys += Math.max(0, 1 - golsS/2.0) * 1.8;
  // xG: mantido mas com threshold menor (mais sensitivo)
  ys += Math.min(1, xg/1.5) * 1.2;
  // Chutes: leve redução
  ys += Math.min(1, shots/7) * 0.6;
  // Posse: reduzida significativamente — dados mostraram posse ≠ resultado
  ys += Math.min(1, (poss-30)/40) * 0.15;
  // Passes: leve redução
  ys += Math.min(1, (passAcc-60)/35) * 0.15;
  // Reescalar para manter range ~0-10
  return Math.min(10, Math.max(0, ys * 1.05));
}

// Classificar força pelo YS (substitui classForça por odds)
function classForçaYS(ys) {
  if (ys === null) return 'medio';
  if (ys >= 7.5) return 'top';
  if (ys >= 5.5) return 'forte';
  if (ys >= 3.5) return 'equilibrado';
  return 'fraco';
}

// Sequência atual (quantas vitórias/derrotas consecutivas)
function calcSequencia(jogos) {
  if (!jogos?.length) return { tipo: null, count: 0 };
  const primResult = jogos[0].resultado;
  let count = 0;
  for (const jj of jogos) {
    if (jj.resultado === primResult) count++;
    else break;
  }
  return { tipo: primResult, count };
}

// Gols por período (1T vs 2T)
function calcGolsPorTempo(jogos) {
  if (!jogos?.length) return { primeiro: 0, segundo: 0 };
  let g1 = 0, g2 = 0, n = 0;
  for (const jj of jogos) {
    if (!jj.golsMinuto?.length) continue;
    g1 += jj.golsMinuto.filter(m => m <= 45).length;
    g2 += jj.golsMinuto.filter(m => m > 45).length;
    n++;
  }
  if (!n) return { primeiro: 0, segundo: 0 };
  return { primeiro: +(g1/n).toFixed(2), segundo: +(g2/n).toFixed(2) };
}

// ── CALCULAR PREVISÃO ─────────────────────────────────────────────────────
function calcularPrevisao(j, hC, hF, cC, cF, cG) {
  const explicacoes = [];
  const fontes = [];
  let wTotal = 0;
  let probCasa = 0, probEmpate = 0;

  const jogosC = hC?.jogos || [];
  const jogosF = hF?.jogos || [];
  const nC = jogosC.length, nF = jogosF.length;

  // ── YELLUP SCORE de cada time ─────────────────────────────────────────
  const ysC = calcYS(jogosC);
  const ysF = calcYS(jogosF);
  const forcaC = classForçaYS(ysC);
  const forcaF = classForçaYS(ysF);

  // Sequência atual
  const seqC = calcSequencia(jogosC);
  const seqF = calcSequencia(jogosF);

  // Gols por período
  const periodoC = calcGolsPorTempo(jogosC);
  const periodoF = calcGolsPorTempo(jogosF);

  // ── FONTE 1: Yellup Score relativo ───────────────────────────────────
  if (ysC !== null && ysF !== null) {
    const ysTotal = (ysC + ysF) || 10;
    const diffAbs = Math.abs(ysC - ysF);
    let probYS = (ysC / ysTotal) * 100 + 5; // +5 vantagem casa

    // Quando times são equilibrados (YS diff < 1.5) puxar para base 50/25/25
    // Dados mostraram que YS sozinho não quebra empates próximos
    if (diffAbs < 1.5) {
      probYS = probYS * 0.6 + 50 * 0.4; // regredir à média
    }

    // Empate mais provável quando times equilibrados
    const empYS = 24 + Math.max(0, 12 - diffAbs) * 0.9;

    // Peso do YS baseado em 1707 jogos reais:
    // diff < 2.0 → fraco preditor mas ainda melhor que fallback genérico
    // diff 2-3   → neutro (45%) → peso mínimo
    // diff 3-4   → 63% acerto → peso real
    // diff 4+    → predição forte → peso máximo
    const w = diffAbs >= 4.0 ? 0.35
            : diffAbs >= 3.0 ? 0.28
            : diffAbs >= 2.0 ? 0.10
            : diffAbs >= 1.0 ? 0.08  // contribui pouco — equilibrado
            : 0.06;                  // mínimo — não zerar para evitar fallback genérico

    probCasa   += probYS * w;
    probEmpate += empYS * w;
    wTotal += w;
    fontes.push({ nome: `YS ${ysC?.toFixed(1)} vs ${ysF?.toFixed(1)}`, amostras: nC + nF, ativa: true });
    const diff = ysC - ysF;
    if (diff >= 2.5)       explicacoes.push(`${j.timeCasa?.nome} muito superior em forma — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)}`);
    else if (diff <= -2.5) explicacoes.push(`${j.timeFora?.nome} chega em melhor momento — YS ${ysF.toFixed(1)} vs ${ysC.toFixed(1)}`);
    else if (diffAbs < 1.0) explicacoes.push(`Times praticamente iguais em forma — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)} (imprevisível)`);
    else                   explicacoes.push(`${diff > 0 ? j.timeCasa?.nome : j.timeFora?.nome} ligeiramente melhor — YS ${ysC.toFixed(1)} vs ${ysF.toFixed(1)}`);
  }

  // ── FONTE 2: Histórico em casa ────────────────────────────────────────
  if (nC >= 3) {
    const emCasa = jogosC.filter(jj => jj.casa === true);
    const ref = emCasa.length >= 3 ? emCasa : jogosC;
    const n = ref.length;
    const vit = ref.filter(jj => jj.resultado === 'V').length / n * 100;
    const emp = ref.filter(jj => jj.resultado === 'E').length / n * 100;
    const w = n >= 15 ? 0.20 : n >= 7 ? 0.13 : 0.07;
    probCasa   += vit * w;
    probEmpate += emp * w;
    wTotal += w;
    fontes.push({ nome: 'Hist.Casa', amostras: n, ativa: true });
    // Forma recente
    const vit5 = jogosC.slice(0, 5).filter(jj => jj.resultado === 'V').length;
    if (vit5 >= 4) explicacoes.push(`${j.timeCasa?.nome} em excelente forma — ${vit5}V nos últimos 5`);
    else if (vit5 <= 1) explicacoes.push(`${j.timeCasa?.nome} em má fase — só ${vit5}V nos últimos 5`);
  } else {
    fontes.push({ nome: 'Hist.Casa', amostras: nC, ativa: false });
  }

  // ── FONTE 3: Histórico visitante ──────────────────────────────────────
  if (nF >= 3) {
    const emFora = jogosF.filter(jj => jj.casa === false);
    const ref = emFora.length >= 3 ? emFora : jogosF;
    const n = ref.length;
    const vitF = ref.filter(jj => jj.resultado === 'V').length / n * 100;
    const empF = ref.filter(jj => jj.resultado === 'E').length / n * 100;
    const w = n >= 15 ? 0.18 : n >= 7 ? 0.11 : 0.05;
    probCasa   += (100 - vitF - empF) * w;
    probEmpate += empF * w;
    wTotal += w;
    fontes.push({ nome: 'Hist.Fora', amostras: n, ativa: true });
    const vit5F = jogosF.slice(0, 5).filter(jj => jj.resultado === 'V').length;
    if (vit5F >= 4) explicacoes.push(`${j.timeFora?.nome} em grande fase fora — ${vit5F}V nos últimos 5`);
  } else {
    fontes.push({ nome: 'Hist.Fora', amostras: nF, ativa: false });
  }

  // ── FONTE 4: H2H ──────────────────────────────────────────────────────
  const h2h = hC?.h2h || [];
  if (h2h.length >= 3) {
    const foraId = j.timeFora?.apiId || j.timeFora?.id;
    const h2hFilt = h2h.filter(g =>
      String(g.timeForaId) === String(foraId) || String(g.timeCasaId) === String(foraId)
    );
    if (h2hFilt.length >= 3) {
      const casaId2 = j.timeCasa?.apiId || j.timeCasa?.id;
      const vitH2H = h2hFilt.filter(g => {
        const isCasa = String(g.timeCasaId) === String(casaId2);
        return (isCasa && g.resultado === '1') || (!isCasa && g.resultado === '2');
      }).length / h2hFilt.length * 100;
      const empH2H = h2hFilt.filter(g => g.resultado === 'X').length / h2hFilt.length * 100;
      const w = h2hFilt.length >= 8 ? 0.18 : 0.10;
      probCasa   += vitH2H * w;
      probEmpate += empH2H * w;
      wTotal += w;
      fontes.push({ nome: 'H2H', amostras: h2hFilt.length, ativa: true });
      if (vitH2H >= 65) explicacoes.push(`${j.timeCasa?.nome} domina o histórico direto — ${Math.round(vitH2H)}% de vitórias em ${h2hFilt.length} jogos`);
      else if (vitH2H <= 25) explicacoes.push(`${j.timeFora?.nome} vence mais os confrontos diretos — ${Math.round(100-vitH2H-empH2H)}% de vitórias`);
    }
  }

  // ── FONTE 5: Banco de contexto (com força dinâmica) ───────────────────
  if (cC?.totalAmostras >= 5) {
    const vitC = cC.resultados?.pctVitoria || 0;
    const empC = cC.resultados?.pctEmpate  || 25;
    const w = cC.totalAmostras >= 30 ? 0.22 : cC.totalAmostras >= 10 ? 0.14 : 0.07;
    probCasa   += vitC * w;
    probEmpate += empC * w;
    wTotal += w;
    fontes.push({ nome: 'Banco', amostras: cC.totalAmostras, ativa: true });
    if (vitC >= 70) explicacoes.push(`Banco próprio: ${j.timeCasa?.nome} vence ${Math.round(vitC)}% vs adversários ${forcaF}`);
  } else {
    fontes.push({ nome: 'Banco', amostras: cC?.totalAmostras || 0, ativa: false });
  }

  // ── FONTE 6: Banco Global ─────────────────────────────────────────────
  if (cG?.totalAmostras >= 30) {
    const vitG = cG.resultados?.pctVitoria || 46;
    const empG = cG.resultados?.pctEmpate  || 26;
    const w = cG.totalAmostras >= 100 ? 0.12 : 0.08;
    probCasa   += vitG * w;
    probEmpate += empG * w;
    wTotal += w;
    fontes.push({ nome: 'Global', amostras: cG.totalAmostras, ativa: true });
  }

  // ── SEQUÊNCIA — ajuste fino ───────────────────────────────────────────
  if (seqC.tipo === 'V' && seqC.count >= 3) {
    probCasa += 3;
    explicacoes.push(`${j.timeCasa?.nome} em série de ${seqC.count} vitórias consecutivas`);
  } else if (seqC.tipo === 'D' && seqC.count >= 3) {
    probCasa -= 3;
    explicacoes.push(`${j.timeCasa?.nome} vem de ${seqC.count} derrotas seguidas`);
  }
  if (seqF.tipo === 'V' && seqF.count >= 3) {
    probCasa -= 3;
    explicacoes.push(`${j.timeFora?.nome} em série de ${seqF.count} vitórias`);
  }

  // ── NORMALIZAR ────────────────────────────────────────────────────────
  if (wTotal < 0.1) {
    // Fallback: usar YS relativo puro se disponível, senão base mundial
    if (ysC !== null && ysF !== null) {
      const ysTotal = (ysC + ysF) || 10;
      probCasa   = (ysC / ysTotal) * 100 + 3; // leve vantagem casa
      probEmpate = 26;
      explicacoes.push(`Poucos dados — estimativa baseada em YS ${ysC?.toFixed(1)} vs ${ysF?.toFixed(1)}`);
    } else {
      probCasa = 46; probEmpate = 26;
      explicacoes.push('Dados insuficientes — base estatística mundial (46/26/28)');
    }
  } else {
    probCasa   = probCasa   / wTotal;
    probEmpate = probEmpate / wTotal;
  }

  // Deflação de probabilidades extremas — dados mostram sobreconfiança acima de 55%
  // 55-64%: viés ~-6pp → comprimir levemente
  // 65-74%: viés ~-14pp → comprimir moderado
  // 75%+:   viés ~-24pp → comprimir forte
  function deflacionar(prob) {
    if (prob >= 75) return 0.72 * prob + 8;   // comprime forte
    if (prob >= 65) return 0.82 * prob + 5;   // comprime moderado
    if (prob >= 55) return 0.90 * prob + 3;   // comprime leve
    return prob;                              // abaixo de 55% manter
  }
  probCasa   = deflacionar(probCasa);
  probEmpate = deflacionar(probEmpate);

  probCasa   = Math.min(80, Math.max(8,  Math.round(probCasa)));
  probEmpate = Math.min(42, Math.max(8,  Math.round(probEmpate)));
  let probFora = Math.max(4, 100 - probCasa - probEmpate);
  const tot = probCasa + probEmpate + probFora;
  probCasa   = Math.round(probCasa   / tot * 100);
  probEmpate = Math.round(probEmpate / tot * 100);
  probFora   = 100 - probCasa - probEmpate;

  const max = Math.max(probCasa, probEmpate, probFora);
  const veredito = probCasa === max ? 'casa' : probEmpate === max ? 'empate' : 'fora';

  // Flag de alta incerteza — quando as 3 opções estão próximas
  const segundoMax = [probCasa, probEmpate, probFora].sort((a,b)=>b-a)[1];
  const altaIncerteza = (max - segundoMax) < 8; // menos de 8pp de margem

  // ── CONFIANÇA v3 — baseada em 251 jogos reais ───────────────────────────
  // Aprendizado: YS alto ≠ acerto. Média confiança (39.7%) pior que aleatório.
  // Nova lógica: sinais INDEPENDENTES precisam convergir. Sem convergência = insuficiente.
  // Alta só quando múltiplos sinais fortes apontam na mesma direção.
  const diffYS = ysC !== null && ysF !== null ? Math.abs(ysC - ysF) : 0;

  // ── SINAL 1: Volume de dados (qualidade da amostra) ──────────────────
  const volBom = nC >= 15 && nF >= 15;   // ambos com histórico decente
  const volOtimo = nC >= 25 && nF >= 25; // ambos com histórico sólido

  // ── SINAL 2: Domínio claro pelo YS (não só diferença, mas nível absoluto) ──
  // YS alto do favorito + YS baixo do adversário = dominância real
  const ysMax = Math.max(ysC || 0, ysF || 0);
  const ysMin = Math.min(ysC || 99, ysF || 99);
  const dominanciaClara = diffYS >= 4.0 && ysMax >= 7.0; // favorito forte E adversário fraco
  const dominanciaMedia = diffYS >= 2.5 && ysMax >= 5.5;

  // ── SINAL 3: Probabilidade com margem real ────────────────────────────
  // Max > 62% = modelo tem convicção. Max < 48% = equilíbrio real.
  const probForte   = max >= 62 && !altaIncerteza;
  const probModerada = max >= 54 && !altaIncerteza;

  // ── SINAL 4: Consistência de forma recente ────────────────────────────
  // Time favorecido pelo YS também está em boa forma? Sinais independentes convergem?
  const favoritoYS = (ysC || 0) > (ysF || 0) ? 'casa' : 'fora';
  const jogosDoFavorito = favoritoYS === 'casa' ? jogosC : jogosF;
  const formaFavorito = jogosDoFavorito.slice(0, 5);
  const vitoriasFavorito = formaFavorito.filter(jj => jj.resultado === 'V').length;
  const formaConverge = vitoriasFavorito >= 3; // ≥3V nos últimos 5

  // ── SINAL 5: H2H consistente ──────────────────────────────────────────
  const h2hBom = h2h.length >= 4;

  // ── CONVERGÊNCIA dos sinais → nível de confiança ────────────────────
  // Alta: 4+ sinais fortes convergindo — esperamos >62% de acerto
  const sinaisAlta = [
    volOtimo,
    dominanciaClara,
    probForte,
    formaConverge,
    h2hBom,
  ].filter(Boolean).length;

  const sinaisMedia = [
    volBom,
    dominanciaMedia,
    probModerada,
    formaConverge,
  ].filter(Boolean).length;

  // Confiança baseada em sinais universais — independente da liga
  const penalizar = (altaIncerteza && max < 48) || max < 40;

  const confianca = penalizar
    ? 'insuficiente'
    : sinaisAlta >= 3
      ? 'alta'
      : sinaisMedia >= 2
        ? 'baixa'
        : 'insuficiente';

  // Força comparativa (gols)
  if (nC >= 5 && nF >= 5) {
    const mgC = jogosC.reduce((a,jj)=>a+(jj.gols||0),0)/nC;
    const mgF = jogosF.reduce((a,jj)=>a+(jj.gols||0),0)/nF;
    if (mgC > mgF + 0.6) explicacoes.push(`${j.timeCasa?.nome} mais eficiente — ${mgC.toFixed(1)} gols/jogo vs ${mgF.toFixed(1)}`);
    else if (mgF > mgC + 0.6) explicacoes.push(`${j.timeFora?.nome} marca mais — ${mgF.toFixed(1)} gols/jogo fora`);
  }

  // Forma
  const formaC = jogosC.slice(0,5).map(jj => jj.resultado==='V'?'V':jj.resultado==='E'?'E':'D');
  const formaF = jogosF.slice(0,5).map(jj => jj.resultado==='V'?'V':jj.resultado==='E'?'E':'D');

  // altaIncerteza já está tratada dentro do scoreConf v3 (penalização direta)
  // Manter confiancaFinal como alias para compatibilidade
  const confiancaFinal = confianca;

  if (altaIncerteza && !explicacoes.find(e => e.includes('imprevisível'))) {
    explicacoes.push('Jogo imprevisível — margem pequena entre os resultados');
  }

  return {
    resultado: { casa: probCasa, empate: probEmpate, fora: probFora, veredito },
    gols: calcularGols(j, jogosC, jogosF, hC?.h2h, periodoC, periodoF),
    confianca: confiancaFinal,
    altaIncerteza,
    explicacoes: explicacoes.slice(0, 4),
    fontes,
    formaC, formaF,
    ysC, ysF, forcaC, forcaF
  };
}

// ── CALCULAR GOLS ─────────────────────────────────────────────────────────
function calcularGols(j, jogosC, jogosF, h2h, periodoC, periodoF) {
  const vals = [];
  const n = Math.min(jogosC.length, 20), m = Math.min(jogosF.length, 20);

  // Método 1: Ataque casa × Defesa visitante + Ataque visitante × Defesa casa
  if (n >= 3 && m >= 3) {
    const atqC = jogosC.slice(0,n).reduce((a,jj)=>a+(jj.gols||0),0)/n;
    const defC = jogosC.slice(0,n).reduce((a,jj)=>a+(jj.golsSofridos||0),0)/n;
    const atqF = jogosF.slice(0,m).reduce((a,jj)=>a+(jj.gols||0),0)/m;
    const defF = jogosF.slice(0,m).reduce((a,jj)=>a+(jj.golsSofridos||0),0)/m;
    // Média global de referência (~1.35 gols por time por jogo)
    const ref = 1.35;
    const xGC = (atqC / ref) * (defF / ref) * ref; // gols esperados da casa
    const xGF = (atqF / ref) * (defC / ref) * ref; // gols esperados do visitante
    vals.push(xGC + xGF);
  }

  // Método 2: Média simples de gols por jogo de cada time
  if (n >= 3) {
    const mg = jogosC.slice(0,n).reduce((a,jj)=>a+(jj.gols||0)+(jj.golsSofridos||0),0)/n;
    vals.push(mg);
  }
  if (m >= 3) {
    const mg = jogosF.slice(0,m).reduce((a,jj)=>a+(jj.gols||0)+(jj.golsSofridos||0),0)/m;
    vals.push(mg);
  }

  // Método 3: H2H média de gols totais
  if (h2h?.length >= 3) {
    const mgH2H = h2h.slice(0,8).reduce((a,g)=>a+(g.golsCasa||0)+(g.golsFora||0),0)/Math.min(h2h.length,8);
    if (mgH2H > 0) vals.push(mgH2H);
  }

  if (!vals.length) vals.push(2.5);

  const media = vals.reduce((a,b)=>a+b,0)/vals.length;
  // Calibração v3 — curva baseada em 1707 jogos reais
  // Dados mostram regressão à média: estimativas baixas subestimam, altas superestimam
  // Fórmula derivada dos dados: correção = 0.56 quando est=1.5, 0 quando est=2.5, -0.26 quando est=3.5+
  function correcaoCurva(m) {
    if (m <= 1.5) return 0.55;       // subestimamos muito quando estimamos baixo
    if (m <= 2.0) return 0.30;       // ainda subestimamos
    if (m <= 2.5) return 0.05;       // quase calibrado
    if (m <= 3.0) return -0.20;      // começamos a superestimar
    return -0.26;                    // superestimamos jogos de muitos gols
  }
  const corr = correcaoCurva(media);
  const est = Math.round(Math.max(0.5, media + corr) * 10) / 10;
  const baixo = Math.max(0, Math.round((est - 0.9) * 10) / 10);
  const alto  = Math.round((est + 1.0) * 10) / 10;
  const tendencia = est >= 3.0 ? 'alto' : est <= 1.9 ? 'baixo' : 'medio';

  // Distribuição por período se disponível
  let periodo = null;
  if (periodoC && periodoF && (periodoC.primeiro + periodoF.primeiro) > 0) {
    const g1 = +((periodoC.primeiro + periodoF.primeiro) / 2 * (est / Math.max(0.1, (periodoC.primeiro+periodoC.segundo+periodoF.primeiro+periodoF.segundo)/2))).toFixed(1);
    const g2 = +(est - g1).toFixed(1);
    if (g1 > 0 && g2 > 0) periodo = `${g1} no 1T · ${g2} no 2T`;
  }

  return { estimado: est.toFixed(1), range: `${baixo}–${alto}`, tendencia, periodo };
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function base5050() { return { casa: 45, empate: 26, fora: 29, veredito: 'casa' }; }
function golsDefault() { return { estimado: '2.5', range: '1.5–3.5', tendencia: 'medio' }; }

function atualizarResumo() {
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;
  const prevs = jogos.map(j => PREVISOES[j.id]).filter(Boolean).filter(p => !p.loading);
  gc('rTotal').textContent = jogos.length;
  gc('rAnalisados').textContent = prevs.length;
  gc('rAlta').textContent  = prevs.filter(p => p.confianca === 'alta').length;
  gc('rMedia').textContent = prevs.filter(p => p.confianca === 'media').length;
  gc('rBaixa').textContent = prevs.filter(p => p.confianca === 'baixa' || p.confianca === 'insuficiente').length;
  gc('resumoBar').style.display = jogos.length ? 'flex' : 'none';
}

function setStatus(msg, err) {
  const el = gc('statusBar');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = msg.startsWith('✓') ? `<span style="color:var(--grn)">${msg}</span>`
    : err ? `<span style="color:var(--red)">${msg}</span>`
    : `<div class="dot-spin"></div><span>${msg}</span>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function setTab(tab) {
  const isPrevisoes   = tab === 'previsoes';
  const isAprendizado = tab === 'aprendizado';
  const isSimulador   = tab === 'simulador';
  gc('jogosGrid').style.display           = isPrevisoes ? 'flex' : 'none';
  gc('resumoBar').style.display           = isPrevisoes && JOGOS.length ? 'flex' : 'none';
  gc('painelAprendizado').style.display   = isAprendizado ? 'block' : 'none';
  gc('painelSimulador').style.display     = isSimulador   ? 'block' : 'none';

  const tabs = ['btnTabPrevisoes','btnTabAprendizado','btnTabSimulador'];
  const ativo = isPrevisoes ? 0 : isAprendizado ? 1 : 2;
  tabs.forEach((id, i) => {
    const el = gc(id);
    if (!el) return;
    el.style.color       = i === ativo ? 'var(--acc)' : '';
    el.style.borderColor = i === ativo ? 'var(--acc)' : '';
  });

  if (isAprendizado) carregarAprendizado();
  if (isSimulador)   iniciarSimulador();
}

// ── SALVAR PREVISÃO PRÉ-JOGO ──────────────────────────────────────────────
async function salvarPrevisao(j, prev) {
  try {
    const dt = j.dataInicio?.toDate ? j.dataInicio.toDate() : new Date(j.dataInicio||0);
    await fns.httpsCallable('salvarPrevisao')({
      fixtureId:     j.apiFootballId || j.id,
      timeCasaId:    j.timeCasa?.apiId || j.timeCasa?.id,
      timeForaId:    j.timeFora?.apiId || j.timeFora?.id,
      timeCasaNome:  j.timeCasa?.nome,
      timeForaNome:  j.timeFora?.nome,
      liga:          j.liga?.nome,
      dataJogo:      dt.toISOString(),
      previsao: {
        probCasa:     prev.resultado.casa,
        probEmpate:   prev.resultado.empate,
        probFora:     prev.resultado.fora,
        veredito:     prev.resultado.veredito,
        golsEstimado: prev.gols?.estimado,
        golsRange:    prev.gols?.range,
        confianca:    prev.confianca,
        ysC:          prev.ysC,
        ysF:          prev.ysF,
        forcaC:       prev.forcaC,
        forcaF:       prev.forcaF,
        fontes:       (prev.fontes||[]).map(f => f.nome),
      }
    });
  } catch(e) {
    console.warn('Erro ao salvar previsão:', e.message);
  }
}

// Sobrescrever analisarTodos para salvar previsões
async function analisarTodos() {
  if (ANALISANDO) return;
  const filtroLiga = gc('filtroLiga').value;
  const jogos = filtroLiga ? JOGOS.filter(j => j.liga?.nome === filtroLiga) : JOGOS;
  if (!jogos.length) return;

  ANALISANDO = true;
  const btn = gc('btnAnalisar');
  btn.disabled = true;
  btn.textContent = '⏳ Analisando...';

  jogos.forEach(j => { PREVISOES[j.id] = { loading: true, step: 'buscando dados' }; });
  renderCards();

  let analisados = 0;
  for (const j of jogos) {
    try {
      PREVISOES[j.id] = { loading: true, step: j.timeCasa?.nome };
      const cardEl = document.getElementById('card-' + j.id);
      if (cardEl) cardEl.outerHTML = renderCard(j, PREVISOES[j.id]);

      const prev = await analisarJogo(j);
      PREVISOES[j.id] = prev;
      analisados++;
      setStatus(`${analisados}/${jogos.length} analisados`);

      const cardEl2 = document.getElementById('card-' + j.id);
      if (cardEl2) cardEl2.outerHTML = renderCard(j, prev);

      // Salvar previsão no banco (só jogos não encerrados)
      if (j.status !== 'encerrado' && j.apiFootballId) {
        salvarPrevisao(j, prev); // assíncrono, não bloqueia
      }
      // Cache local no sessionStorage
      try { sessionStorage.setItem('prev_' + j.id, JSON.stringify(prev)); } catch(e) {}
    } catch(e) {
      PREVISOES[j.id] = { resultado: null, gols: null, confianca: 'insuficiente', explicacoes: ['Erro: ' + e.message], fontes: [] };
    }
  }

  atualizarResumo();
  ANALISANDO = false;
  btn.disabled = false;
  btn.textContent = '🔄 Reanalisar';
  setStatus('✓ Análise completa — previsões salvas');
  // Atualizar cache
  JOGOS.forEach(j => {
    if (PREVISOES[j.id] && !PREVISOES[j.id].loading) {
      try { sessionStorage.setItem('prev_' + j.id, JSON.stringify(PREVISOES[j.id])); } catch(e) {}
    }
  });
}

// ── CARREGAR APRENDIZADO ──────────────────────────────────────────────────
async function carregarAprendizado() {
  const el = gc('aprendizadoContent');
  el.innerHTML = '<div style="color:var(--t2);text-align:center;padding:40px">Carregando...</div>';
  try {
    const r = await fns.httpsCallable('buscarAprendizado')({});
    const { ligas, ultimas, fatorGlobal } = r.data;
    renderAprendizado(ligas, ultimas, fatorGlobal);
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red);padding:20px">Erro: ${e.message}</div>`;
  }
}

function renderAprendizado(ligas, ultimas, fatorGlobal) {
  const el = gc('aprendizadoContent');

  // Totais globais
  const totalJogos  = ligas.reduce((a,l) => a + (l.totalJogos||0), 0);
  const totalAcertos = ligas.reduce((a,l) => a + (l.acertosResultado||0), 0);
  const totalGols   = ligas.reduce((a,l) => a + (l.acertosGols||0), 0);
  const pctResultado = totalJogos ? Math.round(totalAcertos/totalJogos*100) : 0;
  const pctGols      = totalJogos ? Math.round(totalGols/totalJogos*100) : 0;
  const desvioMedio  = totalJogos ? ligas.reduce((a,l) => a + (l.desvioGolsAcum||0), 0) / totalJogos : 0;

  // Fator labels
  const fatorLabel = {
    yellup_score:        'YS favorecia mas perdeu',
    xg_contra_resultado: 'Venceu com xG inferior',
    gols_acima:          'Mais gols que o previsto',
    gols_abaixo:         'Menos gols que o previsto',
    posse_sem_eficiencia:'Posse sem eficiência',
    baixa_confianca_correta: 'Resultado de baixa probabilidade',
  };

  const fatoresOrdenados = Object.entries(fatorGlobal)
    .sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxFator = fatoresOrdenados[0]?.[1] || 1;

  // Ligas ordenadas por acurácia
  const ligasOrdenadas = ligas
    .filter(l => l.totalJogos >= 2)
    .sort((a,b) => (b.acertosResultado/b.totalJogos) - (a.acertosResultado/a.totalJogos));

  // Por confiança (global)
  const confGlobal = { alta:{total:0,acertos:0}, media:{total:0,acertos:0}, baixa:{total:0,acertos:0}, insuficiente:{total:0,acertos:0} };
  ligas.forEach(l => {
    Object.entries(l.porConfianca||{}).forEach(([k,v]) => {
      if (!confGlobal[k]) confGlobal[k] = {total:0,acertos:0};
      confGlobal[k].total   += v.total||0;
      confGlobal[k].acertos += v.acertos||0;
    });
  });

  el.innerHTML = `
  <div style="margin-bottom:16px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">🧠 O que a Yellup aprendeu</div>
    <div style="font-size:12px;color:var(--t2)">${totalJogos} jogos analisados até agora</div>
  </div>

  ${totalJogos === 0 ? `<div style="text-align:center;padding:40px;color:var(--t2)">
    <div style="font-size:32px;margin-bottom:12px">📊</div>
    <div style="font-size:14px">Nenhum jogo analisado ainda.</div>
    <div style="font-size:12px;margin-top:8px">Use o painel abaixo para importar o histórico de jogos já encerrados.</div>
  </div>` : `

  <div class="apr-grid">
    <div class="apr-card">
      <div class="apr-card-title">🎯 Acurácia de resultado</div>
      <div class="apr-big" style="color:${pctResultado>=60?'var(--grn)':pctResultado>=45?'var(--acc)':'var(--red)'}">${pctResultado}%</div>
      <div class="apr-sub">${totalAcertos} de ${totalJogos} acertos</div>
    </div>
    <div class="apr-card">
      <div class="apr-card-title">⚽ Acurácia de gols (±1)</div>
      <div class="apr-big" style="color:${pctGols>=60?'var(--grn)':pctGols>=45?'var(--acc)':'var(--red)'}">${pctGols}%</div>
      <div class="apr-sub">Dentro de 1 gol da estimativa</div>
    </div>
    <div class="apr-card">
      <div class="apr-card-title">📐 Desvio médio de gols</div>
      <div class="apr-big" style="color:var(--acc)">${desvioMedio >= 0 ? '+' : ''}${desvioMedio.toFixed(1)}</div>
      <div class="apr-sub">${desvioMedio > 0 ? 'Subestimamos gols' : desvioMedio < 0 ? 'Superestimamos gols' : 'Calibrado'}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="apr-card">
      <div class="apr-card-title">⚠️ Principais causas de erro</div>
      ${fatoresOrdenados.length === 0 ? '<div style="color:var(--t3);font-size:12px">Sem dados suficientes ainda</div>' :
        fatoresOrdenados.map(([tipo, count]) => `

// Carrega análise rápida de confiança ao abrir a aba
async function _carregarAnaliseConfianca() {
  const el = gc('simConfiancaRapida');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--t2);font-size:12px">Carregando análise de confiança...</div>';
  try {
    const r = await fns.httpsCallable('simularEstrategias')({ liga: null, confianca: null });
    const d = r.data;
    if (!d.sucesso) { el.innerHTML = ''; return; }

    const confs = [
      { key: 'alta',         label: 'Alta',         cor: '#27d49b' },
      { key: 'media',        label: 'Média',        cor: '#f5a524' },
      { key: 'baixa',        label: 'Baixa',        cor: '#ef5f5f' },
      { key: 'insuficiente', label: 'Insuficiente', cor: '#858ba5' },
    ].filter(c => d.porConf[c.key]);

    const melhorConf = confs.reduce((best, c) =>
      (d.porConf[c.key]?.pct || 0) > (d.porConf[best.key]?.pct || 0) ? c : best
    , confs[0]);

    el.innerHTML = `
    <div class="sim-card" style="margin-bottom:16px">
      <div class="sim-title">🔬 Análise de confiança — ${d.total} jogos históricos</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        ${confs.map(cf => {
          const m = d.porConf[cf.key];
          const isEdge = m.pct >= 55;
          const isBad  = m.pct < 45;
          return `<div style="background:var(--bg3);border:1px solid ${isBad?'rgba(239,95,95,.3)':isEdge?'rgba(39,212,155,.3)':'var(--brd)'};border-radius:10px;padding:12px;text-align:center">
            <div style="font-size:10px;color:var(--t2);margin-bottom:4px">${cf.label}</div>
            <div style="font-size:24px;font-weight:800;color:${isBad?'var(--red)':isEdge?'var(--grn)':'var(--acc)'}">${m.pct}%</div>
            <div style="font-size:10px;color:var(--t3)">${m.total} jogos</div>
            <div style="font-size:10px;margin-top:4px;color:${m.golsDesvioMedio>0?'var(--red)':'var(--grn)'}">
              gols: ${m.golsDesvioMedio > 0 ? '+' : ''}${m.golsDesvioMedio}
            </div>
            ${isBad ? '<div style="font-size:9px;color:var(--red);margin-top:3px">⚠️ Pior que aleatório</div>' : ''}
            ${isEdge ? '<div style="font-size:9px;color:var(--grn);margin-top:3px">✓ Edge positivo</div>' : ''}
          </div>`;
        }).join('')}
      </div>

      <div style="background:rgba(245,165,36,.06);border:1px solid rgba(245,165,36,.2);border-radius:8px;padding:12px;font-size:12px;line-height:1.7">
        <b style="color:var(--acc)">💡 O que os dados estão dizendo:</b><br>
        ${(() => {
          const alta  = d.porConf['alta'];
          const media = d.porConf['media'];
          const baixa = d.porConf['baixa'];
          const insuf = d.porConf['insuficiente'];
          const msgs = [];

          if (media && media.pct < 45)
            msgs.push(`<b>Média confiança (${media.pct}%)</b> está abaixo do aleatório — evitar apostar nesses jogos.`);

          if (insuf && baixa && insuf.pct > (media?.pct || 0))
            msgs.push(`<b>Inversão detectada:</b> "Insuficiente" (${insuf.pct}%) acerta mais que "Média" (${media?.pct || 0}%) — os limiares de confiança precisam de recalibração.`);

          if (alta && alta.total < 10)
            msgs.push(`<b>Alta confiança</b> tem apenas ${alta.total} amostras — estatisticamente frágil ainda.`);
          else if (alta && alta.pct >= 60)
            msgs.push(`<b>Alta confiança (${alta.pct}%)</b> está com edge real — apostar apenas nesses jogos seria mais rentável.`);

          // Gols
          const devMedio = d.desvioMedio;
          if (devMedio > 0.05)
            msgs.push(`<b>Gols:</b> sistema subestima consistentemente (+${devMedio} de desvio) — apostar Under(est.+0) tem vantagem histórica.`);
          else if (devMedio < -0.05)
            msgs.push(`<b>Gols:</b> sistema superestima (-${Math.abs(devMedio)} de desvio) — apostar Under tem vantagem histórica.`);

          const melhorOver = d.estrategiasGols?.reduce((best, e) => e.over.pct > best.over.pct ? e : best, d.estrategiasGols[0]);
          if (melhorOver && melhorOver.over.pct > 58)
            msgs.push(`<b>Melhor estratégia de gols:</b> Over ${melhorOver.margem >= 0 ? 'Est.+'+melhorOver.margem : 'Est.'+melhorOver.margem} acerta ${melhorOver.over.pct}% historicamente.`);

          return msgs.length ? msgs.map(m => '• ' + m).join('<br>') : 'Dados insuficientes para conclusões sólidas ainda.';
        })()}
      </div>
    </div>`;
  } catch(e) {
    if (gc('simConfiancaRapida')) gc('simConfiancaRapida').innerHTML = '';
  }
}

        <!-- Calibração de probabilidade -->
        <div>
          <div style="font-size:11px;color:var(--acc);font-weight:600;margin-bottom:8px">🎯 Probabilidade estimada vs acerto real</div>
          <table class="sim-table">
            <tr><th>Faixa prob.</th><th>Jogos</th><th>Acerto real</th><th>Viés</th></tr>
            ${(d.calibracaoProb||[]).map(p => `<tr>
              <td>${p.faixa}</td>
              <td style="color:var(--t3)">${p.total}</td>
              <td style="font-weight:600;color:${p.pct>=60?'var(--grn)':p.pct>=50?'var(--t1)':'var(--red)'}">${p.pct}%</td>
              <td style="color:${Math.abs(p.vies||0)<5?'var(--grn)':'var(--red)'}">${(p.vies||0)>0?'+':''}${p.vies||0}pp</td>
            </tr>`).join('')}
          </table>
          <div style="font-size:10px;color:var(--t3);margin-top:6px">Viés ideal = 0 · Positivo = subestimamos confiança · Negativo = superestimamos</div>
        </div>
      </div>

      <div class="sim-grid">
        <!-- YS vs resultado -->
        <div>
          <div style="font-size:11px;color:var(--acc);font-weight:600;margin-bottom:8px">📊 Diferença de YS vs taxa de vitória do favorito</div>
          <table class="sim-table">
            <tr><th>Diff YS</th><th>Jogos</th><th>Favorito vence</th><th>Empate</th><th>Azarão</th></tr>
            ${(d.calibracaoYS||[]).map(y => `<tr>
              <td>${y.faixa}</td>
              <td style="color:var(--t3)">${y.total}</td>
              <td style="font-weight:600;color:${y.pctFavorito>=55?'var(--grn)':y.pctFavorito>=40?'var(--t1)':'var(--red)'}">${y.pctFavorito}%</td>
              <td style="color:var(--t3)">${y.total>0?Math.round(y.empates/y.total*100):0}%</td>
              <td style="color:var(--t3)">${y.total>0?Math.round(y.azaraoVenceu/y.total*100):0}%</td>
            </tr>`).join('')}
          </table>
          <div style="font-size:10px;color:var(--t3);margin-top:6px">Qual diferença de YS realmente prediz vitória?</div>
        </div>

        <!-- Gols por YS combinado -->
        <div>
          <div style="font-size:11px;color:var(--acc);font-weight:600;margin-bottom:8px">⚽ Média de gols por força dos times</div>
          <table class="sim-table">
            <tr><th>Força</th><th>Jogos</th><th>Média gols</th><th>Over 2.5</th><th>Over 3.5</th></tr>
            ${(d.golsPorYS||[]).map(g => `<tr>
              <td>${g.faixa}</td>
              <td style="color:var(--t3)">${g.total}</td>
              <td style="font-weight:600">${g.mediaGols}</td>
              <td style="color:${g.pctOver2_5>=55?'var(--grn)':'var(--t1)'}">${g.pctOver2_5}%</td>
              <td style="color:${g.pctOver3_5>=40?'var(--grn)':'var(--t1)'}">${g.pctOver3_5}%</td>
            </tr>`).join('')}
          </table>
          <div style="font-size:10px;color:var(--t3);margin-top:6px">Times mais fortes = mais gols ou menos?</div>
        </div>
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red)">Erro: ${e.message}</div>`;
  }
}

async function rodarSimulacao() {
  const el = gc('simResultado');
  const liga   = gc('simLiga')?.value || null;
  const conf   = gc('simConf')?.value || null;
  const odd    = parseFloat(gc('simOdd')?.value || '1.90');
  const stake  = parseFloat(gc('simStake')?.value || '10');

  el.innerHTML = '<div style="color:var(--t2);padding:20px">Calculando...</div>';

  try {
    const r = await fns.httpsCallable('simularEstrategias')({
      liga: liga || null, confianca: conf || null
    });
    const d = r.data;
    if (!d.sucesso) { el.innerHTML = `<div style="color:var(--red)">${d.msg}</div>`; return; }

    // Recalcular ROI com odd/stake da UI
    const n = d.total;
    const simFin = d.estrategiasGols.map(e => {
      const ganhoOver  = e.over.acertos  * (stake * odd) - n * stake;
      const ganhoUnder = e.under.acertos * (stake * odd) - n * stake;
      return {
        label:      e.label,
        margem:     e.margem,
        overPct:    e.over.pct,
        underPct:   e.under.pct,
        roiOver:    +((ganhoOver  / (n * stake)) * 100).toFixed(1),
        roiUnder:   +((ganhoUnder / (n * stake)) * 100).toFixed(1),
        lucroOver:  +ganhoOver.toFixed(2),
        lucroUnder: +ganhoUnder.toFixed(2),
      };
    });

    const melhorOverIdx  = simFin.reduce((bi, e, i) => e.roiOver  > simFin[bi].roiOver  ? i : bi, 0);
    const melhorUnderIdx = simFin.reduce((bi, e, i) => e.roiUnder > simFin[bi].roiUnder ? i : bi, 0);

    // Distribuição de desvios
    const buckets = Object.entries(d.histDesvios).sort((a,b) => parseFloat(a[0])-parseFloat(b[0]));
    const maxBucket = Math.max(...buckets.map(([,v]) => v));

    el.innerHTML = `
    <div class="sim-grid">

      <!-- Card: Distribuição de erros -->
      <div class="sim-card">
        <div class="sim-title">📐 Distribuição dos desvios de gols</div>
        <div style="font-size:12px;color:var(--t2);margin-bottom:12px">
          Desvio médio: <b style="color:${d.desvioMedio>=0?'var(--grn)':'var(--red)'}">${d.desvioMedio>=0?'+':''}${d.desvioMedio}</b> &nbsp;·&nbsp;
          Subestimou: <b>${d.desviosPositivos}</b> &nbsp;·&nbsp;
          Superestimou: <b>${d.desviosNegativos}</b> &nbsp;·&nbsp;
          Exato: <b>${d.desviosExatos}</b>
        </div>
        ${buckets.map(([k, v]) => {
          const pctBar = Math.round(v / maxBucket * 100);
          const cor = k.startsWith('+') ? '#ef4444' : k === '0' ? 'var(--grn)' : '#378ADD';
          return `<div class="desvio-bar">
            <div style="min-width:28px;text-align:right;color:var(--t2)">${k}</div>
            <div class="desvio-bar-fill" style="width:${pctBar}%;background:${cor}"></div>
            <div style="color:var(--t2)">${v}×</div>
            <div style="color:var(--t3);font-size:10px">(${(v/n*100).toFixed(0)}%)</div>
          </div>`;
        }).join('')}
      </div>

      <!-- Card: Resultado por margem de probabilidade -->
      <div class="sim-card">
        <div class="sim-title">🎯 Acurácia de resultado por confiança do modelo</div>
        <table class="sim-table">
          <tr><th>Faixa de prob.</th><th>Jogos</th><th>Acertos</th><th>%</th></tr>
          ${d.porMargem.filter(m => m.total > 0).map(m => {
            const cor = m.pct>=60?'var(--grn)':m.pct>=48?'var(--acc)':'var(--red)';
            return `<tr>
              <td>${m.label}</td>
              <td style="color:var(--t2)">${m.total}</td>
              <td>${m.acertos}</td>
              <td class="sim-pct" style="color:${cor}">${m.pct}%</td>
            </tr>`;
          }).join('')}
        </table>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)">
          <div class="sim-title">Por nível de confiança</div>
          <table class="sim-table">
            <tr><th>Confiança</th><th>Jogos</th><th>%</th><th>Desvio gols</th></tr>
            ${['alta','media','baixa','insuficiente'].filter(k => d.porConf[k]).map(k => {
              const m = d.porConf[k];
              const cor = m.pct>=60?'var(--grn)':m.pct>=48?'var(--acc)':'var(--red)';
              const label = k==='alta'?'Alta':k==='media'?'Média':k==='baixa'?'Baixa':'Insuf.';
              return `<tr>
                <td>${label}</td>
                <td style="color:var(--t2)">${m.total}</td>
                <td class="sim-pct" style="color:${cor}">${m.pct}%</td>
                <td style="color:${m.golsDesvioMedio>=0?'var(--red)':'var(--grn)'}">${m.golsDesvioMedio>=0?'+':''}${m.golsDesvioMedio}</td>
              </tr>`;
            }).join('')}
          </table>
        </div>
      </div>
    </div>

    <!-- Tabela principal: estratégias de gols -->
    <div class="sim-card" style="margin-bottom:16px">
      <div class="sim-title">⚽ Estratégias de gols — ${n} jogos · odd ${odd} · R$${stake}/aposta</div>
      <table class="sim-table">
        <tr>
          <th>Estratégia</th>
          <th>Over %</th><th>ROI Over</th><th>Lucro Over</th>
          <th>Under %</th><th>ROI Under</th><th>Lucro Under</th>
        </tr>
        ${simFin.map((e, i) => {
          const bestO = i === melhorOverIdx;
          const bestU = i === melhorUnderIdx;
          return `<tr class="${bestO||bestU ? 'sim-best' : ''}">
            <td style="font-weight:${bestO||bestU?'700':'400'}">${e.label} ${bestO&&bestU?'🏆 ★':bestO?'🏆':bestU?'★':''}</td>
            <td class="sim-pct" style="color:${e.overPct>=55?'var(--grn)':e.overPct>=45?'var(--t1)':'var(--red)'}">${e.overPct}%</td>
            <td class="${e.roiOver>=0?'sim-roi-pos':'sim-roi-neg'}">${e.roiOver>=0?'+':''}${e.roiOver}%</td>
            <td style="color:${e.lucroOver>=0?'var(--grn)':'var(--red)'}">R$${e.lucroOver>=0?'+':''}${e.lucroOver}</td>
            <td class="sim-pct" style="color:${e.underPct>=55?'var(--grn)':e.underPct>=45?'var(--t1)':'var(--red)'}">${e.underPct}%</td>
            <td class="${e.roiUnder>=0?'sim-roi-pos':'sim-roi-neg'}">${e.roiUnder>=0?'+':''}${e.roiUnder}%</td>
            <td style="color:${e.lucroUnder>=0?'var(--grn)':'var(--red)'}">R$${e.lucroUnder>=0?'+':''}${e.lucroUnder}</td>
          </tr>`;
        }).join('')}
      </table>
      <div style="font-size:11px;color:var(--t3);margin-top:10px">
        🏆 = melhor ROI Over &nbsp;·&nbsp; ★ = melhor ROI Under &nbsp;·&nbsp;
        Over: aposta que o jogo terá MAIS gols que o threshold &nbsp;·&nbsp;
        Under: aposta que o jogo terá MENOS gols que o threshold
      </div>
    </div>

    <div style="background:rgba(99,195,34,.06);border:1px solid rgba(99,195,34,.2);border-radius:10px;padding:14px;font-size:12px">
      <b style="color:var(--grn)">💡 Melhor estratégia encontrada:</b><br>
      <b>Over:</b> Apostando Over nos jogos onde estimamos ${simFin[melhorOverIdx].margem >= 0 ? 'mais de ' + (simFin[melhorOverIdx].margem > 0 ? 'est.+'+simFin[melhorOverIdx].margem : 'exato estimado') : 'est.'+simFin[melhorOverIdx].margem} gols →
        acerto de <b>${simFin[melhorOverIdx].overPct}%</b>, ROI <b>${simFin[melhorOverIdx].roiOver >= 0 ? '+' : ''}${simFin[melhorOverIdx].roiOver}%</b>
        (R$${simFin[melhorOverIdx].lucroOver >= 0 ? '+' : ''}${simFin[melhorOverIdx].lucroOver} em ${n} apostas)<br>
      <b>Under:</b> Apostando Under no threshold <b>${simFin[melhorUnderIdx].label}</b> →
        acerto de <b>${simFin[melhorUnderIdx].underPct}%</b>, ROI <b>${simFin[melhorUnderIdx].roiUnder >= 0 ? '+' : ''}${simFin[melhorUnderIdx].roiUnder}%</b>
        (R$${simFin[melhorUnderIdx].lucroUnder >= 0 ? '+' : ''}${simFin[melhorUnderIdx].lucroUnder} em ${n} apostas)
    </div>`;

    // Popular select de ligas com dados reais
    if (d.ligasDisponiveis) {
      const sel = gc('simLiga');
      if (sel) {
        const current = sel.value;
        sel.innerHTML = '<option value="">Todas as ligas</option>';
        d.ligasDisponiveis.forEach(l => sel.innerHTML += `<option value="${l}" ${l===current?'selected':''}>${l}</option>`);
      }
    }

  } catch(e) {
    el.innerHTML = `<div style="color:var(--red)">Erro: ${e.message}</div>`;
  }
}

// Popular select de ligas do simulador quando aba é aberta
async function _carregarLigasSimulador() {
  try {
    const snap = await db.collection('yellup-aprendizado').get();
    const sel = gc('simLiga');
    if (!sel) return;
    const ligas = snap.docs.map(d => d.data().liga).filter(Boolean).sort();
    sel.innerHTML = '<option value="">Todas as ligas</option>';
    ligas.forEach(l => sel.innerHTML += `<option value="${l}">${l}</option>`);
  } catch(e) {}
}



// ── BACKFILL HISTÓRICO MASSIVO ────────────────────────────────────────────
let _massivoRodando = false;
let _massivoParar   = false;

async function iniciarBackfillMassivo() {
  if (_massivoRodando) return;
  _massivoRodando = true;
  _massivoParar   = false;

  const ligaId = gc('massLiga').value;
  const season = gc('massSeason').value;
  const lote   = parseInt(gc('massLote').value || '10');
  const ligaNome = gc('massLiga').options[gc('massLiga').selectedIndex].text;

  gc('btnMassivo').disabled = true;
  gc('btnPararMassivo').style.display = 'inline-flex';
  gc('massivoProgress').style.display = 'block';
  gc('massivoStatus').textContent = `Iniciando importação de ${ligaNome} ${season}...`;

  let pagina = 1;
  let totalProcessados = 0;
  let totalPaginas = null;
  let totalJogos = null;

  while (true) {
    if (_massivoParar) {
      gc('massivoStatus').innerHTML = `<span style="color:var(--acc)">⏹ Parado em ${totalProcessados} jogos processados</span>`;
      break;
    }

    try {
      gc('massivoStatus').textContent = `Processando página ${pagina}/${totalPaginas || '?'}...`;

      const r = await fns.httpsCallable('backfillHistoricoMassivo')({
        ligaId: parseInt(ligaId),
        season: parseInt(season),
        lote,
        pagina,
      });
      const d = r.data;

      if (!d.sucesso) {
        gc('massivoStatus').innerHTML = `<span style="color:var(--red)">Erro: ${d.msg}</span>`;
        break;
      }

      totalProcessados += d.processados || 0;
      if (totalPaginas === null) totalPaginas = d.paginas || 1;
      if (totalJogos === null)   totalJogos   = d.total || 0;

      // Progresso
      const pct = Math.round((pagina / totalPaginas) * 100);
      gc('massivoBar').style.width = pct + '%';
      gc('massivoLabel').textContent = `Página ${pagina}/${totalPaginas} · ${totalProcessados} novos · ${d.pulados || 0} pulados · acurácia ${d.acuracia !== null ? d.acuracia+'%' : '—'}`;

      if (pagina >= totalPaginas || d.processados + (d.pulados||0) === 0) {
        gc('massivoStatus').innerHTML = `<span style="color:var(--grn)">✓ Concluído — ${totalProcessados} jogos importados de ${ligaNome} ${season}</span>`;
        break;
      }

      pagina++;
      // Aguardar entre páginas para não estourar rate limit da API
      await new Promise(res => setTimeout(res, 2000));

    } catch(e) {
      gc('massivoStatus').innerHTML = `<span style="color:var(--red)">Erro na página ${pagina}: ${e.message}</span>`;
      break;
    }
  }

  _massivoRodando = false;
  gc('btnMassivo').disabled = false;
  gc('btnPararMassivo').style.display = 'none';
}

function pararBackfillMassivo() {
  _massivoParar = true;
}

async function iniciarBackfill() {
  if (backfillRodando) return;
  const btn = gc('btnBackfill');
  const liga = gc('backfillLiga')?.value || null;
  const lote = parseInt(gc('backfillLote')?.value || '20');

  backfillRodando = true;
  btn.disabled = true;
  btn.textContent = '⏳ Importando...';
  gc('backfillProgress').style.display = 'block';
  gc('backfillStatus').textContent = 'Iniciando importação...';

  let offset = 0, totalProcessados = 0, totalErros = 0, total = null;

  try {
    while (true) {
      gc('backfillStatus').textContent = `Processando lote a partir do jogo ${offset+1}...`;

      const forcar = gc('chkForcar')?.checked || false;
      const r = await fns.httpsCallable('backfillPrevisoes')({
        lote, offset, liga: liga || null, forcar
      });
      const d = r.data;

      totalProcessados += d.processados || 0;
      totalErros       += d.erros || 0;
      if (total === null) total = d.total || 0;

      // Atualizar barra
      const pct = total > 0 ? Math.min(100, Math.round((offset + lote) / total * 100)) : 0;
      gc('backfillBar').style.width = pct + '%';
      gc('backfillStats').textContent =
        `${totalProcessados} processados · ${totalErros} erros · ${d.totalRestante || 0} restantes`;

      // Sem mais para processar
      if (!d.processados || d.totalRestante <= 0) {
        gc('backfillStatus').innerHTML =
          `<span style="color:var(--grn)">✓ Importação concluída — ${totalProcessados} jogos analisados</span>`;
        gc('backfillBar').style.width = '100%';
        break;
      }

      offset = d.proximoOffset;

      // Pausa entre lotes para não sobrecarregar
      await new Promise(res => setTimeout(res, 2000));
    }
  } catch(e) {
    gc('backfillStatus').innerHTML =
      `<span style="color:var(--red)">Erro: ${e.message}</span>`;
  }

  backfillRodando = false;
  btn.disabled = false;
  btn.textContent = '🔄 Continuar importação';

  // Recarregar dados de aprendizado
  setTimeout(() => carregarAprendizado(), 1000);
}
