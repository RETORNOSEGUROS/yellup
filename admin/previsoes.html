<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Previsões de Gols · Yellup</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0a0e1a; --s1:#0f1422; --s2:#141927; --s3:#1a2030;
  --b1:#1f2638; --b2:#2a3142;
  --tx1:#e8ecf3; --tx2:#a0a8ba; --tx3:#5a6478;
  --gn:#0fe898; --gn-d:rgba(15,232,152,.08); --gn-b:rgba(15,232,152,.25);
  --rd:#ff5577; --rd-d:rgba(255,85,119,.08); --rd-b:rgba(255,85,119,.25);
  --yl:#facc15; --yl-d:rgba(250,204,21,.08); --yl-b:rgba(250,204,21,.25);
  --cy:#00d4ff; --cy-d:rgba(0,212,255,.08); --cy-b:rgba(0,212,255,.25);
  --pu:#a78bfa;
  --fS:'Inter',system-ui,-apple-system,sans-serif;
  --fM:'JetBrains Mono','SF Mono',Menlo,monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--tx1); font-family:var(--fS); font-size:13px; min-height:100vh; }

/* TOPBAR */
.topbar { display:flex; align-items:center; padding:12px 20px; background:var(--s1); border-bottom:1px solid var(--b1); gap:14px; }
.logo { font-size:16px; font-weight:800; letter-spacing:1px; color:var(--cy); }
.logo em { font-style:normal; color:var(--tx1); }
.page-id { font-size:9px; font-weight:700; letter-spacing:1.4px; color:var(--tx3); text-transform:uppercase; }
.topbar .spacer { flex:1; }
.btn { background:transparent; color:var(--tx2); border:1px solid var(--b2); border-radius:6px; padding:7px 14px; font-size:11px; font-weight:600; cursor:pointer; font-family:var(--fS); transition:.15s; }
.btn:hover { color:var(--tx1); border-color:var(--tx3); }
.btn-pri { background:var(--cy-d); color:var(--cy); border-color:var(--cy-b); }
.btn-pri:hover { background:rgba(0,212,255,.18); }
.btn-pri:disabled { opacity:.5; cursor:not-allowed; }

/* MAIN */
.main { max-width:1400px; margin:0 auto; padding:20px; }
.bar { display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.bar h1 { font-size:18px; font-weight:600; color:var(--tx1); }
.dt-pick { background:var(--s2); border:1px solid var(--b1); color:var(--tx1); padding:7px 12px; border-radius:6px; font-size:12px; font-family:var(--fM); }
.tag { padding:3px 9px; border-radius:4px; font-size:10px; font-weight:700; font-family:var(--fM); }
.tag-info { background:var(--cy-d); color:var(--cy); border:1px solid var(--cy-b); }

/* STATUS BANNER */
.banner { padding:12px 16px; border-radius:8px; margin-bottom:16px; display:flex; gap:10px; align-items:center; font-size:12px; }
.banner-info { background:var(--cy-d); color:var(--cy); border:1px solid var(--cy-b); }
.banner-warn { background:var(--yl-d); color:var(--yl); border:1px solid var(--yl-b); }
.banner-err  { background:var(--rd-d); color:var(--rd); border:1px solid var(--rd-b); }

/* JOGO CARD */
.jc { background:var(--s1); border:1px solid var(--b1); border-radius:10px; margin-bottom:10px; overflow:hidden; transition:.15s; }
.jc:hover { border-color:var(--b2); }
.jc-hd { display:grid; grid-template-columns:90px 1fr 130px 1fr 130px; align-items:center; padding:14px 18px; gap:14px; cursor:pointer; }
.jc-time { font-family:var(--fM); font-size:11px; color:var(--tx3); font-weight:600; }
.jc-time strong { color:var(--tx1); display:block; font-size:13px; font-weight:700; }
.jc-tm { display:flex; align-items:center; gap:10px; min-width:0; }
.jc-tm.right { justify-content:flex-end; }
.jc-tm img { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
.jc-tm-nm { font-size:13px; font-weight:600; color:var(--tx1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.jc-vs { text-align:center; font-family:var(--fM); font-size:18px; font-weight:700; }
.jc-vs.pend { color:var(--tx3); }
.jc-vs.fim { color:var(--gn); }
.jc-status { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; padding:3px 8px; border-radius:4px; text-align:center; }
.jc-status-ag { background:var(--cy-d); color:var(--cy); }
.jc-status-fim { background:var(--gn-d); color:var(--gn); }
.jc-status-live { background:var(--rd-d); color:var(--rd); }
.jc-prev { font-family:var(--fM); font-size:11px; text-align:right; }
.jc-prev .lambda { color:var(--cy); font-size:14px; font-weight:700; }
.jc-prev .lbl { color:var(--tx3); font-size:9px; text-transform:uppercase; letter-spacing:.5px; }
.jc-prev.empty { color:var(--tx3); font-style:italic; }

/* DETAIL PANE */
.jc-det { display:none; padding:0 18px 18px; border-top:1px solid var(--b1); margin-top:6px; padding-top:14px; }
.jc.open .jc-det { display:block; }
.jc.open .jc-hd { background:var(--s2); }

.det-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.det-block { background:var(--s2); border:1px solid var(--b1); border-radius:8px; padding:14px; }
.det-h { font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--tx3); margin-bottom:10px; }

/* FORTESCORE LADO A LADO */
.fs-pair { display:grid; grid-template-columns:1fr auto 1fr; gap:14px; align-items:center; }
.fs-side { text-align:center; }
.fs-team { font-size:11px; color:var(--tx2); font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fs-val { font-size:32px; font-weight:700; font-family:var(--fM); }
.fs-vs { font-family:var(--fM); font-size:11px; color:var(--tx3); }
.fs-cmp { display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center; margin-top:4px; font-family:var(--fM); font-size:10px; }
.fs-cmp-bar { background:var(--s3); border-radius:2px; height:5px; overflow:hidden; position:relative; }
.fs-cmp-fill { height:100%; }

/* DISTRIBUIÇÃO POISSON */
.poisson { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-top:6px; }
.poi-c { background:var(--s3); border-radius:6px; padding:8px 4px; text-align:center; position:relative; overflow:hidden; }
.poi-c-bar { position:absolute; bottom:0; left:0; right:0; background:var(--cy-d); border-top:2px solid var(--cy); }
.poi-c-lbl { position:relative; font-family:var(--fM); font-size:10px; color:var(--tx2); font-weight:700; }
.poi-c-pct { position:relative; font-family:var(--fM); font-size:13px; color:var(--tx1); font-weight:700; margin-top:2px; }
.poi-c.peak .poi-c-bar { background:rgba(0,212,255,.25); border-top-color:var(--cy); }
.poi-c.peak .poi-c-pct { color:var(--cy); }

/* ACURÁCIA (jogo encerrado) */
.acc { background:var(--gn-d); border:1px solid var(--gn-b); border-radius:8px; padding:12px 14px; margin-top:12px; font-family:var(--fM); font-size:11px; }
.acc.miss { background:var(--rd-d); border-color:var(--rd-b); }
.acc-hd { font-weight:700; margin-bottom:6px; }

/* JANELAS */
.jan-list { display:flex; flex-direction:column; gap:3px; }
.jan-item { display:grid; grid-template-columns:50px 1fr auto; gap:10px; align-items:center; padding:5px 10px; background:var(--s3); border-radius:4px; font-family:var(--fM); font-size:10px; }
.jan-min { color:var(--tx2); font-weight:700; }
.jan-team { color:var(--gn); font-weight:700; }
.jan-sc { color:var(--cy); font-weight:700; }

/* SPINNER */
.sp { display:inline-block; width:11px; height:11px; border:2px solid currentColor; border-bottom-color:transparent; border-radius:50%; animation:sp 0.7s linear infinite; vertical-align:middle; }
@keyframes sp { to { transform:rotate(360deg); } }

/* PROGRESS */
.prog { background:var(--s2); border:1px solid var(--b1); border-radius:8px; padding:14px; margin-bottom:14px; display:none; }
.prog.on { display:block; }
.prog-bar { background:var(--s3); height:6px; border-radius:3px; overflow:hidden; margin-top:8px; }
.prog-fill { background:var(--cy); height:100%; transition:.3s; }
.prog-info { display:flex; justify-content:space-between; font-family:var(--fM); font-size:11px; color:var(--tx2); }

.empty-state { text-align:center; padding:60px 20px; color:var(--tx3); }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">YELL<em>UP</em></span>
  <span class="page-id">PREVISÕES · GOLS</span>
  <div class="spacer"></div>
  <button class="btn" onclick="window.location.href='jogos-admin.html'">← Jogos</button>
  <button class="btn" onclick="abrirRBF()">🧮 RBF</button>
  <button class="btn-pri btn" id="btnCalc" onclick="calcularTodos()">⚡ Calcular previsões do dia</button>
</div>

<div class="main">
  <div class="bar">
    <h1 id="dataTitle">Carregando...</h1>
    <input type="date" class="dt-pick" id="dtPick" onchange="mudarData(this.value)">
    <div class="spacer"></div>
    <span id="counters"></span>
  </div>

  <div class="prog" id="progress">
    <div class="prog-info">
      <span id="progLbl">Calculando...</span>
      <span id="progNum">0/0</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0"></div></div>
  </div>

  <div id="banner"></div>

  <!-- ═══════════════════════════════════════════════════════════
       MÓDULO RBF — Modelo experimental de função base radial
       ═══════════════════════════════════════════════════════════ -->
  <div id="rbf-section" style="display:none; margin-top:20px;">

        <h2 style="font-size:16px; font-weight:600; color:var(--cy);">🧮 Modelo RBF — fórmula por similaridade</h2>
        <span class="tag tag-info">EXPERIMENTAL</span>
        <div style="flex:1;"></div>
        <button class="btn btn-pri" onclick="rbfTreinarEPrever()" id="rbfBtnRun">▶️ Treinar e prever</button>
        <button class="btn" onclick="rbfFechar()">✕ Fechar</button>
      </div>
      <div id="rbf-status" style="font-size:11px; color:var(--tx2); font-family:var(--fM); margin-bottom:8px;">Aguardando...</div>
    </div>

    <div id="rbf-stats" style="display:none; margin-bottom:16px;">
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px;" id="rbf-stats-grid"></div>

    <div style="display:flex; gap:4px; margin-bottom:8px; border-bottom:1px solid var(--b1);">
      <div class="rbf-tab" data-view="abertos" onclick="rbfTrocarAba('abertos', this)" style="padding:8px 16px; cursor:pointer; color:var(--cy); border-bottom:2px solid var(--cy); font-weight:600; font-size:12px;">🔮 Abertos</div>
      <div class="rbf-tab" data-view="encerrados" onclick="rbfTrocarAba('encerrados', this)" style="padding:8px 16px; cursor:pointer; color:var(--tx2); border-bottom:2px solid transparent; font-weight:600; font-size:12px;">📊 Validação</div>
      <div class="rbf-tab" data-view="vizinhos" onclick="rbfTrocarAba('vizinhos', this)" style="padding:8px 16px; cursor:pointer; color:var(--tx2); border-bottom:2px solid transparent; font-weight:600; font-size:12px;">🎯 Vizinhança</div>
      <div class="rbf-tab" data-view="log" onclick="rbfTrocarAba('log', this)" style="padding:8px 16px; cursor:pointer; color:var(--tx2); border-bottom:2px solid transparent; font-weight:600; font-size:12px;">📝 Log</div>
    </div>

    <div class="rbf-view" id="rbf-view-abertos" style="display:block;">
      <div style="background:var(--s2); border:1px solid var(--b1); border-radius:8px; padding:14px; overflow-x:auto;" id="rbf-tabela-abertos">
        <div style="color:var(--tx3); font-size:12px;">Clique em "Treinar e prever" pra começar.</div>
      </div>
    </div>
    <div class="rbf-view" id="rbf-view-encerrados" style="display:none;">
      <div style="background:var(--s2); border:1px solid var(--b1); border-radius:8px; padding:14px; overflow-x:auto;" id="rbf-tabela-encerrados"></div>
    </div>
    <div class="rbf-view" id="rbf-view-vizinhos" style="display:none;">
      <div style="background:var(--s2); border:1px solid var(--b1); border-radius:8px; padding:14px;" id="rbf-vizinhos-conteudo"></div>
    </div>
    <div class="rbf-view" id="rbf-view-log" style="display:none;">
      <pre id="rbf-log" style="background:var(--bg); border:1px solid var(--b1); border-radius:6px; padding:10px; font-size:10px; color:var(--tx2); max-height:400px; overflow:auto; font-family:var(--fM);"></pre>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const CFG = {
  apiKey: '35647fb22d9fa6e5ab4397cb1a0d27a3',
  apiBase: 'https://v3.football.api-sports.io',
  firebase: {
    apiKey: "AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",
    authDomain: "painel-yellup.firebaseapp.com",
    projectId: "painel-yellup",
    storageBucket: "painel-yellup.appspot.com",
    messagingSenderId: "608347210297",
    appId: "1:608347210297:web:75092713724e617c7203e8"
  }
};
firebase.initializeApp(CFG.firebase);
const db = firebase.firestore();
const auth = firebase.auth();

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let JOGOS = [];           // jogos do dia (do Firestore)
let PREVS = {};           // fixtureId -> previsão salva
let CACHE_TEAMS = {};     // apiId -> { last20, calcAt }
let CACHE_EVENTS = {};    // fixtureId+'_'+teamId -> events parsed
let CACHE_FORTE = {};     // apiId -> score
let CACHE_STATS = {};     // fixtureId -> { home: {xg,shots,shotsOG,poss}, away: {...} }
let SELECTED_DATE = null;

const TTL_TEAM = 12 * 60 * 60 * 1000;  // 12h
const TTL_FORTE = 24 * 60 * 60 * 1000; // 24h

// ═══════════════════════════════════════════════════════════
// AUTH + INIT
// ═══════════════════════════════════════════════════════════
auth.onAuthStateChanged(u => {
  if (!u || u.email !== 'admin@yellup.com') {
    window.location.href = 'login.html';
    return;
  }
  loadCachesFromLocalStorage();
  init();
});

function loadCachesFromLocalStorage() {
  try {
    const t = localStorage.getItem('yellup_cache_teams');
    if (t) CACHE_TEAMS = JSON.parse(t);
    const f = localStorage.getItem('yellup_cache_forte');
    if (f) CACHE_FORTE = JSON.parse(f);
    const e = localStorage.getItem('yellup_cache_events');
    if (e) CACHE_EVENTS = JSON.parse(e);
    const s = localStorage.getItem('yellup_cache_stats');
    if (s) CACHE_STATS = JSON.parse(s);
  } catch(_) {}
}
function persistCaches() {
  try {
    localStorage.setItem('yellup_cache_teams', JSON.stringify(CACHE_TEAMS));
    localStorage.setItem('yellup_cache_forte', JSON.stringify(CACHE_FORTE));
    localStorage.setItem('yellup_cache_events', JSON.stringify(CACHE_EVENTS));
    localStorage.setItem('yellup_cache_stats', JSON.stringify(CACHE_STATS));
  } catch(_) {}
}

async function init() {
  const hoje = toBRTDate(new Date());
  document.getElementById('dtPick').value = hoje;
  await mudarData(hoje);
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function toBRTDate(d) {
  const t = new Date(d.getTime() - (d.getTimezoneOffset() * 60000) + (-3 * 60 * 60000));
  return t.toISOString().slice(0, 10);
}
function fmtTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
function fmtData(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
}
function el(id) { return document.getElementById(id); }

function showBanner(tipo, msg) {
  const b = el('banner');
  b.innerHTML = `<div class="banner banner-${tipo}">${msg}</div>`;
}
function clearBanner() { el('banner').innerHTML = ''; }

// ═══════════════════════════════════════════════════════════
// API com retry
// ═══════════════════════════════════════════════════════════
async function apiGet(path, retries = 3) {
  let lastErr;
  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      const res = await fetch(CFG.apiBase + path, { headers: { 'x-apisports-key': CFG.apiKey }});
      if (res.status === 429) {
        if (attempt < retries - 1) { await sleep(1500 * (attempt+1)); continue; }
        throw new Error('API 429 rate limit');
      }
      if (res.status >= 500) {
        if (attempt < retries - 1) { await sleep(800 * (attempt+1)); continue; }
        throw new Error(`API ${res.status}`);
      }
      if (!res.ok) throw new Error(`API ${res.status} ${res.statusText}`);
      const json = await res.json();
      if (json.errors && Object.keys(json.errors).length) {
        const msg = Object.values(json.errors)[0];
        if (/rate|limit|quota|busy/i.test(msg) && attempt < retries-1) {
          await sleep(1500 * (attempt+1)); continue;
        }
        throw new Error(msg);
      }
      return json;
    } catch (e) {
      lastErr = e;
      if (e instanceof TypeError && attempt < retries-1) {
        await sleep(800 * (attempt+1)); continue;
      }
      if (!(e instanceof TypeError)) throw e;
    }
  }
  throw lastErr || new Error('apiGet falhou');
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ═══════════════════════════════════════════════════════════
// FETCH com cache
// ═══════════════════════════════════════════════════════════
async function fetchTeamLast20(apiId) {
  const ck = String(apiId);
  const c = CACHE_TEAMS[ck];
  if (c && (Date.now() - c.calcAt < TTL_TEAM)) {
    return c.last20;
  }
  const r = await apiGet(`/fixtures?team=${apiId}&last=30`);
  const fixes = (r.response || [])
    .filter(f => f.fixture.status.short === 'FT' || f.fixture.status.short === 'AET' || f.fixture.status.short === 'PEN')
    .sort((a,b) => new Date(b.fixture.date) - new Date(a.fixture.date))
    .slice(0, 30);
  CACHE_TEAMS[ck] = { last20: fixes, calcAt: Date.now() };
  persistCaches();
  return fixes;
}

async function fetchFixtureEvents(fixtureId, teamId) {
  const ck = `${fixtureId}_${teamId}`;
  if (CACHE_EVENTS[ck] !== undefined) return CACHE_EVENTS[ck];
  try {
    const r = await apiGet(`/fixtures/events?fixture=${fixtureId}&type=Goal`);
    const parsed = parseGoalEvents(r.response || [], teamId);
    CACHE_EVENTS[ck] = parsed;
    persistCaches();
    return parsed;
  } catch (e) {
    console.warn(`events fixture=${fixtureId} falhou:`, e.message);
    return [];
  }
}

async function fetchFixtureStats(fixtureId, homeId, awayId) {
  if (CACHE_STATS[fixtureId] !== undefined) return CACHE_STATS[fixtureId];
  try {
    const r = await apiGet(`/fixtures/statistics?fixture=${fixtureId}`);
    const parsed = parseFixtureStats(r.response || [], homeId, awayId);
    CACHE_STATS[fixtureId] = parsed;
    persistCaches();
    return parsed;
  } catch (e) {
    CACHE_STATS[fixtureId] = null;
    return null;
  }
}

function parseFixtureStats(raw, homeId, awayId) {
  // Retorna { home: {xg, shots, shotsOG, poss}, away: {xg, shots, shotsOG, poss} }
  // Cada campo pode ser null se não disponível na liga
  const r = { home: {xg:null, shots:null, shotsOG:null, poss:null},
              away: {xg:null, shots:null, shotsOG:null, poss:null} };
  if (!Array.isArray(raw) || !raw.length) return r;
  for (const ts of raw) {
    const side = ts.team?.id === homeId ? 'home' : (ts.team?.id === awayId ? 'away' : null);
    if (!side) continue;
    for (const stat of (ts.statistics || [])) {
      const t = stat.type;
      const v = stat.value;
      const isXG = (t === 'expected_goals' || t === 'Expected Goals');
      if (!isXG && (v === null || v === undefined)) continue;
      if (t === 'Ball Possession')      r[side].poss    = parseInt(v) || 0;
      else if (t === 'Total Shots')     r[side].shots   = parseInt(v) || 0;
      else if (t === 'Shots on Goal')   r[side].shotsOG = parseInt(v) || 0;
      else if (isXG && v !== null && v !== undefined) r[side].xg = parseFloat(v) || 0;
    }
  }
  return r;
}

// ═══════════════════════════════════════════════════════════
// CORE — enrich + parse + bucket
// ═══════════════════════════════════════════════════════════
function enrich(f, tid) {
  const home = f.teams.home.id === tid;
  const tGoals = home ? f.goals.home : f.goals.away;
  const oGoals = home ? f.goals.away : f.goals.home;
  const oTeamId = home ? f.teams.away.id : f.teams.home.id;
  const res = tGoals === null ? 'n' : tGoals > oGoals ? 'v' : tGoals === oGoals ? 'e' : 'd';
  return { f, home, tGoals, oGoals, res, oTeamId };
}

function parseGoalEvents(events, teamId) {
  if (!Array.isArray(events)) return [];
  return events
    .filter(ev => ev.type?.toLowerCase() === 'goal')
    .map(ev => ({
      elapsed: ev.time?.elapsed ?? 0,
      extra: ev.time?.extra,
      sc: ev.team?.id === teamId   // true = team marked, false = team conceded
    }));
}

// 20 buckets: 0-5, 6-10, ..., 41-45, AC1T, 46-50, ..., 86-90, AC2T
function getBucket(elapsed, extra) {
  const hasExtra = extra != null && extra > 0;
  if (elapsed > 90 || (elapsed === 90 && hasExtra)) return 19;
  if (elapsed === 45 && hasExtra) return 9;
  if (elapsed === 46 || elapsed === 47) return 9;
  if (elapsed <= 45) return Math.min(8, Math.floor((Math.max(1, elapsed) - 1) / 5));
  return Math.min(18, 10 + Math.floor((elapsed - 48) / 5));
}

const BUCKET_LABELS = ['0-5','6-10','11-15','16-20','21-25','26-30','31-35','36-40','41-45','AC1T',
                       '46-50','51-55','56-60','61-65','66-70','71-75','76-80','81-85','86-90','AC2T'];

// ═══════════════════════════════════════════════════════════
// LEAGUE COEFFICIENT (mantido, com defaults melhores)
// ═══════════════════════════════════════════════════════════
const LC = {

  39:1.00, 40:0.82, 41:0.65, 45:0.85,
  140:1.00, 141:0.80, 143:0.90,
  78:0.98, 79:0.78, 81:0.85,
  135:0.97, 136:0.77, 137:0.83,
  61:0.93, 62:0.73, 66:0.80,
  94:0.82, 95:0.65, 96:0.80,
  88:0.85, 89:0.67,
  144:0.83, 145:0.68,
  203:0.80, 204:0.65,
  235:0.78,
  179:0.74, 180:0.60,
  71:0.80, 72:0.63, 73:0.52, 75:0.75,
  13:0.88, 11:0.80,
  128:0.82, 130:0.78,
  239:0.72, 265:0.70,
  262:0.75, 263:0.65,
  253:0.70, 254:0.58,
  307:0.65, 291:0.60, 435:0.58,
  98:0.73, 99:0.60,
  292:0.70, 188:0.60,
  169:0.83, 170:0.68,
  197:0.76, 198:0.65, 207:0.76,
  244:0.66, 103:0.71, 113:0.72, 119:0.74,
  106:0.71, 283:0.68, 333:0.72,
  286:0.68, 210:0.70,
  233:0.62, 200:0.63, 288:0.58,
};
function getLC(leagueId) { return LC[leagueId] || 0.60; }

// ═══════════════════════════════════════════════════════════
// FORTESCORE simplificado (com LC + forma recente)
// Componentes: WRS·0.45 + IO·0.20 + ID·0.20 + LCS·0.15
// ═══════════════════════════════════════════════════════════
function calcForteScore(enriched20) {
  if (!enriched20.length) return { score: 5.0, components: {} };

  // WRS — pontos × LC × bônus fora, recência ponderada (10/10/15 → 25%/40%/35%)
  const winScore = (games) => {
    if (!games.length) return 0;
    let sum = 0, wMax = 0;
    games.forEach(e => {
      const pts = e.res==='v' ? 1.0 : e.res==='e' ? 0.33 : 0;
      const coeff = getLC(e.f.league.id);
      const bonusFora = (e.res==='v' && !e.home) ? 1.08 : 1.0;
      sum += pts * coeff * bonusFora;
      wMax += 1.0 * coeff * 1.08;
    });
    return wMax ? Math.min(1, sum / wMax) : 0;
  };
  const w20 = winScore(enriched20);
  const w10 = winScore(enriched20.slice(0, 10));
  const w5  = winScore(enriched20.slice(0, 5));
  const wrs = w20*0.30 + w10*0.40 + w5*0.30;

  // IO — média de gols feitos / 2.6 (escala over-the-top "elite faz 2.6+")
  const gfMed = enriched20.reduce((s,e)=>s+(e.tGoals||0),0) / enriched20.length;
  const io = Math.min(1, gfMed / 2.6);

  // ID — 1 - GC/2.6 (simétrico ao IO)
  const gcMed = enriched20.reduce((s,e)=>s+(e.oGoals||0),0) / enriched20.length;
  const id = Math.max(0, 1 - gcMed / 2.6);

  // LCS — média do coeficiente das ligas em que jogou
  const lcMed = enriched20.reduce((s,e)=>s+getLC(e.f.league.id),0) / enriched20.length;
  const lcs = Math.max(0, Math.min(1, (lcMed - 0.50) / 0.60));

  // Combinação
  const raw = wrs*0.45 + io*0.20 + id*0.20 + lcs*0.15;
  const score = parseFloat(Math.max(0.01, Math.min(10, Math.pow(raw, 0.55) * 10)).toFixed(2));

  return { score, components: { wrs, io, id, lcs, gfMed, gcMed, lcMed } };
}

// ═══════════════════════════════════════════════════════════
// MOTOR DE PREVISÃO DE GOLS (POISSON)
// ═══════════════════════════════════════════════════════════
function calcPrevisao(rxA, rxB) {
  // rxA = time da casa, rxB = time de fora
  // Cada enriched item agora pode ter: tXG, oXG, tShots, oShots, tShotsOG, oShotsOG, tPoss, oForte
  const FATOR_CORRECAO = 0.80;

  // ─── 1. Médias gerais (fallback / base) ───
  const meanField = (arr, field) => {
    const valid = arr.filter(e => e[field] != null);
    return valid.length >= 5 ? valid.reduce((s,e)=>s+e[field],0) / valid.length : null;
  };
  const meanGoals = (arr, field) =>
    arr.length ? arr.reduce((s,e)=>s+(e[field]||0),0) / arr.length : 0;

  // ─── 1b. Média PONDERADA por similaridade do oponente ───
  // Para cada jogo, peso = exp(-Δ²/2) onde Δ = |oForte_jogo - forte_adversario_atual|
  // Jogos contra times com força similar ao oponente atual pesam mais
  // Quando oForte não tá em cache, peso neutro 1.0 (não distorce)
  const weightedMean = (arr, field, alvoForte) => {
    let valid = arr.filter(e => e[field] != null);
    if (valid.length < 5) return null;
    let totalW = 0, sumW = 0, jogosComForte = 0;
    for (const e of valid) {
      let w = 1.0;
      if (typeof e.oForte === 'number') {
        const delta = Math.abs(e.oForte - alvoForte);
        w = Math.exp(-(delta*delta) / 2);  // gaussian, σ=1
        jogosComForte++;
      }
      totalW += w;
      sumW   += w * e[field];
    }
    return totalW > 0 ? { val: sumW / totalW, jogosPond: jogosComForte, totalJogos: valid.length } : null;
  };

  const forteB = rxB.forte?.score ?? 6.0;
  const forteA = rxA.forte?.score ?? 6.0;

  // gfA/gcA: prioriza xG, ponderado por similaridade ao oponente (B)
  const gfA_xg_w = weightedMean(rxA.enriched, 'tXG', forteB);
  const gcA_xg_w = weightedMean(rxA.enriched, 'oXG', forteB);
  const gfB_xg_w = weightedMean(rxB.enriched, 'tXG', forteA);
  const gcB_xg_w = weightedMean(rxB.enriched, 'oXG', forteA);

  const gfA_g_w = weightedMean(rxA.enriched, 'tGoals', forteB);
  const gcA_g_w = weightedMean(rxA.enriched, 'oGoals', forteB);
  const gfB_g_w = weightedMean(rxB.enriched, 'tGoals', forteA);
  const gcB_g_w = weightedMean(rxB.enriched, 'oGoals', forteA);

  // Fonte: xG se disponível (5+ jogos), senão gols
  const usaXG_A = gfA_xg_w !== null && gcA_xg_w !== null;
  const usaXG_B = gfB_xg_w !== null && gcB_xg_w !== null;

  const gfA_geral = (usaXG_A ? gfA_xg_w : gfA_g_w)?.val ?? 0;
  const gcA_geral = (usaXG_A ? gcA_xg_w : gcA_g_w)?.val ?? 0;
  const gfB_geral = (usaXG_B ? gfB_xg_w : gfB_g_w)?.val ?? 0;
  const gcB_geral = (usaXG_B ? gcB_xg_w : gcB_g_w)?.val ?? 0;

  // Quantos jogos tiveram peso real (oForte em cache) — útil pra UI
  const jogosPondA = gfA_xg_w?.jogosPond ?? gfA_g_w?.jogosPond ?? 0;
  const jogosPondB = gfB_xg_w?.jogosPond ?? gfB_g_w?.jogosPond ?? 0;

  // ─── 2. Filtro por mando (peso 40% no cálculo final) ───
  const mandoA = rxA.enriched.filter(e => e.home === true).slice(0, 15);
  const mandoB = rxB.enriched.filter(e => e.home === false).slice(0, 15);

  const calcStat = (arr, fieldXG, fieldGol) => {
    if (arr.length < 4) return null;
    const xg = meanField(arr, fieldXG);
    if (xg !== null) return { val: xg, src: 'xg' };
    return { val: meanGoals(arr, fieldGol), src: 'gols' };
  };

  const gfA_m = calcStat(mandoA, 'tXG', 'tGoals');
  const gcA_m = calcStat(mandoA, 'oXG', 'oGoals');
  const gfB_m = calcStat(mandoB, 'tXG', 'tGoals');
  const gcB_m = calcStat(mandoB, 'oXG', 'oGoals');

  // Mistura: 60% geral ponderado + 40% mando
  const mix = (g, m) => m === null ? g : 0.6*g + 0.4*m.val;
  const gfA = mix(gfA_geral, gfA_m);
  const gcA = mix(gcA_geral, gcA_m);
  const gfB = mix(gfB_geral, gfB_m);
  const gcB = mix(gcB_geral, gcB_m);

  // ─── 3. λ base (Dixon-Coles cruzado) ───
  let lambdaA = (gfA + gcB) / 2;
  let lambdaB = (gfB + gcA) / 2;

  // ─── 4. Janelas — só sinalização (não inflam λ) ───
  const janelas = calcJanelas(rxA, rxB);
  const top1 = janelas[0]?.total || 0;
  const top2 = janelas[1]?.total || 0;
  const matchupAberto  = (top1 >= 20 && top2 >= 14);
  const jogoTrancado   = (top1 < 11);

  // ─── 5. Forma recente (últimos 5) ───
  const gfA_g_simple = meanGoals(rxA.enriched, 'tGoals');
  const gfB_g_simple = meanGoals(rxB.enriched, 'tGoals');
  const formA5 = rxA.enriched.slice(0,5).reduce((s,e)=>s+(e.tGoals||0),0) / Math.max(1, Math.min(5, rxA.enriched.length));
  const formB5 = rxB.enriched.slice(0,5).reduce((s,e)=>s+(e.tGoals||0),0) / Math.max(1, Math.min(5, rxB.enriched.length));
  const adjA = gfA_g_simple > 0 ? Math.max(0.7, Math.min(1.3, formA5 / gfA_g_simple)) : 1;
  const adjB = gfB_g_simple > 0 ? Math.max(0.7, Math.min(1.3, formB5 / gfB_g_simple)) : 1;

  lambdaA *= adjA;
  lambdaB *= adjB;

  // ─── 6. Calibração empírica ───
  lambdaA *= FATOR_CORRECAO;
  lambdaB *= FATOR_CORRECAO;

  lambdaA = Math.max(0.1, Math.min(4.5, lambdaA));
  lambdaB = Math.max(0.1, Math.min(4.5, lambdaB));

  const lambdaTotal = lambdaA + lambdaB;
  const probs = poissonDistribution(lambdaTotal, 5);

  // ─── 7. Tags de confiança ───
  const pUnder15 = probs[0] + probs[1];
  const tagAltoConfiancaUnder = pUnder15 >= 0.45;

  // F18 (formula linear validada): pred = (λ + t1/15) × 0.43, dispara over 2.5 quando >=2.5
  const f18 = (lambdaTotal + top1/15) * 0.43;
  const tagAltoConfiancaOver = f18 >= 2.5;

  return {
    lambdaA: round2(lambdaA),
    lambdaB: round2(lambdaB),
    lambdaTotal: round2(lambdaTotal),
    probs: probs.map(round3),
    janelasTop: janelas.slice(0, 5),
    matchupAberto,
    jogoTrancado,
    tagAltoConfiancaUnder,
    tagAltoConfiancaOver,
    fatorCorrecao: FATOR_CORRECAO,
    fonteLambda: {
      usaXG_A, usaXG_B,
      mandoA_n: mandoA.length, mandoA_src: gfA_m?.src || null,
      mandoB_n: mandoB.length, mandoB_src: gfB_m?.src || null,
      jogosPondA, jogosPondB,         // qts adversários históricos tinham forteScore em cache
      forteAlvoA: round2(forteB),     // força do oponente atual usada como alvo
      forteAlvoB: round2(forteA)
    },
    rawInputs: {
      gfA_geral: round2(gfA_geral), gcA_geral: round2(gcA_geral),
      gfB_geral: round2(gfB_geral), gcB_geral: round2(gcB_geral),
      gfA_final: round2(gfA), gcA_final: round2(gcA),
      gfB_final: round2(gfB), gcB_final: round2(gcB),
      formA5, formB5,
      adjA: round2(adjA), adjB: round2(adjB),
      f18: round2(f18)
    }
  };
}

function poissonDistribution(lambda, untilK) {
  // Retorna [P(0), P(1), ..., P(untilK-1), P(>=untilK)]
  const arr = [];
  let acc = 0;
  for (let k = 0; k < untilK; k++) {
    const p = Math.pow(lambda, k) * Math.exp(-lambda) / fact(k);
    arr.push(p);
    acc += p;
  }
  arr.push(Math.max(0, 1 - acc));
  return arr;
}
function fact(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
const round2 = x => Math.round(x * 100) / 100;
const round3 = x => Math.round(x * 1000) / 1000;

// ═══════════════════════════════════════════════════════════
// JANELAS (cross-index) — reusado de raiox-times
// ═══════════════════════════════════════════════════════════
function calcJanelas(rxA, rxB) {
  // rxA.totalsByBucket = { sc: [20], cn: [20] }
  const out = [];
  for (let i = 0; i < 20; i++) {
    const aSc = rxA.totalsByBucket.sc[i];
    const aCn = rxA.totalsByBucket.cn[i];
    const bSc = rxB.totalsByBucket.sc[i];
    const bCn = rxB.totalsByBucket.cn[i];
    const aAtk = aSc * bCn;
    const bAtk = bSc * aCn;
    const total = aAtk + bAtk;
    const fav = aAtk >= bAtk ? 'A' : 'B';
    if (total >= 6 || (aSc >= 4 && bCn >= 1) || (bSc >= 4 && aCn >= 1)) {
      out.push({ i, label: BUCKET_LABELS[i], total, aAtk, bAtk, fav, aSc, aCn, bSc, bCn });
    }
  }
  return out.sort((a,b) => b.total - a.total);
}

// Gols por tempo (1ºT vs 2ºT) — soma buckets 0-9 (0-45+AC1T) e 10-19 (46-90+AC2T)
// Retorna média por jogo (totals já são somas dos N jogos)
function calcGolsPorTempo(totalsByBucket, nJogos) {
  if (!nJogos || nJogos < 1) nJogos = 1;
  let sc1T = 0, sc2T = 0, cn1T = 0, cn2T = 0;
  for (let i = 0; i < 10; i++) {
    sc1T += totalsByBucket.sc[i];
    cn1T += totalsByBucket.cn[i];
  }
  for (let i = 10; i < 20; i++) {
    sc2T += totalsByBucket.sc[i];
    cn2T += totalsByBucket.cn[i];
  }
  return {
    sc1T_med: sc1T / nJogos, sc2T_med: sc2T / nJogos,
    cn1T_med: cn1T / nJogos, cn2T_med: cn2T / nJogos,
    sc1T, sc2T, cn1T, cn2T  // totais brutos pra debug
  };
}

// ═══════════════════════════════════════════════════════════
// SCAN COMPLETO DE UM TIME
// ═══════════════════════════════════════════════════════════
async function scanTeam(apiId, teamMeta) {
  const fixes = await fetchTeamLast20(apiId);
  const enriched = fixes.map(f => enrich(f, apiId));

  // ForteScore (com cache de 24h)
  let forte;
  const fc = CACHE_FORTE[apiId];
  if (fc && (Date.now() - fc.calcAt < TTL_FORTE)) {
    forte = fc.data;
  } else {
    forte = calcForteScore(enriched);
    CACHE_FORTE[apiId] = { data: forte, calcAt: Date.now() };
    persistCaches();
  }

  // Estatísticas detalhadas (xG, chutes, posse) — paralelo com cache
  await Promise.allSettled(enriched.map(async e => {
    const homeId = e.f.teams.home.id;
    const awayId = e.f.teams.away.id;
    const stats = await fetchFixtureStats(e.f.fixture.id, homeId, awayId);
    if (!stats) return;
    const my = e.home ? stats.home : stats.away;
    const op = e.home ? stats.away : stats.home;
    if (my) {
      e.tXG      = my.xg;
      e.tShots   = my.shots;
      e.tShotsOG = my.shotsOG;
      e.tPoss    = my.poss;
    }
    if (op) {
      e.oXG      = op.xg;
      e.oShots   = op.shots;
      e.oShotsOG = op.shotsOG;
    }
  }));

  // Anexar forteScore do adversário (se já existe em CACHE_FORTE)
  // Usado em calcPrevisao pra ponderar jogos por similaridade de oponente
  for (const e of enriched) {
    const oCache = CACHE_FORTE[e.oTeamId];
    if (oCache && oCache.data) {
      e.oForte = oCache.data.score;
    }
  }

  // Eventos por bucket
  const totalsByBucket = { sc: new Array(20).fill(0), cn: new Array(20).fill(0) };
  for (const e of enriched) {
    const evs = await fetchFixtureEvents(e.f.fixture.id, apiId);
    evs.forEach(ev => {
      const bi = getBucket(ev.elapsed, ev.extra);
      if (bi >= 0 && bi < 20) {
        ev.sc ? totalsByBucket.sc[bi]++ : totalsByBucket.cn[bi]++;
      }
    });
  }

  return { team: teamMeta, enriched, forte, totalsByBucket };
}

// ═══════════════════════════════════════════════════════════
// CARREGAR JOGOS DO DIA + PREVISÕES SALVAS
// ═══════════════════════════════════════════════════════════
async function mudarData(yyyy_mm_dd) {
  SELECTED_DATE = yyyy_mm_dd;
  el('dataTitle').textContent = fmtData(yyyy_mm_dd);
  el('lista').innerHTML = '<div class="empty-state"><span class="sp"></span> Carregando jogos...</div>';
  clearBanner();

  try {
    const dtIni = new Date(yyyy_mm_dd + 'T00:00:00-03:00');
    const dtFim = new Date(yyyy_mm_dd + 'T23:59:59-03:00');

    const snap = await db.collection('jogos-admin')
      .where('dataInicio', '>=', firebase.firestore.Timestamp.fromDate(dtIni))
      .where('dataInicio', '<=', firebase.firestore.Timestamp.fromDate(dtFim))
      .orderBy('dataInicio', 'asc')
      .limit(200)
      .get();

    JOGOS = snap.docs.map(d => ({ _id: d.id, ...d.data() }))
      .filter(j => j.timeCasa?.apiId && j.timeFora?.apiId);

    // Carrega previsões já salvas pra esses jogos
    PREVS = {};
    if (JOGOS.length) {
      const ids = JOGOS.map(j => String(j.apiFixtureId)).filter(Boolean);
      // Firestore "in" só aceita 10 por vez — paralelizar em chunks
      const chunks = [];
      for (let i = 0; i < ids.length; i += 10) chunks.push(ids.slice(i, i+10));
      const results = await Promise.all(chunks.map(chunk =>
        db.collection('previsoes-historico')
          .where(firebase.firestore.FieldPath.documentId(), 'in', chunk)
          .get()
      ));
      results.forEach(r => r.docs.forEach(d => PREVS[d.id] = d.data()));
    }

    renderLista();
  } catch (e) {
    console.error(e);
    el('lista').innerHTML = `<div class="empty-state">Erro: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER LISTA
// ═══════════════════════════════════════════════════════════
function renderLista() {
  const total = JOGOS.length;
  const comPrev = JOGOS.filter(j => PREVS[String(j.apiFixtureId)]).length;
  const enc = JOGOS.filter(j => j.status === 'encerrado').length;
  el('counters').innerHTML = `<span class="tag tag-info">${total} jogos · ${comPrev} com previsão · ${enc} encerrados</span>`;

  if (!total) {
    el('lista').innerHTML = '<div class="empty-state">Nenhum jogo cadastrado para esta data.</div>';
    el('btnCalc').disabled = true;
    return;
  }
  el('btnCalc').disabled = false;
  el('lista').innerHTML = JOGOS.map(j => renderJogoCard(j)).join('');
}

  if (prev) {
    prevHtml = `
      <div class="jc-prev">

        <div class="lbl">gols esperados</div>
      </div>`;
  } else {

  }

  const detPane = renderDetalhe(j, prev);

  return `
    <div class="jc" id="jc-${id}">
      <div class="jc-hd" onclick="toggleDet(${id})">
        <div class="jc-time">
          ${fmtTime(j.dataInicio)}
          <strong>${(j.liga?.nome || '').slice(0, 22)}</strong>

          <span class="jc-tm-nm">${j.timeCasa.nome}</span>

function forteColor(score) {
  if (score >= 8) return 'var(--cy)';
  if (score >= 6.5) return 'var(--gn)';

  return 'var(--rd)';
}

// ═══════════════════════════════════════════════════════════
// CALCULAR (um jogo / todos os jogos)
// ═══════════════════════════════════════════════════════════
async function calcularUm(docId, fixtureId) {
  const j = JOGOS.find(jg => jg._id === docId);
  if (!j) return;
  showProg('Calculando...', 0, 1);
  try {
    const prev = await calcularJogo(j);
    PREVS[String(fixtureId)] = prev;
    showProg('Concluído', 1, 1);
    setTimeout(hideProg, 800);
    renderLista();
    // re-abrir o card
    const card = el(`jc-${fixtureId}`);
    if (card) card.classList.add('open');
  } catch (e) {
    console.error(e);
    showBanner('err', 'Erro ao calcular: ' + e.message);
    hideProg();
  }
}

async function calcularTodos() {
  if (!JOGOS.length) return;
  el('btnCalc').disabled = true;
  showProg('Calculando previsões...', 0, JOGOS.length);

  let ok = 0, fail = 0;
  for (let i = 0; i < JOGOS.length; i++) {
    const j = JOGOS[i];
    try {
      const prev = await calcularJogo(j);
      PREVS[String(j.apiFixtureId)] = prev;
      ok++;
    } catch (e) {
      console.warn('Falhou ' + j._id + ': ' + e.message);
      fail++;
    }
    showProg(`Calculando... (${ok+fail}/${JOGOS.length})`, ok+fail, JOGOS.length);
  }

  hideProg();
  el('btnCalc').disabled = false;
  showBanner(fail ? 'warn' : 'info', `✓ ${ok} previsões salvas${fail ? ` · ${fail} falharam` : ''}`);
  renderLista();
}

async function calcularJogo(j) {
  // Scan dos dois times
  const [rxA, rxB] = await Promise.all([
    scanTeam(j.timeCasa.apiId, j.timeCasa),
    scanTeam(j.timeFora.apiId, j.timeFora)
  ]);

  const previsao = calcPrevisao(rxA, rxB);

  // Gols por tempo (1ºT/2ºT) — usa totalsByBucket de cada time
  const tempoA = calcGolsPorTempo(rxA.totalsByBucket, rxA.enriched.length);
  const tempoB = calcGolsPorTempo(rxB.totalsByBucket, rxB.enriched.length);
  const golsPorTempo = {
    A: { feitos1T: round2(tempoA.sc1T_med), feitos2T: round2(tempoA.sc2T_med),
         tomados1T: round2(tempoA.cn1T_med), tomados2T: round2(tempoA.cn2T_med),
         nJogos: rxA.enriched.length },
    B: { feitos1T: round2(tempoB.sc1T_med), feitos2T: round2(tempoB.sc2T_med),
         tomados1T: round2(tempoB.cn1T_med), tomados2T: round2(tempoB.cn2T_med),
         nJogos: rxB.enriched.length }
  };

  // Snapshot pro Firestore — só o essencial
  const doc = {
    apiFixtureId: j.apiFixtureId,
    jogoId: j._id,
    timeCasa: { apiId: j.timeCasa.apiId, nome: j.timeCasa.nome },
    timeFora: { apiId: j.timeFora.apiId, nome: j.timeFora.nome },
    liga: { apiId: j.liga?.apiId, nome: j.liga?.nome },
    dataJogo: j.dataInicio,
    forteA: rxA.forte,
    forteB: rxB.forte,
    lambdaA: previsao.lambdaA,
    lambdaB: previsao.lambdaB,
    lambdaTotal: previsao.lambdaTotal,
    probs: previsao.probs,
    janelasTop: previsao.janelasTop.map(jn => ({
      i: jn.i, label: jn.label, total: jn.total, fav: jn.fav,
      aSc: jn.aSc, aCn: jn.aCn, bSc: jn.bSc, bCn: jn.bCn
    })),
    golsPorTempo,
    matchupAberto: previsao.matchupAberto,
    jogoTrancado: previsao.jogoTrancado,
    tagAltoConfiancaUnder: previsao.tagAltoConfiancaUnder,
    tagAltoConfiancaOver: previsao.tagAltoConfiancaOver,
    fatorCorrecao: previsao.fatorCorrecao,
    fonteLambda: previsao.fonteLambda,
    versaoModelo: 'v5-30jogos-tempos',
    rawInputs: previsao.rawInputs,
    analisado: false,
    calculadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };

  await db.collection('previsoes-historico')
    .doc(String(j.apiFixtureId))
    .set(doc, { merge: true });

  return doc;
}

function showProg(lbl, n, total) {
  el('progress').classList.add('on');
  el('progLbl').textContent = lbl;
  el('progNum').textContent = `${n}/${total}`;
  el('progFill').style.width = total ? `${(n/total)*100}%` : '0';
}

<!-- ═══════════════════════════════════════════════════════════
     MÓDULO RBF — Função base radial gaussiana
     Treina com previsoes-historico, prevê os abertos.
     Reutiliza db, auth, JOGOS, PREVS já carregados acima.
     ═══════════════════════════════════════════════════════════ -->
<script>
const RBF_NOMES_FEATURES = ['λ','λA','λB','A','B','gfA','gcA','gfB','gcB','formA','formB','f18','t1','|A-B|'];
let RBF_ESTADO = { modelo:null, abertos:[], encerrados:[], loo:null };

function rbfLog(msg) {
  const el = document.getElementById('rbf-log');
  if (!el) return;
  const ts = new Date().toLocaleTimeString();
  el.textContent += `[${ts}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
  console.log('[RBF]', msg);
}
function rbfStatus(msg) {
  const el = document.getElementById('rbf-status');
  if (el) el.textContent = msg;
}

function abrirRBF() {
  document.getElementById('rbf-section').style.display = 'block';
  document.getElementById('rbf-section').scrollIntoView({behavior:'smooth'});
}
function rbfFechar() {
  document.getElementById('rbf-section').style.display = 'none';
}
function rbfTrocarAba(qual, btn) {
  document.querySelectorAll('.rbf-tab').forEach(t => {
    t.style.color = 'var(--tx2)';
    t.style.borderBottomColor = 'transparent';
  });
  btn.style.color = 'var(--cy)';
  btn.style.borderBottomColor = 'var(--cy)';
  document.querySelectorAll('.rbf-view').forEach(v => v.style.display = 'none');
  document.getElementById('rbf-view-' + qual).style.display = 'block';
}

// ─────────────────────────────────────────────────────────────
// FEATURE EXTRACTION — 14 features dos rawInputs
// ─────────────────────────────────────────────────────────────
function rbfExtrairFeatures(jogo) {
  const p = jogo.previsao || {};
  const r = p.rawInputs || {};
  const gfA = r.gfA_final ?? r.gfA_geral ?? r.gfA ?? null;
  const gcA = r.gcA_final ?? r.gcA_geral ?? r.gcA ?? null;
  const gfB = r.gfB_final ?? r.gfB_geral ?? r.gfB ?? null;
  const gcB = r.gcB_final ?? r.gcB_geral ?? r.gcB ?? null;
  const formA = r.formA5 ?? null;
  const formB = r.formB5 ?? null;
  const f18 = r.f18 ?? null;
  const t1 = (p.janelasTop && p.janelasTop[0]) ? (p.janelasTop[0].total || 0) : 0;
  const lam = p.lambdaTotal ?? null;
  const lamA = p.lambdaA ?? null;
  const lamB = p.lambdaB ?? null;
  const forteA = p.forteA ?? null;
  const forteB = p.forteB ?? null;
  const v = [lam, lamA, lamB, forteA, forteB, gfA, gcA, gfB, gcB, formA, formB, f18, t1, Math.abs((forteA||0)-(forteB||0))];
  if (v.some(x => x === null || x === undefined || isNaN(x))) return null;
  return v;
}

// ─────────────────────────────────────────────────────────────
// MATEMÁTICA
// ─────────────────────────────────────────────────────────────
function rbfMedia(arr) { return arr.reduce((s,x)=>s+x,0) / arr.length; }
function rbfDesvio(arr) {
  const m = rbfMedia(arr);
  return Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0) / arr.length);
}
function rbfStats(X) {
  const d = X[0].length;
  const mu = new Array(d).fill(0), sd = new Array(d).fill(0);
  for (let k=0; k<d; k++) {
    const col = X.map(row => row[k]);
    mu[k] = rbfMedia(col);
    sd[k] = rbfDesvio(col) || 1;
  }
  return { mu, sd };
}
function rbfNorm(x, mu, sd) { return x.map((v, i) => (v - mu[i]) / sd[i]); }
function rbfDist(a, b) {
  let s = 0;
  for (let i=0; i<a.length; i++) s += (a[i]-b[i])**2;
  return Math.sqrt(s);
}
function rbfKernel(d, sigma) { return Math.exp(-(d*d) / (2*sigma*sigma)); }

function rbfCholesky(A) {
  const n = A.length;
  const L = Array.from({length:n}, () => new Array(n).fill(0));
  for (let i=0; i<n; i++) {
    for (let j=0; j<=i; j++) {
      let sum = 0;
      for (let k=0; k<j; k++) sum += L[i][k] * L[j][k];
      if (i === j) {
        const diag = A[i][i] - sum;
        if (diag <= 0) return null;
        L[i][j] = Math.sqrt(diag);
      } else {
        L[i][j] = (A[i][j] - sum) / L[j][j];
      }
    }
  }
  return L;
}
function rbfSolve(K, y, ridge) {
  ridge = ridge || 1e-4;
  const n = K.length;
  const A = K.map((row, i) => row.map((v, j) => v + (i===j ? ridge : 0)));
  const L = rbfCholesky(A);
  if (!L) return null;
  const z = new Array(n).fill(0);
  for (let i=0; i<n; i++) {
    let s = y[i];
    for (let k=0; k<i; k++) s -= L[i][k] * z[k];
    z[i] = s / L[i][i];
  }
  const w = new Array(n).fill(0);
  for (let i=n-1; i>=0; i--) {
    let s = z[i];
    for (let k=i+1; k<n; k++) s -= L[k][i] * w[k];
    w[i] = s / L[i][i];
  }
  return w;
}
function rbfMatrizK(Xn, sigma) {
  const n = Xn.length;
  const K = Array.from({length:n}, () => new Array(n).fill(0));
  for (let i=0; i<n; i++) {
    for (let j=i; j<n; j++) {
      const d = rbfDist(Xn[i], Xn[j]);
      const k = rbfKernel(d, sigma);
      K[i][j] = k; K[j][i] = k;
    }
  }
  return K;
}

function rbfLooMAE(Xn, y, sigma) {
  const n = y.length;
  let soma = 0, cnt = 0;
  for (let i=0; i<n; i++) {
    const Xt = Xn.filter((_, j) => j !== i);
    const yt = y.filter((_, j) => j !== i);
    const Kt = rbfMatrizK(Xt, sigma);
    const w = rbfSolve(Kt, yt, 1e-3);
    if (!w) continue;
    let pred = 0;
    for (let j=0; j<Xt.length; j++) pred += w[j] * rbfKernel(rbfDist(Xn[i], Xt[j]), sigma);
    soma += Math.abs(pred - y[i]);
    cnt++;
  }
  return cnt ? soma/cnt : Infinity;
}

function rbfBuscarSigma(Xn, y) {
  const sigmas = [0.5, 0.7, 1.0, 1.3, 1.5, 1.8, 2.0, 2.5, 3.0, 4.0];
  let melhorMAE = Infinity, melhorSigma = 1.0;
  const resultados = [];
  rbfLog(`Buscando σ ótimo via leave-one-out (${y.length} jogos, ${sigmas.length} candidatos)...`);
  for (const sigma of sigmas) {
    const mae = rbfLooMAE(Xn, y, sigma);
    resultados.push({sigma, mae});
    rbfLog(`  σ=${sigma}  →  MAE=${mae.toFixed(3)}`);
    if (mae < melhorMAE) { melhorMAE = mae; melhorSigma = sigma; }
  }
  return { melhorSigma, melhorMAE, resultados };
}

// ─────────────────────────────────────────────────────────────
// PIPELINE PRINCIPAL — usa db já inicializado lá em cima
// ─────────────────────────────────────────────────────────────
async function rbfTreinarEPrever() {
  const btn = document.getElementById('rbfBtnRun');
  btn.disabled = true;
  rbfStatus('lendo histórico do Firestore...');
  try {
    rbfLog('Iniciando pipeline RBF...');
    const snap = await db.collection('previsoes-historico').get();
    const todos = [];
    snap.forEach(doc => todos.push({ id: doc.id, ...doc.data() }));
    rbfLog(`${todos.length} jogos no histórico.`);

    const encerradosBrutos = todos.filter(j =>
      j.real && j.real.encerrado && typeof j.real.totalGols === 'number'
    );
    rbfLog(`Encerrados com gols válidos: ${encerradosBrutos.length}`);

    const treino = [];
    let descartados = 0;
    for (const j of encerradosBrutos) {
      const v = rbfExtrairFeatures(j);
      if (!v) { descartados++; continue; }
      treino.push({ jogo: j, features: v, real: j.real.totalGols });
    }
    rbfLog(`Treináveis: ${treino.length} (descartados ${descartados})`);

    if (treino.length < 20) {
      rbfStatus('❌ poucos jogos pra treinar (mínimo 20)');
      btn.disabled = false;
      return;
    }

    const X = treino.map(t => t.features);
    const y = treino.map(t => t.real);
    const { mu, sd } = rbfStats(X);
    const Xn = X.map(x => rbfNorm(x, mu, sd));
    rbfLog(`Médias normalizadoras: ${mu.map(v=>v.toFixed(2)).join(', ')}`);

    rbfStatus('otimizando σ via leave-one-out (pode demorar 30-90s)...');
    await new Promise(r => setTimeout(r, 50));
    const { melhorSigma, melhorMAE, resultados } = rbfBuscarSigma(Xn, y);
    rbfLog(`✅ σ ótimo = ${melhorSigma}, MAE LOO = ${melhorMAE.toFixed(3)}`);

    rbfStatus('treinando modelo final...');
    const K = rbfMatrizK(Xn, melhorSigma);
    const w = rbfSolve(K, y, 1e-4);
    if (!w) {
      rbfLog('❌ Cholesky falhou.');
      rbfStatus('❌ erro numérico');
      btn.disabled = false;
      return;
    }
    rbfLog(`Pesos calculados. |w| médio=${rbfMedia(w.map(Math.abs)).toFixed(3)}, máx=${Math.max(...w.map(Math.abs)).toFixed(3)}`);

    const predTreino = Xn.map(xi => {
      let s = 0;
      for (let j=0; j<Xn.length; j++) s += w[j] * rbfKernel(rbfDist(xi, Xn[j]), melhorSigma);
      return s;
    });
    const maeIn = rbfMedia(predTreino.map((p,i) => Math.abs(p - y[i])));
    rbfLog(`MAE in-sample: ${maeIn.toFixed(4)}`);

    const maePoisson = rbfMedia(treino.map(t => Math.abs(t.features[0] - t.real)));
    rbfLog(`MAE Poisson v3 (mesmos jogos): ${maePoisson.toFixed(3)}`);

    RBF_ESTADO.modelo = { sigma: melhorSigma, w, mu, sd, Xn, y, treino };
    RBF_ESTADO.encerrados = treino;
    RBF_ESTADO.loo = { sigma: melhorSigma, mae: melhorMAE, todos: resultados, maePoisson };

    const abertosBrutos = todos.filter(j =>
      !(j.real && j.real.encerrado) || (j.real && !('totalGols' in j.real))
    );
    rbfLog(`Jogos abertos: ${abertosBrutos.length}`);

    const abertos = [];
    for (const j of abertosBrutos) {
      const v = rbfExtrairFeatures(j);
      if (!v) continue;
      const xn = rbfNorm(v, mu, sd);
      let pred = 0;
      const sems = [];
      for (let k=0; k<Xn.length; k++) {
        const d = rbfDist(xn, Xn[k]);
        const s = rbfKernel(d, melhorSigma);
        sems.push({ idx:k, dist:d, sem:s, contrib:w[k]*s, peso:w[k], real:y[k], jogo:treino[k].jogo });
        pred += w[k] * s;
      }
      sems.sort((a,b) => b.sem - a.sem);
      abertos.push({ jogo:j, features:v, predRBF:pred, predPoisson:v[0], topVizinhos:sems.slice(0,5) });
    }
    RBF_ESTADO.abertos = abertos;
    rbfLog(`✅ Pipeline concluída. ${abertos.length} previsões geradas.`);

    rbfRender();
    rbfStatus('✅ pronto');
    btn.disabled = false;
  } catch (e) {
    rbfLog(`❌ Erro: ${e.message}`);
    rbfStatus('❌ ' + e.message);
    console.error(e);
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function rbfRender() {
  const m = RBF_ESTADO.modelo, loo = RBF_ESTADO.loo;
  const ganho = loo.maePoisson - loo.mae;
  const cor = ganho > 0.05 ? 'var(--gn)' : (ganho < -0.05 ? 'var(--rd)' : 'var(--yl)');
  document.getElementById('rbf-stats').style.display = 'block';
  document.getElementById('rbf-stats-grid').innerHTML = `
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">σ ótimo</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM);">${m.sigma}</div>
    </div>
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">jogos treino</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM);">${m.y.length}</div>
    </div>
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">MAE RBF (LOO)</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM);">${loo.mae.toFixed(3)}</div>
    </div>
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">MAE Poisson v3</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM);">${loo.maePoisson.toFixed(3)}</div>
    </div>
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">ganho RBF</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM); color:${cor};">${ganho>=0?'+':''}${ganho.toFixed(3)}</div>
    </div>
    <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px;">
      <div style="font-size:10px; color:var(--tx3); text-transform:uppercase;">features</div>
      <div style="font-size:18px; font-weight:600; font-family:var(--fM);">${RBF_NOMES_FEATURES.length}</div>
    </div>
  `;
  rbfRenderAbertos();
  rbfRenderEncerrados();
  rbfRenderVizinhos();
}

function rbfRenderAbertos() {
  const linhas = RBF_ESTADO.abertos
    .sort((a,b) => new Date(a.jogo.dataJogo) - new Date(b.jogo.dataJogo))
    .map(a => {
      const j = a.jogo;
      const dt = new Date(j.dataJogo);
      const dtStr = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      const diff = a.predRBF - a.predPoisson;
      const cor = diff > 0.5 ? 'var(--rd)' : (diff < -0.5 ? 'var(--gn)' : 'var(--tx2)');
      const tag = a.predRBF < 0 ? '<span class="tag" style="background:var(--rd-d); color:var(--rd); border:1px solid var(--rd-b);">RBF&lt;0</span>'
                : Math.abs(diff) >= 0.7 ? '<span class="tag" style="background:var(--yl-d); color:var(--yl); border:1px solid var(--yl-b);">DIVERG</span>' : '';
      return `<tr style="border-bottom:1px solid var(--b1);">
        <td style="padding:6px 8px; font-family:var(--fM); font-size:11px;">${dtStr}</td>
        <td style="padding:6px 8px; font-size:11px; color:var(--tx2);">${j.liga?.nome || '?'}</td>
        <td style="padding:6px 8px; font-size:12px;">${j.casa?.nome || '?'} × ${j.fora?.nome || '?'}</td>
        <td style="padding:6px 8px; text-align:right; font-family:var(--fM);"><span style="background:var(--cy-d); color:var(--cy); padding:2px 6px; border-radius:3px;">${a.predPoisson.toFixed(2)}</span></td>
        <td style="padding:6px 8px; text-align:right; font-family:var(--fM);"><span style="background:var(--pu)20; color:var(--pu); padding:2px 6px; border-radius:3px;">${a.predRBF.toFixed(2)}</span></td>
        <td style="padding:6px 8px; text-align:right; font-family:var(--fM); color:${cor};">${diff>=0?'+':''}${diff.toFixed(2)}</td>
        <td style="padding:6px 8px;">${tag}</td>
      </tr>`;
    }).join('');

  document.getElementById('rbf-tabela-abertos').innerHTML = `
    <table style="width:100%; border-collapse:collapse; font-size:12px;">
      <thead><tr style="background:var(--s3); color:var(--tx2);">
        <th style="padding:8px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.05em;">Data</th>
        <th style="padding:8px; text-align:left; font-size:10px; text-transform:uppercase;">Liga</th>
        <th style="padding:8px; text-align:left; font-size:10px; text-transform:uppercase;">Jogo</th>
        <th style="padding:8px; text-align:right; font-size:10px; text-transform:uppercase;">Poisson</th>
        <th style="padding:8px; text-align:right; font-size:10px; text-transform:uppercase;">RBF</th>
        <th style="padding:8px; text-align:right; font-size:10px; text-transform:uppercase;">Δ</th>
        <th></th>
      </tr></thead>
      <tbody>${linhas || `<tr><td colspan="7" style="padding:14px; color:var(--tx3); text-align:center;">nenhum jogo aberto com features completas</td></tr>`}</tbody>
    </table>
  `;
}

function rbfRenderEncerrados() {
  const m = RBF_ESTADO.modelo;
  const linhas = m.treino.map((t, i) => {
    const xi = m.Xn[i];
    let predIn = 0;
    for (let j=0; j<m.Xn.length; j++) predIn += m.w[j] * rbfKernel(rbfDist(xi, m.Xn[j]), m.sigma);
    const predPoisson = t.features[0];
    const real = t.real;
    const errRBF = Math.abs(predIn - real);
    const errPoisson = Math.abs(predPoisson - real);
    return { t, predIn, predPoisson, real, errRBF, errPoisson, ganha: errRBF < errPoisson };
  }).sort((a,b) => Math.abs(b.predIn - b.predPoisson) - Math.abs(a.predIn - a.predPoisson));

  const html = `
    <div style="font-size:10px; color:var(--tx3); margin-bottom:8px;">⚠️ Erros in-sample (treino). O σ foi escolhido por LOO real (header). Top 50 ordenados por divergência.</div>
    <table style="width:100%; border-collapse:collapse; font-size:11px;">
      <thead><tr style="background:var(--s3); color:var(--tx2);">
        <th style="padding:8px; text-align:left; font-size:10px;">Jogo</th>
        <th style="padding:8px; text-align:left; font-size:10px;">Liga</th>
        <th style="padding:8px; text-align:right; font-size:10px;">Poisson</th>
        <th style="padding:8px; text-align:right; font-size:10px;">RBF</th>
        <th style="padding:8px; text-align:right; font-size:10px;">Real</th>
        <th style="padding:8px; text-align:right; font-size:10px;">Err Po</th>
        <th style="padding:8px; text-align:right; font-size:10px;">Err RBF</th>
        <th></th>
      </tr></thead>
      <tbody>${linhas.slice(0,50).map(r => `
        <tr style="border-bottom:1px solid var(--b1);">
          <td style="padding:5px 8px;">${r.t.jogo.casa?.nome||'?'} × ${r.t.jogo.fora?.nome||'?'}</td>
          <td style="padding:5px 8px; color:var(--tx2);">${r.t.jogo.liga?.nome||'?'}</td>
          <td style="padding:5px 8px; text-align:right; font-family:var(--fM);">${r.predPoisson.toFixed(2)}</td>
          <td style="padding:5px 8px; text-align:right; font-family:var(--fM);">${r.predIn.toFixed(2)}</td>
          <td style="padding:5px 8px; text-align:right; font-family:var(--fM);"><span style="background:var(--gn-d); color:var(--gn); padding:1px 5px; border-radius:3px;">${r.real}</span></td>
          <td style="padding:5px 8px; text-align:right; font-family:var(--fM); color:var(--tx2);">${r.errPoisson.toFixed(2)}</td>
          <td style="padding:5px 8px; text-align:right; font-family:var(--fM); color:var(--tx2);">${r.errRBF.toFixed(2)}</td>
          <td style="padding:5px 8px; font-size:10px;">${r.ganha ? '<span style="color:var(--gn);">✓ RBF</span>' : '<span style="color:var(--tx3);">Po</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('rbf-tabela-encerrados').innerHTML = html;
}

function rbfRenderVizinhos() {
  const blocos = RBF_ESTADO.abertos.slice(0, 30).map(a => {
    const j = a.jogo;
    const vizs = a.topVizinhos.map((v, k) => `
      <tr style="border-bottom:1px solid var(--b1);">
        <td style="padding:4px 8px; font-family:var(--fM);">${k+1}</td>
        <td style="padding:4px 8px;">${v.jogo.casa?.nome||'?'} × ${v.jogo.fora?.nome||'?'}</td>
        <td style="padding:4px 8px; text-align:right; font-family:var(--fM);">${v.dist.toFixed(2)}</td>
        <td style="padding:4px 8px; text-align:right; font-family:var(--fM);">${v.sem.toFixed(3)}</td>
        <td style="padding:4px 8px; text-align:right;"><span style="background:var(--gn-d); color:var(--gn); padding:1px 5px; border-radius:3px; font-family:var(--fM);">${v.real}</span></td>
        <td style="padding:4px 8px; text-align:right; font-family:var(--fM);">${v.peso.toFixed(2)}</td>
        <td style="padding:4px 8px; text-align:right; font-family:var(--fM); color:${v.contrib>=0?'var(--rd)':'var(--gn)'};">${v.contrib>=0?'+':''}${v.contrib.toFixed(3)}</td>
      </tr>
    `).join('');
    return `
      <div style="background:var(--s3); border:1px solid var(--b2); border-radius:6px; padding:10px; margin-bottom:8px;">
        <div style="margin-bottom:6px; font-size:12px;">
          <strong>${j.casa?.nome||'?'} × ${j.fora?.nome||'?'}</strong>
          <span style="color:var(--tx3); font-size:10px;"> — ${j.liga?.nome||'?'}</span>
          <span class="tag" style="background:var(--cy-d); color:var(--cy); margin-left:8px;">Po ${a.predPoisson.toFixed(2)}</span>
          <span class="tag" style="background:var(--pu)20; color:var(--pu);">RBF ${a.predRBF.toFixed(2)}</span>
        </div>
        <table style="width:100%; border-collapse:collapse; font-size:11px;">
          <thead><tr style="background:var(--s2); color:var(--tx2);">
            <th style="padding:5px 8px; text-align:left; font-size:9px;">#</th>
            <th style="padding:5px 8px; text-align:left; font-size:9px;">Vizinho</th>
            <th style="padding:5px 8px; text-align:right; font-size:9px;">dist</th>
            <th style="padding:5px 8px; text-align:right; font-size:9px;">sem</th>
            <th style="padding:5px 8px; text-align:right; font-size:9px;">real</th>
            <th style="padding:5px 8px; text-align:right; font-size:9px;">peso</th>
            <th style="padding:5px 8px; text-align:right; font-size:9px;">contrib</th>
          </tr></thead>
          <tbody>${vizs}</tbody>
        </table>
      </div>
    `;
  }).join('');
  document.getElementById('rbf-vizinhos-conteudo').innerHTML = blocos || '<div style="color:var(--tx3); padding:10px;">sem dados</div>';
}

rbfLog('Módulo RBF carregado. Clique em "🧮 RBF" no topo pra abrir.');
</script>
