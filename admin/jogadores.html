<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yellup — Jogadores</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
:root{
  --bg:#07080d;--bg2:#0b0d15;--bg3:#0f1119;
  --c1:#131622;--c2:#181b28;--c3:#1d2133;
  --bd1:#191c2c;--bd2:#212540;--bd3:#2a2e4a;
  --t1:#eceef6;--t2:#858ba5;--t3:#41456a;
  --acc:#f5a524;--adim:rgba(245,165,36,.13);--adim2:rgba(245,165,36,.22);
  --grn:#27d49b;--gdim:rgba(39,212,155,.13);
  --red:#ef5f5f;--rdim:rgba(239,95,95,.13);
  --blu:#4f96f4;--bdim2:rgba(79,150,244,.13);
  --pur:#a78bfa;--pdim:rgba(167,139,250,.13);
  --sw:220px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);height:100vh;background:var(--bg2);border-right:1px solid var(--bd1);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.sb-logo .ball{width:28px;height:28px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#000;}
.sb-logo .tt{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;}
.sb-logo .tt small{display:block;font-size:9px;font-weight:400;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{display:flex;flex-direction:column;gap:1px;padding:8px 6px;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.nav-i{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;color:var(--t2);text-decoration:none;font-size:12px;font-weight:500;transition:all .15s;}
.nav-i:hover{background:var(--c2);color:var(--t1);}
.nav-i.on{background:var(--adim);color:var(--acc);}

/* Filtros sidebar */
.sb-filtros{flex:1;overflow-y:auto;padding:12px 10px;}
.sb-filtros::-webkit-scrollbar{width:3px;}
.sb-filtros::-webkit-scrollbar-thumb{background:var(--bd3);}
.filt-group{margin-bottom:14px;}
.filt-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:6px;display:block;}
.filt-select{width:100%;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:11px;font-family:'DM Sans',sans-serif;padding:6px 8px;border-radius:7px;outline:none;cursor:pointer;}
.filt-select:focus{border-color:var(--acc);}
.filt-select option{background:var(--c3);}
.filt-input{width:100%;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:11px;font-family:'DM Sans',sans-serif;padding:6px 8px;border-radius:7px;outline:none;}
.filt-input:focus{border-color:var(--acc);}
.filt-input::placeholder{color:var(--t3);}
.pos-chips{display:flex;flex-wrap:wrap;gap:4px;}
.pos-chip{padding:3px 8px;border-radius:5px;border:1px solid var(--bd2);font-size:9px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .12s;}
.pos-chip:hover{border-color:var(--bd3);color:var(--t2);}
.pos-chip.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.btn-buscar{width:100%;padding:8px;border-radius:8px;border:none;background:var(--acc);color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .15s;margin-top:4px;}
.btn-buscar:hover{opacity:.85;}
.rk-btn{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--bd2);background:var(--c3);color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:left;}
.rk-btn:hover{border-color:var(--bd3);color:var(--t1);background:var(--c2);}
.rk-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.scope-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.scope-btn{padding:6px 8px;border-radius:7px;border:1px solid var(--bd2);background:var(--c3);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center;}
.scope-btn:hover{border-color:var(--bd3);color:var(--t1);background:var(--c2);}
.scope-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.scope-btn.mundo{grid-column:1/-1;border-color:rgba(79,150,244,.3);color:var(--blu);}
.scope-btn.mundo.on{border-color:var(--blu);background:var(--bdim2);color:var(--blu);}
.liga-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;background:var(--c3);font-size:9px;color:var(--t3);margin-left:4px;}
.liga-badge img{width:12px;height:12px;object-fit:contain;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-head{background:var(--bg2);border-bottom:1px solid var(--bd1);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.main-head h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;flex:1;}
.sort-btns{display:flex;gap:4px;flex-wrap:wrap;}
.s-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t3);font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.s-btn:hover{border-color:var(--bd3);color:var(--t2);}
.s-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.view-btns{display:flex;gap:3px;}
.v-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.v-btn:hover{border-color:var(--bd3);color:var(--t2);}
.v-btn.on{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.ct-badge{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap;}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd1);padding:0 20px;flex-shrink:0;}
.tab{padding:10px 16px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--t2);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}

/* ── CONTENT AREA ── */
.content{flex:1;overflow-y:auto;padding:16px 20px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--bd3);}

/* ── RANKING TABLE ── */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table thead th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:7px 10px;text-align:left;border-bottom:1px solid var(--bd1);position:sticky;top:0;background:var(--bg);cursor:pointer;white-space:nowrap;user-select:none;}
.rank-table thead th:hover{color:var(--t2);}
.rank-table thead th.sort-on{color:var(--acc);}
.rank-table thead th.r{text-align:right;}
.rank-table tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;cursor:pointer;}
.rank-table tbody tr:hover{background:rgba(255,255,255,.03);}
.rank-table td{padding:7px 10px;font-size:12px;vertical-align:middle;}
.rank-table td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);}
.rank-table td.accent{color:var(--acc);font-weight:700;}
.rank-num-big{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);width:26px;text-align:center;}
.player-cell{display:flex;align-items:center;gap:10px;}
.player-foto{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--bd2);flex-shrink:0;background:var(--c3);}
.player-info .pn{font-size:12px;font-weight:600;}
.player-info .pnat{font-size:9px;color:var(--t3);}
.time-cell{display:flex;align-items:center;gap:5px;}
.time-cell img{width:14px;height:14px;object-fit:contain;}
.time-cell span{font-size:11px;}
.pos-tag{font-size:8px;padding:1px 6px;border-radius:4px;font-weight:700;text-transform:uppercase;}
.pos-G{background:rgba(245,165,36,.2);color:var(--acc);}
.pos-D{background:rgba(79,150,244,.15);color:var(--blu);}
.pos-M{background:rgba(39,212,155,.12);color:var(--grn);}
.pos-A{background:rgba(239,95,95,.13);color:var(--red);}
.rating-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:22px;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;}
.rb-top{background:rgba(39,212,155,.2);color:var(--grn);}
.rb-mid{background:var(--adim);color:var(--acc);}
.rb-low{background:rgba(239,95,95,.13);color:var(--red);}
.rb-na{background:var(--c3);color:var(--t3);}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.player-card{background:var(--c2);border:1px solid var(--bd1);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;}
.player-card:hover{border-color:var(--bd3);transform:translateY(-1px);}
.pc-foto{width:100%;height:120px;object-fit:cover;object-position:top;background:var(--c3);display:block;}
.pc-foto-wrap{position:relative;height:120px;overflow:hidden;background:var(--c3);}
.pc-foto-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;}
.pc-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(7,8,13,.9));padding:20px 10px 8px;}
.pc-nome{font-size:12px;font-weight:700;line-height:1.2;}
.pc-pos{font-size:9px;color:var(--t3);}
.pc-body{padding:10px;}
.pc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
.pc-stat{text-align:center;}
.pc-stat .sv{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--acc);}
.pc-stat .sl{font-size:8px;color:var(--t3);}
.pc-meta{display:flex;align-items:center;gap:5px;border-top:1px solid var(--bd1);padding-top:7px;}
.pc-meta img{width:12px;height:12px;object-fit:contain;}
.pc-meta span{font-size:10px;color:var(--t2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-rating{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}

/* ── MODAL PERFIL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.modal-ov.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:800px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
.modal-head{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--bd1);flex-shrink:0;}
.modal-foto-wrap{width:120px;height:120px;flex-shrink:0;background:var(--c3);overflow:hidden;}
.modal-foto{width:100%;height:100%;object-fit:cover;object-position:top;}
.modal-info{flex:1;padding:16px 18px;}
.modal-nome{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.1;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--t3);margin-bottom:10px;}
.modal-badges{display:flex;flex-wrap:wrap;gap:6px;}
.m-badge{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid var(--bd2);font-size:10px;font-weight:600;background:var(--c3);}
.modal-close{align-self:flex-start;margin:12px;width:28px;height:28px;border-radius:50%;border:1px solid var(--bd2);background:none;color:var(--t3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--bd3);}

/* Tabs modal */
.modal-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.mt-tab{padding:5px 12px;border-radius:7px;border:1px solid var(--bd2);background:none;font-size:11px;font-weight:700;color:var(--t3);cursor:pointer;transition:all .15s;}
.mt-tab.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.mt-pane{display:none;}
.mt-pane.on{display:block;}

/* Stats de temporada */
.temp-card{background:var(--c3);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid var(--bd1);}
.temp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.temp-head img{width:20px;height:20px;object-fit:contain;}
.temp-liga{font-size:11px;font-weight:600;}
.temp-sub{font-size:9px;color:var(--t3);}
.temp-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.ts-item{text-align:center;padding:6px;background:var(--c2);border-radius:7px;}
.ts-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:var(--t1);}
.ts-lbl{font-size:8px;color:var(--t3);margin-top:1px;}
.ts-val.verde{color:var(--grn);}
.ts-val.amarelo{color:var(--acc);}
.ts-val.azul{color:var(--blu);}
.ts-val.roxo{color:var(--pur);}

/* Médias */
.medias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:14px;}
.media-card{background:var(--c3);border-radius:8px;padding:10px;border-left:2px solid var(--acc);}
.media-card.b{border-left-color:var(--blu);}
.media-card.g{border-left-color:var(--grn);}
.media-card.r{border-left-color:var(--red);}
.media-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--t1);}
.media-lbl{font-size:8px;color:var(--t3);margin-top:2px;line-height:1.3;}

/* Radar chart */
.radar-wrap{display:flex;justify-content:center;margin:10px 0;}

/* ── PAGINAÇÃO ── */
.paginacao{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0;}
.pg-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--t2);cursor:pointer;font-size:11px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pg-btn:hover{border-color:var(--acc);color:var(--acc);}
.pg-btn.on{background:var(--adim);border-color:var(--acc);color:var(--acc);}
.pg-info{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;padding:0 8px;}

/* ── UTILS ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--t3);}
.empty .ico{font-size:36px;opacity:.4;}
.empty p{font-size:13px;text-align:center;}
.ld{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
.ld-big{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:10px;background:var(--c3);border:1px solid var(--bd2);color:var(--t1);font-size:13px;z-index:999;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{border-color:var(--red);color:var(--red);}
.divider{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:12px 0 6px;display:flex;align-items:center;gap:8px;}
.divider::after{content:'';flex:1;height:1px;background:var(--bd1);}

@media(max-width:800px){
  .sb{display:none;}
  .cards-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- SIDEBAR (Filtros) -->
<aside class="sb">
  <div class="sb-head">
    <div class="sb-logo">
      <div class="ball">Y</div>
      <div class="tt">Yellup <small>Admin</small></div>
    </div>
    <nav class="sb-nav">
      <a href="jogos-admin.html" class="nav-i">⚽ Jogos Admin</a>
      <a href="campeonatos.html" class="nav-i">🏆 Campeonatos</a>
      <a href="jogadores.html" class="nav-i on">👤 Jogadores</a>
      <a href="acuracia.html" class="nav-i">🎯 Acurácia</a>
    </nav>
  </div>
  <div class="sb-filtros">
    <!-- MELHORES NOTAS: ação padrão -->
    <div class="filt-group">
      <span class="filt-label">⭐ Melhores Notas</span>
      <div class="scope-grid">
        <button class="scope-btn on" id="scopeBtn-liga"     onclick="setScope('liga',this)">🏟 Liga</button>
        <button class="scope-btn"    id="scopeBtn-brasil"   onclick="setScope('brasil',this)">🇧🇷 Brasil</button>
        <button class="scope-btn"    id="scopeBtn-europa"   onclick="setScope('europa',this)">🇪🇺 Europa</button>
        <button class="scope-btn"    id="scopeBtn-americas" onclick="setScope('americas',this)">🌎 Américas</button>
        <button class="scope-btn mundo" id="scopeBtn-mundo" onclick="setScope('mundo',this)">🌍 Mundo</button>
      </div>
    </div>

    <div style="height:1px;background:var(--bd1);margin:10px 0 12px"></div>

    <!-- RANKING RÁPIDO (por liga) -->
    <div class="filt-group">
      <span class="filt-label">📊 Ranking por liga</span>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <button class="rk-btn" id="rkBtn-topscorers"    onclick="buscarRanking('topscorers',this)">⚽ Artilheiros</button>
        <button class="rk-btn" id="rkBtn-topassists"    onclick="buscarRanking('topassists',this)">🎯 Assistências</button>
        <button class="rk-btn" id="rkBtn-topyellowcards" onclick="buscarRanking('topyellowcards',this)">🟨 + Amarelos</button>
        <button class="rk-btn" id="rkBtn-topredcards"   onclick="buscarRanking('topredcards',this)">🟥 + Expulsões</button>
      </div>
    </div>

    <div style="height:1px;background:var(--bd1);margin:10px 0 12px"></div>

    <!-- FILTROS -->
    <div class="filt-group" id="filtLigaWrap">
      <span class="filt-label">Liga</span>
      <select class="filt-select" id="fLiga" onchange="onLigaChange()">
        <option value="">Carregando...</option>
      </select>
    </div>
    <div class="filt-group">
      <span class="filt-label">Temporada</span>
      <select class="filt-select" id="fSeason" onchange="onLigaChange()">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
      </select>
    </div>
    <div class="filt-group">
      <span class="filt-label">Posição</span>
      <div class="pos-chips">
        <span class="pos-chip on" onclick="setPosicao('',this)">Todas</span>
        <span class="pos-chip" onclick="setPosicao('Goalkeeper',this)">⛳ GK</span>
        <span class="pos-chip" onclick="setPosicao('Defender',this)">🛡 DEF</span>
        <span class="pos-chip" onclick="setPosicao('Midfielder',this)">🔄 MEI</span>
        <span class="pos-chip" onclick="setPosicao('Attacker',this)">⚡ ATA</span>
      </div>
    </div>
    <div class="filt-group">
      <span class="filt-label">Buscar nome / time</span>
      <input class="filt-input" type="text" id="fBusca" placeholder="Nome ou clube..." oninput="renderJogadores()">
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="main-head">
    <h2 id="mainTitulo">👤 Jogadores</h2>
    <div class="sort-btns" id="sortBtns">
      <span style="font-size:9px;color:var(--t3);align-self:center">Ordenar:</span>
      <button class="s-btn on" id="sBtn-rating" onclick="setSort('rating',this)">⭐ Nota</button>
      <button class="s-btn" onclick="setSort('gols',this)">⚽ Gols</button>
      <button class="s-btn" onclick="setSort('assistencias',this)">🎯 Assist.</button>
      <button class="s-btn" onclick="setSort('passes',this)">🔄 Passes</button>
      <button class="s-btn" onclick="setSort('minutos',this)">⏱ Minutos</button>
      <button class="s-btn" onclick="setSort('chutes',this)">🎯 Chutes</button>
    </div>
    <div class="view-btns">
      <button class="v-btn on" id="vTabela" onclick="setView('tabela')" title="Tabela">☰</button>
      <button class="v-btn" id="vCards" onclick="setView('cards')" title="Cards">⊞</button>
    </div>
    <span class="ct-badge" id="ctBadge"></span>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="trocarAba('lista',this)">📋 Lista / Ranking</button>
    <button class="tab" onclick="trocarAba('medias',this)">📊 Médias & Comparativo</button>
  </div>

  <!-- PANE LISTA -->
  <div id="pane-lista" class="content">
    <div class="empty">
      <div class="ico">⚡</div>
      <p>Carregando ranking...</p>
    </div>
  </div>

  <!-- PANE MÉDIAS -->
  <div id="pane-medias" class="content" style="display:none">
    <div class="empty">
      <div class="ico">📊</div>
      <p>Busque jogadores primeiro</p>
    </div>
  </div>
</main>

<!-- MODAL PERFIL JOGADOR -->
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)fecharModal()">
  <div class="modal" id="modalBox">
    <div class="empty"><div class="ld"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig={apiKey:'AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c',authDomain:'painel-yellup.firebaseapp.com',projectId:'painel-yellup',storageBucket:'painel-yellup.appspot.com',messagingSenderId:'598994266077',appId:'1:598994266077:web:yellup'};
firebase.initializeApp(firebaseConfig);
const fns = firebase.app().functions('us-central1');

const gc = id => document.getElementById(id);
function toast(msg,t='ok'){const el=gc('toast');el.textContent=msg;el.className='toast show'+(t==='err'?' err':'');clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3200);}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── ESTADO ──
let LIGAS = null;
let JOGADORES = [];
let SORT_KEY = 'rating';
let VIEW = 'tabela';
let POSICAO = '';
let PAG = 1;
let TOTAL_PAGS = 1;
let ABA = 'lista';
let MODO = 'notas'; // 'notas' | 'ranking' | 'lista'
let RANKING_TIPO = '';
let SCOPE = 'liga'; // 'liga' | 'brasil' | 'europa' | 'americas' | 'mundo'

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fns.httpsCallable('buscarLigasYellup')({});
    LIGAS = r.data.ligas;
    popularSelectLigas();
    gc('fLiga').value = '71';
    await buscarMelhoresNotas();
  } catch(e) {
    toast('Erro ao carregar ligas', 'err');
  }
});

function popularSelectLigas() {
  const sel = gc('fLiga');
  const grupos = [
    { key: 'brasil',         label: '🇧🇷 Brasil' },
    { key: 'internacional',  label: '🌍 Internacional' },
    { key: 'copas_nacionais',label: '🏆 Copas' },
    { key: 'americas',       label: '🌎 Américas' },
    { key: 'europa_extra',   label: '🇪🇺 Europa' },
    { key: 'asia_oriente',   label: '🌏 Ásia & Oriente' },
  ];
  sel.innerHTML = '<option value="">Selecione uma liga...</option>';
  grupos.forEach(g => {
    const og = document.createElement('optgroup');
    og.label = g.label;
    (LIGAS[g.key] || []).forEach(l => {
      const o = document.createElement('option');
      o.value = l.id;
      o.textContent = l.nome;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
}

function onLigaChange() {
  if (MODO === 'ranking' && RANKING_TIPO) {
    buscarRanking(RANKING_TIPO);
  } else {
    buscarMelhoresNotas();
  }
}

function setScope(scope, btn) {
  SCOPE = scope;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Liga seletor: visível apenas no scope 'liga'
  gc('filtLigaWrap').style.display = scope === 'liga' ? '' : 'none';
  // Desmarcar ranking
  document.querySelectorAll('.rk-btn').forEach(b => b.classList.remove('on'));
  MODO = 'notas';
  RANKING_TIPO = '';
  buscarMelhoresNotas();
}

function trocarAba(aba, btn) {
  ABA = aba;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  gc('pane-lista').style.display = aba === 'lista' ? '' : 'none';
  gc('pane-medias').style.display = aba === 'medias' ? '' : 'none';
  if (aba === 'medias' && JOGADORES.length) renderMediasComparativo();
}

function setPosicao(pos, btn) {
  POSICAO = pos;
  document.querySelectorAll('.pos-chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  renderJogadores();
}

function setSort(key, btn) {
  SORT_KEY = key;
  document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('on'));
  const el = btn || gc('sBtn-'+key);
  if (el) el.classList.add('on');
  renderJogadores();
}

function setView(v) {
  VIEW = v;
  gc('vTabela').classList.toggle('on', v === 'tabela');
  gc('vCards').classList.toggle('on', v === 'cards');
  renderJogadores();
}

// ── MELHORES NOTAS (nova CF, todos ordenados por rating) ──
async function buscarMelhoresNotas() {
  const season = gc('fSeason').value;
  const ano = parseInt(season);
  MODO = 'notas';
  RANKING_TIPO = '';
  TOTAL_PAGS = 1; PAG = 1;
  document.querySelectorAll('.rk-btn').forEach(b => b.classList.remove('on'));
  setSort('rating', gc('sBtn-rating'));

  // Label de temporada exibido: europeus mostram "25/26", brasileiros "2026"
  const euroLabel = `${ano-1}/${String(ano).slice(2)}`; // ex: 25/26
  const scopeLabels = {
    liga:     '', // definido abaixo com nome da liga
    brasil:   `Brasil ${season}`,
    europa:   `Europa ${euroLabel}`,
    americas: `Américas ${season}`,
    mundo:    `Mundo (${euroLabel} / ${season})`,
  };

  if (SCOPE === 'liga') {
    const liga = gc('fLiga').value;
    if (!liga) { toast('Selecione uma liga', 'err'); return; }
    // Calcular ajuste da liga selecionada
    const ligaObj = buscarLigaObj(parseInt(liga));
    const ajuste = ligaObj?.ajuste ?? 0;
    const apiSeason = String(ano + ajuste);
    const seasonLabel = ajuste === -1 ? euroLabel : season;
    const ligaNome = gc('fLiga').selectedOptions[0]?.textContent || '';
    gc('mainTitulo').textContent = `⭐ Melhores Notas — ${ligaNome} ${seasonLabel}`;
    gc('pane-lista').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Buscando melhores notas da liga...</p></div>';
    try {
      const r = await fns.httpsCallable('buscarMelhoresNotasLiga')({ leagueId: parseInt(liga), season: apiSeason });
      JOGADORES = r.data.jogadores || [];
      gc('ctBadge').textContent = `${JOGADORES.length} jogadores`;
      renderJogadores();
    } catch(e) {
      gc('pane-lista').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
      toast(e.message, 'err');
    }
  } else {
    const lbl = scopeLabels[SCOPE] || SCOPE;
    gc('mainTitulo').textContent = `⭐ Melhores Notas — ${lbl}`;
    gc('pane-lista').innerHTML = `<div class="empty"><div class="ld-big"></div><p>Agregando dados de múltiplas ligas...<br><small style="color:var(--t3)">Pode demorar até 30s na primeira vez</small></p></div>`;
    try {
      const r = await fns.httpsCallable('buscarMelhoresNotasMundo')({ season, scope: SCOPE });
      JOGADORES = r.data.jogadores || [];
      gc('ctBadge').textContent = `${JOGADORES.length} jogadores`;
      renderJogadores();
    } catch(e) {
      gc('pane-lista').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
      toast(e.message, 'err');
    }
  }
}

// Busca o objeto da liga no LIGAS_YELLUP local (cache do init)
function buscarLigaObj(id) {
  if (!LIGAS) return null;
  for (const grupo of Object.values(LIGAS)) {
    const found = grupo.find(l => l.id === id);
    if (found) return found;
  }
  return null;
}

// ── BUSCAR JOGADORES (lista paginada, sem ordenação global) ──
async function buscarJogadores(pagina) {
  const liga = gc('fLiga').value;
  const season = gc('fSeason').value;
  if (!liga || !season) { toast('Selecione liga e temporada', 'err'); return; }
  MODO = 'lista'; RANKING_TIPO = ''; PAG = pagina;
  document.querySelectorAll('.rk-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('on'));
  const ligaNome = gc('fLiga').selectedOptions[0]?.textContent || '';
  gc('mainTitulo').textContent = `👤 Todos — ${ligaNome} ${season}`;
  gc('pane-lista').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Buscando jogadores...</p></div>';
  try {
    const r = await fns.httpsCallable('buscarJogadoresLiga')({ leagueId: parseInt(liga), season, pagina });
    JOGADORES = r.data.jogadores || [];
    TOTAL_PAGS = r.data.paginacao?.total || 1;
    PAG = r.data.paginacao?.atual || 1;
    gc('ctBadge').textContent = `Pág ${PAG}/${TOTAL_PAGS}`;
    renderJogadores();
    if (ABA === 'medias') renderMediasComparativo();
  } catch(e) {
    gc('pane-lista').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
    toast(e.message, 'err');
  }
}

// ── RANKING RÁPIDO ──
async function buscarRanking(tipo, btn) {
  const liga = gc('fLiga').value;
  const season = gc('fSeason').value;
  if (!liga || !season) { toast('Selecione liga e temporada', 'err'); return; }

  // Marcar botão ativo
  document.querySelectorAll('.rk-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('on'));
  const btnEl = btn || gc('rkBtn-'+tipo);
  if (btnEl) btnEl.classList.add('on');

  MODO = 'ranking';
  RANKING_TIPO = tipo;
  const nomes = { topscorers: '⚽ Artilheiros', topassists: '🎯 Assistências', topyellowcards: '🟨 Mais Amarelos', topredcards: '🟥 Mais Expulsos' };
  // Descobrir nome da liga selecionada
  const ligaNome = gc('fLiga').selectedOptions[0]?.textContent || '';
  gc('mainTitulo').textContent = `${nomes[tipo]||'Ranking'} — ${ligaNome} ${season}`;
  gc('pane-lista').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Carregando ranking...</p></div>';
  try {
    const r = await fns.httpsCallable('buscarRankingJogadores')({ leagueId: parseInt(liga), season, tipo });
    JOGADORES = r.data.jogadores || [];
    TOTAL_PAGS = 1;
    gc('ctBadge').textContent = `${JOGADORES.length} jogadores`;
    renderJogadores();
  } catch(e) {
    gc('pane-lista').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
    toast(e.message, 'err');
  }
}

// ── RENDER JOGADORES ──
function jogadoresFiltrados() {
  let lista = [...JOGADORES];
  const busca = gc('fBusca').value.toLowerCase().trim();

  if (POSICAO) lista = lista.filter(j => {
    const p = j.posicao || j.stats?.games?.position || '';
    return p.toLowerCase().includes(POSICAO.toLowerCase());
  });

  if (busca) lista = lista.filter(j =>
    j.nome?.toLowerCase().includes(busca) ||
    j.time?.nome?.toLowerCase().includes(busca) ||
    j.nacionalidade?.toLowerCase().includes(busca)
  );

  // Ordenar
  lista.sort((a, b) => {
    const va = a.stats?.[SORT_KEY] ?? a.stats?.games?.[SORT_KEY] ?? -1;
    const vb = b.stats?.[SORT_KEY] ?? b.stats?.games?.[SORT_KEY] ?? -1;
    const na = typeof va === 'string' ? parseFloat(va) || 0 : va || 0;
    const nb = typeof vb === 'string' ? parseFloat(vb) || 0 : vb || 0;
    return nb - na;
  });
  return lista;
}

function renderJogadores() {
  const lista = jogadoresFiltrados();
  if (!lista.length) {
    gc('pane-lista').innerHTML = '<div class="empty"><div class="ico">👤</div><p>Nenhum jogador encontrado</p></div>';
    return;
  }

  if (VIEW === 'cards') {
    gc('pane-lista').innerHTML = `<div class="cards-grid">${lista.map((j,i) => renderCardJogador(j, i)).join('')}</div>${renderPaginacao()}`;
  } else {
    gc('pane-lista').innerHTML = renderTabelaJogadores(lista) + renderPaginacao();
  }
}

function renderTabelaJogadores(lista) {
  const isGlobal = SCOPE !== 'liga' && MODO === 'notas';
  const cols = [
    { key: 'rating', label: 'Nota', suffix: '' },
    { key: 'gols', label: '⚽ Gols', suffix: '' },
    { key: 'assistencias', label: '🎯 Ast', suffix: '' },
    { key: 'passes', label: 'Passes', suffix: '' },
    { key: 'chutes', label: 'Chutes', suffix: '' },
    { key: 'chutesAlvo', label: 'A Gol', suffix: '' },
    { key: 'minutos', label: '⏱ Min', suffix: '' },
    { key: 'jogos', label: 'Jogos', suffix: '' },
    { key: 'amarelos', label: '🟨', suffix: '' },
    { key: 'vermelhos', label: '🟥', suffix: '' },
  ];

  return `<table class="rank-table">
    <thead><tr>
      <th style="width:28px">#</th>
      <th>Jogador</th>
      <th>Time${isGlobal ? ' / Liga' : ''}</th>
      <th>Pos</th>
      ${cols.map(c => `<th class="r${SORT_KEY===c.key?' sort-on':''}" onclick="setSort('${c.key}',this)">${c.label}</th>`).join('')}
    </tr></thead>
    <tbody>
    ${lista.map((j, i) => {
      const s = j.stats || {};
      const rat = s.rating ? parseFloat(s.rating).toFixed(1) : '–';
      const ratClass = s.rating >= 7.5 ? 'rb-top' : s.rating >= 6.5 ? 'rb-mid' : s.rating ? 'rb-low' : 'rb-na';
      const pos = j.posicao || '–';
      const posKey = pos[0] || '';
      return `<tr onclick="abrirPerfil(${j.id})">
        <td><span class="rank-num-big">${i+1}</span></td>
        <td><div class="player-cell">
          <img class="player-foto" src="${x(j.foto)}" onerror="this.src=''" alt="">
          <div class="player-info">
            <div class="pn">${x(j.nome)}</div>
            <div class="pnat">${x(j.nacionalidade||'')}</div>
          </div>
        </div></td>
        <td><div class="time-cell">
          <img src="${x(j.time?.logo)}" onerror="this.src=''" alt="">
          <div>
            <div style="font-size:10px;font-weight:600">${x(j.time?.nome||'—')}</div>
            ${isGlobal && j.liga?.nome ? `<div class="liga-badge"><img src="${x(j.liga?.logo)}" onerror="this.style.display='none'">${x(j.liga.nome)}</div>` : ''}
          </div>
        </div></td>
        <td><span class="pos-tag pos-${posKey}">${x(pos.slice(0,3).toUpperCase())}</span></td>
        <td class="r"><span class="rating-badge ${ratClass}">${rat}</span></td>
        <td class="r${SORT_KEY==='gols'?' accent':''}">${s.gols||0}</td>
        <td class="r${SORT_KEY==='assistencias'?' accent':''}">${s.assistencias||0}</td>
        <td class="r${SORT_KEY==='passes'?' accent':''}">${s.passes||0}</td>
        <td class="r${SORT_KEY==='chutes'?' accent':''}">${s.chutes||0}</td>
        <td class="r">${s.chutesAlvo||0}</td>
        <td class="r${SORT_KEY==='minutos'?' accent':''}">${s.minutos||0}</td>
        <td class="r">${s.jogos||0}</td>
        <td class="r">${s.amarelos||0}</td>
        <td class="r">${s.vermelhos||0}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

function renderCardJogador(j, i) {
  const s = j.stats || {};
  const rat = s.rating ? parseFloat(s.rating).toFixed(1) : '–';
  const ratColor = s.rating >= 7.5 ? 'var(--grn)' : s.rating >= 6.5 ? 'var(--acc)' : 'var(--red)';
  return `<div class="player-card" onclick="abrirPerfil(${j.id})">
    <div class="pc-foto-wrap">
      <img src="${x(j.foto)}" onerror="this.style.opacity='.2'" alt="">
      <div class="pc-overlay">
        <div class="pc-nome">${x(j.nome)}</div>
        <div class="pc-pos">${x(j.posicao||'–')} · ${x(j.time?.nome||'—')}</div>
      </div>
    </div>
    <div class="pc-body">
      <div class="pc-stats">
        <div class="pc-stat"><div class="sv">${s.gols||0}</div><div class="sl">Gols</div></div>
        <div class="pc-stat"><div class="sv">${s.assistencias||0}</div><div class="sl">Ast</div></div>
        <div class="pc-stat"><div class="sv">${s.jogos||0}</div><div class="sl">Jogos</div></div>
      </div>
      <div class="pc-meta">
        <img src="${x(j.time?.logo)}" onerror="this.style.display='none'" alt="">
        <span>${x(j.time?.nome||'—')}</span>
        <span class="pc-rating" style="color:${ratColor}">${rat}</span>
      </div>
    </div>
  </div>`;
}

function renderPaginacao() {
  if (TOTAL_PAGS <= 1 || MODO === 'ranking') return '';
  let h = '<div class="paginacao">';
  if (PAG > 1) h += `<button class="pg-btn" onclick="buscarJogadores(${PAG-1})">‹</button>`;
  for (let p = Math.max(1, PAG-2); p <= Math.min(TOTAL_PAGS, PAG+2); p++) {
    h += `<button class="pg-btn${p===PAG?' on':''}" onclick="buscarJogadores(${p})">${p}</button>`;
  }
  if (PAG < TOTAL_PAGS) h += `<button class="pg-btn" onclick="buscarJogadores(${PAG+1})">›</button>`;
  h += `<span class="pg-info">Pág ${PAG}/${TOTAL_PAGS}</span></div>`;
  return h;
}

// ── MÉDIAS & COMPARATIVO ──
function renderMediasComparativo() {
  const lista = jogadoresFiltrados().slice(0, 50);
  if (!lista.length) return;

  const avg = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0;
  const sum = key => lista.map(j => j.stats?.[key] || 0);

  const mediaGols = avg(sum('gols'));
  const mediaAst = avg(sum('assistencias'));
  const mediaPasses = avg(sum('passes'));
  const mediaMin = avg(sum('minutos'));
  const mediaChutes = avg(sum('chutes'));
  const mediaRating = avg(lista.filter(j => j.stats?.rating).map(j => parseFloat(j.stats.rating) || 0));

  // Top por posição
  const porPosicao = {};
  lista.forEach(j => {
    const pos = j.posicao?.[0] || 'X';
    if (!porPosicao[pos]) porPosicao[pos] = [];
    porPosicao[pos].push(j);
  });

  const fmtN = n => isNaN(n) || !n ? '–' : n % 1 === 0 ? n : n.toFixed(2);

  let html = `
    <div class="divider">📊 Médias da Seleção Atual (${lista.length} jogadores)</div>
    <div class="medias-grid">
      <div class="media-card"><div class="media-val">${fmtN(mediaRating.toFixed(2))}</div><div class="media-lbl">Nota Média</div></div>
      <div class="media-card g"><div class="media-val">${fmtN(mediaGols.toFixed(2))}</div><div class="media-lbl">Gols por Jogador</div></div>
      <div class="media-card b"><div class="media-val">${fmtN(mediaAst.toFixed(2))}</div><div class="media-lbl">Ast por Jogador</div></div>
      <div class="media-card b"><div class="media-val">${fmtN(mediaPasses.toFixed(0))}</div><div class="media-lbl">Passes Médios</div></div>
      <div class="media-card r"><div class="media-val">${fmtN(mediaChutes.toFixed(1))}</div><div class="media-lbl">Chutes Médios</div></div>
      <div class="media-card"><div class="media-val">${fmtN(mediaMin.toFixed(0))}</div><div class="media-lbl">Minutos Médios</div></div>
    </div>

    <div class="divider">🏅 Top 5 por Posição (nota)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;">
    ${Object.entries(porPosicao).map(([pos, jgs]) => {
      const top = [...jgs].sort((a,b) => (parseFloat(b.stats?.rating)||0) - (parseFloat(a.stats?.rating)||0)).slice(0,5);
      const posNome = { G: 'Goleiros', D: 'Defensores', M: 'Meias', A: 'Atacantes' }[pos] || pos;
      return `<div style="background:var(--c2);border:1px solid var(--bd1);border-radius:10px;padding:12px">
        <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${posNome}</div>
        ${top.map((j,i) => `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)">
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);width:14px">${i+1}</span>
          <img src="${x(j.foto)}" style="width:22px;height:22px;border-radius:50%;object-fit:cover" onerror="this.src=''">
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x(j.nome)}</div>
            <div style="font-size:8px;color:var(--t3)">${x(j.time?.nome||'')}</div>
          </div>
          <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${parseFloat(j.stats?.rating)>=7.5?'var(--grn)':'var(--acc)'}">${j.stats?.rating?parseFloat(j.stats.rating).toFixed(1):'–'}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}
    </div>

    <div class="divider">⚡ Médias por Minuto Jogado (Top 20)</div>
    <table class="rank-table">
      <thead><tr>
        <th>#</th><th>Jogador</th><th>Pos</th>
        <th class="r">Gols/90'</th><th class="r">Chutes/90'</th><th class="r">Passes/90'</th><th class="r">Dribles/90'</th>
      </tr></thead>
      <tbody>
      ${lista.filter(j => (j.stats?.minutos||0) > 90).slice(0,20).map((j,i) => {
        const min = j.stats.minutos || 1;
        const fator = 90 / min;
        const pos = j.posicao?.[0] || '–';
        return `<tr onclick="abrirPerfil(${j.id})">
          <td><span class="rank-num-big">${i+1}</span></td>
          <td><div class="player-cell">
            <img class="player-foto" src="${x(j.foto)}" onerror="this.src=''">
            <div class="player-info"><div class="pn">${x(j.nome)}</div><div class="pnat">${x(j.time?.nome||'')}</div></div>
          </div></td>
          <td><span class="pos-tag pos-${pos}">${pos}</span></td>
          <td class="r">${((j.stats.gols||0)*fator).toFixed(2)}</td>
          <td class="r">${((j.stats.chutes||0)*fator).toFixed(2)}</td>
          <td class="r">${((j.stats.passes||0)*fator).toFixed(1)}</td>
          <td class="r">${((j.stats.dribles||0)*fator).toFixed(2)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  `;
  gc('pane-medias').innerHTML = html;
}

// ── PERFIL COMPLETO ──
async function abrirPerfil(playerId) {
  const season = gc('fSeason').value || '2026';
  gc('modalOv').classList.add('show');
  gc('modalBox').innerHTML = '<div class="empty"><div class="ld-big"></div><p>Carregando perfil...</p></div>';
  try {
    const r = await fns.httpsCallable('buscarPerfilJogadorAdmin')({ playerId, season });
    renderModalPerfil(r.data);
  } catch(e) {
    gc('modalBox').innerHTML = `<div class="empty"><div class="ico">⚠️</div><p>${e.message}</p></div>`;
  }
}

function fecharModal() {
  gc('modalOv').classList.remove('show');
}

function renderModalPerfil(data) {
  const { jogador, stats } = data;
  if (!jogador) { gc('modalBox').innerHTML = '<div class="empty"><div class="ico">⚠️</div><p>Jogador não encontrado</p></div>'; return; }

  // Stat principal (primeira liga com mais minutos)
  const statPrinc = [...(stats||[])].sort((a,b) => (b.minutos||0)-(a.minutos||0))[0] || {};
  const rat = statPrinc.rating ? parseFloat(statPrinc.rating).toFixed(1) : '–';
  const ratColor = statPrinc.rating >= 7.5 ? 'var(--grn)' : statPrinc.rating >= 6.5 ? 'var(--acc)' : 'var(--red)';

  // Header
  const headerHtml = `
    <div class="modal-head">
      <div class="modal-foto-wrap">
        <img class="modal-foto" src="${x(jogador.foto)}" onerror="this.style.opacity='.2'" alt="">
      </div>
      <div class="modal-info">
        <div class="modal-nome">${x(jogador.nome)}</div>
        <div class="modal-sub">${x(jogador.nacionalidade||'–')} · ${x(jogador.pais||'')} · ${jogador.nascimento ? new Date(jogador.nascimento).getFullYear() + ' anos aprox.' : ''}</div>
        <div class="modal-badges">
          <span class="m-badge" style="color:${ratColor};border-color:${ratColor}20">⭐ ${rat}</span>
          ${statPrinc.liga ? `<span class="m-badge"><img src="${x(statPrinc.liga.logo)}" style="width:12px;height:12px;object-fit:contain"> ${x(statPrinc.liga.nome)}</span>` : ''}
          ${jogador.altura ? `<span class="m-badge">📏 ${x(jogador.altura)}</span>` : ''}
          ${jogador.peso ? `<span class="m-badge">⚖️ ${x(jogador.peso)}</span>` : ''}
          ${jogador.lesionado ? `<span class="m-badge" style="color:var(--red)">🏥 Lesionado</span>` : ''}
        </div>
      </div>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>`;

  // Temporadas HTML
  const tempHtml = (stats||[]).map(s => {
    const fJ = n => s.jogos > 0 ? (n/s.jogos).toFixed(2) : '–';
    const fM = n => s.minutos > 0 ? (n/s.minutos*90).toFixed(2) : '–';
    const rat = s.rating ? parseFloat(s.rating).toFixed(2) : '–';
    const ratColor = s.rating >= 7.5 ? 'var(--grn)' : s.rating >= 6.5 ? 'var(--acc)' : 'var(--red)';

    return `<div class="temp-card">
      <div class="temp-head">
        <img src="${x(s.liga?.logo)}" onerror="this.src=''">
        <div>
          <div class="temp-liga">${x(s.liga?.nome||'–')} — ${x(s.time?.nome||'–')}</div>
          <div class="temp-sub">${s.liga?.pais||''} · Temporada ${s.liga?.temporada||''}</div>
        </div>
        <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:${ratColor}">${rat}</span>
      </div>
      <div class="temp-stats-grid">
        <div class="ts-item"><div class="ts-val">${s.jogos||0}</div><div class="ts-lbl">Jogos</div></div>
        <div class="ts-item"><div class="ts-val">${s.titular||0}</div><div class="ts-lbl">Titular</div></div>
        <div class="ts-item"><div class="ts-val">${s.minutos||0}</div><div class="ts-lbl">Minutos</div></div>
        <div class="ts-item"><div class="ts-val verde">${s.gols||0}</div><div class="ts-lbl">Gols</div></div>
        <div class="ts-item"><div class="ts-val azul">${s.assistencias||0}</div><div class="ts-lbl">Assist.</div></div>
        <div class="ts-item"><div class="ts-val">${s.chutes||0}</div><div class="ts-lbl">Chutes</div></div>
        <div class="ts-item"><div class="ts-val">${s.chutesAlvo||0}</div><div class="ts-lbl">A Gol</div></div>
        <div class="ts-item"><div class="ts-val amarelo">${s.passes||0}</div><div class="ts-lbl">Passes</div></div>
        <div class="ts-item"><div class="ts-val">${s.passesChave||0}</div><div class="ts-lbl">P. Chave</div></div>
        <div class="ts-item"><div class="ts-val">${s.precisaoPasses||'–'}${s.precisaoPasses?'%':''}</div><div class="ts-lbl">Prec. Passe</div></div>
        <div class="ts-item"><div class="ts-val">${s.dribles||0}</div><div class="ts-lbl">Dribles</div></div>
        <div class="ts-item"><div class="ts-val">${s.driblesSuccess||0}</div><div class="ts-lbl">Driblas OK</div></div>
        <div class="ts-item"><div class="ts-val">${s.desarmes||0}</div><div class="ts-lbl">Desarmes</div></div>
        <div class="ts-item"><div class="ts-val">${s.interceptacoes||0}</div><div class="ts-lbl">Interc.</div></div>
        <div class="ts-item"><div class="ts-val">${s.faltas||0}</div><div class="ts-lbl">Faltas</div></div>
        <div class="ts-item"><div class="ts-val">${s.sofreu||0}</div><div class="ts-lbl">Sofreu F.</div></div>
        <div class="ts-item"><div class="ts-val" style="color:var(--acc)">${s.amarelos||0}</div><div class="ts-lbl">Amarelos</div></div>
        <div class="ts-item"><div class="ts-val" style="color:var(--red)">${s.vermelhos||0}</div><div class="ts-lbl">Vermelhos</div></div>
      </div>
      <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--bd1)">
        <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Médias por 90 minutos</div>
        <div class="temp-stats-grid">
          <div class="ts-item"><div class="ts-val verde" style="font-size:13px">${fM(s.gols||0)}</div><div class="ts-lbl">Gols/90'</div></div>
          <div class="ts-item"><div class="ts-val azul" style="font-size:13px">${fM(s.assistencias||0)}</div><div class="ts-lbl">Ast/90'</div></div>
          <div class="ts-item"><div class="ts-val" style="font-size:13px">${fM(s.chutes||0)}</div><div class="ts-lbl">Chutes/90'</div></div>
          <div class="ts-item"><div class="ts-val amarelo" style="font-size:13px">${fM(s.passes||0)}</div><div class="ts-lbl">Passes/90'</div></div>
          <div class="ts-item"><div class="ts-val" style="font-size:13px">${fJ(s.gols||0)}</div><div class="ts-lbl">Gols/Jogo</div></div>
          <div class="ts-item"><div class="ts-val" style="font-size:13px">${fJ(s.chutes||0)}</div><div class="ts-lbl">Chutes/Jogo</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Radar SVG (baseado em stats principais)
  const radarHtml = gerarRadar(statPrinc);

  gc('modalBox').innerHTML = `
    ${headerHtml}
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="mt-tab on" onclick="mtAba('temporadas',this)">📅 Temporadas</button>
        <button class="mt-tab" onclick="mtAba('radar',this)">🕸 Radar</button>
      </div>
      <div class="mt-pane on" id="mtp-temporadas">${tempHtml || '<div class="empty"><p>Sem dados de temporada</p></div>'}</div>
      <div class="mt-pane" id="mtp-radar">${radarHtml}</div>
    </div>`;
}

function mtAba(aba, btn) {
  document.querySelectorAll('.mt-tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.mt-pane').forEach(p => p.classList.remove('on'));
  gc('mtp-' + aba)?.classList.add('on');
}

function gerarRadar(s) {
  if (!s || !s.jogos) return '<div class="empty"><p>Sem dados suficientes</p></div>';
  const j = s.jogos || 1;
  const min = s.minutos || 1;

  // Normalizar 0-100
  const norm = (val, max) => Math.min(100, Math.round((val||0) / max * 100));
  const dims = [
    { label: 'Gols/90', val: norm((s.gols||0)/min*90, 1.5) },
    { label: 'Ast/90', val: norm((s.assistencias||0)/min*90, 1.2) },
    { label: 'Passes/J', val: norm((s.passes||0)/j, 80) },
    { label: 'Precisão', val: norm(parseFloat(s.precisaoPasses)||0, 100) },
    { label: 'Desarmes', val: norm((s.desarmes||0)/j, 5) },
    { label: 'Dribles/J', val: norm((s.dribles||0)/j, 5) },
  ];

  const n = dims.length;
  const cx = 140, cy = 140, r = 100;
  const angStep = (2 * Math.PI) / n;

  const pts = dims.map((d, i) => {
    const ang = i * angStep - Math.PI/2;
    const rv = r * d.val / 100;
    return { x: cx + rv * Math.cos(ang), y: cy + rv * Math.sin(ang) };
  });

  const polyPoints = pts.map(p => `${p.x},${p.y}`).join(' ');

  // Grade
  let gradeLines = '';
  [20,40,60,80,100].forEach(pct => {
    const gPts = dims.map((_, i) => {
      const ang = i * angStep - Math.PI/2;
      const rv = r * pct / 100;
      return `${cx + rv * Math.cos(ang)},${cy + rv * Math.sin(ang)}`;
    }).join(' ');
    gradeLines += `<polygon points="${gPts}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
  });

  // Eixos
  let eixos = '';
  dims.forEach((_, i) => {
    const ang = i * angStep - Math.PI/2;
    eixos += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(ang)}" y2="${cy + r * Math.sin(ang)}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
  });

  // Labels
  let labels = '';
  dims.forEach((d, i) => {
    const ang = i * angStep - Math.PI/2;
    const lx = cx + (r + 22) * Math.cos(ang);
    const ly = cy + (r + 22) * Math.sin(ang);
    const anchor = Math.abs(lx - cx) < 10 ? 'middle' : lx > cx ? 'start' : 'end';
    labels += `<text x="${lx}" y="${ly+4}" text-anchor="${anchor}" font-size="10" fill="rgba(133,139,165,.8)" font-family="DM Sans">${d.label}</text>
    <text x="${lx}" y="${ly+16}" text-anchor="${anchor}" font-size="11" fill="#eceef6" font-family="DM Mono" font-weight="700">${d.val}</text>`;
  });

  return `<div style="text-align:center;margin-bottom:10px">
    <div style="font-size:10px;color:var(--t3);margin-bottom:12px">Baseado na temporada com mais minutos. Valores normalizados 0-100.</div>
    <div class="radar-wrap">
      <svg width="280" height="280" viewBox="0 0 280 280">
        ${gradeLines}${eixos}
        <polygon points="${polyPoints}" fill="rgba(245,165,36,.2)" stroke="var(--acc)" stroke-width="2"/>
        ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--acc)"/>`).join('')}
        ${labels}
      </svg>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:360px;margin:0 auto">
      ${dims.map(d => `<div style="background:var(--c3);border-radius:6px;padding:6px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:${d.val>=70?'var(--grn)':d.val>=40?'var(--acc)':'var(--red)'}">${d.val}</div>
        <div style="font-size:8px;color:var(--t3)">${d.label}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
</script>
</body>
</html>
