<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Yellup · Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080b10;
  --surface:#0e1219;
  --surface2:#131820;
  --surface3:#181f2a;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.1);
  --text:#e8edf5;
  --muted:#5a6478;
  --muted2:#8694b0;
  --acc:#00d4ff;
  --acc-dim:rgba(0,212,255,.08);
  --acc-border:rgba(0,212,255,.2);
  --grn:#00e5a0;
  --grn-dim:rgba(0,229,160,.08);
  --red:#ff4d6d;
  --red-dim:rgba(255,77,109,.08);
  --yel:#ffd166;
  --yel-dim:rgba(255,209,102,.08);
  --pur:#b794f4;
  --pur-dim:rgba(183,148,244,.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;overflow:hidden;}

/* ── TOP BAR ── */
.topbar{height:48px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;z-index:50;}
.logo-mark{width:26px;height:26px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#000;flex-shrink:0;}
.logo-text{font-weight:700;font-size:14px;letter-spacing:-.3px;}
.logo-text span{color:var(--acc);}
.topbar-nav{display:flex;gap:2px;margin-left:4px;}
.tnav{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;color:var(--muted2);text-decoration:none;transition:all .15s;cursor:pointer;border:none;background:none;font-family:inherit;}
.tnav:hover{color:var(--text);background:rgba(255,255,255,.05);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tbtn{padding:4px 12px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.tbtn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.tbtn-acc{background:var(--acc);border-color:var(--acc);color:#000;}
.tbtn-acc:hover{opacity:.88;color:#000;}
.status-pill{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 48px);overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-search-wrap{padding:10px;}
.sb-search{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;font-family:inherit;transition:border .15s;}
.sb-search:focus{border-color:var(--acc-border);}
.sb-search::placeholder{color:var(--muted);}
.sb-filters{display:flex;gap:4px;padding:0 10px 8px;flex-wrap:wrap;}
.sf{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .1s;font-family:inherit;}
.sf.on{background:var(--acc-dim);border-color:var(--acc-border);color:var(--acc);}
.sb-list{flex:1;overflow-y:auto;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.si{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.025);}
.si:hover{background:rgba(255,255,255,.03);}
.si.on{background:var(--acc-dim);border-left:2px solid var(--acc);}
.si-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0;}
.si-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.si-liga{font-size:9px;color:var(--muted);margin-top:1px;}
.si-right{text-align:right;flex-shrink:0;}
.si-score{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
.si-forma{display:flex;gap:2px;margin-top:2px;justify-content:flex-end;}
.fb{width:9px;height:9px;border-radius:2px;font-size:0;}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 4px;}
.tab{padding:12px 16px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit;letter-spacing:.3px;}
.tab:hover{color:var(--muted2);}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.pane{display:none;flex:1;overflow-y:auto;padding:16px;}
.pane.on{display:block;}
.pane::-webkit-scrollbar{width:4px;}
.pane::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);gap:10px;}
.empty svg{opacity:.3;}

/* ── SECTION TITLE ── */
.sec{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.sec:first-child{margin-top:0;}

/* ── SCORE HEADER ── */
.profile-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:4px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;}
.ph-logo{width:56px;height:56px;object-fit:contain;}
.ph-name{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
.ph-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.ph-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px;}
.score-block{text-align:right;}
.score-num{font-family:'Space Mono',monospace;font-size:52px;font-weight:700;line-height:1;}
.score-label{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
.score-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.mom-row{display:flex;gap:6px;margin-top:8px;justify-content:flex-end;}
.mom-box{background:var(--surface3);border-radius:6px;padding:4px 8px;text-align:center;min-width:52px;}
.mom-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
.mom-lbl{font-size:8px;color:var(--muted);margin-top:1px;letter-spacing:.3px;}

/* ── METRIC CARDS ── */
.cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px;}
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.cards2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.card-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;line-height:1.1;}
.card-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:3px;}
.card-delta{font-size:10px;font-weight:600;margin-top:4px;}
.card-null{color:var(--muted);font-size:16px;}

/* ── SOLIDEZ CARDS ── */
.sol-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.sol-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.sol-bar{height:3px;background:var(--border2);border-radius:2px;margin:6px 0 4px;overflow:hidden;}
.sol-fill{height:100%;border-radius:2px;transition:width .5s;}
.sol-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* ── COMPARATIVO TABLE ── */
.comp-table{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.comp-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;}
.comp-table th:first-child{text-align:left;}
.comp-table td{padding:7px 10px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);text-align:right;font-family:'Space Mono',monospace;}
.comp-table td:first-child{text-align:left;font-family:'Space Grotesk',sans-serif;color:var(--muted2);font-size:10px;}
.comp-table tr:last-child td{border-bottom:none;}

/* ── JOGOS LIST ── */
.jogos-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.jogo-row{display:grid;grid-template-columns:20px 14px 1fr auto auto auto auto;gap:8px;align-items:center;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.025);}
.jogo-row:last-child{border-bottom:none;}
.jr-res{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.jr-local{font-size:10px;color:var(--muted);}
.jr-adv{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.jr-score{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.jr-tot{font-size:9px;color:var(--muted);text-align:right;}
.jr-xg{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-align:right;min-width:50px;}
.jr-date{font-size:9px;color:var(--muted);text-align:right;min-width:68px;}

/* ── POR FORÇA ── */
.pf-table{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;border-collapse:collapse;}
.pf-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;}
.pf-table th:first-child{text-align:left;}
.pf-table td{padding:7px 10px;font-size:10px;border-bottom:1px solid rgba(255,255,255,.025);text-align:center;font-family:'Space Mono',monospace;}
.pf-table td:first-child{text-align:left;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:500;color:var(--muted2);}
.pf-table tr:last-child td{border-bottom:none;}

/* ── MINUTOS ── */
.min-chart{display:flex;gap:2px;align-items:flex-end;height:70px;margin:8px 0;}
.min-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;cursor:default;position:relative;}
.min-col:hover .min-tip{display:block;}
.min-sc{border-radius:2px 2px 0 0;min-width:3px;transition:height .3s;}
.min-cn{border-radius:0 0 2px 2px;min-width:3px;opacity:.7;}
.min-lbl{font-size:6px;color:var(--muted);margin-top:2px;}
.min-tip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:9px;white-space:nowrap;z-index:30;pointer-events:none;}
.min-legend{display:flex;gap:12px;font-size:9px;color:var(--muted);}

/* ── RANKING TABLE ── */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;}
.rank-table th.r{text-align:right;}
.rank-table td{padding:7px 8px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);}
.rank-table td.r{text-align:right;font-family:'Space Mono',monospace;font-size:10px;}
.rank-table tr{cursor:pointer;transition:background .1s;}
.rank-table tr:hover td{background:rgba(255,255,255,.02);}
.rank-pos{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.rank-bar-wrap{display:flex;align-items:center;}
.rank-bar{height:5px;border-radius:2px;}

/* ── CONFRONTO ── */
.conf-pick{display:grid;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:center;margin-bottom:14px;}
.conf-input-wrap{position:relative;}
.conf-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:8px 10px;outline:none;font-family:inherit;transition:border .15s;}
.conf-input:focus{border-color:var(--acc-border);}
.conf-drop{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:0 0 8px 8px;max-height:180px;overflow-y:auto;z-index:100;font-size:12px;}
.conf-drop-item{padding:7px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.conf-drop-item:hover{background:rgba(255,255,255,.04);}
.vs-label{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--muted);text-align:center;}
.conf-sel{font-size:10px;color:var(--acc);min-height:14px;margin-top:3px;}
.conf-result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.conf-prob-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.cbox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.cbox-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;}
.cbox-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.prob-bar-h{height:3px;border-radius:2px;margin-top:6px;}
.conf-teams-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;font-size:10px;}
.conf-team-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;}
.forma-row{display:flex;gap:3px;margin:4px 0;}

/* ── LOADING ── */
.ld{width:14px;height:14px;border:2px solid rgba(0,212,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted);font-size:11px;}

/* ── COLORS ── */
.c-grn{color:var(--grn)!important;}
.c-red{color:var(--red)!important;}
.c-yel{color:var(--yel)!important;}
.c-acc{color:var(--acc)!important;}
.c-muted{color:var(--muted)!important;}
.c-pur{color:var(--pur)!important;}
.bg-grn{background:var(--grn-dim)!important;border-color:rgba(0,229,160,.2)!important;}
.bg-red{background:var(--red-dim)!important;border-color:rgba(255,77,109,.2)!important;}
.bg-yel{background:var(--yel-dim)!important;border-color:rgba(255,209,102,.2)!important;}
.bg-pur{background:var(--pur-dim)!important;border-color:rgba(183,148,244,.2)!important;}

/* ── FONTE SCORE ── */
.fs-grn{color:var(--grn);}
.fs-yel{color:var(--yel);}
.fs-red{color:var(--red);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">Y</div>
  <div class="logo-text">yell<span>up</span> <span style="font-size:9px;font-weight:400;color:var(--muted);letter-spacing:0">scout</span></div>
  <nav class="topbar-nav">
    <a class="tnav" href="apostas.html">Previsões</a>
    <a class="tnav" href="campeonatos.html">Campeonatos</a>
    <a class="tnav" href="mapeamento-historico.html">Mapeamento</a>
  </nav>
  <div class="topbar-right">
    <button class="tbtn" id="btnEnriquecer" onclick="enrichAll()">Enriquecer via API</button>
    <button class="tbtn" id="btnNormElo" onclick="normalizarElo()" title="Recalcula as notas Elo relativas ao banco sem chamar a API">⚖ Normalizar Elo</button>
    <button class="tbtn" id="btnRecalc" onclick="recalcElo()">Recalcular</button>
    <div class="status-pill"><div class="status-dot" id="statusDot" style="background:var(--muted)"></div><span id="statusTxt">—</span></div>
    <button class="tbtn tbtn-acc" onclick="reloadAll()">↺</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-search-wrap">
      <input class="sb-search" id="searchInput" placeholder="Buscar time..." oninput="renderSidebar(this.value)">
    </div>
    <div class="sb-filters">
      <button class="sf" onclick="setLiga('',this)">Todos</button>
      <button class="sf on" onclick="setLiga('_clubes',this)">🏆 Clubes</button>
      <button class="sf" onclick="setLiga('_nacionals',this)">🌍 Seleções</button>
      <button class="sf" onclick="setLiga('Brasileirão A',this)">BR-A</button>
      <button class="sf" onclick="setLiga('Premier League',this)">PL</button>
      <button class="sf" onclick="setLiga('La Liga',this)">ESP</button>
      <button class="sf" onclick="setLiga('Copa Libertadores',this)">LIB</button>
    </div>
    <div class="sb-list" id="sbList"><div class="loading-center"><div class="ld"></div>Carregando...</div></div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('perfil')">Perfil</button>
      <button class="tab" onclick="switchTab('confronto')">Confronto</button>
      <button class="tab" onclick="switchTab('ranking')">Ranking</button>
    </div>

    <div class="pane on" id="pane-perfil">
      <div class="empty" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <div>Selecione um time</div>
      </div>
      <div id="perfilContent" style="display:none"></div>
    </div>

    <div class="pane" id="pane-confronto">
      <div class="sec">Calculadora de Confronto</div>
      <div class="conf-pick">
        <div>
          <div style="font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">🏠 Casa</div>
          <div class="conf-input-wrap">
            <input class="conf-input" id="inCasa" placeholder="Digite o time..." autocomplete="off" oninput="filtConf('casa')" onfocus="filtConf('casa')">
            <div class="conf-drop" id="dropCasa"></div>
          </div>
          <div class="conf-sel" id="selCasa"></div>
        </div>
        <div class="vs-label">VS</div>
        <div>
          <div style="font-size:9px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;text-align:right">✈️ Fora</div>
          <div class="conf-input-wrap">
            <input class="conf-input" id="inFora" placeholder="Digite o time..." autocomplete="off" oninput="filtConf('fora')" onfocus="filtConf('fora')" style="text-align:right">
            <div class="conf-drop" id="dropFora"></div>
          </div>
          <div class="conf-sel" id="selFora" style="text-align:right"></div>
        </div>
      </div>
      <input type="hidden" id="idCasa"><input type="hidden" id="idFora">
      <div id="confResult"><div class="empty" style="height:200px"><div style="color:var(--muted);font-size:11px">Selecione os dois times</div></div></div>
    </div>

    <div class="pane" id="pane-ranking">
      <div id="rankContent"><div class="loading-center"><div class="ld"></div>Aguardando dados...</div></div>
    </div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyC5ZrkEy7KuCFJOtPvI7-P-JcA0MF4im5c",

  messagingSenderId:"608347210297",

});
const auth=firebase.auth(), db=firebase.firestore(), fns=firebase.functions();

// ── LIGA TIER ────────────────────────────────────────────────────────────────
function getLigaTier(liga) {
  var l = (liga || '').toLowerCase().trim();
  if (/world cup|nations league|friendl|amistoso|international friendly|copa america|eliminat|copa do mundo|african cup|asia cup|gold cup|concacaf|conmebol|qualif|qualification|olympic|u-[0-9]|under-[0-9]|sub-[0-9]/.test(l)) return 'nacional';
  if (l === 'premier league') return 1.00;
  if (l === 'la liga') return 1.00;
  if (l === 'bundesliga') return 1.00;
  if (l === 'serie a' || l === 'serie a tim') return 1.00;
  if (l === 'ligue 1') return 1.00;
  if (l === 'champions league' || l === 'uefa champions league') return 1.00;
  if (l === 'uefa europa league') return 0.97;
  if (l === 'uefa conference league') return 0.95;
  if (/brasileir|libertadores|eredivisie|primeira liga|liga portugal|süper lig|super lig|scottish prem/.test(l)) return 0.93;
  if (/^liga i$|j1 league|j-league|^mls$|liga mx|a-league|allsvenskan|eliteserien|ekstraklasa|championship/.test(l)) return 0.82;
  if (/saudi|roshn|stars league|mbs.*pro/.test(l)) return 0.62;
  if (/pro league/.test(l) && !/premier|primeira/.test(l)) return 0.62;
  if (/chinese super|csl|k.league|k-league/.test(l)) return 0.65;
  if (/egyptian|emirati|qatari|persian gulf|iranian/.test(l)) return 0.60;
  if (/premier league/.test(l)) return 0.72;
  if (/segunda|serie c|national league|primera b/.test(l)) return 0.65;
  if (/gibraltar|san marino|andorra|faroe|liechtenstein/.test(l)) return 0.45;
  return 0.72;
}

function isNacional(t) {
  if (t.nacional === true) return true;
  if (t.m && t.m.nacional === true) return true;
  if (getLigaTier(t.liga) === 'nacional') return true;
  var nome = (t.nome || '').toLowerCase();
  var SELECOES = /^(brazil|brasil|argentina|france|germany|england|spain|portugal|italy|netherlands|belgium|croatia|uruguay|colombia|chile|mexico|japan|south korea|senegal|morocco|nigeria|cameroon|ivory coast|ghana|egypt|algeria|tunisia|australia|usa|canada|denmark|sweden|norway|switzerland|austria|poland|czech republic|hungary|turkey|ukraine|iran|saudi arabia|qatar|ecuador|peru|venezuela|bolivia|paraguay|costa rica|honduras|scotland|wales|ireland)$/;
  if (SELECOES.test(nome)) return true;
  return false;
}

// ── SCORE PRINCIPAL: Elo normalizado ─────────────────────────────────────────
// Após carregar todos os perfis, normaliza elo_raw (min-max → 1-10)
// Times sem elo_raw caem para score baseado em stats como fallback
var ELO_MIN = 1100, ELO_MAX = 1900, ELO_SPAN = 800; // defaults — recalculados em loadData

function eloToScore(elo_raw) {
  if (elo_raw == null) return null;
  var norm = (elo_raw - ELO_MIN) / ELO_SPAN * 9 + 1;
  return Math.round(Math.min(10, Math.max(1, norm)) * 10) / 10;
}

// Score por stats (fallback quando não tem elo_raw)
function statsScore(s, liga, totalJogos, pf) {
  if (!s || s.n < 3) return null;
  var des = (s.pts_jogo / 3) * 5;
  var atk = Math.min(s.gf_media, 2.5) / 2.5 * 2;
  var def = Math.max(0, 1 - s.gs_media / 2.5) * 2;
  var sol = ((s.clean_sheet_pct||0) / 100) * 1;
  var xgb = s.xgd != null ? Math.min(Math.max(s.xgd * 0.3, -0.5), 0.5) : 0;
  var raw  = des + atk + def + sol + xgb;
  var conf = s.n >= 8 ? 1.0 : s.n >= 5 ? 0.85 : 0.6;
  var base = Math.min(10, Math.max(0, raw)) * conf;
  var tier = getLigaTier(liga);
  if (tier === 'nacional') tier = 0.80;
  var tierCap = tier>=0.98?10:tier>=0.90?9.2:tier>=0.78?8.2:tier>=0.58?6.5:4.5;
  var vol = (totalJogos||0)>=40?1.04:(totalJogos||0)>=25?1.02:1.0;
  var sosAdj = 0;
  if (pf) {
    var nF=(pf.forte&&pf.forte.geral)?pf.forte.geral.n||0:0;
    var nB=(pf.bom&&pf.bom.geral)?pf.bom.geral.n||0:0;
    var nM=(pf.medio&&pf.medio.geral)?pf.medio.geral.n||0:0;
    var nFr=(pf.fraco&&pf.fraco.geral)?pf.fraco.geral.n||0:0;
    var tot=nF+nB+nM+nFr;
    if(tot>=8){var q=(nF+nB*0.5+nM*0.1)/tot;sosAdj=Math.max(-0.8,Math.min(0.8,(q-0.30)*1.5));}
  }
  var score = Math.min(tierCap, base*tier*vol) + sosAdj;
  return Math.round(Math.min(tierCap, Math.max(0, score)) * 10) / 10;
}

// calcScore = alias para compatibilidade com chamadas internas (momBox, etc.)
function calcScore(s, liga, totalJogos, sTemp, pf) {
  return statsScore(s, liga, totalJogos, pf);
}

// Helpers de stats
function forcaStats(m) {
  return m.sDom30 || m.sDom15 || m.s30 || m.s15 || m.s10 || m.s7 || m.s5 || null;
}
function formaStats(m) {
  return m.sDom15 || m.s7 || m.s5 || null;
}
function bestStats(m) {
  return forcaStats(m);
}
function tempStats(m) {
  // Histórico longo para blend
  return m.s50 || m.sDom30 || m.s30 || m.s15 || null;
}
function europaStats(m) {
  return m.sEur15 || null;
}

const BANDS=['1-5','6-10','11-15','16-20','21-25','26-30','31-35','36-40',
             '41-45','46-50','51-55','56-60','61-65','66-70','71-75','76-80','81-85','86-90'];
const BSTART=[1,6,11,16,21,26,31,36,41,46,51,56,61,66,71,76,81,86];
const GLOBAL_SC=[3.0,4.6,3.6,3.7,5.3,4.8,4.0,4.5,8.0,5.4,6.6,9.2,4.5,5.5,5.0,4.8,7.4,10.1];
const GLOBAL_CN=[2.6,4.5,3.2,4.2,5.2,4.5,4.0,4.5,7.7,5.3,6.7,9.8,4.5,5.3,5.4,4.7,7.8,10.0];
const _minCache={};
async function getMinProfile(teamId){
  const k=String(teamId);
  if(_minCache[k]!==undefined)return _minCache[k];
  try{
    const snap=await db.collection('cache-historico').where('teamId','==',Number(teamId)).limit(1).get();
    if(snap.empty){_minCache[k]=null;return null;}
    const jogos=snap.docs[0].data().jogos||[];
    const sc=[],cn=[];
    jogos.slice(-40).forEach(j=>{
      (j.golsMinuto||[]).forEach(m=>{if(m>=1&&m<=95)sc.push(m);});
      (j.golsSofridosMinuto||[]).forEach(m=>{if(m>=1&&m<=95)cn.push(m);});
    });
    if(sc.length<3&&cn.length<3){_minCache[k]=null;return null;}
    const ts=sc.length||1,tc=cn.length||1;
    const p={
      sc:BSTART.map(s=>Math.round(sc.filter(m=>m>=s&&m<=s+4).length/ts*1000)/10),
      cn:BSTART.map(s=>Math.round(cn.filter(m=>m>=s&&m<=s+4).length/tc*1000)/10),
      nsc:sc.length,ncn:cn.length,ok:sc.length>=15||cn.length>=15
    };
    _minCache[k]=p;return p;
  }catch(e){_minCache[k]=null;return null;}
}
function renderMinChart(sc,cn,isHome){
  const mv=Math.max(...sc,...cn,0.1);
  return BSTART.map((s,i)=>{
    const hSc=Math.round(sc[i]/mv*58),hCn=Math.round(cn[i]/mv*58);
    const colSc=isHome?'var(--grn)':'var(--acc)',colCn='var(--red)';
    const lbl=[1,11,21,31,41,51,61,71,81].includes(s)?(s===41?'45':s===86?'90':s+'\''):'';
    return `<div class="min-col">
      <div class="min-sc" style="height:${hSc}px;background:${colSc};width:100%"></div>
      <div class="min-cn" style="height:${hCn}px;background:${colCn};width:100%"></div>
      <div class="min-lbl">${lbl}</div>
      <div class="min-tip"><strong>${BANDS[i]}'</strong><br><span style="color:${colSc}">▶ ${sc[i]}%</span><br><span style="color:${colCn}">◀ ${cn[i]}%</span></div>
    </div>`;
  }).join('');
}
function calcCrossing(scA,cnB){
  let score=0;const hs=[];const avg=100/18;
  for(let i=0;i<18;i++){
    const c=(scA[i]*cnB[i])/100;score+=c;
    if(scA[i]>avg*1.5&&cnB[i]>avg*1.5)hs.push({band:BANDS[i],atk:scA[i],def:cnB[i],c});
  }
  hs.sort((a,b)=>b.c-a.c);
  return{score:Math.round(score*10)/10,hs:hs.slice(0,3)};
}

// ── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData(){
  setStatus('loading','Carregando...');
  try{
    let all=[],last=null;
    while(true){
      let q=db.collection('perfis-times').limit(500);
      if(last)q=q.startAfter(last);
      const snap=await q.get();
      if(snap.empty)break;
      all=all.concat(snap.docs);
      last=snap.docs[snap.docs.length-1];
      if(snap.docs.length<500)break;
    }
    PERFIS={};
    all.forEach(d=>{
      const p=d.data();
      const tid=String(p.teamId||d.id);
      // Normaliza ligaNome — pega da liga do time ou dos jogos
      const liga=p.liga&&p.liga!=='undefined'?p.liga:
        (p.ultJogos&&p.ultJogos[0]?p.ultJogos[0].ligaNome:'');
      PERFIS[tid]={
        id:tid, nome:p.nome||'—', logo:p.logo||'',
        liga, teamId:p.teamId,
        nacional: p.nacional === true,  // campo salvo pelo enriquecerPerfisDiretamente
        m:{
          // ── Elo (métrica principal de força) ──────────────────────────────
          // Cloud Function salva como "eloRaw" — mapeia para elo_raw usado no frontend
          elo_raw: p.eloRaw ?? p.elo_raw ?? p.elo ?? null,
          elo: p.elo ?? p.eloRaw ?? p.elo_raw ?? null,

          // ── stats gerais ──────────────────────────────────────────────────
          s5:p.s5||null, s7:p.s7||null, s10:p.s10||null,
          s15:p.s15||null, s30:p.s30||null,
          // Cloud Function salva s50 (não s70)
          s50:p.s50||p.s70||null,

          // ── stats domésticos (Cloud Function salva sDom30, sDom15, sEur15) ──
          // Aceita tanto camelCase (novo) quanto snake_case (legado)
          sDom30: p.sDom30||p.s30_dom||null,
          sDom15: p.sDom15||p.s15_dom||null,
          sEur15: p.sEur15||p.s15_eur||null,

          statsCasa:p.statsCasa||null, statsFora:p.statsFora||null,
          porForca:p.porForca||null,
          // xG e métricas API
          xgf:p.xgf_media||null, xga:p.xga_media||null,
          xgd:p.xgd||null, posse:p.posse_media||null,
          shots:p.shots_on_media||null, saves:p.saves_media||null,
          conv:p.conv_rate||null,
          cs:p.clean_sheet_pct!=null?p.clean_sheet_pct:null,
          btts:p.btts_pct!=null?p.btts_pct:null,
          over25:p.over25_pct!=null?p.over25_pct:null,
          // momentum e tendência
          mom5:p.mom5??null, mom10:p.mom10??null, mom20:p.mom20??null,
          tendencia:p.tendencia||'estavel',
          tendGolsTag:p.tendGolsTag||'media',
          fadiga:p.fadiga??0,
          // jogos
          ultJogos:p.ultJogos||[],
          totalJogos:p.totalJogos||0,
          confianca:p.confianca??1,
          enriquecido:!!p.enriquecidoEm,
        }
      };
    });

    // ── Normalização Elo: calcula range ANTES de ordenar ────────────────────
    // Usa percentil 3%–97% para ignorar outliers extremos
    const eloVals = Object.values(PERFIS)
      .filter(t => (t.m.elo||t.m.elo_raw) > 0 && !isNacional(t))
      .map(t => t.m.elo||t.m.elo_raw)
      .sort((a,b) => a - b);
    if (eloVals.length >= 10) {
      const i3  = Math.floor(eloVals.length * 0.03);
      const i97 = Math.floor(eloVals.length * 0.97);
      ELO_MIN  = eloVals[i3];
      ELO_MAX  = eloVals[i97];
      ELO_SPAN = ELO_MAX - ELO_MIN || 800;
    }

    // Ordena LISTA com o range correto já calculado
    // Normalizar Elo: percentis p3-p97 → evita outliers
    const _elos = Object.values(PERFIS).map(t=>t.m.elo).filter(v=>v>0).sort((a,b)=>a-b);
    if (_elos.length >= 2) {
      const i3  = Math.max(0, Math.floor(_elos.length * 0.03));
      const i97 = Math.min(_elos.length-1, Math.floor(_elos.length * 0.97));
      ELO_MIN  = _elos[i3];
      ELO_MAX  = _elos[i97];
      ELO_SPAN = ELO_MAX - ELO_MIN || 800;
    }
    LISTA=Object.values(PERFIS).sort((a,b)=>(getScore(b)||0)-(getScore(a)||0));

    const comElo = eloVals.length;
    setStatus('ok',`${LISTA.length} times · ${comElo} com Elo · Range: ${ELO_MIN}–${ELO_MAX}`);
    renderSidebar();renderRanking();populateDrop();
  }catch(e){setStatus('err','Erro: '+e.message);console.error(e);}
}

// ── SCORE HELPER ─────────────────────────────────────────────────────────────
function enrichStats(s, m) {
  // Injeta métricas top-level nas stats de janela
  if (!s) return s;
  const sc = Object.assign({}, s);
  if (sc.clean_sheet_pct == null && m.cs != null) sc.clean_sheet_pct = m.cs;
  if (sc.xgd == null && m.xgd != null) sc.xgd = m.xgd;
  return sc;
}

function getScore(t) {
  const m = t.m;

  // ── MÉTODO 1: Elo normalizado (relativo a todos os times no banco) ─────────
  // Fonte principal — único método justo entre ligas diferentes.
  // eloRaw calculado pelo Cloud Function: ganhar vs Bayern > ganhar vs Al-Hilal
  // eloToScore() normaliza para escala 1–10 usando percentis do banco
  if (m.elo && m.elo > 0) {
    return eloToScore(m.elo);
  }

  // ── MÉTODO 2: Fallback stats (times ainda não enriquecidos pela API) ───────
  // Usa tierCap para evitar que ligas fracas inflem o ranking
  const liga = t.liga;
  const tier = getLigaTier(liga);
  const cap  = typeof tier === 'number'
    ? (tier >= 0.98 ? 10 : tier >= 0.90 ? 9.2 : tier >= 0.78 ? 8.2 : tier >= 0.58 ? 6.5 : 4.5)
    : 5;

  const s   = forcaStats(m);
  const sHi = tempStats(m);
  if (!s) return null;

  const sc1 = statsScore(enrichStats(s, m), liga, m.totalJogos || 0, m.porForca || null);
  const sc2 = sHi ? statsScore(enrichStats(sHi, m), liga, m.totalJogos || 0, m.porForca || null) : null;
  const sc  = sc2 != null ? sc1 * 0.6 + sc2 * 0.4 : sc1;
  return sc != null ? Math.round(Math.min(cap, sc) * 10) / 10 : null;
}

function scoreColor(v){
  if(v==null)return'var(--muted)';
  return v>=7?'var(--grn)':v>=5?'var(--yel)':'var(--red)';
}

function renderPerfil(t){
  const m=t.m;
  const s=forcaStats(m);    // força: sDom30 > s30
  const sf=formaStats(m);   // forma: sDom15 > s7
  const st=tempStats(m);    // histórico: s50 > sDom30
  const seur=europaStats(m);// performance europeia

  // Score calculado agora, ignorando eloNota do Firestore
  const sc=Object.assign({},s||{});
  if(sc.clean_sheet_pct==null&&m.cs!=null)sc.clean_sheet_pct=m.cs;
  if(sc.xgd==null&&m.xgd!=null)sc.xgd=m.xgd;
  const score=getScore(t);  // usa sDom30 + ligaTier + oppQuality // inclui tier cap + porForca penalty // usa porForca para SOS
  const sCol=scoreColor(score);

  // Badges
  const badges=[];
  if(m.tendencia==='subindo')badges.push(`<span class="badge bg-grn c-grn">↑ Subindo</span>`);
  else if(m.tendencia==='caindo')badges.push(`<span class="badge bg-red c-red">↓ Caindo</span>`);
  else badges.push(`<span class="badge" style="background:rgba(255,255,255,.05)">→ Estável</span>`);
  if(m.tendGolsTag==='alta')badges.push(`<span class="badge bg-red c-red">🔥 Muitos gols</span>`);
  else if(m.tendGolsTag==='baixa')badges.push(`<span class="badge bg-grn c-grn">🔒 Poucos gols</span>`);
  else badges.push(`<span class="badge bg-yel c-yel">⚖ Gols médio</span>`);
  if(m.fadiga>=4)badges.push(`<span class="badge bg-pur c-pur">😓 Fadiga ${m.fadiga}j</span>`);
  if(!m.enriquecido)badges.push(`<span class="badge" style="background:rgba(255,255,255,.04);color:var(--muted)">Sem xG</span>`);
  const _tier=getLigaTier(t.liga);
  if(_tier==='nacional')badges.push(`<span class="badge" style="background:rgba(0,212,255,.1);color:var(--acc)">🌍 Seleção</span>`);
  else if(_tier>=0.95)badges.push(`<span class="badge" style="background:rgba(0,229,160,.08);color:var(--grn)">★ Liga top</span>`);
  else if(_tier<=0.50)badges.push(`<span class="badge" style="background:rgba(255,77,109,.08);color:var(--red)">Liga menor</span>`);
  if(m.totalEur>0&&m.sEur15){const eurScore=calcScore(enrichStats(m.sEur15,m),t.liga,m.totalJogos,null);badges.push(`<span class="badge" style="background:rgba(79,150,244,.08);color:var(--blu)">CL/EUR: ${eurScore??'—'}</span>`);}

  // Momenta

  function momBox(janela, lbl, liga, totalJogos) {
    if (!janela) return `<div class="mom-box"><div class="mom-val c-muted">—</div><div class="mom-lbl">${lbl}</div></div>`;

  }

  // Jogos
  // Dedup: remove jogos duplicados pelo fixtureId ou pela combinação data+adversario
  const _seen={};
  const _jogos=(m.ultJogos||[]).filter(j=>{
    const k=j.fixtureId||(j.data+'|'+j.adversario+'|'+j.resultado);
    if(_seen[k])return false;_seen[k]=true;return true;

  const ultJogos=_jogos.map(j=>{
    const cor=j.resultado==='V'?'var(--grn)':j.resultado==='E'?'var(--acc)':'var(--red)';
    const bg=j.resultado==='V'?'var(--grn-dim)':j.resultado==='E'?'var(--acc-dim)':'var(--red-dim)';

    const xgHtml=j.xgf!=null?`<span class="jr-xg">${j.xgf}/${j.xga??'?'}</span>`:`<span class="jr-xg">—</span>`;
    return `<div class="jogo-row">
      <div class="jr-res" style="background:${bg};color:${cor}">${j.resultado}</div>

  // Comparativo table

    return `<tr><td>${lbl}</td><td style="color:${col}">${vs!=null?fmt(vs):'—'}</td><td class="c-muted">${vt!=null?fmt(vt):'—'}</td></tr>`;

function renderRanking(){
  // Por padrão o ranking mostra só clubes — seleções têm contexto diferente

  const list=[...LISTA]
    .filter(t=>_rankMode==='todos'?true:_rankMode==='selecoes'?isNacional(t):!isNacional(t))
    .sort((a,b)=>(getScore(b)||0)-(getScore(a)||0));
  const max=getScore(list[0])||10;
  g('rankContent').innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button id="rankModeToggle" data-mode="clubes" onclick="setRankMode('clubes',this)" style="padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--acc-dim);color:var(--acc);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🏆 Clubes</button>
      <button onclick="setRankMode('selecoes',g('rankModeToggle'))" style="padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🌍 Seleções</button>
      <button onclick="setRankMode('todos',g('rankModeToggle'))" style="padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Todos</button>
    </div>
    <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
      <span style="font-size:13px;font-weight:700">${list.length} times · Yellup Score</span>
      <span style="font-size:10px;color:var(--muted)">calculado dos resultados reais · ignora histórico de Elo</span>
    </div>
    <table class="rank-table">
      <thead><tr>
        <th style="width:32px">#</th><th>Time</th><th>Liga</th>
        <th class="r">Score</th><th class="r">Mom5</th>
        <th>Força</th>
        <th class="r">GF/j</th><th class="r">GS/j</th><th class="r">CS%</th>
        <th class="r">xGD</th><th class="r">BTTS%</th>
        <th>Forma</th>
      </tr></thead>
      <tbody>${list.slice(0,100).map((t,i)=>{
        const sc=getScore(t),col=scoreColor(sc);
        const s=bestStats(t.m);
        const pct=((sc||0)/max*100).toFixed(0);
        const momCol=(t.m.mom5||0)>0?'var(--grn)':(t.m.mom5||0)<0?'var(--red)':'var(--muted)';
        const forma=(s?.forma||[]).slice(0,5);
        return`<tr onclick="selectTime('${t.id}');switchTab('perfil')">
          <td><span class="rank-pos">${i+1}</span></td>
          <td><div style="display:flex;align-items:center;gap:7px">
            <img src="${t.logo}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.display='none'">
            <span style="font-weight:600">${t.nome}</span>
          </div></td>
          <td style="font-size:9px;color:var(--muted)">${t.liga||'—'}</td>
          <td class="r" style="font-size:9px" title="Tier da liga">${(()=>{const tier=getLigaTier(t.liga);if(tier==='nacional')return'<span style="color:var(--acc)">SL</span>';if(tier>=0.98)return'<span style="color:var(--grn)">T1</span>';if(tier>=0.90)return'<span style="color:var(--grn)">T2</span>';if(tier>=0.78)return'<span style="color:var(--yel)">T3</span>';if(tier>=0.65)return'<span style="color:var(--red)">T4</span>';return'<span style="color:var(--red)">T5</span>';})()}</td>
          <td class="r" style="color:${col};font-weight:700">${sc??'—'}</td>
          <td class="r" style="color:${momCol}">${t.m.mom5!=null?(t.m.mom5>0?'+':'')+t.m.mom5:'—'}</td>
          <td><div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}px;max-width:100px;background:${col}"></div></div></td>
          <td class="r">${s?.gf_media??'—'}</td>
          <td class="r">${s?.gs_media??'—'}</td>
          <td class="r" style="color:${(t.m.cs??0)>=40?'var(--grn)':(t.m.cs??0)<20?'var(--red)':'var(--yel)'}">${t.m.cs!=null?t.m.cs+'%':'—'}</td>
          <td class="r" style="color:${(t.m.xgd||0)>0.2?'var(--grn)':(t.m.xgd||0)<-0.2?'var(--red)':'var(--muted)'}">${t.m.xgd!=null?(t.m.xgd>0?'+':'')+t.m.xgd:'—'}</td>

          <td><div style="display:flex;gap:2px">${forma.map(r=>`<div class="fb" style="width:9px;height:9px;background:${r==='V'?'var(--grn-dim)':r==='E'?'var(--acc-dim)':'var(--red-dim)'}"></div>`).join('')}</div></td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

// ── CONFRONTO ─────────────────────────────────────────────────────────────────
function populateDrop(){
  document.addEventListener('click',e=>{
    if(!e.target.closest('#inCasa')&&!e.target.closest('#dropCasa'))g('dropCasa').style.display='none';
    if(!e.target.closest('#inFora')&&!e.target.closest('#dropFora'))g('dropFora').style.display='none';
  });
}
function filtConf(lado){
  const inp=g(lado==='casa'?'inCasa':'inFora');
  const drop=g(lado==='casa'?'dropCasa':'dropFora');
  const q=(inp.value||'').toLowerCase();
  const res=q.length<1?LISTA.slice(0,30):LISTA.filter(t=>t.nome.toLowerCase().includes(q)||t.liga.toLowerCase().includes(q)).slice(0,40);
  if(!res.length){drop.style.display='none';return;}
  drop.innerHTML=res.map(t=>`<div class="conf-drop-item" onclick="pickConf('${lado}','${t.id}','${t.nome.replace(/'/g,"\\'")}')">
    <span>${t.nome}</span><span style="font-size:9px;color:var(--muted)">${t.liga||''} · ${getScore(t)??'—'}</span>
  </div>`).join('');
  drop.style.display='block';
}
function pickConf(lado,id,nome){
  const inp=g(lado==='casa'?'inCasa':'inFora');
  const drop=g(lado==='casa'?'dropCasa':'dropFora');
  const hid=g(lado==='casa'?'idCasa':'idFora');
  const sel=g(lado==='casa'?'selCasa':'selFora');
  inp.value=nome;hid.value=id;
  sel.textContent='✓ '+nome;drop.style.display='none';
  calcConfronto();
}
function calcConfronto(){
  const casaId=g('idCasa').value,foraId=g('idFora').value;
  if(!casaId||!foraId||casaId===foraId)return;
  const casa=PERFIS[casaId],fora=PERFIS[foraId];
  if(!casa||!fora)return;
  try{
    const mc=casa.m,mf=fora.m;
    const sc=bestStats(mc),sf=bestStats(mf);

    // xG: usa dados reais da API se disponível, senão estatísticas de gols
    const atqC=mc.xgf??sc?.gf_media??1.3;
    const defC=mc.xga??sc?.gs_media??1.3;
    const atqF=mf.xgf??sf?.gf_media??1.3;
    const defF=mf.xga??sf?.gs_media??1.3;
    const ref=1.3;
    const xGC=+(atqC*defF/ref).toFixed(2);
    const xGF=+(atqF*defC/ref).toFixed(2);
    const xGT=+(xGC+xGF).toFixed(2);

    // BTTS e Over2.5
    const bttsP=mc.btts!=null&&mf.btts!=null?Math.round((mc.btts+mf.btts)/2):null;
    const ov25P=mc.over25!=null&&mf.over25!=null?Math.round((mc.over25+mf.over25)/2):
      Math.round(Math.max(0,Math.min(100,(xGT-2.5)*25+50)));

    // Probabilidades baseadas no score
    const scC=getScore(casa)||5, scF=getScore(fora)||5;
    const vantCasa=0.35;
    const diff=(scC+vantCasa)-scF;
    const ec=1/(1+Math.pow(10,-diff/3.5));
    let pC=Math.round(ec*100),pE=Math.abs(diff)<0.8?32:Math.abs(diff)<1.5?27:22;
    pC=Math.min(78,Math.max(12,pC));
    let pF=Math.max(8,100-pC-pE);
    const tot=pC+pE+pF;
    pC=Math.round(pC/tot*100);pE=Math.round(pE/tot*100);pF=100-pC-pE;

    const winner=pC>=pE&&pC>=pF?casa.nome:pE>=pC&&pE>=pF?'Empate':fora.nome;
    const wCol=pC>=pE&&pC>=pF?'var(--grn)':pE>=pC&&pE>=pF?'var(--acc)':'var(--yel)';
    const scCasa=Object.assign({},sc||{},{clean_sheet_pct:sc?.clean_sheet_pct??mc.cs,xgd:sc?.xgd??mc.xgd});
    const scFora=Object.assign({},sf||{},{clean_sheet_pct:sf?.clean_sheet_pct??mf.cs,xgd:sf?.xgd??mf.xgd});

    g('confResult').innerHTML=`
      <div class="card" style="margin-bottom:10px;text-align:center;padding:14px">
        <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:4px">VEREDITO</div>
        <div style="font-size:20px;font-weight:700;color:${wCol}">${winner}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">maior probabilidade · Yellup Score: ${scC} vs ${scF}</div>
      </div>
      <div class="conf-result-grid">
        <div class="cbox"><div class="cbox-val c-grn">${xGC}</div><div class="cbox-lbl">xG Casa${mc.xgf?'  (API)':' (calc)'}</div></div>
        <div class="cbox"><div class="cbox-val c-yel">${xGT}</div><div class="cbox-lbl">Total esperado</div></div>
        <div class="cbox"><div class="cbox-val c-acc">${xGF}</div><div class="cbox-lbl">xG Fora${mf.xgf?' (API)':' (calc)'}</div></div>
      </div>
      <div class="conf-prob-grid">
        <div class="cbox"><div class="cbox-val" style="color:${pC>=pF&&pC>=pE?'var(--grn)':'var(--muted2)'}">${pC}%</div><div class="cbox-lbl">🏠 ${casa.nome.split(' ')[0]}</div><div class="prob-bar-h" style="background:rgba(0,229,160,${pC/100})"></div></div>
        <div class="cbox"><div class="cbox-val" style="color:${pE>=pC&&pE>=pF?'var(--acc)':'var(--muted2)'}">${pE}%</div><div class="cbox-lbl">🤝 Empate</div><div class="prob-bar-h" style="background:rgba(0,212,255,${pE/100})"></div></div>
        <div class="cbox"><div class="cbox-val" style="color:${pF>=pC&&pF>=pE?'var(--yel)':'var(--muted2)'}">${pF}%</div><div class="cbox-lbl">✈ ${fora.nome.split(' ')[0]}</div><div class="prob-bar-h" style="background:rgba(255,209,102,${pF/100})"></div></div>
      </div>
      ${bttsP!=null||ov25P!=null?`<div class="conf-result-grid" style="margin-bottom:10px">
        ${bttsP!=null?`<div class="cbox"><div class="cbox-val" style="color:${bttsP>=55?'var(--red)':bttsP<=35?'var(--grn)':'var(--yel)'}">${bttsP}%</div><div class="cbox-lbl">BTTS</div></div>`:''}
        ${ov25P!=null?`<div class="cbox"><div class="cbox-val" style="color:${ov25P>=60?'var(--red)':ov25P<=40?'var(--grn)':'var(--yel)'}">${ov25P}%</div><div class="cbox-lbl">Over 2.5</div></div>`:''}
        <div class="cbox"><div class="cbox-val c-muted">${Math.round(Math.max(0,Math.min(100,(xGT-1.5)*30+35)))}%</div><div class="cbox-lbl">Over 1.5</div></div>
      </div>`:''}
      <div class="conf-teams-row">
        <div class="conf-team-card">
          <div style="font-weight:600;margin-bottom:6px;font-size:12px">${casa.nome} <span style="color:${scoreColor(scC)};font-family:'Space Mono',monospace">${scC}</span></div>
          <div class="forma-row">${(sc?.forma||[]).map(r=>`<div style="width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:${r==='V'?'var(--grn-dim)':r==='E'?'var(--acc-dim)':'var(--red-dim)'};color:${r==='V'?'var(--grn)':r==='E'?'var(--acc)':'var(--red)'}">${r}</div>`).join('')}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:4px">${sc?.vit??0}V ${sc?.emp??0}E ${sc?.der??0}D · ${sc?.pts_jogo??'—'} pts/j</div>
          ${mc.xgf?`<div style="font-size:9px;color:var(--muted)">xGF ${mc.xgf} · xGA ${mc.xga} · CS ${mc.cs??'—'}%</div>`:''}
        </div>
        <div class="conf-team-card">
          <div style="font-weight:600;margin-bottom:6px;font-size:12px">${fora.nome} <span style="color:${scoreColor(scF)};font-family:'Space Mono',monospace">${scF}</span></div>
          <div class="forma-row">${(sf?.forma||[]).map(r=>`<div style="width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:${r==='V'?'var(--grn-dim)':r==='E'?'var(--acc-dim)':'var(--red-dim)'};color:${r==='V'?'var(--grn)':r==='E'?'var(--acc)':'var(--red)'}">${r}</div>`).join('')}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:4px">${sf?.vit??0}V ${sf?.emp??0}E ${sf?.der??0}D · ${sf?.pts_jogo??'—'} pts/j</div>
          ${mf.xgf?`<div style="font-size:9px;color:var(--muted)">xGF ${mf.xgf} · xGA ${mf.xga} · CS ${mf.cs??'—'}%</div>`:''}
        </div>
      </div>
      <div id="confMinutos" style="margin-top:10px">
        <div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:10px"><div class="ld"></div>Carregando análise por minuto...</div>
      </div>`;

    Promise.all([getMinProfile(casa.teamId||casaId),getMinProfile(fora.teamId||foraId)]).then(([pC,pF])=>{
      const elMin=g('confMinutos');if(!elMin)return;
      const scA=pC?.sc||GLOBAL_SC,cnB=pF?.cn||GLOBAL_CN;
      const scB=pF?.sc||GLOBAL_SC,cnA=pC?.cn||GLOBAL_CN;
      const crossAB=calcCrossing(scA,cnB),crossBA=calcCrossing(scB,cnA);
      const total=+(crossAB.score+crossBA.score).toFixed(1);
      const crossCol=total>=20?'var(--red)':total>=12?'var(--yel)':'var(--grn)';
      const allHs=[...crossAB.hs.map(h=>({...h,dir:casa.nome.split(' ')[0]+'→'+fora.nome.split(' ')[0]})),
                   ...crossBA.hs.map(h=>({...h,dir:fora.nome.split(' ')[0]+'→'+casa.nome.split(' ')[0]}))];
      allHs.sort((a,b)=>b.c-a.c);
      elMin.innerHTML=`<div class="card" style="padding:14px">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px">Cruzamento de janelas de gols
          <span style="font-family:'Space Mono',monospace;font-weight:700;color:${crossCol};margin-left:8px">${total} ${total>=20?'🔥 Alta':total>=12?'⚡ Média':'🔒 Baixa'}</span>
        </div>
        ${renderMinChart(scA,cnB,true).split('').length>0?`
          <div style="font-size:9px;color:var(--muted2);margin-bottom:4px">🏠 ${casa.nome} ${pC?`(${pC.nsc} gols)`:''}</div>
          <div class="min-chart">${renderMinChart(scA,cnB,true)}</div>
          <div style="font-size:9px;color:var(--muted2);margin:8px 0 4px">✈ ${fora.nome} ${pF?`(${pF.nsc} gols)`:''}</div>
          <div class="min-chart">${renderMinChart(scB,cnA,false)}</div>`:''}
        ${allHs.slice(0,3).length?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          ${allHs.slice(0,3).map(h=>{const ic=h.c>=8?'var(--red)':h.c>=4?'var(--yel)':'var(--muted2)';return`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:9px">
            <span style="font-family:'Space Mono',monospace;font-weight:700;color:${ic};min-width:48px">${h.band}'</span>
            <span style="color:var(--muted2);flex:1">${h.dir} · atk ${h.atk.toFixed(0)}% × def ${h.def.toFixed(0)}%</span>
            <span style="font-family:'Space Mono',monospace;color:${ic}">${h.c.toFixed(1)}</span>
          </div>`;}).join('')}
        </div>`:''}
        <div class="min-legend" style="margin-top:8px"><span style="color:var(--grn)">■ Marcou</span><span style="color:var(--red)">■ Sofreu</span></div>
      </div>`;
    });
  }catch(e){console.error('[Confronto]',e);}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('on',['perfil','confronto','ranking'][i]===id);
  });
  document.querySelectorAll('.pane').forEach((p,i)=>{
    p.classList.toggle('on',['pane-perfil','pane-confronto','pane-ranking'][i]===('pane-'+id));
  });
}
function reloadAll(){PERFIS={};LISTA=[];SELECTED=null;loadData();}
async function enrichAll(){
  const btn=g('btnEnriquecer');btn.disabled=true;
  let offset=0,total=0,erros=0;
  try{
    while(true){
      btn.textContent=`Enriquecendo (${total})...`;
      const r=await fns.httpsCallable('enriquecerPerfisDiretamente')({batchSize:6,maxTimes:200,offset});
      total+=(r.data.processados||0); erros+=(r.data.erros||0);
      if((r.data.processados||0)<200) break;
      offset+=200;
    }
    setStatus('ok',`✓ ${total} times com Elo calculado (${erros} erros) — recarregando...`);
    btn.textContent='Enriquecer via API';btn.disabled=false;
    setTimeout(reloadAll,1500);
  }catch(e){setStatus('err','Erro: '+e.message);btn.textContent='Enriquecer via API';btn.disabled=false;}
}
async function normalizarElo(){
  const btn=g('btnNormElo');btn.disabled=true;btn.textContent='Normalizando...';
  try{
    const r=await fns.httpsCallable('normalizarElo')({});
    setStatus('ok',`✓ ${r.data.total} times normalizados — Elo: ${r.data.minElo}–${r.data.maxElo}`);
    btn.textContent='⚖ Normalizar Elo';btn.disabled=false;
    setTimeout(reloadAll,1000);
  }catch(e){setStatus('err','Erro normalizar: '+e.message);btn.textContent='⚖ Normalizar Elo';btn.disabled=false;}
}
async function recalcElo(){
  const btn=g('btnRecalc');btn.disabled=true;btn.textContent='Recalculando...';
  try{const r=await fns.httpsCallable('calcularPerfisManual')({});
    setStatus('ok',`✓ ${r.data.totalTimes} times recalculados`);
    btn.textContent='Recalcular';btn.disabled=false;
    setTimeout(reloadAll,1500);
  }catch(e){setStatus('err','Erro: '+e.message);btn.textContent='Recalcular';btn.disabled=false;}
}
function setStatus(state,msg){
  g('statusTxt').textContent=msg;
  g('statusDot').style.background=state==='ok'?'var(--grn)':state==='err'?'var(--red)':'var(--yel)';
}
function g(id){return document.getElementById(id);}
</script>
